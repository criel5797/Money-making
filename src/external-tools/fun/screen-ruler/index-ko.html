<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>화면 눈금자 - 온라인 픽셀 측정</title>
    <meta name="description" content="무료 온라인 화면 눈금자. 화면에서 픽셀 단위로 크기를 측정하세요.">
    <meta name="keywords" content="화면 눈금자, 픽셀 측정, 온라인 자, 스크린 룰러">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .ruler-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 20px;
            justify-content: center;
        }
        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .control-group label {
            font-size: 0.9rem;
            color: rgba(255,255,255,0.8);
        }
        .control-group select, .control-group input {
            padding: 8px 12px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
        }
        .ruler-container {
            position: relative;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .horizontal-ruler {
            height: 50px;
            background: #f5f5f5;
            position: relative;
            border-bottom: 2px solid #333;
        }
        .vertical-ruler {
            position: absolute;
            left: 0;
            top: 50px;
            width: 50px;
            height: 300px;
            background: #f5f5f5;
            border-right: 2px solid #333;
        }
        .measure-area {
            margin-left: 50px;
            height: 300px;
            background: #fff;
            position: relative;
            cursor: crosshair;
        }
        .tick {
            position: absolute;
            background: #333;
        }
        .tick-label {
            position: absolute;
            font-size: 10px;
            color: #333;
            font-family: monospace;
        }
        .measurement-box {
            position: absolute;
            border: 2px dashed #667eea;
            background: rgba(102, 126, 234, 0.1);
            pointer-events: none;
        }
        .measurement-label {
            position: absolute;
            background: #667eea;
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            white-space: nowrap;
        }
        .info-box {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .info-item {
            text-align: center;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 10px;
        }
        .info-value {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .info-label {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        .instructions {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고 영역</div>
        <header>
            <h1>📏 화면 눈금자</h1>
            <p class="subtitle">화면에서 픽셀 단위로 측정하세요</p>
        </header>
        <div class="ruler-section">
            <div class="controls">
                <div class="control-group">
                    <label>단위:</label>
                    <select id="unitSelect" onchange="updateRuler()">
                        <option value="px">픽셀 (px)</option>
                        <option value="cm">센티미터 (cm)</option>
                        <option value="in">인치 (in)</option>
                    </select>
                </div>
                <div class="control-group">
                    <label>DPI:</label>
                    <input type="number" id="dpiInput" value="96" min="72" max="300" style="width:70px" onchange="updateRuler()">
                </div>
            </div>
            <div class="ruler-container" id="rulerContainer">
                <div class="horizontal-ruler" id="hRuler"></div>
                <div class="vertical-ruler" id="vRuler"></div>
                <div class="measure-area" id="measureArea"></div>
            </div>
            <div class="info-box">
                <div class="info-item">
                    <div class="info-value" id="widthDisplay">0</div>
                    <div class="info-label">너비</div>
                </div>
                <div class="info-item">
                    <div class="info-value" id="heightDisplay">0</div>
                    <div class="info-label">높이</div>
                </div>
                <div class="info-item">
                    <div class="info-value" id="cursorDisplay">0, 0</div>
                    <div class="info-label">커서 위치</div>
                </div>
            </div>
            <p class="instructions">측정 영역을 드래그하여 크기를 측정하세요</p>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고 영역</div>
    </div>
    <script>
        var unit = 'px';
        var dpi = 96;
        var isDrawing = false;
        var startX = 0, startY = 0;
        var measureBox = null;
        var measureLabel = null;

        function updateRuler() {
            unit = document.getElementById('unitSelect').value;
            dpi = parseInt(document.getElementById('dpiInput').value) || 96;
            drawHorizontalRuler();
            drawVerticalRuler();
        }

        function pxToUnit(px) {
            if (unit === 'cm') return (px / dpi * 2.54).toFixed(1);
            if (unit === 'in') return (px / dpi).toFixed(2);
            return Math.round(px);
        }

        function getUnitSuffix() {
            if (unit === 'cm') return 'cm';
            if (unit === 'in') return 'in';
            return 'px';
        }

        function drawHorizontalRuler() {
            var ruler = document.getElementById('hRuler');
            var width = ruler.offsetWidth;
            ruler.innerHTML = '';

            var step = unit === 'px' ? 50 : (unit === 'cm' ? dpi / 2.54 : dpi);
            var smallStep = step / 5;

            for (var i = 0; i <= width; i += smallStep) {
                var tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.left = (50 + i) + 'px';
                tick.style.bottom = '0';
                tick.style.width = '1px';

                if (i % step < 1) {
                    tick.style.height = '20px';
                    var label = document.createElement('div');
                    label.className = 'tick-label';
                    label.style.left = (50 + i - 10) + 'px';
                    label.style.top = '5px';
                    label.textContent = pxToUnit(i);
                    ruler.appendChild(label);
                } else if (i % (step / 2) < 1) {
                    tick.style.height = '12px';
                } else {
                    tick.style.height = '6px';
                }
                ruler.appendChild(tick);
            }
        }

        function drawVerticalRuler() {
            var ruler = document.getElementById('vRuler');
            var height = ruler.offsetHeight;
            ruler.innerHTML = '';

            var step = unit === 'px' ? 50 : (unit === 'cm' ? dpi / 2.54 : dpi);
            var smallStep = step / 5;

            for (var i = 0; i <= height; i += smallStep) {
                var tick = document.createElement('div');
                tick.className = 'tick';
                tick.style.top = i + 'px';
                tick.style.right = '0';
                tick.style.height = '1px';

                if (i % step < 1) {
                    tick.style.width = '20px';
                    var label = document.createElement('div');
                    label.className = 'tick-label';
                    label.style.top = (i - 5) + 'px';
                    label.style.left = '5px';
                    label.textContent = pxToUnit(i);
                    ruler.appendChild(label);
                } else if (i % (step / 2) < 1) {
                    tick.style.width = '12px';
                } else {
                    tick.style.width = '6px';
                }
                ruler.appendChild(tick);
            }
        }

        var measureArea = document.getElementById('measureArea');

        measureArea.addEventListener('mousedown', function(e) {
            isDrawing = true;
            var rect = measureArea.getBoundingClientRect();
            startX = e.clientX - rect.left;
            startY = e.clientY - rect.top;

            if (measureBox) measureBox.remove();
            if (measureLabel) measureLabel.remove();

            measureBox = document.createElement('div');
            measureBox.className = 'measurement-box';
            measureBox.style.left = startX + 'px';
            measureBox.style.top = startY + 'px';
            measureArea.appendChild(measureBox);

            measureLabel = document.createElement('div');
            measureLabel.className = 'measurement-label';
            measureArea.appendChild(measureLabel);
        });

        measureArea.addEventListener('mousemove', function(e) {
            var rect = measureArea.getBoundingClientRect();
            var x = e.clientX - rect.left;
            var y = e.clientY - rect.top;

            document.getElementById('cursorDisplay').textContent =
                pxToUnit(x) + ', ' + pxToUnit(y) + ' ' + getUnitSuffix();

            if (isDrawing && measureBox) {
                var width = Math.abs(x - startX);
                var height = Math.abs(y - startY);
                var left = Math.min(x, startX);
                var top = Math.min(y, startY);

                measureBox.style.left = left + 'px';
                measureBox.style.top = top + 'px';
                measureBox.style.width = width + 'px';
                measureBox.style.height = height + 'px';

                measureLabel.style.left = (left + width + 5) + 'px';
                measureLabel.style.top = (top + height / 2 - 10) + 'px';
                measureLabel.textContent = pxToUnit(width) + ' × ' + pxToUnit(height) + ' ' + getUnitSuffix();

                document.getElementById('widthDisplay').textContent = pxToUnit(width) + ' ' + getUnitSuffix();
                document.getElementById('heightDisplay').textContent = pxToUnit(height) + ' ' + getUnitSuffix();
            }
        });

        measureArea.addEventListener('mouseup', function() {
            isDrawing = false;
        });

        measureArea.addEventListener('mouseleave', function() {
            isDrawing = false;
        });

        updateRuler();
    </script>
</body>
</html>
