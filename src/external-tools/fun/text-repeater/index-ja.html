<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テキストリピーター - 文字を繰り返す</title>
    <meta name="description" content="テキストを好きな回数繰り返すツールです。コピペに便利です。">
    <meta name="keywords" content="テキスト繰り返し, 文字コピー, テキスト生成, リピーター">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .main-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .input-group { margin-bottom: 20px; }
        label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.9);
            font-size: 0.9rem;
        }
        input, textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
        }
        input:focus, textarea:focus {
            outline: none;
            border-color: #fff;
            background: rgba(255,255,255,0.15);
        }
        input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.5); }
        textarea {
            height: 80px;
            resize: none;
        }
        .options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }
        .option-group label {
            font-size: 0.85rem;
            margin-bottom: 6px;
        }
        .option-group input {
            text-align: center;
        }
        .separator-options {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .sep-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            background: transparent;
            color: white;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s;
        }
        .sep-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: #fff;
        }
        .generate-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39,174,96,0.4);
        }
        .result-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .result-header h3 { font-size: 1rem; }
        .char-count {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.7);
        }
        .result-box {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 15px;
            min-height: 100px;
            max-height: 200px;
            overflow-y: auto;
            word-break: break-all;
            white-space: pre-wrap;
            font-size: 0.95rem;
        }
        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .copy-btn, .clear-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .copy-btn { background: #3498db; color: white; }
        .clear-btn { background: rgba(255,255,255,0.2); color: white; }
        .copied {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8);
            padding: 15px 30px;
            border-radius: 10px;
            z-index: 100;
            animation: fadeInOut 1.5s ease;
        }
        @keyframes fadeInOut {
            0%, 100% { opacity: 0; }
            20%, 80% { opacity: 1; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告エリア</div>
        <header>
            <h1>🔄 テキストリピーター</h1>
            <p class="subtitle">テキストを好きな回数繰り返します</p>
        </header>
        <div class="main-section">
            <div class="input-group">
                <label>繰り返すテキスト</label>
                <textarea id="inputText" placeholder="繰り返すテキストを入力してください"></textarea>
            </div>
            <div class="options">
                <div class="option-group">
                    <label>繰り返し回数</label>
                    <input type="number" id="repeatCount" value="10" min="1" max="1000">
                </div>
                <div class="option-group">
                    <label>区切り文字</label>
                    <input type="text" id="customSep" placeholder="なし">
                </div>
            </div>
            <div class="separator-options">
                <button class="sep-btn active" data-sep="">なし</button>
                <button class="sep-btn" data-sep=" ">スペース</button>
                <button class="sep-btn" data-sep="\n">改行</button>
                <button class="sep-btn" data-sep=", ">カンマ</button>
            </div>
            <button class="generate-btn" onclick="generate()">生成</button>
            <div class="result-section">
                <div class="result-header">
                    <h3>📝 結果</h3>
                    <span class="char-count" id="charCount">0文字</span>
                </div>
                <div class="result-box" id="result"></div>
                <div class="btn-group">
                    <button class="copy-btn" onclick="copyResult()">コピー</button>
                    <button class="clear-btn" onclick="clearAll()">クリア</button>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告エリア</div>
    </div>
    <script>
        var separator = '';

        document.querySelectorAll('.sep-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.sep-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                separator = this.dataset.sep;
                document.getElementById('customSep').value = separator === '\\n' ? '' : separator;
            });
        });

        document.getElementById('customSep').addEventListener('input', function() {
            separator = this.value;
            document.querySelectorAll('.sep-btn').forEach(function(b) { b.classList.remove('active'); });
        });

        function generate() {
            var text = document.getElementById('inputText').value;
            var count = parseInt(document.getElementById('repeatCount').value) || 1;
            count = Math.min(count, 1000);

            if (!text) {
                document.getElementById('result').textContent = 'テキストを入力してください';
                document.getElementById('charCount').textContent = '0文字';
                return;
            }

            var sep = separator === '\\n' ? '\n' : separator;
            var arr = [];
            for (var i = 0; i < count; i++) arr.push(text);
            var result = arr.join(sep);

            document.getElementById('result').textContent = result;
            document.getElementById('charCount').textContent = result.length.toLocaleString() + '文字';
        }

        function copyResult() {
            var text = document.getElementById('result').textContent;
            if (text && text !== 'テキストを入力してください') {
                navigator.clipboard.writeText(text).then(function() {
                    showCopied();
                });
            }
        }

        function clearAll() {
            document.getElementById('inputText').value = '';
            document.getElementById('result').textContent = '';
            document.getElementById('charCount').textContent = '0文字';
        }

        function showCopied() {
            var div = document.createElement('div');
            div.className = 'copied';
            div.textContent = 'コピーしました！';
            document.body.appendChild(div);
            setTimeout(function() { div.remove(); }, 1500);
        }
    </script>
</body>
</html>
