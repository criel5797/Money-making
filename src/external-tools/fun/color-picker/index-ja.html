<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カラーピッカー - オンライン色選択</title>
    <meta name="description" content="無料オンラインカラーピッカー。HEX、RGB、HSLカラーコードを簡単に選択してコピーできます。">
    <meta name="keywords" content="カラーピッカー, HEX色, RGB色, カラーコード, 色選択">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .picker-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .color-preview {
            width: 100%;
            height: 150px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.2);
            transition: background-color 0.3s;
        }
        .color-input-wrapper {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .color-input {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .color-values {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .color-value-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .color-label {
            width: 50px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .color-value-input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-family: monospace;
            font-size: 1rem;
        }
        .copy-btn {
            padding: 12px 18px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .copy-btn:hover {
            transform: scale(1.05);
        }
        .copy-btn.copied {
            background: linear-gradient(135deg, #3498db, #2980b9);
        }
        .sliders-section {
            margin-top: 25px;
        }
        .slider-group {
            margin-bottom: 15px;
        }
        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 0.9rem;
        }
        .color-slider {
            width: 100%;
            height: 12px;
            border-radius: 6px;
            -webkit-appearance: none;
            background: linear-gradient(to right, #000, #fff);
        }
        .color-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        #redSlider { background: linear-gradient(to right, #000, #f00); }
        #greenSlider { background: linear-gradient(to right, #000, #0f0); }
        #blueSlider { background: linear-gradient(to right, #000, #00f); }
        .saved-colors {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .saved-colors h3 {
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .saved-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .saved-color {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            cursor: pointer;
            border: 2px solid rgba(255,255,255,0.3);
            transition: transform 0.2s;
        }
        .saved-color:hover {
            transform: scale(1.1);
        }
        .save-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: 2px dashed rgba(255,255,255,0.3);
            background: transparent;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告エリア</div>
        <header>
            <h1>🎨 カラーピッカー</h1>
            <p class="subtitle">色を選択してコードをコピー</p>
        </header>
        <div class="picker-section">
            <div class="color-preview" id="colorPreview" style="background-color: #667eea"></div>
            <div class="color-input-wrapper">
                <input type="color" class="color-input" id="colorInput" value="#667eea" onchange="updateFromPicker(this.value)">
            </div>
            <div class="color-values">
                <div class="color-value-row">
                    <span class="color-label">HEX</span>
                    <input type="text" class="color-value-input" id="hexValue" value="#667eea" readonly>
                    <button class="copy-btn" onclick="copyValue('hexValue')">コピー</button>
                </div>
                <div class="color-value-row">
                    <span class="color-label">RGB</span>
                    <input type="text" class="color-value-input" id="rgbValue" value="rgb(102, 126, 234)" readonly>
                    <button class="copy-btn" onclick="copyValue('rgbValue')">コピー</button>
                </div>
                <div class="color-value-row">
                    <span class="color-label">HSL</span>
                    <input type="text" class="color-value-input" id="hslValue" value="hsl(229, 75%, 66%)" readonly>
                    <button class="copy-btn" onclick="copyValue('hslValue')">コピー</button>
                </div>
            </div>
            <div class="sliders-section">
                <div class="slider-group">
                    <div class="slider-label"><span>R (赤)</span><span id="redValue">102</span></div>
                    <input type="range" class="color-slider" id="redSlider" min="0" max="255" value="102" oninput="updateFromSliders()">
                </div>
                <div class="slider-group">
                    <div class="slider-label"><span>G (緑)</span><span id="greenValue">126</span></div>
                    <input type="range" class="color-slider" id="greenSlider" min="0" max="255" value="126" oninput="updateFromSliders()">
                </div>
                <div class="slider-group">
                    <div class="slider-label"><span>B (青)</span><span id="blueValue">234</span></div>
                    <input type="range" class="color-slider" id="blueSlider" min="0" max="255" value="234" oninput="updateFromSliders()">
                </div>
            </div>
            <div class="saved-colors">
                <h3>💾 保存した色</h3>
                <div class="saved-list" id="savedList">
                    <button class="save-btn" onclick="saveColor()">+</button>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告エリア</div>
    </div>
    <script>
        var savedColors = JSON.parse(localStorage.getItem('savedColors') || '[]');

        function hexToRgb(hex) {
            var result = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
            return result ? {
                r: parseInt(result[1], 16),
                g: parseInt(result[2], 16),
                b: parseInt(result[3], 16)
            } : null;
        }

        function rgbToHsl(r, g, b) {
            r /= 255; g /= 255; b /= 255;
            var max = Math.max(r, g, b), min = Math.min(r, g, b);
            var h, s, l = (max + min) / 2;
            if (max === min) {
                h = s = 0;
            } else {
                var d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }
            return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
        }

        function updateColor(r, g, b) {
            var hex = '#' + [r, g, b].map(function(x) {
                return x.toString(16).padStart(2, '0');
            }).join('');
            var hsl = rgbToHsl(r, g, b);

            document.getElementById('colorPreview').style.backgroundColor = hex;
            document.getElementById('colorInput').value = hex;
            document.getElementById('hexValue').value = hex;
            document.getElementById('rgbValue').value = 'rgb(' + r + ', ' + g + ', ' + b + ')';
            document.getElementById('hslValue').value = 'hsl(' + hsl.h + ', ' + hsl.s + '%, ' + hsl.l + '%)';

            document.getElementById('redSlider').value = r;
            document.getElementById('greenSlider').value = g;
            document.getElementById('blueSlider').value = b;
            document.getElementById('redValue').textContent = r;
            document.getElementById('greenValue').textContent = g;
            document.getElementById('blueValue').textContent = b;
        }

        function updateFromPicker(hex) {
            var rgb = hexToRgb(hex);
            if (rgb) updateColor(rgb.r, rgb.g, rgb.b);
        }

        function updateFromSliders() {
            var r = parseInt(document.getElementById('redSlider').value);
            var g = parseInt(document.getElementById('greenSlider').value);
            var b = parseInt(document.getElementById('blueSlider').value);
            updateColor(r, g, b);
        }

        function copyValue(id) {
            var input = document.getElementById(id);
            navigator.clipboard.writeText(input.value);
            var btn = input.nextElementSibling;
            btn.textContent = '完了!';
            btn.classList.add('copied');
            setTimeout(function() {
                btn.textContent = 'コピー';
                btn.classList.remove('copied');
            }, 1500);
        }

        function saveColor() {
            var hex = document.getElementById('hexValue').value;
            if (!savedColors.includes(hex)) {
                savedColors.push(hex);
                if (savedColors.length > 10) savedColors.shift();
                localStorage.setItem('savedColors', JSON.stringify(savedColors));
                renderSavedColors();
            }
        }

        function loadSavedColor(hex) {
            updateFromPicker(hex);
        }

        function renderSavedColors() {
            var list = document.getElementById('savedList');
            list.innerHTML = '';
            savedColors.forEach(function(hex) {
                var div = document.createElement('div');
                div.className = 'saved-color';
                div.style.backgroundColor = hex;
                div.onclick = function() { loadSavedColor(hex); };
                list.appendChild(div);
            });
            var btn = document.createElement('button');
            btn.className = 'save-btn';
            btn.textContent = '+';
            btn.onclick = saveColor;
            list.appendChild(btn);
        }

        renderSavedColors();
    </script>
</body>
</html>
