<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>性格診断</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .intro { text-align: center; margin-bottom: 25px; }
        .intro p { opacity: .9; line-height: 1.6; }
        .start-btn, .restart-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .start-btn:hover, .restart-btn:hover { transform: scale(1.02); }
        .question-section { display: none; }
        .progress { background: rgba(255,255,255,.2); border-radius: 10px; height: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #22c55e, #16a34a); height: 100%; transition: width .3s; }
        .question-num { font-size: .9rem; opacity: .7; margin-bottom: 10px; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 25px; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 15px 20px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: left; transition: all .3s; }
        .option-btn:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.5); }
        .result-section { display: none; text-align: center; }
        .result-type { font-size: 4rem; margin-bottom: 15px; }
        .result-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 15px; }
        .result-desc { font-size: 1rem; line-height: 1.7; opacity: .9; margin-bottom: 20px; }
        .traits { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .trait { background: rgba(255,255,255,.2); padding: 8px 16px; border-radius: 20px; font-size: .9rem; }
        .share-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🧠 性格診断</h1>
        </header>
        <div class="game-section">
            <div class="intro-section" id="introSection">
                <div class="intro">
                    <p>12の質問に答えて<br>あなたの性格タイプを発見しよう！</p>
                </div>
                <button class="start-btn" onclick="startTest()">診断スタート</button>
            </div>
            <div class="question-section" id="questionSection">
                <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
                <div class="question-num" id="questionNum"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>
            <div class="result-section" id="resultSection">
                <div class="result-type" id="resultType"></div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="traits" id="traits"></div>
                <button class="share-btn" onclick="shareResult()">結果をシェア</button>
                <button class="restart-btn" onclick="restartTest()">もう一度診断する</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var questions = [
            { q: "週末に時間ができたら？", a: ["友達と集まる", "家で一人でゆっくり"], type: ["E", "I"] },
            { q: "新しいプロジェクトを始める時？", a: ["全体像を先に見る", "詳細な計画から立てる"], type: ["N", "S"] },
            { q: "重要な決断をする時？", a: ["論理と原則に従う", "感情と価値観を考慮する"], type: ["T", "F"] },
            { q: "旅行の計画を立てる時？", a: ["事前に詳しく計画する", "その場の流れに任せる"], type: ["J", "P"] },
            { q: "パーティーでは？", a: ["多くの人と話す", "少数の親しい人と話す"], type: ["E", "I"] },
            { q: "問題を解決する時？", a: ["想像力と直感を使う", "経験と事実に頼る"], type: ["N", "S"] },
            { q: "友達が悩みを打ち明けたら？", a: ["解決策を提案する", "共感して聞く"], type: ["T", "F"] },
            { q: "仕事の進め方は？", a: ["締め切り前に終わらせる", "ギリギリで一気にやる"], type: ["J", "P"] },
            { q: "新しい人に会う時？", a: ["自分から話しかける", "相手が来るのを待つ"], type: ["E", "I"] },
            { q: "本や映画を見る時？", a: ["隠された意味を探す", "そのまま楽しむ"], type: ["N", "S"] },
            { q: "チームプロジェクトでは？", a: ["効率性を重視する", "チームの調和を重視する"], type: ["T", "F"] },
            { q: "生活スタイルは？", a: ["体系的で整理された", "柔軟で自由な"], type: ["J", "P"] }
        ];

        var types = {
            "INTJ": { emoji: "🦉", title: "建築家", desc: "独立的で分析的な思考を持つあなたは、複雑な問題を解決することを楽しみます。高い目標を設定し、体系的に達成していきます。", traits: ["分析的", "独立的", "戦略的", "完璧主義"] },
            "INTP": { emoji: "🔬", title: "論理学者", desc: "好奇心が強く創造的なあなたは、理論やアイデアに魅了されます。論理的分析を通じて世界を理解しようとします。", traits: ["論理的", "創造的", "好奇心", "分析的"] },
            "ENTJ": { emoji: "👔", title: "指揮官", desc: "カリスマ性があり決断力のあるリーダーです。ビジョンを示し、チームを率いて目標を達成します。", traits: ["リーダーシップ", "決断力", "効率的", "自信"] },
            "ENTP": { emoji: "💡", title: "討論者", desc: "挑戦を楽しみ、新しいアイデアを探求します。議論を通じて真実を見つけます。", traits: ["革新的", "挑戦的", "機知に富む", "適応力"] },
            "INFJ": { emoji: "🌙", title: "提唱者", desc: "理想主義的で洞察力に優れています。他者を助け、世界をより良い場所にしたいと考えています。", traits: ["洞察力", "理想主義", "献身的", "創造的"] },
            "INFP": { emoji: "🦋", title: "仲介者", desc: "深い感性と豊かな想像力を持っています。本物の人生と意味を追求します。", traits: ["理想主義", "感情的", "創造的", "共感力"] },
            "ENFJ": { emoji: "🌟", title: "主人公", desc: "温かくカリスマ的なあなたは、他者にインスピレーションを与えます。チームをまとめる能力があります。", traits: ["カリスマ", "共感力", "リーダーシップ", "情熱的"] },
            "ENFP": { emoji: "🎨", title: "広報運動家", desc: "情熱的で創造的な自由な魂です。可能性を見出し、人々とつながることを楽しみます。", traits: ["情熱的", "創造的", "社交的", "楽観的"] },
            "ISTJ": { emoji: "📋", title: "管理者", desc: "責任感があり信頼できます。伝統とルールを尊重し、誠実に仕事をこなします。", traits: ["責任感", "信頼性", "体系的", "現実的"] },
            "ISFJ": { emoji: "🛡️", title: "擁護者", desc: "温かく献身的なあなたは、愛する人を守ります。細やかで思いやりがあります。", traits: ["献身的", "思いやり", "信頼性", "忍耐力"] },
            "ESTJ": { emoji: "🏛️", title: "幹部", desc: "組織的で決断力があります。ルールと秩序を重視し、効率的に仕事をこなします。", traits: ["組織的", "決断力", "責任感", "実用的"] },
            "ESFJ": { emoji: "🤝", title: "領事", desc: "社交的で協力的です。他者を気遣い、調和のとれた環境を作ることを好みます。", traits: ["社交的", "思いやり", "協力的", "忠誠心"] },
            "ISTP": { emoji: "🔧", title: "巨匠", desc: "論理的で実用的です。手を動かして物を作り、問題を解決することを楽しみます。", traits: ["実用的", "論理的", "独立的", "適応力"] },
            "ISFP": { emoji: "🎭", title: "冒険家", desc: "芸術的センスと温かい心を持っています。今を楽しみ、美しさを追求します。", traits: ["芸術的", "穏やか", "柔軟", "感情的"] },
            "ESTP": { emoji: "🏄", title: "起業家", desc: "エネルギッシュで行動志向です。リスクを取り、即座の結果を追求します。", traits: ["大胆", "エネルギー", "実用的", "適応力"] },
            "ESFP": { emoji: "🎉", title: "エンターテイナー", desc: "社交的で即興的です。人生を楽しみ、周りの人に喜びをもたらします。", traits: ["社交的", "楽観的", "即興的", "情熱的"] }
        };

        var currentQ = 0;
        var scores = { E: 0, I: 0, N: 0, S: 0, T: 0, F: 0, J: 0, P: 0 };

        function startTest() {
            currentQ = 0;
            scores = { E: 0, I: 0, N: 0, S: 0, T: 0, F: 0, J: 0, P: 0 };
            document.getElementById('introSection').style.display = 'none';
            document.getElementById('questionSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            var q = questions[currentQ];
            document.getElementById('progressBar').style.width = ((currentQ / questions.length) * 100) + '%';
            document.getElementById('questionNum').textContent = '質問 ' + (currentQ + 1) + ' / ' + questions.length;
            document.getElementById('questionText').textContent = q.q;
            var optionsHtml = '';
            for (var i = 0; i < q.a.length; i++) {
                optionsHtml += '<button class="option-btn" onclick="selectOption(' + i + ')">' + q.a[i] + '</button>';
            }
            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectOption(idx) {
            var q = questions[currentQ];
            scores[q.type[idx]]++;
            currentQ++;
            if (currentQ < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            var mbti = '';
            mbti += scores.E >= scores.I ? 'E' : 'I';
            mbti += scores.N >= scores.S ? 'N' : 'S';
            mbti += scores.T >= scores.F ? 'T' : 'F';
            mbti += scores.J >= scores.P ? 'J' : 'P';

            var result = types[mbti];
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultType').textContent = result.emoji;
            document.getElementById('resultTitle').textContent = mbti + ' - ' + result.title;
            document.getElementById('resultDesc').textContent = result.desc;

            var traitsHtml = '';
            for (var i = 0; i < result.traits.length; i++) {
                traitsHtml += '<span class="trait">' + result.traits[i] + '</span>';
            }
            document.getElementById('traits').innerHTML = traitsHtml;

            var history = JSON.parse(localStorage.getItem('personality_ja') || '[]');
            history.unshift({ type: mbti, date: new Date().toLocaleDateString() });
            if (history.length > 10) history.pop();
            localStorage.setItem('personality_ja', JSON.stringify(history));
        }

        function shareResult() {
            var resultTitle = document.getElementById('resultTitle').textContent;
            var text = '私の性格タイプ: ' + resultTitle + ' - 性格診断で確認してみて！';
            if (navigator.share) {
                navigator.share({ title: '性格診断結果', text: text });
            } else {
                navigator.clipboard.writeText(text);
                alert('結果がクリップボードにコピーされました！');
            }
        }

        function restartTest() {
            document.getElementById('introSection').style.display = 'block';
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
