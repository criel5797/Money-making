<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personality Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .intro { text-align: center; margin-bottom: 25px; }
        .intro p { opacity: .9; line-height: 1.6; }
        .start-btn, .restart-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .start-btn:hover, .restart-btn:hover { transform: scale(1.02); }
        .question-section { display: none; }
        .progress { background: rgba(255,255,255,.2); border-radius: 10px; height: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #22c55e, #16a34a); height: 100%; transition: width .3s; }
        .question-num { font-size: .9rem; opacity: .7; margin-bottom: 10px; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 25px; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 15px 20px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: left; transition: all .3s; }
        .option-btn:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.5); }
        .result-section { display: none; text-align: center; }
        .result-type { font-size: 4rem; margin-bottom: 15px; }
        .result-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 15px; }
        .result-desc { font-size: 1rem; line-height: 1.7; opacity: .9; margin-bottom: 20px; }
        .traits { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .trait { background: rgba(255,255,255,.2); padding: 8px 16px; border-radius: 20px; font-size: .9rem; }
        .share-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🧠 Personality Test</h1>
        </header>
        <div class="game-section">
            <div class="intro-section" id="introSection">
                <div class="intro">
                    <p>Answer 12 questions and<br>discover your personality type!</p>
                </div>
                <button class="start-btn" onclick="startTest()">Start Test</button>
            </div>
            <div class="question-section" id="questionSection">
                <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
                <div class="question-num" id="questionNum"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>
            <div class="result-section" id="resultSection">
                <div class="result-type" id="resultType"></div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="traits" id="traits"></div>
                <button class="share-btn" onclick="shareResult()">Share Result</button>
                <button class="restart-btn" onclick="restartTest()">Take Test Again</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var questions = [
            { q: "When you have free time on weekends?", a: ["Meet up with friends", "Stay home and relax alone"], type: ["E", "I"] },
            { q: "When starting a new project?", a: ["See the big picture first", "Plan the details first"], type: ["N", "S"] },
            { q: "When making important decisions?", a: ["Follow logic and principles", "Consider feelings and values"], type: ["T", "F"] },
            { q: "When planning a trip?", a: ["Plan everything in advance", "Go with the flow"], type: ["J", "P"] },
            { q: "At a party, you?", a: ["Talk to many people", "Talk to a few close friends"], type: ["E", "I"] },
            { q: "When solving problems?", a: ["Use imagination and intuition", "Rely on experience and facts"], type: ["N", "S"] },
            { q: "When a friend shares their problems?", a: ["Offer solutions", "Listen and empathize"], type: ["T", "F"] },
            { q: "Your work style is?", a: ["Finish before the deadline", "Rush to finish at the last minute"], type: ["J", "P"] },
            { q: "When meeting new people?", a: ["Approach and start conversation", "Wait for them to approach"], type: ["E", "I"] },
            { q: "When reading books or watching movies?", a: ["Look for hidden meanings", "Enjoy as it is"], type: ["N", "S"] },
            { q: "In team projects?", a: ["Focus on efficiency", "Focus on team harmony"], type: ["T", "F"] },
            { q: "Your lifestyle is?", a: ["Organized and structured", "Flexible and free"], type: ["J", "P"] }
        ];

        var types = {
            "INTJ": { emoji: "🦉", title: "Architect", desc: "Independent and analytical, you enjoy solving complex problems. You set high goals and achieve them systematically.", traits: ["Analytical", "Independent", "Strategic", "Perfectionist"] },
            "INTP": { emoji: "🔬", title: "Logician", desc: "Curious and creative, you are fascinated by theories and ideas. You understand the world through logical analysis.", traits: ["Logical", "Creative", "Curious", "Analytical"] },
            "ENTJ": { emoji: "👔", title: "Commander", desc: "A charismatic and decisive leader. You present visions and lead teams to achieve goals.", traits: ["Leadership", "Decisive", "Efficient", "Confident"] },
            "ENTP": { emoji: "💡", title: "Debater", desc: "You enjoy challenges and exploring new ideas. You seek truth through debate.", traits: ["Innovative", "Challenging", "Witty", "Adaptable"] },
            "INFJ": { emoji: "🌙", title: "Advocate", desc: "Idealistic with great insight. You help others and want to make the world a better place.", traits: ["Insightful", "Idealistic", "Devoted", "Creative"] },
            "INFP": { emoji: "🦋", title: "Mediator", desc: "Deep emotions and rich imagination. You pursue authentic life and meaning.", traits: ["Idealistic", "Emotional", "Creative", "Empathetic"] },
            "ENFJ": { emoji: "🌟", title: "Protagonist", desc: "Warm and charismatic, you inspire others. You have the ability to unite teams.", traits: ["Charismatic", "Empathetic", "Leadership", "Passionate"] },
            "ENFP": { emoji: "🎨", title: "Campaigner", desc: "A passionate and creative free spirit. You see possibilities and enjoy connecting with people.", traits: ["Passionate", "Creative", "Social", "Optimistic"] },
            "ISTJ": { emoji: "📋", title: "Logistician", desc: "Responsible and reliable. You respect tradition and rules, working diligently.", traits: ["Responsible", "Reliable", "Systematic", "Practical"] },
            "ISFJ": { emoji: "🛡️", title: "Defender", desc: "Warm and devoted, you protect those you love. You are attentive and considerate.", traits: ["Devoted", "Considerate", "Reliable", "Patient"] },
            "ESTJ": { emoji: "🏛️", title: "Executive", desc: "Organized and decisive. You value rules and order, working efficiently.", traits: ["Organized", "Decisive", "Responsible", "Practical"] },
            "ESFJ": { emoji: "🤝", title: "Consul", desc: "Social and cooperative. You enjoy caring for others and creating harmonious environments.", traits: ["Social", "Considerate", "Cooperative", "Loyal"] },
            "ISTP": { emoji: "🔧", title: "Virtuoso", desc: "Logical and practical. You enjoy building things and solving problems hands-on.", traits: ["Practical", "Logical", "Independent", "Adaptable"] },
            "ISFP": { emoji: "🎭", title: "Adventurer", desc: "Artistic sense with a warm heart. You enjoy the present and pursue beauty.", traits: ["Artistic", "Gentle", "Flexible", "Emotional"] },
            "ESTP": { emoji: "🏄", title: "Entrepreneur", desc: "Energetic and action-oriented. You take risks and pursue immediate results.", traits: ["Bold", "Energetic", "Practical", "Adaptable"] },
            "ESFP": { emoji: "🎉", title: "Entertainer", desc: "Social and spontaneous. You enjoy life and bring joy to those around you.", traits: ["Social", "Optimistic", "Spontaneous", "Passionate"] }
        };

        var currentQ = 0;
        var scores = { E: 0, I: 0, N: 0, S: 0, T: 0, F: 0, J: 0, P: 0 };

        function startTest() {
            currentQ = 0;
            scores = { E: 0, I: 0, N: 0, S: 0, T: 0, F: 0, J: 0, P: 0 };
            document.getElementById('introSection').style.display = 'none';
            document.getElementById('questionSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            var q = questions[currentQ];
            document.getElementById('progressBar').style.width = ((currentQ / questions.length) * 100) + '%';
            document.getElementById('questionNum').textContent = 'Question ' + (currentQ + 1) + ' / ' + questions.length;
            document.getElementById('questionText').textContent = q.q;
            var optionsHtml = '';
            for (var i = 0; i < q.a.length; i++) {
                optionsHtml += '<button class="option-btn" onclick="selectOption(' + i + ')">' + q.a[i] + '</button>';
            }
            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectOption(idx) {
            var q = questions[currentQ];
            scores[q.type[idx]]++;
            currentQ++;
            if (currentQ < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            var mbti = '';
            mbti += scores.E >= scores.I ? 'E' : 'I';
            mbti += scores.N >= scores.S ? 'N' : 'S';
            mbti += scores.T >= scores.F ? 'T' : 'F';
            mbti += scores.J >= scores.P ? 'J' : 'P';

            var result = types[mbti];
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultType').textContent = result.emoji;
            document.getElementById('resultTitle').textContent = mbti + ' - ' + result.title;
            document.getElementById('resultDesc').textContent = result.desc;

            var traitsHtml = '';
            for (var i = 0; i < result.traits.length; i++) {
                traitsHtml += '<span class="trait">' + result.traits[i] + '</span>';
            }
            document.getElementById('traits').innerHTML = traitsHtml;

            var history = JSON.parse(localStorage.getItem('personality_en') || '[]');
            history.unshift({ type: mbti, date: new Date().toLocaleDateString() });
            if (history.length > 10) history.pop();
            localStorage.setItem('personality_en', JSON.stringify(history));
        }

        function shareResult() {
            var resultTitle = document.getElementById('resultTitle').textContent;
            var text = 'My personality type: ' + resultTitle + ' - Find out yours with the Personality Test!';
            if (navigator.share) {
                navigator.share({ title: 'Personality Test Result', text: text });
            } else {
                navigator.clipboard.writeText(text);
                alert('Result copied to clipboard!');
            }
        }

        function restartTest() {
            document.getElementById('introSection').style.display = 'block';
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
