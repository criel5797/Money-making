<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>우선순위 매트릭스</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #3498db, #2980b9); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.6rem; margin-bottom: 10px; }
        .add-task { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-task input { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-task button { padding: 12px 20px; border: none; border-radius: 10px; background: rgba(0,0,0,.3); color: #fff; cursor: pointer; }
        .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .quadrant { background: rgba(255,255,255,.1); border-radius: 12px; padding: 15px; min-height: 150px; }
        .quadrant-title { font-size: .85rem; font-weight: 600; margin-bottom: 10px; padding-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,.2); }
        .q1 .quadrant-title { color: #e74c3c; }
        .q2 .quadrant-title { color: #f39c12; }
        .q3 .quadrant-title { color: #27ae60; }
        .q4 .quadrant-title { color: #95a5a6; }
        .task-item { background: rgba(255,255,255,.15); padding: 10px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: .85rem; cursor: move; }
        .task-item:hover { background: rgba(255,255,255,.25); }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; }
        .legend { margin-top: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; font-size: .75rem; opacity: .8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header><h1>📊 우선순위 매트릭스</h1></header>
        <div class="add-task">
            <input type="text" id="taskInput" placeholder="할 일 입력" onkeypress="if(event.key==='Enter')addTask()">
            <select id="quadrantSelect">
                <option value="1">긴급+중요</option>
                <option value="2">중요</option>
                <option value="3">긴급</option>
                <option value="4">나중에</option>
            </select>
            <button onclick="addTask()">추가</button>
        </div>
        <div class="matrix">
            <div class="quadrant q1" id="q1" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="quadrant-title">🔴 긴급 + 중요</div>
            </div>
            <div class="quadrant q2" id="q2" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="quadrant-title">🟠 중요 (일정 계획)</div>
            </div>
            <div class="quadrant q3" id="q3" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="quadrant-title">🟢 긴급 (위임)</div>
            </div>
            <div class="quadrant q4" id="q4" ondrop="drop(event)" ondragover="allowDrop(event)">
                <div class="quadrant-title">⚪ 나중에</div>
            </div>
        </div>
        <div class="legend">
            <span>긴급+중요: 지금 바로 하기</span>
            <span>중요: 일정 잡기</span>
            <span>긴급: 다른 사람에게 위임</span>
            <span>나중에: 나중에 하거나 안 하기</span>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var tasks = JSON.parse(localStorage.getItem('priorityTasks') || '{"1":[],"2":[],"3":[],"4":[]}');
        function save() { localStorage.setItem('priorityTasks', JSON.stringify(tasks)); }
        function render() {
            for (var i = 1; i <= 4; i++) {
                var q = document.getElementById('q' + i);
                var title = q.querySelector('.quadrant-title').outerHTML;
                q.innerHTML = title;
                tasks[i].forEach(function(t, idx) {
                    var div = document.createElement('div');
                    div.className = 'task-item';
                    div.draggable = true;
                    div.dataset.q = i;
                    div.dataset.idx = idx;
                    div.ondragstart = drag;
                    div.innerHTML = '<span>' + t + '</span><button class="del-btn" onclick="delTask(' + i + ',' + idx + ')">×</button>';
                    q.appendChild(div);
                });
            }
        }
        function addTask() {
            var text = document.getElementById('taskInput').value.trim();
            var q = document.getElementById('quadrantSelect').value;
            if (!text) return;
            tasks[q].push(text);
            save();
            render();
            document.getElementById('taskInput').value = '';
        }
        function delTask(q, idx) {
            tasks[q].splice(idx, 1);
            save();
            render();
        }
        function allowDrop(e) { e.preventDefault(); }
        function drag(e) {
            e.dataTransfer.setData('q', e.target.dataset.q);
            e.dataTransfer.setData('idx', e.target.dataset.idx);
        }
        function drop(e) {
            e.preventDefault();
            var fromQ = e.dataTransfer.getData('q');
            var fromIdx = e.dataTransfer.getData('idx');
            var toQ = e.currentTarget.id.replace('q', '');
            var task = tasks[fromQ][fromIdx];
            tasks[fromQ].splice(fromIdx, 1);
            tasks[toQ].push(task);
            save();
            render();
        }
        render();
    </script>
</body>
</html>
