<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마피아 역할 배정</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1e293b, #0f172a); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { opacity: .8; font-size: .9rem; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .setup-section { margin-bottom: 20px; }
        .setting-group { margin-bottom: 20px; }
        .setting-label { font-size: .9rem; opacity: .7; margin-bottom: 10px; display: block; }
        .counter { display: flex; align-items: center; justify-content: center; gap: 15px; }
        .counter-btn { width: 45px; height: 45px; border: none; border-radius: 50%; background: rgba(255,255,255,.2); color: #fff; font-size: 1.5rem; cursor: pointer; }
        .counter-value { font-size: 2rem; font-weight: 700; min-width: 60px; text-align: center; }
        .role-config { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .role-item { background: rgba(255,255,255,.1); padding: 12px; border-radius: 10px; display: flex; align-items: center; justify-content: space-between; }
        .role-info { display: flex; align-items: center; gap: 8px; }
        .role-emoji { font-size: 1.3rem; }
        .role-name { font-size: .85rem; }
        .role-count { display: flex; align-items: center; gap: 8px; }
        .role-btn { width: 28px; height: 28px; border: none; border-radius: 50%; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; }
        .role-num { font-size: 1rem; font-weight: 600; min-width: 20px; text-align: center; }
        .start-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .play-section { display: none; }
        .player-info { text-align: center; margin-bottom: 20px; }
        .player-number { font-size: 1.2rem; opacity: .7; }
        .player-label { font-size: 2rem; font-weight: 700; margin-top: 10px; }
        .role-card { background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1)); border-radius: 20px; padding: 40px; text-align: center; margin-bottom: 20px; min-height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: transform 0.3s; }
        .role-card:hover { transform: scale(1.02); }
        .role-hidden { font-size: 1.2rem; opacity: .7; }
        .role-revealed { display: none; }
        .role-icon { font-size: 5rem; margin-bottom: 15px; }
        .role-title { font-size: 2rem; font-weight: 700; margin-bottom: 10px; }
        .role-desc { font-size: .9rem; opacity: .8; }
        .mafia { color: #ef4444; }
        .citizen { color: #22c55e; }
        .doctor { color: #3b82f6; }
        .police { color: #f59e0b; }
        .controls { display: flex; gap: 12px; }
        .control-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .hide-btn { background: rgba(255,255,255,.2); color: #fff; }
        .next-btn { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
        .complete-section { display: none; text-align: center; }
        .complete-icon { font-size: 5rem; margin-bottom: 20px; }
        .complete-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .complete-desc { font-size: 1rem; opacity: .8; margin-bottom: 25px; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🎭 마피아 역할 배정</h1>
            <p class="subtitle">비밀리에 역할을 확인하세요!</p>
        </header>
        <div class="game-section">
            <div class="setup-section" id="setupSection">
                <div class="setting-group">
                    <span class="setting-label">플레이어 수</span>
                    <div class="counter">
                        <button class="counter-btn" onclick="changePlayer(-1)">-</button>
                        <div class="counter-value" id="playerCount">6</div>
                        <button class="counter-btn" onclick="changePlayer(1)">+</button>
                    </div>
                </div>
                <div class="setting-group">
                    <span class="setting-label">역할 설정</span>
                    <div class="role-config">
                        <div class="role-item">
                            <div class="role-info"><span class="role-emoji">🔪</span><span class="role-name">마피아</span></div>
                            <div class="role-count">
                                <button class="role-btn" onclick="changeRole('mafia',-1)">-</button>
                                <span class="role-num" id="mafiaCount">1</span>
                                <button class="role-btn" onclick="changeRole('mafia',1)">+</button>
                            </div>
                        </div>
                        <div class="role-item">
                            <div class="role-info"><span class="role-emoji">👤</span><span class="role-name">시민</span></div>
                            <div class="role-count">
                                <span class="role-num" id="citizenCount">3</span>
                            </div>
                        </div>
                        <div class="role-item">
                            <div class="role-info"><span class="role-emoji">💉</span><span class="role-name">의사</span></div>
                            <div class="role-count">
                                <button class="role-btn" onclick="changeRole('doctor',-1)">-</button>
                                <span class="role-num" id="doctorCount">1</span>
                                <button class="role-btn" onclick="changeRole('doctor',1)">+</button>
                            </div>
                        </div>
                        <div class="role-item">
                            <div class="role-info"><span class="role-emoji">🔍</span><span class="role-name">경찰</span></div>
                            <div class="role-count">
                                <button class="role-btn" onclick="changeRole('police',-1)">-</button>
                                <span class="role-num" id="policeCount">1</span>
                                <button class="role-btn" onclick="changeRole('police',1)">+</button>
                            </div>
                        </div>
                    </div>
                </div>
                <button class="start-btn" onclick="startGame()">🎮 게임 시작!</button>
            </div>
            <div class="play-section" id="playSection">
                <div class="player-info">
                    <div class="player-number">플레이어 <span id="currentPlayer">1</span> / <span id="totalPlayers">6</span></div>
                    <div class="player-label">당신의 역할은?</div>
                </div>
                <div class="role-card" id="roleCard" onclick="revealRole()">
                    <div class="role-hidden" id="roleHidden">탭하여 역할 확인</div>
                    <div class="role-revealed" id="roleRevealed">
                        <div class="role-icon" id="roleIcon">🔪</div>
                        <div class="role-title" id="roleTitle">마피아</div>
                        <div class="role-desc" id="roleDesc">밤에 시민을 제거하세요</div>
                    </div>
                </div>
                <div class="controls">
                    <button class="control-btn hide-btn" onclick="hideRole()">🙈 숨기기</button>
                    <button class="control-btn next-btn" onclick="nextPlayer()">다음 플레이어 ➡️</button>
                </div>
            </div>
            <div class="complete-section" id="completeSection">
                <div class="complete-icon">✅</div>
                <div class="complete-text">역할 배정 완료!</div>
                <div class="complete-desc">모든 플레이어가 역할을 확인했습니다.<br>게임을 시작하세요!</div>
                <button class="start-btn" onclick="resetGame()">🔄 다시 배정하기</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var playerCount = 6;
        var mafiaCount = 1;
        var doctorCount = 1;
        var policeCount = 1;
        var roles = [];
        var currentPlayerIndex = 0;
        var isRevealed = false;

        var roleData = {
            mafia: { icon: '🔪', title: '마피아', desc: '밤에 시민을 제거하세요', class: 'mafia' },
            citizen: { icon: '👤', title: '시민', desc: '마피아를 찾아내세요', class: 'citizen' },
            doctor: { icon: '💉', title: '의사', desc: '밤에 한 명을 살릴 수 있습니다', class: 'doctor' },
            police: { icon: '🔍', title: '경찰', desc: '밤에 한 명을 조사할 수 있습니다', class: 'police' }
        };

        function changePlayer(delta) {
            playerCount = Math.max(4, Math.min(15, playerCount + delta));
            document.getElementById('playerCount').textContent = playerCount;
            updateCitizenCount();
        }

        function changeRole(role, delta) {
            if (role === 'mafia') {
                mafiaCount = Math.max(1, Math.min(5, mafiaCount + delta));
                document.getElementById('mafiaCount').textContent = mafiaCount;
            } else if (role === 'doctor') {
                doctorCount = Math.max(0, Math.min(2, doctorCount + delta));
                document.getElementById('doctorCount').textContent = doctorCount;
            } else if (role === 'police') {
                policeCount = Math.max(0, Math.min(2, policeCount + delta));
                document.getElementById('policeCount').textContent = policeCount;
            }
            updateCitizenCount();
        }

        function updateCitizenCount() {
            var special = mafiaCount + doctorCount + policeCount;
            var citizens = Math.max(0, playerCount - special);
            document.getElementById('citizenCount').textContent = citizens;
        }

        function shuffleArray(array) {
            for (var i = array.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }

        function startGame() {
            var special = mafiaCount + doctorCount + policeCount;
            if (special > playerCount) {
                alert('특수 역할이 플레이어 수보다 많습니다!');
                return;
            }

            roles = [];
            for (var i = 0; i < mafiaCount; i++) roles.push('mafia');
            for (var i = 0; i < doctorCount; i++) roles.push('doctor');
            for (var i = 0; i < policeCount; i++) roles.push('police');
            var citizens = playerCount - special;
            for (var i = 0; i < citizens; i++) roles.push('citizen');

            shuffleArray(roles);
            currentPlayerIndex = 0;

            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('playSection').style.display = 'block';
            document.getElementById('completeSection').style.display = 'none';
            document.getElementById('totalPlayers').textContent = playerCount;
            updatePlayerDisplay();
        }

        function updatePlayerDisplay() {
            document.getElementById('currentPlayer').textContent = currentPlayerIndex + 1;
            hideRole();
        }

        function revealRole() {
            if (isRevealed) return;
            isRevealed = true;

            var role = roles[currentPlayerIndex];
            var data = roleData[role];

            document.getElementById('roleHidden').style.display = 'none';
            document.getElementById('roleRevealed').style.display = 'block';
            document.getElementById('roleIcon').textContent = data.icon;
            document.getElementById('roleTitle').textContent = data.title;
            document.getElementById('roleTitle').className = 'role-title ' + data.class;
            document.getElementById('roleDesc').textContent = data.desc;
        }

        function hideRole() {
            isRevealed = false;
            document.getElementById('roleHidden').style.display = 'block';
            document.getElementById('roleRevealed').style.display = 'none';
        }

        function nextPlayer() {
            currentPlayerIndex++;
            if (currentPlayerIndex >= playerCount) {
                document.getElementById('playSection').style.display = 'none';
                document.getElementById('completeSection').style.display = 'block';
            } else {
                updatePlayerDisplay();
            }
        }

        function resetGame() {
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('completeSection').style.display = 'none';
        }
    </script>
</body>
</html>
