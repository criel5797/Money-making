<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Truth or Dare</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff6b6b, #feca57); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-select { margin-bottom: 20px; }
        .category-label { font-size: .9rem; opacity: .8; margin-bottom: 8px; display: block; }
        .category-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-btn { padding: 8px 14px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-btn.active { background: rgba(255,255,255,.4); }
        .card { background: rgba(255,255,255,.15); border-radius: 20px; padding: 30px; margin-bottom: 20px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        .card-icon { font-size: 4rem; margin-bottom: 20px; }
        .card-text { font-size: 1.3rem; line-height: 1.6; }
        .card.truth { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card.dare { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .truth-btn { background: linear-gradient(135deg, #667eea, #764ba2); }
        .dare-btn { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .action-btn:hover { transform: scale(1.02); }
        .skip-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; margin-bottom: 15px; }
        .stats { margin-top: 15px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🎭 Truth or Dare</h1>
        </header>
        <div class="game-section">
            <div class="category-select">
                <label class="category-label">Select Intensity</label>
                <div class="category-btns">
                    <button class="cat-btn active" onclick="setCategory('all')">All</button>
                    <button class="cat-btn" onclick="setCategory('mild')">Mild</button>
                    <button class="cat-btn" onclick="setCategory('medium')">Medium</button>
                    <button class="cat-btn" onclick="setCategory('spicy')">Spicy</button>
                </div>
            </div>
            <div class="card" id="card">
                <div class="card-icon" id="cardIcon">🎲</div>
                <div class="card-text" id="cardText">Choose Truth or Dare!</div>
            </div>
            <div class="action-btns">
                <button class="action-btn truth-btn" onclick="getQuestion('truth')">💬 Truth</button>
                <button class="action-btn dare-btn" onclick="getQuestion('dare')">🔥 Dare</button>
            </div>
            <button class="skip-btn" onclick="skip()">🔀 Skip Question</button>
            <div class="stats">
                <div class="stats-title">📊 Game Stats</div>
                <div class="stats-row"><span>Truth Picks</span><span id="truthCount">0</span></div>
                <div class="stats-row"><span>Dare Picks</span><span id="dareCount">0</span></div>
                <div class="stats-row"><span>Skips</span><span id="skipCount">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var truths = {
            mild: [
                'What is your favorite food?',
                'What did you want to be when you grew up?',
                'What is your favorite movie?',
                'When did you get your first phone?',
                'What are you most afraid of?',
                'What is the best place you have visited?'
            ],
            medium: [
                'What is your most embarrassing moment?',
                'What is your biggest regret?',
                'Have you ever had a crush?',
                'Have you ever lied to your parents?',
                'What is your biggest secret?',
                'When was your first love?'
            ],
            spicy: [
                'Has anyone ever confessed feelings for you?',
                'Do you have a crush on someone right now?',
                'Have you ever kissed someone?',
                'What is the most shocking thing that happened to you?',
                'What is the craziest thing you did while drunk?',
                'What is the wildest thing you have ever done?'
            ]
        };

        var dares = {
            mild: [
                'Make a funny face for 5 seconds',
                'Give a compliment to the person next to you',
                'Laugh for 10 seconds without stopping',
                'Sing a line from your favorite song',
                'Show your favorite dance move',
                'Do your best impression of someone famous'
            ],
            medium: [
                'Show your recent call history',
                'Show your phone wallpaper',
                'Reveal your social media follower count',
                'Show the last photo you took',
                'Try not to blink for 1 minute',
                'Speak in an accent until the next round'
            ],
            spicy: [
                'Reveal the initials of your crush',
                'Send a heart emoji to someone you like',
                'Show your recent search history',
                'Have a staring contest with someone for 1 minute',
                'Text your crush right now',
                'Speak in third person until next round'
            ]
        };

        var currentType = null;
        var currentCategory = 'all';
        var stats = JSON.parse(localStorage.getItem('tod_en') || '{"truth":0,"dare":0,"skip":0}');

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.toLowerCase().includes(cat === 'all' ? 'all' : cat));
            });
        }

        function getQuestions(type) {
            var pool = [];
            var source = type === 'truth' ? truths : dares;
            if (currentCategory === 'all') {
                pool = source.mild.concat(source.medium).concat(source.spicy);
            } else {
                pool = source[currentCategory];
            }
            return pool;
        }

        function getQuestion(type) {
            currentType = type;
            var pool = getQuestions(type);
            var question = pool[Math.floor(Math.random() * pool.length)];
            var card = document.getElementById('card');
            card.className = 'card ' + type;
            document.getElementById('cardIcon').textContent = type === 'truth' ? '💬' : '🔥';
            document.getElementById('cardText').textContent = question;
            if (type === 'truth') {
                stats.truth++;
            } else {
                stats.dare++;
            }
            localStorage.setItem('tod_en', JSON.stringify(stats));
            updateStats();
        }

        function skip() {
            if (currentType) {
                stats.skip++;
                localStorage.setItem('tod_en', JSON.stringify(stats));
                updateStats();
                getQuestion(currentType);
            }
        }

        function updateStats() {
            document.getElementById('truthCount').textContent = stats.truth;
            document.getElementById('dareCount').textContent = stats.dare;
            document.getElementById('skipCount').textContent = stats.skip;
        }

        updateStats();
    </script>
</body>
</html>
