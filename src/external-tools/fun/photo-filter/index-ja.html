<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>写真フィルター</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #434343, #000000); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .filter-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .image-container { background: rgba(0,0,0,.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; min-height: 250px; display: flex; align-items: center; justify-content: center; }
        .image-container img { max-width: 100%; max-height: 300px; border-radius: 8px; }
        .upload-label { display: block; padding: 40px; border: 2px dashed rgba(255,255,255,.3); border-radius: 12px; cursor: pointer; text-align: center; }
        .upload-label:hover { border-color: rgba(255,255,255,.5); }
        .upload-input { display: none; }
        .filters { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .filter-btn { padding: 10px 5px; border: none; border-radius: 8px; background: rgba(255,255,255,.15); color: #fff; cursor: pointer; font-size: .8rem; }
        .filter-btn.active { background: rgba(255,255,255,.35); }
        .adjustments { margin-bottom: 20px; }
        .adjust-item { margin-bottom: 15px; }
        .adjust-label { display: flex; justify-content: space-between; font-size: .85rem; margin-bottom: 8px; }
        .adjust-slider { width: 100%; -webkit-appearance: none; height: 6px; border-radius: 3px; background: rgba(255,255,255,.2); outline: none; }
        .adjust-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 18px; height: 18px; border-radius: 50%; background: #667eea; cursor: pointer; }
        .action-btns { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .action-btn.secondary { background: rgba(255,255,255,.2); }
        .action-btn:disabled { opacity: .5; cursor: not-allowed; }
        canvas { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>📸 写真フィルター</h1>
        </header>
        <div class="filter-section">
            <div class="image-container" id="imageContainer">
                <label class="upload-label" id="uploadLabel">
                    📷 写真を選択
                    <input type="file" class="upload-input" id="fileInput" accept="image/*">
                </label>
            </div>
            <div class="filters">
                <button class="filter-btn active" onclick="applyFilter('none')">オリジナル</button>
                <button class="filter-btn" onclick="applyFilter('grayscale')">白黒</button>
                <button class="filter-btn" onclick="applyFilter('sepia')">セピア</button>
                <button class="filter-btn" onclick="applyFilter('vintage')">ビンテージ</button>
                <button class="filter-btn" onclick="applyFilter('warm')">暖かく</button>
                <button class="filter-btn" onclick="applyFilter('cool')">涼しく</button>
                <button class="filter-btn" onclick="applyFilter('vivid')">鮮やか</button>
                <button class="filter-btn" onclick="applyFilter('fade')">フェード</button>
            </div>
            <div class="adjustments">
                <div class="adjust-item">
                    <div class="adjust-label">
                        <span>明るさ</span>
                        <span id="brightnessVal">100%</span>
                    </div>
                    <input type="range" class="adjust-slider" id="brightness" min="0" max="200" value="100" oninput="updateFilters()">
                </div>
                <div class="adjust-item">
                    <div class="adjust-label">
                        <span>コントラスト</span>
                        <span id="contrastVal">100%</span>
                    </div>
                    <input type="range" class="adjust-slider" id="contrast" min="0" max="200" value="100" oninput="updateFilters()">
                </div>
                <div class="adjust-item">
                    <div class="adjust-label">
                        <span>彩度</span>
                        <span id="saturateVal">100%</span>
                    </div>
                    <input type="range" class="adjust-slider" id="saturate" min="0" max="200" value="100" oninput="updateFilters()">
                </div>
            </div>
            <div class="action-btns">
                <button class="action-btn" id="downloadBtn" onclick="downloadImage()" disabled>💾 保存</button>
                <button class="action-btn secondary" onclick="resetFilters()">↻ リセット</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <canvas id="canvas"></canvas>
    <script>
        var img = null;
        var currentFilter = 'none';
        var filterPresets = {
            none: { grayscale: 0, sepia: 0, hueRotate: 0 },
            grayscale: { grayscale: 100, sepia: 0, hueRotate: 0 },
            sepia: { grayscale: 0, sepia: 100, hueRotate: 0 },
            vintage: { grayscale: 20, sepia: 40, hueRotate: -10 },
            warm: { grayscale: 0, sepia: 20, hueRotate: 10 },
            cool: { grayscale: 0, sepia: 0, hueRotate: 180 },
            vivid: { grayscale: 0, sepia: 0, hueRotate: 0, saturate: 150 },
            fade: { grayscale: 10, sepia: 10, hueRotate: 0, brightness: 110, contrast: 90 }
        };
        document.getElementById('fileInput').addEventListener('change', function(e) {
            var file = e.target.files[0];
            if (file) {
                var reader = new FileReader();
                reader.onload = function(event) {
                    img = new Image();
                    img.onload = function() {
                        var container = document.getElementById('imageContainer');
                        container.innerHTML = '<img id="previewImg" src="' + event.target.result + '">';
                        document.getElementById('downloadBtn').disabled = false;
                        updateFilters();
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });
        function applyFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(
                    filter === 'none' ? 'オリジナル' : filter === 'grayscale' ? '白黒' :
                    filter === 'sepia' ? 'セピア' : filter === 'vintage' ? 'ビンテージ' :
                    filter === 'warm' ? '暖かく' : filter === 'cool' ? '涼しく' :
                    filter === 'vivid' ? '鮮やか' : 'フェード'
                ));
            });
            if (filterPresets[filter].saturate) {
                document.getElementById('saturate').value = filterPresets[filter].saturate;
            }
            if (filterPresets[filter].brightness) {
                document.getElementById('brightness').value = filterPresets[filter].brightness;
            }
            if (filterPresets[filter].contrast) {
                document.getElementById('contrast').value = filterPresets[filter].contrast;
            }
            updateFilters();
        }
        function updateFilters() {
            var preview = document.getElementById('previewImg');
            if (!preview) return;
            var brightness = document.getElementById('brightness').value;
            var contrast = document.getElementById('contrast').value;
            var saturate = document.getElementById('saturate').value;
            document.getElementById('brightnessVal').textContent = brightness + '%';
            document.getElementById('contrastVal').textContent = contrast + '%';
            document.getElementById('saturateVal').textContent = saturate + '%';
            var preset = filterPresets[currentFilter];
            var filterStr = 'brightness(' + brightness + '%) contrast(' + contrast + '%) saturate(' + saturate + '%) ' +
                'grayscale(' + preset.grayscale + '%) sepia(' + preset.sepia + '%) hue-rotate(' + preset.hueRotate + 'deg)';
            preview.style.filter = filterStr;
        }
        function resetFilters() {
            currentFilter = 'none';
            document.getElementById('brightness').value = 100;
            document.getElementById('contrast').value = 100;
            document.getElementById('saturate').value = 100;
            document.querySelectorAll('.filter-btn').forEach(function(btn, i) {
                btn.classList.toggle('active', i === 0);
            });
            updateFilters();
        }
        function downloadImage() {
            if (!img) return;
            var canvas = document.getElementById('canvas');
            var ctx = canvas.getContext('2d');
            canvas.width = img.width;
            canvas.height = img.height;
            var brightness = document.getElementById('brightness').value;
            var contrast = document.getElementById('contrast').value;
            var saturate = document.getElementById('saturate').value;
            var preset = filterPresets[currentFilter];
            var filterStr = 'brightness(' + brightness + '%) contrast(' + contrast + '%) saturate(' + saturate + '%) ' +
                'grayscale(' + preset.grayscale + '%) sepia(' + preset.sepia + '%) hue-rotate(' + preset.hueRotate + 'deg)';
            ctx.filter = filterStr;
            ctx.drawImage(img, 0, 0);
            var link = document.createElement('a');
            link.download = 'filtered_image.png';
            link.href = canvas.toDataURL();
            link.click();
        }
    </script>
</body>
</html>
