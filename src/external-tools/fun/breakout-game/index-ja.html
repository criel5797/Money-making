<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブロック崩し</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #232526, #414345); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .score-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .score-item { text-align: center; }
        .score-label { font-size: .8rem; opacity: .7; }
        .score-value { font-size: 1.4rem; font-weight: 700; }
        .game-canvas { display: flex; justify-content: center; margin-bottom: 15px; }
        #gameCanvas { background: #1a1a2e; border-radius: 8px; border: 3px solid #ff6b6b; }
        .controls { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; }
        .ctrl-btn { padding: 15px 30px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; font-size: 1.5rem; cursor: pointer; }
        .ctrl-btn:active { background: rgba(255,255,255,.4); }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .start-btn { background: linear-gradient(135deg, #ff6b6b, #ee5a24); color: #fff; }
        .pause-btn { background: rgba(255,255,255,.2); color: #fff; }
        .game-over { text-align: center; padding: 20px; background: rgba(239,68,68,.2); border-radius: 12px; margin-bottom: 15px; display: none; }
        .game-over h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🧱 ブロック崩し</h1>
        </header>
        <div class="game-section">
            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">スコア</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">残機</div>
                    <div class="score-value" id="lives">3</div>
                </div>
                <div class="score-item">
                    <div class="score-label">レベル</div>
                    <div class="score-value" id="level">1</div>
                </div>
            </div>
            <div class="game-canvas">
                <canvas id="gameCanvas" width="320" height="400"></canvas>
            </div>
            <div id="gameOver" class="game-over">
                <h2 id="endMessage">ゲームオーバー！</h2>
                <p>スコア: <span id="finalScore">0</span></p>
            </div>
            <div class="controls">
                <button class="ctrl-btn" onclick="moveLeft()">⬅️</button>
                <button class="ctrl-btn" onclick="moveRight()">➡️</button>
            </div>
            <div class="action-btns">
                <button class="action-btn start-btn" id="startBtn" onclick="startGame()">🎮 スタート</button>
                <button class="action-btn pause-btn" id="pauseBtn" onclick="togglePause()">⏸️ 一時停止</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="highScore">0</div>
                    <div class="stat-label">ハイスコア</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalGames">0</div>
                    <div class="stat-label">ゲーム数</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var ballRadius = 8;
        var x, y, dx, dy;
        var paddleH = 12, paddleW = 70, paddleX;
        var brickRowCount = 5, brickColCount = 7;
        var brickW = 40, brickH = 15, brickPadding = 4, brickOffsetTop = 30, brickOffsetLeft = 10;
        var bricks = [];
        var score = 0, lives = 3, level = 1;
        var gameLoop = null;
        var isPaused = false, isGameOver = true;
        var stats = JSON.parse(localStorage.getItem('breakout_ja') || '{"games":0,"high":0}');
        var colors = ['#ff6b6b','#4ecdc4','#45b7d1','#96ceb4','#ffeaa7'];
        var leftPressed = false, rightPressed = false;

        function initBricks() {
            bricks = [];
            for (var c = 0; c < brickColCount; c++) {
                bricks[c] = [];
                for (var r = 0; r < brickRowCount; r++) {
                    bricks[c][r] = { x: 0, y: 0, status: 1 };
                }
            }
        }

        function initGame() {
            x = canvas.width / 2;
            y = canvas.height - 30;
            dx = 3 * (Math.random() > 0.5 ? 1 : -1);
            dy = -3;
            paddleX = (canvas.width - paddleW) / 2;
        }

        function drawBall() {
            ctx.beginPath();
            ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();
            ctx.closePath();
        }

        function drawPaddle() {
            ctx.beginPath();
            ctx.roundRect(paddleX, canvas.height - paddleH - 10, paddleW, paddleH, 6);
            ctx.fillStyle = '#ff6b6b';
            ctx.fill();
            ctx.closePath();
        }

        function drawBricks() {
            for (var c = 0; c < brickColCount; c++) {
                for (var r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) {
                        var brickX = c * (brickW + brickPadding) + brickOffsetLeft;
                        var brickY = r * (brickH + brickPadding) + brickOffsetTop;
                        bricks[c][r].x = brickX;
                        bricks[c][r].y = brickY;
                        ctx.beginPath();
                        ctx.roundRect(brickX, brickY, brickW, brickH, 3);
                        ctx.fillStyle = colors[r % colors.length];
                        ctx.fill();
                        ctx.closePath();
                    }
                }
            }
        }

        function collisionDetection() {
            for (var c = 0; c < brickColCount; c++) {
                for (var r = 0; r < brickRowCount; r++) {
                    var b = bricks[c][r];
                    if (b.status === 1) {
                        if (x > b.x && x < b.x + brickW && y > b.y && y < b.y + brickH) {
                            dy = -dy;
                            b.status = 0;
                            score += 10 * level;
                            document.getElementById('score').textContent = score;
                            if (checkWin()) {
                                level++;
                                document.getElementById('level').textContent = level;
                                initBricks();
                                initGame();
                                dx *= 1.1;
                                dy *= 1.1;
                            }
                        }
                    }
                }
            }
        }

        function checkWin() {
            for (var c = 0; c < brickColCount; c++) {
                for (var r = 0; r < brickRowCount; r++) {
                    if (bricks[c][r].status === 1) return false;
                }
            }
            return true;
        }

        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            drawBricks();
            drawBall();
            drawPaddle();
            collisionDetection();

            if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
            if (y + dy < ballRadius) dy = -dy;
            else if (y + dy > canvas.height - ballRadius - 10) {
                if (x > paddleX && x < paddleX + paddleW) {
                    dy = -dy;
                    var hitPos = (x - paddleX) / paddleW;
                    dx = 6 * (hitPos - 0.5);
                } else {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    if (lives === 0) {
                        endGame(false);
                        return;
                    }
                    initGame();
                }
            }

            if (leftPressed && paddleX > 0) paddleX -= 7;
            if (rightPressed && paddleX < canvas.width - paddleW) paddleX += 7;

            x += dx;
            y += dy;
        }

        function moveLeft() { if (paddleX > 0) paddleX -= 25; }
        function moveRight() { if (paddleX < canvas.width - paddleW) paddleX += 25; }

        function startGame() {
            score = 0; lives = 3; level = 1;
            isGameOver = false;
            isPaused = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('lives').textContent = '3';
            document.getElementById('level').textContent = '1';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').textContent = '🔄 リスタート';
            initBricks();
            initGame();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(function() {
                if (!isPaused && !isGameOver) draw();
            }, 16);
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️ 再開' : '⏸️ 一時停止';
        }

        function endGame(won) {
            isGameOver = true;
            if (gameLoop) clearInterval(gameLoop);
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('endMessage').textContent = won ? 'クリア！🎉' : 'ゲームオーバー！';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('startBtn').textContent = '🎮 もう一度';
            stats.games++;
            if (score > stats.high) stats.high = score;
            localStorage.setItem('breakout_ja', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('highScore').textContent = stats.high;
            document.getElementById('totalGames').textContent = stats.games;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowLeft') leftPressed = true;
            else if (e.key === 'ArrowRight') rightPressed = true;
        });
        document.addEventListener('keyup', function(e) {
            if (e.key === 'ArrowLeft') leftPressed = false;
            else if (e.key === 'ArrowRight') rightPressed = false;
        });

        canvas.addEventListener('mousemove', function(e) {
            var rect = canvas.getBoundingClientRect();
            var relX = e.clientX - rect.left;
            if (relX > 0 && relX < canvas.width) {
                paddleX = relX - paddleW / 2;
            }
        });

        canvas.addEventListener('touchmove', function(e) {
            e.preventDefault();
            var rect = canvas.getBoundingClientRect();
            var relX = e.touches[0].clientX - rect.left;
            if (relX > 0 && relX < canvas.width) {
                paddleX = relX - paddleW / 2;
            }
        });

        updateStats();
        initBricks();
        initGame();
        draw();
    </script>
</body>
</html>
