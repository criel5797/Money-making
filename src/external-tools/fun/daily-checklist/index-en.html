<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Checklist</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #fc4a1a, #f7b733); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .date-display { font-size: 1rem; opacity: .8; }
        .checklist-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .add-task { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-task input { flex: 1; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); color: #333; font-size: 1rem; }
        .add-btn { padding: 15px 20px; border: none; border-radius: 12px; background: rgba(0,0,0,.3); color: #fff; font-size: 1rem; cursor: pointer; }
        .task-list { display: flex; flex-direction: column; gap: 10px; }
        .task-item { background: rgba(255,255,255,.15); padding: 15px; border-radius: 10px; display: flex; align-items: center; gap: 12px; }
        .task-item.done { opacity: .6; }
        .task-item.done .task-text { text-decoration: line-through; }
        .task-check { width: 24px; height: 24px; border: 2px solid rgba(255,255,255,.5); border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .task-check.checked { background: #fff; color: #fc4a1a; }
        .task-text { flex: 1; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; }
        .progress { margin-top: 20px; }
        .progress-bar { height: 10px; background: rgba(0,0,0,.2); border-radius: 5px; overflow: hidden; }
        .progress-fill { height: 100%; background: #fff; transition: width .3s; }
        .progress-text { text-align: center; margin-top: 10px; font-size: .9rem; }
        .clear-btn { width: 100%; padding: 15px; margin-top: 20px; border: 1px solid rgba(255,255,255,.3); border-radius: 10px; background: transparent; color: #fff; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>📋 Daily Checklist</h1>
            <div class="date-display" id="dateDisplay"></div>
        </header>
        <div class="checklist-section">
            <div class="add-task">
                <input type="text" id="taskInput" placeholder="Add task" onkeypress="if(event.key==='Enter')addTask()">
                <button class="add-btn" onclick="addTask()">Add</button>
            </div>
            <div class="task-list" id="taskList"></div>
            <div class="progress">
                <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
                <div class="progress-text" id="progressText">0 / 0 completed</div>
            </div>
            <button class="clear-btn" onclick="clearDone()">Clear completed</button>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var today = new Date().toDateString();
        var key = 'checklist_' + today;
        var tasks = JSON.parse(localStorage.getItem(key) || '[]');
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        function save() { localStorage.setItem(key, JSON.stringify(tasks)); }
        function addTask() {
            var text = document.getElementById('taskInput').value.trim();
            if (!text) return;
            tasks.push({ text: text, done: false });
            save();
            document.getElementById('taskInput').value = '';
            render();
        }
        function toggle(i) {
            tasks[i].done = !tasks[i].done;
            save();
            render();
        }
        function delTask(i) {
            tasks.splice(i, 1);
            save();
            render();
        }
        function clearDone() {
            tasks = tasks.filter(function(t) { return !t.done; });
            save();
            render();
        }
        function render() {
            var list = document.getElementById('taskList');
            list.innerHTML = '';
            var done = 0;
            tasks.forEach(function(t, i) {
                if (t.done) done++;
                var div = document.createElement('div');
                div.className = 'task-item' + (t.done ? ' done' : '');
                div.innerHTML = '<div class="task-check' + (t.done ? ' checked' : '') + '" onclick="toggle(' + i + ')">' + (t.done ? '✓' : '') + '</div>' +
                    '<span class="task-text">' + t.text + '</span>' +
                    '<button class="del-btn" onclick="delTask(' + i + ')">×</button>';
                list.appendChild(div);
            });
            var pct = tasks.length > 0 ? (done / tasks.length) * 100 : 0;
            document.getElementById('progressFill').style.width = pct + '%';
            document.getElementById('progressText').textContent = done + ' / ' + tasks.length + ' completed';
        }
        render();
    </script>
</body>
</html>
