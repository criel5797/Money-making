<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수면 시간 계산기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .sleep-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .mode-btns { display: flex; gap: 10px; margin-bottom: 25px; }
        .mode-btn { flex: 1; padding: 15px; border: 1px solid rgba(255,255,255,.3); border-radius: 10px; background: transparent; color: #fff; cursor: pointer; }
        .mode-btn.active { background: rgba(255,255,255,.2); border-color: #fff; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: .9rem; margin-bottom: 10px; opacity: .8; }
        input[type=time] { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); color: #333; font-size: 1.2rem; }
        .calc-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.1rem; cursor: pointer; margin-bottom: 25px; }
        .results { background: rgba(0,0,0,.3); border-radius: 12px; padding: 20px; }
        .results-title { font-size: 1rem; margin-bottom: 15px; opacity: .8; }
        .time-slots { display: flex; flex-direction: column; gap: 12px; }
        .time-slot { background: rgba(255,255,255,.1); padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .time-slot.recommended { background: rgba(102,126,234,.4); border: 1px solid rgba(102,126,234,.8); }
        .slot-time { font-size: 1.2rem; font-weight: 600; }
        .slot-cycles { font-size: .85rem; opacity: .8; }
        .slot-badge { background: #667eea; padding: 3px 8px; border-radius: 10px; font-size: .75rem; }
        .info { margin-top: 20px; font-size: .85rem; opacity: .7; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header><h1>😴 수면 시간 계산기</h1></header>
        <div class="sleep-section">
            <div class="mode-btns">
                <button class="mode-btn active" onclick="setMode('wake')">기상 시간 계산</button>
                <button class="mode-btn" onclick="setMode('sleep')">취침 시간 계산</button>
            </div>
            <div class="input-group">
                <div class="input-label" id="inputLabel">취침 시간</div>
                <input type="time" id="timeInput" value="23:00">
            </div>
            <button class="calc-btn" onclick="calculate()">계산하기</button>
            <div class="results">
                <div class="results-title" id="resultsTitle">추천 기상 시간</div>
                <div class="time-slots" id="timeSlots"></div>
            </div>
            <div class="info">수면 주기는 약 90분입니다. 주기가 끝날 때 일어나면 더 개운합니다.</div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var mode = 'wake';
        var cycleMin = 90;
        var fallAsleepMin = 15;
        function setMode(m) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(function(b, i) {
                b.classList.toggle('active', (m === 'wake' && i === 0) || (m === 'sleep' && i === 1));
            });
            document.getElementById('inputLabel').textContent = m === 'wake' ? '취침 시간' : '기상 시간';
            document.getElementById('resultsTitle').textContent = m === 'wake' ? '추천 기상 시간' : '추천 취침 시간';
            document.getElementById('timeSlots').innerHTML = '';
        }
        function calculate() {
            var time = document.getElementById('timeInput').value;
            var parts = time.split(':');
            var h = parseInt(parts[0]);
            var m = parseInt(parts[1]);
            var base = new Date();
            base.setHours(h, m, 0, 0);
            var slots = document.getElementById('timeSlots');
            slots.innerHTML = '';
            for (var i = 6; i >= 3; i--) {
                var mins = i * cycleMin;
                var target = new Date(base.getTime());
                if (mode === 'wake') {
                    target.setMinutes(target.getMinutes() + fallAsleepMin + mins);
                } else {
                    target.setMinutes(target.getMinutes() - fallAsleepMin - mins);
                }
                var div = document.createElement('div');
                div.className = 'time-slot' + (i === 6 || i === 5 ? ' recommended' : '');
                var timeStr = target.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
                var hours = (mins / 60).toFixed(1);
                div.innerHTML = '<div><div class="slot-time">' + timeStr + '</div><div class="slot-cycles">' + i + '사이클 (' + hours + '시간)</div></div>' + (i >= 5 ? '<span class="slot-badge">추천</span>' : '');
                slots.appendChild(div);
            }
        }
        calculate();
    </script>
</body>
</html>
