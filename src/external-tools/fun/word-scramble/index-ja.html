<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>単語パズル</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f093fb, #f5576c); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .scrambled { background: rgba(0,0,0,.3); border-radius: 12px; padding: 25px; margin-bottom: 20px; text-align: center; }
        .scrambled-word { font-size: 2.5rem; font-weight: 700; letter-spacing: 5px; margin-bottom: 10px; }
        .hint { font-size: .9rem; opacity: .7; }
        .input-section { margin-bottom: 20px; }
        .input-section input { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); color: #333; font-size: 1.2rem; text-align: center; letter-spacing: 3px; }
        .input-section input:focus { outline: 2px solid #667eea; }
        .actions { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .action-btn.secondary { background: rgba(255,255,255,.2); }
        .action-btn:disabled { opacity: .5; cursor: not-allowed; }
        .message { text-align: center; padding: 15px; border-radius: 10px; margin-bottom: 15px; display: none; }
        .message.correct { display: block; background: rgba(56,239,125,.3); }
        .message.wrong { display: block; background: rgba(255,107,107,.3); }
        .category { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .cat-btn { padding: 8px 15px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-btn.active { background: rgba(255,255,255,.4); }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🔤 単語パズル</h1>
        </header>
        <div class="game-section">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="score">0</div>
                    <div class="stat-label">スコア</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">連続</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="hints">3</div>
                    <div class="stat-label">ヒント</div>
                </div>
            </div>
            <div class="scrambled">
                <div class="scrambled-word" id="scrambledWord">???</div>
                <div class="hint" id="hintText"></div>
            </div>
            <div class="message" id="message"></div>
            <div class="input-section">
                <input type="text" id="answerInput" placeholder="答えを入力" maxlength="20" onkeypress="if(event.key==='Enter')checkAnswer()">
            </div>
            <div class="actions">
                <button class="action-btn" onclick="checkAnswer()">確認</button>
                <button class="action-btn secondary" onclick="useHint()" id="hintBtn">💡 ヒント</button>
                <button class="action-btn secondary" onclick="skipWord()">⏭️ スキップ</button>
            </div>
            <div class="category">
                <button class="cat-btn active" onclick="setCategory('all')">全部</button>
                <button class="cat-btn" onclick="setCategory('animal')">動物</button>
                <button class="cat-btn" onclick="setCategory('fruit')">果物</button>
                <button class="cat-btn" onclick="setCategory('country')">国</button>
                <button class="cat-btn" onclick="setCategory('food')">食べ物</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var words = {
            animal: [
                { word: 'ねこ', hint: 'にゃーと鳴く' },
                { word: 'いぬ', hint: 'わんわん吠える' },
                { word: 'ぞう', hint: '長い鼻を持つ' },
                { word: 'うさぎ', hint: '長い耳がある' },
                { word: 'さる', hint: 'バナナが好き' }
            ],
            fruit: [
                { word: 'りんご', hint: '赤い果物' },
                { word: 'バナナ', hint: '黄色い果物' },
                { word: 'ぶどう', hint: '粒がたくさん' },
                { word: 'いちご', hint: '赤くて小さい' },
                { word: 'すいか', hint: '夏の大きな果物' }
            ],
            country: [
                { word: 'にほん', hint: '私たちの国' },
                { word: 'かんこく', hint: '隣の国' },
                { word: 'ちゅうごく', hint: '万里の長城' },
                { word: 'フランス', hint: 'エッフェル塔' },
                { word: 'アメリカ', hint: '自由の女神' }
            ],
            food: [
                { word: 'すし', hint: '日本の伝統料理' },
                { word: 'ラーメン', hint: '熱いスープの麺' },
                { word: 'カレー', hint: 'スパイシー料理' },
                { word: 'うどん', hint: '太い麺' },
                { word: 'そば', hint: '細い麺' }
            ]
        };
        var currentWord = null;
        var score = 0;
        var streak = 0;
        var hintsLeft = 3;
        var category = 'all';
        var revealedHint = 0;
        function shuffle(str) {
            var arr = str.split('');
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
            return arr.join('');
        }
        function getAllWords() {
            var all = [];
            for (var cat in words) {
                all = all.concat(words[cat]);
            }
            return all;
        }
        function setCategory(cat) {
            category = cat;
            document.querySelectorAll('.cat-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(cat === 'all' ? '全部' :
                    cat === 'animal' ? '動物' : cat === 'fruit' ? '果物' :
                    cat === 'country' ? '国' : '食べ物'));
            });
            newWord();
        }
        function newWord() {
            var pool = category === 'all' ? getAllWords() : words[category];
            currentWord = pool[Math.floor(Math.random() * pool.length)];
            revealedHint = 0;
            var scrambled = shuffle(currentWord.word);
            while (scrambled === currentWord.word && currentWord.word.length > 1) {
                scrambled = shuffle(currentWord.word);
            }
            document.getElementById('scrambledWord').textContent = scrambled;
            document.getElementById('hintText').textContent = '';
            document.getElementById('answerInput').value = '';
            document.getElementById('message').className = 'message';
            document.getElementById('answerInput').focus();
        }
        function checkAnswer() {
            var input = document.getElementById('answerInput').value.trim();
            var msg = document.getElementById('message');
            if (input === currentWord.word) {
                msg.textContent = '正解！ 🎉';
                msg.className = 'message correct';
                score += 10 + streak * 2;
                streak++;
                document.getElementById('score').textContent = score;
                document.getElementById('streak').textContent = streak;
                setTimeout(newWord, 1000);
            } else {
                msg.textContent = '不正解！もう一度！';
                msg.className = 'message wrong';
                streak = 0;
                document.getElementById('streak').textContent = streak;
            }
        }
        function useHint() {
            if (hintsLeft <= 0) return;
            revealedHint++;
            if (revealedHint === 1) {
                document.getElementById('hintText').textContent = 'ヒント: ' + currentWord.hint;
            } else if (revealedHint === 2) {
                document.getElementById('hintText').textContent = '最初の文字: ' + currentWord.word[0];
            }
            hintsLeft--;
            document.getElementById('hints').textContent = hintsLeft;
            if (hintsLeft <= 0) {
                document.getElementById('hintBtn').disabled = true;
            }
        }
        function skipWord() {
            document.getElementById('message').textContent = '答え: ' + currentWord.word;
            document.getElementById('message').className = 'message wrong';
            streak = 0;
            document.getElementById('streak').textContent = streak;
            setTimeout(newWord, 1500);
        }
        newWord();
    </script>
</body>
</html>
