<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>노래 맞추기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #a855f7, #9333ea); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { opacity: .8; font-size: .9rem; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .category-btn { padding: 15px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: center; transition: all .3s; }
        .category-btn.active { background: rgba(255,255,255,.3); border-color: #fff; }
        .category-emoji { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .start-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ec4899, #db2777); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .play-section { display: none; }
        .question-num { text-align: center; font-size: .9rem; opacity: .7; margin-bottom: 15px; }
        .lyrics-card { background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1)); border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; min-height: 150px; }
        .lyrics-label { font-size: .9rem; opacity: .7; margin-bottom: 15px; }
        .lyrics-text { font-size: 1.3rem; font-weight: 600; line-height: 1.6; }
        .hint-section { margin-bottom: 20px; }
        .hint-btn { width: 100%; padding: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 10px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .hint-text { background: rgba(255,255,255,.1); padding: 15px; border-radius: 10px; text-align: center; display: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .option-btn { padding: 15px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; transition: all .3s; }
        .option-btn.correct { background: #22c55e; border-color: #22c55e; }
        .option-btn.wrong { background: #ef4444; border-color: #ef4444; }
        .score-display { text-align: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .score-text { font-size: 1.2rem; }
        .score-value { font-size: 2rem; font-weight: 700; color: #fbbf24; }
        .result-section { display: none; text-align: center; }
        .result-icon { font-size: 5rem; margin-bottom: 20px; }
        .result-score { font-size: 3rem; font-weight: 700; margin-bottom: 5px; }
        .result-total { font-size: 1.2rem; opacity: .8; margin-bottom: 25px; }
        .next-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 15px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🎵 노래 맞추기</h1>
            <p class="subtitle">가사를 보고 노래 제목을 맞춰요!</p>
        </header>
        <div class="game-section">
            <div class="setup-section" id="setupSection">
                <div class="category-grid">
                    <button class="category-btn active" onclick="selectCategory(0)"><span class="category-emoji">🎤</span>K-POP</button>
                    <button class="category-btn" onclick="selectCategory(1)"><span class="category-emoji">👶</span>동요</button>
                    <button class="category-btn" onclick="selectCategory(2)"><span class="category-emoji">🎬</span>OST</button>
                    <button class="category-btn" onclick="selectCategory(3)"><span class="category-emoji">🎸</span>발라드</button>
                </div>
                <button class="start-btn" onclick="startGame()">🎮 게임 시작!</button>
            </div>
            <div class="play-section" id="playSection">
                <div class="question-num" id="questionNum">문제 1 / 10</div>
                <div class="lyrics-card">
                    <div class="lyrics-label">이 가사의 노래는?</div>
                    <div class="lyrics-text" id="lyricsText">가사가 여기에 표시됩니다</div>
                </div>
                <div class="hint-section">
                    <button class="hint-btn" onclick="showHint()">💡 힌트 보기</button>
                    <div class="hint-text" id="hintText">아티스트: </div>
                </div>
                <div class="options-grid" id="optionsGrid"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 문제 ➡️</button>
                <div class="score-display">
                    <div class="score-text">현재 점수</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
            </div>
            <div class="result-section" id="resultSection">
                <div class="result-icon">🏆</div>
                <div class="result-score" id="resultScore">0</div>
                <div class="result-total">/ 10 정답</div>
                <button class="start-btn" onclick="resetGame()">🔄 다시 하기</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var songData = {
            0: [ // K-POP
                { lyrics: '다이너마이트처럼\n터져버려', answer: 'Dynamite', artist: 'BTS', options: ['Dynamite', 'Butter', 'Permission to Dance', 'Boy With Luv'] },
                { lyrics: '내 피 땀 눈물\n내 마지막 춤을', answer: '피 땀 눈물', artist: 'BTS', options: ['피 땀 눈물', 'DNA', 'FAKE LOVE', 'Spring Day'] },
                { lyrics: '뚜두뚜두\n뚜두뚜두', answer: '뚜두뚜두', artist: 'BLACKPINK', options: ['뚜두뚜두', 'Kill This Love', 'How You Like That', 'Lovesick Girls'] },
                { lyrics: '하루아침에\n내가 변한 건 아냐', answer: 'Celebrity', artist: 'IU', options: ['Celebrity', 'Blueming', 'Eight', 'Palette'] },
                { lyrics: '오빠 딱 내 스타일\n오빠 딱 내 스타일', answer: '강남스타일', artist: 'PSY', options: ['강남스타일', 'GENTLEMAN', '나팔바지', 'New Face'] },
                { lyrics: '널 사랑하고 있어\n이 세상은 너', answer: 'Love Scenario', artist: 'iKON', options: ['Love Scenario', 'Killing Me', 'Goodbye Road', 'Rhythm Ta'] },
                { lyrics: 'Super Shy\nSuper Shy', answer: 'Super Shy', artist: 'NewJeans', options: ['Super Shy', 'Hype Boy', 'Attention', 'Ditto'] },
                { lyrics: '어젯밤 꿈속에\n니가 나와서', answer: '꿈', artist: 'IU', options: ['꿈', 'Good Day', 'You & I', 'LILAC'] }
            ],
            1: [ // 동요
                { lyrics: '반짝반짝 작은 별\n아름답게 비치네', answer: '작은 별', artist: '동요', options: ['작은 별', '곰 세마리', '나비야', '산토끼'] },
                { lyrics: '학교 종이 땡땡땡\n어서 모이자', answer: '학교 종', artist: '동요', options: ['학교 종', '등대지기', '고향의 봄', '과수원 길'] },
                { lyrics: '곰 세 마리가\n한 집에 있어', answer: '곰 세마리', artist: '동요', options: ['곰 세마리', '아기 상어', '뽀로로', '코코몽'] },
                { lyrics: '나비야 나비야\n이리 날아 오너라', answer: '나비야', artist: '동요', options: ['나비야', '개구리', '달팽이', '무당벌레'] },
                { lyrics: '산토끼 토끼야\n어디를 가느냐', answer: '산토끼', artist: '동요', options: ['산토끼', '숲속 작은집', '올챙이와 개구리', '그대로 멈춰라'] },
                { lyrics: '둥근 해가 떴습니다\n자리에서 일어나서', answer: '해', artist: '동요', options: ['해', '달', '별', '구름'] },
                { lyrics: '아기 상어 뚜루루뚜루\n귀여운 뚜루루뚜루', answer: '아기 상어', artist: '핑크퐁', options: ['아기 상어', '상어 가족', '바다 친구', '물고기'] }
            ],
            2: [ // OST
                { lyrics: '널 사랑하지 않아\n널 사랑하지 않아', answer: '사랑하지 않아', artist: '태연', options: ['사랑하지 않아', 'Can You Hear Me', '만약에', 'Time'] },
                { lyrics: '눈이 부시게\n푸르른 날에', answer: '그 겨울 바람이 분다', artist: '김범수', options: ['그 겨울 바람이 분다', '넌 감동이었어', '그리움만 쌓이네', '보고 싶다'] },
                { lyrics: '사랑이 지나가면\n남는 건 그 기억만', answer: '거짓말이야', artist: '거미', options: ['거짓말이야', 'You Are My Everything', 'Snowflake', 'Someday'] },
                { lyrics: '멀리서 봐도\n한눈에 넌', answer: '넌 어디에', artist: '서도영', options: ['넌 어디에', '아직도 어두운 밤인걸', '사랑해요', '보고싶다'] },
                { lyrics: '첫눈이 내리면\n가장 먼저 네가', answer: '첫눈처럼 너에게 가겠다', artist: '에일리', options: ['첫눈처럼 너에게 가겠다', '첫사랑', '눈물비', '노래가 늘었어'] }
            ],
            3: [ // 발라드
                { lyrics: '널 바라만 봐도\n그냥 바라만 봐도', answer: '너를 사랑해', artist: '윤미래', options: ['너를 사랑해', '사랑해', '보고싶다', '그리워'] },
                { lyrics: '눈을 떠봐 이젠\n꿈에서 깨어나', answer: '눈의 꽃', artist: '박효신', options: ['눈의 꽃', '야생화', 'Home', 'Breath'] },
                { lyrics: '사랑했지만\n보내야만 했던', answer: '벌써 12시', artist: '청하', options: ['벌써 12시', 'Gotta Go', 'Rollercoaster', 'Why Dont You Know'] },
                { lyrics: '오래 기다려왔던\n꿈의 무대 위에', answer: '나의 사람아', artist: 'SG워너비', options: ['나의 사람아', '살다가', '내 사람', 'Timeless'] },
                { lyrics: '그대가 분다\n바람처럼 분다', answer: '바람', artist: '이소라', options: ['바람', '제발', '추억', 'No.1'] }
            ]
        };

        var selectedCategory = 0;
        var currentSongs = [];
        var songIndex = 0;
        var score = 0;
        var answered = false;

        function selectCategory(index) {
            selectedCategory = index;
            var btns = document.querySelectorAll('.category-btn');
            btns.forEach(function(btn, i) {
                btn.classList.toggle('active', i === index);
            });
        }

        function shuffleArray(arr) {
            var a = arr.slice();
            for (var i = a.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = a[i]; a[i] = a[j]; a[j] = t;
            }
            return a;
        }

        function startGame() {
            currentSongs = shuffleArray(songData[selectedCategory]).slice(0, 10);
            songIndex = 0;
            score = 0;

            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('playSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            showSong();
        }

        function showSong() {
            answered = false;
            var song = currentSongs[songIndex];
            document.getElementById('questionNum').textContent = '문제 ' + (songIndex + 1) + ' / ' + currentSongs.length;
            document.getElementById('lyricsText').textContent = song.lyrics;
            document.getElementById('hintText').textContent = '아티스트: ' + song.artist;
            document.getElementById('hintText').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('scoreValue').textContent = score;

            var shuffledOptions = shuffleArray(song.options);
            var html = '';
            shuffledOptions.forEach(function(opt) {
                html += '<button class="option-btn" onclick="selectAnswer(this, \'' + opt + '\', \'' + song.answer + '\')">' + opt + '</button>';
            });
            document.getElementById('optionsGrid').innerHTML = html;
        }

        function showHint() {
            document.getElementById('hintText').style.display = 'block';
        }

        function selectAnswer(btn, selected, correct) {
            if (answered) return;
            answered = true;

            var btns = document.querySelectorAll('.option-btn');
            btns.forEach(function(b) {
                if (b.textContent === correct) b.classList.add('correct');
                else if (b === btn && selected !== correct) b.classList.add('wrong');
            });

            if (selected === correct) score++;
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            songIndex++;
            if (songIndex >= currentSongs.length) {
                endGame();
            } else {
                showSong();
            }
        }

        function endGame() {
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultScore').textContent = score;

            var stats = JSON.parse(localStorage.getItem('songguess_ko') || '{"best":0}');
            if (score > stats.best) stats.best = score;
            localStorage.setItem('songguess_ko', JSON.stringify(stats));
        }

        function resetGame() {
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
