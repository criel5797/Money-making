<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>럭키 드로우</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .boxes-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .box { aspect-ratio: 1; background: linear-gradient(135deg, #7c3aed, #5b21b6); border-radius: 16px; display: flex; align-items: center; justify-content: center; font-size: 3rem; cursor: pointer; transition: all .3s; box-shadow: 0 4px 15px rgba(0,0,0,.3); position: relative; overflow: hidden; }
        .box:hover { transform: scale(1.05); }
        .box:active { transform: scale(0.95); }
        .box.opened { background: linear-gradient(135deg, #fbbf24, #f59e0b); cursor: default; animation: open 0.5s ease; }
        .box.opened:hover { transform: none; }
        @keyframes open { 0% { transform: rotateY(0); } 50% { transform: rotateY(90deg); } 100% { transform: rotateY(0); } }
        .box-content { display: none; flex-direction: column; align-items: center; }
        .box.opened .box-content { display: flex; }
        .box.opened .box-icon { display: none; }
        .box-icon { font-size: 2.5rem; }
        .prize-emoji { font-size: 2.5rem; }
        .prize-text { font-size: .8rem; color: #1a1a2e; font-weight: 700; margin-top: 5px; }
        .result { text-align: center; padding: 20px; background: rgba(255,255,255,.1); border-radius: 12px; margin-bottom: 15px; min-height: 80px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .result-emoji { font-size: 3rem; margin-bottom: 10px; }
        .result-text { font-size: 1.2rem; font-weight: 700; }
        .result.win { background: rgba(251,191,36,.2); color: #fbbf24; }
        .reset-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #10b981, #059669); color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: transform .2s; }
        .reset-btn:hover { transform: scale(1.02); }
        .reset-btn:active { transform: scale(0.98); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .65rem; opacity: .7; }
        .history { margin-top: 15px; }
        .history-label { font-size: .8rem; opacity: .7; margin-bottom: 10px; }
        .history-items { display: flex; gap: 8px; flex-wrap: wrap; }
        .history-item { padding: 8px 12px; background: rgba(255,255,255,.1); border-radius: 8px; font-size: .8rem; }
        .history-item.win { background: rgba(251,191,36,.2); color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>럭키 드로우</h1>
        </header>
        <div class="game-section">
            <div class="boxes-container" id="boxes"></div>
            <div class="result" id="result">
                <div class="result-text">상자를 골라보세요!</div>
            </div>
            <button class="reset-btn" onclick="resetGame()">다시 하기</button>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="plays">0</div>
                    <div class="stat-label">게임 수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="wins">0</div>
                    <div class="stat-label">승리 수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="winRate">0%</div>
                    <div class="stat-label">승률</div>
                </div>
            </div>
            <div class="history">
                <div class="history-label">기록</div>
                <div class="history-items" id="history"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var prizes = [
            { emoji: '\uD83D\uDC8E', text: 'Diamond', win: true },
            { emoji: '\uD83C\uDFC6', text: 'Trophy', win: true },
            { emoji: '\u2B50', text: 'Star', win: true },
            { emoji: '\uD83C\uDF89', text: 'Party', win: true },
            { emoji: '\uD83D\uDCB0', text: 'Money', win: true },
            { emoji: '\uD83D\uDE10', text: 'Nothing', win: false },
            { emoji: '\uD83C\uDF2C', text: 'Wind', win: false },
            { emoji: '\uD83C\uDF27', text: 'Rain', win: false },
            { emoji: '\uD83D\uDC7B', text: 'Ghost', win: false }
        ];

        var gameEnded = false;
        var stats = JSON.parse(localStorage.getItem('lucky_ko') || '{"plays":0,"wins":0,"history":[]}');

        function createBoxes() {
            var container = document.getElementById('boxes');
            container.innerHTML = '';

            var shuffled = prizes.slice().sort(function() { return Math.random() - 0.5; });

            for (var i = 0; i < 9; i++) {
                var box = document.createElement('div');
                box.className = 'box';
                box.dataset.index = i;
                box.dataset.prize = JSON.stringify(shuffled[i]);
                box.innerHTML = '<span class="box-icon">&#127873;</span>' +
                    '<div class="box-content">' +
                    '<span class="prize-emoji">' + shuffled[i].emoji + '</span>' +
                    '<span class="prize-text">' + shuffled[i].text + '</span>' +
                    '</div>';
                box.onclick = function() { openBox(this); };
                container.appendChild(box);
            }
        }

        function openBox(boxEl) {
            if (gameEnded || boxEl.classList.contains('opened')) return;

            boxEl.classList.add('opened');
            var prize = JSON.parse(boxEl.dataset.prize);

            var resultEl = document.getElementById('result');
            resultEl.innerHTML = '<div class="result-emoji">' + prize.emoji + '</div>' +
                '<div class="result-text">' + (prize.win ? '축하합니다! ' + prize.text + '!' : '아쉽네요... ' + prize.text) + '</div>';

            if (prize.win) {
                resultEl.classList.add('win');
                stats.wins++;
            } else {
                resultEl.classList.remove('win');
            }

            stats.plays++;
            stats.history.unshift({ text: prize.emoji + ' ' + prize.text, win: prize.win });
            if (stats.history.length > 10) stats.history.pop();
            localStorage.setItem('lucky_ko', JSON.stringify(stats));

            gameEnded = true;

            setTimeout(function() {
                document.querySelectorAll('.box:not(.opened)').forEach(function(box) {
                    box.classList.add('opened');
                });
            }, 500);

            updateDisplay();
        }

        function resetGame() {
            gameEnded = false;
            document.getElementById('result').innerHTML = '<div class="result-text">상자를 골라보세요!</div>';
            document.getElementById('result').classList.remove('win');
            createBoxes();
        }

        function updateDisplay() {
            document.getElementById('plays').textContent = stats.plays;
            document.getElementById('wins').textContent = stats.wins;
            document.getElementById('winRate').textContent = stats.plays > 0 ? Math.round((stats.wins / stats.plays) * 100) + '%' : '0%';

            var historyEl = document.getElementById('history');
            historyEl.innerHTML = '';
            stats.history.slice(0, 5).forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'history-item' + (item.indexOf('Nothing') < 0 && item.indexOf('Wind') < 0 && item.indexOf('Rain') < 0 && item.indexOf('Ghost') < 0 ? ' win' : '');
                div.textContent = item;
                historyEl.appendChild(div);
            });
        }

        createBoxes();
        updateDisplay();
    </script>
</body>
</html>
