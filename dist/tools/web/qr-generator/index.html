    <div class="container">

                    <button class="tab-btn" onclick="switchTab('wifi')">📶 WiFi</button>

                    <input type="text" id="wifiPassword" placeholder="password123">
                    <label>보안 유형</label>

                        <option value="WPA">WPA/WPA2</option>

                <div class="tab-content" id="tab-phone">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <script>
        let currentTab = 'url';
        let qr = null;

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            document.querySelector(`[onclick="switchTab('${tab}')"]`).classList.add('active');
            document.getElementById(`tab-${tab}`).classList.add('active');
            generateQR();
        }

        function generateQR() {
            const data = getData();
            if (!data) return;

            const size = parseInt(document.getElementById('sizeSlider').value);
            const qrColor = document.getElementById('qrColor').value;
            const bgColor = document.getElementById('bgColor').value;

            const container = document.getElementById('qrcode');
            container.innerHTML = '';

            qr = new QRCode(container, {
                text: data,
                width: size,
                height: size,
                colorDark: qrColor,
                colorLight: bgColor,
                correctLevel: QRCode.CorrectLevel.H
            });
        }

        function getData() {
            switch(currentTab) {
                case 'url':
                    return document.getElementById('urlInput').value || 'https://example.com';
                case 'text':
                    return document.getElementById('textInput').value || '안녕하세요';
                case 'wifi':
                    const ssid = document.getElementById('wifiSsid').value;
                    const password = document.getElementById('wifiPassword').value;
                    const security = document.getElementById('wifiSecurity').value;
                    return `WIFI:T:${security};S:${ssid};P:${password};;`;
                case 'email':
                    const email = document.getElementById('emailAddress').value;
                    const subject = document.getElementById('emailSubject').value;
                    const body = document.getElementById('emailBody').value;
                    let mailto = `mailto:${email}`;
                    if (subject || body) {
                        mailto += '?';
                        if (subject) mailto += `subject=${encodeURIComponent(subject)}`;
                        if (subject && body) mailto += '&';
                        if (body) mailto += `body=${encodeURIComponent(body)}`;
                    }
                    return mailto;
                case 'phone':
                    return `tel:${document.getElementById('phoneNumber').value}`;
                default:
                    return '';
            }
        }

        function downloadQR(format) {
            const canvas = document.querySelector('#qrcode canvas');
            if (!canvas) {
                showToast('먼저 QR 코드를 생성하세요');
                return;
            }

            if (format === 'png') {
                const link = document.createElement('a');
                link.download = 'qrcode.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            } else {
                const size = canvas.width;
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, size, size);

                let svg = `<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}">`;
                const bgColor = document.getElementById('bgColor').value;
                const qrColor = document.getElementById('qrColor').value;
                svg += `<rect width="100%" height="100%" fill="${bgColor}"/>`;

                for (let y = 0; y < size; y++) {
                    for (let x = 0; x < size; x++) {
                        const i = (y * size + x) * 4;
                        if (imageData.data[i] < 128) {
                            svg += `<rect x="${x}" y="${y}" width="1" height="1" fill="${qrColor}"/>`;
                        }
                    }
                }
                svg += '</svg>';

                const blob = new Blob([svg], { type: 'image/svg+xml' });
                const link = document.createElement('a');
                link.download = 'qrcode.svg';
                link.href = URL.createObjectURL(blob);
                link.click();
            }

            showToast('다운로드 완료!');
        }

        document.getElementById('qrColor').addEventListener('input', (e) => {
            document.getElementById('qrColorValue').textContent = e.target.value;
            generateQR();
        });
        document.getElementById('bgColor').addEventListener('input', (e) => {
            document.getElementById('bgColorValue').textContent = e.target.value;
            generateQR();
        });

        document.getElementById('sizeSlider').addEventListener('input', (e) => {
            document.getElementById('sizeValue').textContent = e.target.value + 'px';
            generateQR();
        });

        document.querySelectorAll('input, textarea, select').forEach(el => {
            el.addEventListener('input', generateQR);
        });

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        generateQR();
    </script>
