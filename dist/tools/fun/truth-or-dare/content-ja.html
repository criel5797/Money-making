<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>真実か挑戦</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff6b6b, #feca57); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-select { margin-bottom: 20px; }
        .category-label { font-size: .9rem; opacity: .8; margin-bottom: 8px; display: block; }
        .category-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-btn { padding: 8px 14px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-btn.active { background: rgba(255,255,255,.4); }
        .card { background: rgba(255,255,255,.15); border-radius: 20px; padding: 30px; margin-bottom: 20px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        .card-icon { font-size: 4rem; margin-bottom: 20px; }
        .card-text { font-size: 1.3rem; line-height: 1.6; }
        .card.truth { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card.dare { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .truth-btn { background: linear-gradient(135deg, #667eea, #764ba2); }
        .dare-btn { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .action-btn:hover { transform: scale(1.02); }
        .skip-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; margin-bottom: 15px; }
        .stats { margin-top: 15px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🎭 真実か挑戦</h1>
        </header>
        <div class="game-section">
            <div class="category-select">
                <label class="category-label">レベル選択</label>
                <div class="category-btns">
                    <button class="cat-btn active" onclick="setCategory('all')">全て</button>
                    <button class="cat-btn" onclick="setCategory('mild')">やさしい</button>
                    <button class="cat-btn" onclick="setCategory('medium')">普通</button>
                    <button class="cat-btn" onclick="setCategory('spicy')">激辛</button>
                </div>
            </div>
            <div class="card" id="card">
                <div class="card-icon" id="cardIcon">🎲</div>
                <div class="card-text" id="cardText">真実か挑戦を選んでください！</div>
            </div>
            <div class="action-btns">
                <button class="action-btn truth-btn" onclick="getQuestion('truth')">💬 真実</button>
                <button class="action-btn dare-btn" onclick="getQuestion('dare')">🔥 挑戦</button>
            </div>
            <button class="skip-btn" onclick="skip()">🔀 別の質問</button>
            <div class="stats">
                <div class="stats-title">📊 ゲーム記録</div>
                <div class="stats-row"><span>真実回数</span><span id="truthCount">0</span></div>
                <div class="stats-row"><span>挑戦回数</span><span id="dareCount">0</span></div>
                <div class="stats-row"><span>スキップ</span><span id="skipCount">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var truths = {
            mild: [
                '好きな食べ物は何ですか？',
                '子供の頃の夢は何でしたか？',
                '好きな映画は何ですか？',
                '初めて携帯を持ったのはいつ？',
                '一番怖いものは何ですか？',
                '今まで行った中で一番良かった場所は？'
            ],
            medium: [
                '一番恥ずかしかった瞬間は？',
                '一番後悔していることは？',
                '片思いしたことはありますか？',
                '親に嘘をついたことはありますか？',
                '一番大きな秘密は何ですか？',
                '初恋はいつでしたか？'
            ],
            spicy: [
                '告白されたことはありますか？',
                '今好きな人はいますか？',
                'キスしたことはありますか？',
                '一番ショックを受けたことは？',
                '酔っ払って失敗したことは？',
                '一番クレイジーな行動は何でしたか？'
            ]
        };

        var dares = {
            mild: [
                '変な顔を5秒間する',
                '隣の人を褒める',
                '10秒間笑い続ける',
                '好きな歌のワンフレーズを歌う',
                '好きなダンスを見せる',
                '面白い芸を見せる'
            ],
            medium: [
                '最近の通話履歴を見せる',
                'スマホの壁紙を見せる',
                'SNSのフォロワー数を公開する',
                '最後に撮った写真を見せる',
                '1分間まばたきしない',
                '次のラウンドまで方言で話す'
            ],
            spicy: [
                '好きな人のイニシャルを公開する',
                '好きな人にハートを送る',
                '最近の検索履歴を見せる',
                '1分間にらめっこする',
                '好きな人にメッセージを送る',
                '次のラウンドまで敬語で話す'
            ]
        };

        var currentType = null;
        var currentCategory = 'all';
        var stats = JSON.parse(localStorage.getItem('tod_ja') || '{"truth":0,"dare":0,"skip":0}');

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(
                    cat === 'all' ? '全て' : cat === 'mild' ? 'やさしい' : cat === 'medium' ? '普通' : '激辛'));
            });
        }

        function getQuestions(type) {
            var pool = [];
            var source = type === 'truth' ? truths : dares;
            if (currentCategory === 'all') {
                pool = source.mild.concat(source.medium).concat(source.spicy);
            } else {
                pool = source[currentCategory];
            }
            return pool;
        }

        function getQuestion(type) {
            currentType = type;
            var pool = getQuestions(type);
            var question = pool[Math.floor(Math.random() * pool.length)];
            var card = document.getElementById('card');
            card.className = 'card ' + type;
            document.getElementById('cardIcon').textContent = type === 'truth' ? '💬' : '🔥';
            document.getElementById('cardText').textContent = question;
            if (type === 'truth') {
                stats.truth++;
            } else {
                stats.dare++;
            }
            localStorage.setItem('tod_ja', JSON.stringify(stats));
            updateStats();
        }

        function skip() {
            if (currentType) {
                stats.skip++;
                localStorage.setItem('tod_ja', JSON.stringify(stats));
                updateStats();
                getQuestion(currentType);
            }
        }

        function updateStats() {
            document.getElementById('truthCount').textContent = stats.truth;
            document.getElementById('dareCount').textContent = stats.dare;
            document.getElementById('skipCount').textContent = stats.skip;
        }

        updateStats();
    </script>
</body>
</html>
