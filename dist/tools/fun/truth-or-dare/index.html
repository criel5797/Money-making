<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/truth-or-dare/"><meta property="og:url" content="https://instaidea.org/tools/fun/truth-or-dare/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/truth-or-dare/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/truth-or-dare/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/truth-or-dare/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/truth-or-dare/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>진실 혹은 도전</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff6b6b, #feca57); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .mode-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .mode-btn { flex: 1; padding: 15px; border: 3px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all .2s; }
        .mode-btn.active { background: rgba(255,255,255,.3); border-color: #fff; }
        .mode-btn:hover { transform: scale(1.02); }
        .card { background: rgba(255,255,255,.15); border-radius: 20px; padding: 30px; margin-bottom: 20px; text-align: center; min-height: 200px; display: flex; flex-direction: column; justify-content: center; }
        .card-icon { font-size: 4rem; margin-bottom: 20px; }
        .card-text { font-size: 1.3rem; line-height: 1.6; }
        .card.truth { background: linear-gradient(135deg, #667eea, #764ba2); }
        .card.dare { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .truth-btn { background: linear-gradient(135deg, #667eea, #764ba2); }
        .dare-btn { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .action-btn:hover { transform: scale(1.02); }
        .skip-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; margin-bottom: 15px; }
        .category-select { margin-bottom: 20px; }
        .category-label { font-size: .9rem; opacity: .8; margin-bottom: 8px; display: block; }
        .category-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-btn { padding: 8px 14px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-btn.active { background: rgba(255,255,255,.4); }
        .stats { margin-top: 15px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🎭 진실 혹은 도전</h1>
        </header>
        <div class="game-section">
            <div class="category-select">
                <label class="category-label">카테고리 선택</label>
                <div class="category-btns">
                    <button class="cat-btn active" onclick="setCategory('all')">전체</button>
                    <button class="cat-btn" onclick="setCategory('mild')">순한맛</button>
                    <button class="cat-btn" onclick="setCategory('medium')">중간맛</button>
                    <button class="cat-btn" onclick="setCategory('spicy')">매운맛</button>
                </div>
            </div>
            <div class="card" id="card">
                <div class="card-icon" id="cardIcon">🎲</div>
                <div class="card-text" id="cardText">진실 또는 도전을 선택하세요!</div>
            </div>
            <div class="action-btns">
                <button class="action-btn truth-btn" onclick="getQuestion('truth')">💬 진실</button>
                <button class="action-btn dare-btn" onclick="getQuestion('dare')">🔥 도전</button>
            </div>
            <button class="skip-btn" onclick="skip()">🔀 다른 질문</button>
            <div class="stats">
                <div class="stats-title">📊 게임 기록</div>
                <div class="stats-row"><span>진실 선택</span><span id="truthCount">0</span></div>
                <div class="stats-row"><span>도전 선택</span><span id="dareCount">0</span></div>
                <div class="stats-row"><span>스킵</span><span id="skipCount">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var truths = {
            mild: [
                '가장 좋아하는 음식은?',
                '어릴 때 꿈은 무엇이었나요?',
                '가장 좋아하는 영화는?',
                '처음 핸드폰을 가진 건 언제였나요?',
                '가장 무서워하는 것은?',
                '지금까지 가본 곳 중 가장 좋았던 곳은?'
            ],
            medium: [
                '가장 창피했던 순간은?',
                '가장 후회하는 일은?',
                '짝사랑한 적 있나요?',
                '거짓말을 한 적 있나요?',
                '가장 큰 비밀은?',
                '첫사랑은 언제였나요?'
            ],
            spicy: [
                '이성에게 고백을 받아본 적 있나요?',
                '좋아하는 사람이 있나요?',
                '키스해본 적 있나요?',
                '가장 충격받은 일은?',
                '술 마시고 한 실수는?',
                '가장 미치광이처럼 행동한 적은?'
            ]
        };

        var dares = {
            mild: [
                '이상한 얼굴 5초간 하기',
                '옆 사람 칭찬하기',
                '10초간 아무 말 없이 웃기',
                '좋아하는 노래 한 소절 부르기',
                '가장 좋아하는 춤 동작 보여주기',
                '재미있는 개인기 보여주기'
            ],
            medium: [
                '최근 통화기록 보여주기',
                '핸드폰 배경화면 보여주기',
                'SNS 팔로워 수 공개하기',
                '가장 최근에 찍은 사진 보여주기',
                '1분간 눈 안 깜빡이기',
                '다음 라운드까지 사투리로 말하기'
            ],
            spicy: [
                '좋아하는 사람 이니셜 공개하기',
                '원하는 사람에게 하트 보내기',
                '최근 검색 기록 보여주기',
                '1분간 옆 사람과 눈싸움',
                '좋아하는 사람에게 문자 보내기',
                '다음 라운드까지 존댓말로만 말하기'
            ]
        };

        var currentType = null;
        var currentCategory = 'all';
        var stats = JSON.parse(localStorage.getItem('tod_ko') || '{"truth":0,"dare":0,"skip":0}');

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(
                    cat === 'all' ? '전체' : cat === 'mild' ? '순한' : cat === 'medium' ? '중간' : '매운'));
            });
        }

        function getQuestions(type) {
            var pool = [];
            var source = type === 'truth' ? truths : dares;
            if (currentCategory === 'all') {
                pool = source.mild.concat(source.medium).concat(source.spicy);
            } else {
                pool = source[currentCategory];
            }
            return pool;
        }

        function getQuestion(type) {
            currentType = type;
            var pool = getQuestions(type);
            var question = pool[Math.floor(Math.random() * pool.length)];
            var card = document.getElementById('card');
            card.className = 'card ' + type;
            document.getElementById('cardIcon').textContent = type === 'truth' ? '💬' : '🔥';
            document.getElementById('cardText').textContent = question;
            if (type === 'truth') {
                stats.truth++;
            } else {
                stats.dare++;
            }
            localStorage.setItem('tod_ko', JSON.stringify(stats));
            updateStats();
        }

        function skip() {
            if (currentType) {
                stats.skip++;
                localStorage.setItem('tod_ko', JSON.stringify(stats));
                updateStats();
                getQuestion(currentType);
            }
        }

        function updateStats() {
            document.getElementById('truthCount').textContent = stats.truth;
            document.getElementById('dareCount').textContent = stats.dare;
            document.getElementById('skipCount').textContent = stats.skip;
        }

        updateStats();
    </script>
</body>
</html>
