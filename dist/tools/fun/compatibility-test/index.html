                heart.innerHTML = '💕';

            ['year1', 'year2'].forEach(id => {
                const select = document.getElementById(id);
                for (let y = currentYear; y >= 1950; y--) {
                    select.innerHTML += `<option value="${y}">${y}년</option>`;
                }
            });

            ['month1', 'month2'].forEach(id => {
                const select = document.getElementById(id);
                for (let m = 1; m <= 12; m++) {
                    select.innerHTML += `<option value="${m}">${m}월</option>`;
                }
            });

            ['day1', 'day2'].forEach(id => {
                const select = document.getElementById(id);
                for (let d = 1; d <= 31; d++) {
                    select.innerHTML += `<option value="${d}">${d}일</option>`;
                }
            });
        }
        initDateSelects();

        let resultData = {};

        function checkCompatibility() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();
            const year1 = document.getElementById('year1').value;
            const month1 = document.getElementById('month1').value;
            const day1 = document.getElementById('day1').value;
            const year2 = document.getElementById('year2').value;
            const month2 = document.getElementById('month2').value;
            const day2 = document.getElementById('day2').value;

            if (!name1 || !name2) {
                showToast('⚠️ 이름을 입력해주세요!');
                return;
            }

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('loadingSection').classList.add('show');

            setTimeout(() => {
                calculateResult(name1, name2,
                    { year: year1, month: month1, day: day1 },
                    { year: year2, month: month2, day: day2 }
                );
            }, 2000);
        }

        function calculateResult(name1, name2, birth1, birth2) {
            // 이름 기반 점수 계산
            const nameScore = calculateNameScore(name1, name2);

            // 생년월일 기반 점수 계산
            let birthScore = 50;
            if (birth1.year && birth2.year) {
                birthScore = calculateBirthScore(birth1, birth2);
            }

            // 최종 점수 계산
            const finalScore = Math.round((nameScore * 0.4 + birthScore * 0.6));

            // 카테고리별 점수
            const categories = {
                love: Math.min(100, Math.max(30, finalScore + randomRange(-15, 15))),
                communication: Math.min(100, Math.max(30, finalScore + randomRange(-15, 15))),
                trust: Math.min(100, Math.max(30, finalScore + randomRange(-15, 15))),
                future: Math.min(100, Math.max(30, finalScore + randomRange(-15, 15)))
            };

            resultData = {
                name1,
                name2,
                score: finalScore,
                categories
            };

            displayResult();
        }

        function calculateNameScore(name1, name2) {
            // 이름 문자열 기반 시드 생성
            const combined = name1 + name2;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = ((hash << 5) - hash) + combined.charCodeAt(i);
                hash = hash & hash;
            }

            // 50-100 사이 점수
            return 50 + (Math.abs(hash) % 51);
        }

        function calculateBirthScore(birth1, birth2) {
            const y1 = parseInt(birth1.year);
            const m1 = parseInt(birth1.month);
            const d1 = parseInt(birth1.day);
            const y2 = parseInt(birth2.year);
            const m2 = parseInt(birth2.month);
            const d2 = parseInt(birth2.day);

            // 나이 차이 점수
            const ageDiff = Math.abs(y1 - y2);
            let ageScore = 100;
            if (ageDiff > 10) ageScore = 60;
            else if (ageDiff > 5) ageScore = 80;
            else if (ageDiff > 2) ageScore = 90;

            // 월/일 조합 점수
            const dateHash = (m1 * d1 + m2 * d2) % 100;
            const dateScore = 50 + (dateHash % 51);

            return Math.round((ageScore + dateScore) / 2);
        }

        function randomRange(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function displayResult() {
            document.getElementById('loadingSection').classList.remove('show');
            document.getElementById('resultSection').classList.add('show');

            document.getElementById('displayName1').textContent = resultData.name1;
            document.getElementById('displayName2').textContent = resultData.name2;

            // 점수 애니메이션
            const circumference = 2 * Math.PI * 78;
            const offset = circumference - (resultData.score / 100) * circumference;

            setTimeout(() => {
                document.getElementById('progressCircle').style.strokeDashoffset = offset;
                animateNumber('scoreNumber', 0, resultData.score, 1000);
            }, 100);

            // 결과 메시지
            document.getElementById('resultMessage').textContent = getResultMessage(resultData.score);

            // 카테고리 점수
            const catNames = {
                love: '💗 애정운',
                communication: '💬 소통력',
                trust: '🤝 신뢰도',
                future: '🌟 미래'
            };

            let catHtml = '';
            for (const [key, value] of Object.entries(resultData.categories)) {
                catHtml += `
                    <div class="category-item">
                        <div class="cat-name">${catNames[key]}</div>
                        <div class="cat-score">${value}%</div>
                        <div class="bar-container">
                            <div class="bar-fill" style="width: ${value}%"></div>
                        </div>
                    </div>
                `;
            }
            document.getElementById('categoryScores').innerHTML = catHtml;

            // 분석 내용
            document.getElementById('analysisSection').innerHTML = generateAnalysis(resultData);
        }

        function animateNumber(elementId, start, end, duration) {
            const element = document.getElementById(elementId);
            const range = end - start;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const value = Math.round(start + range * progress);
                element.textContent = value + '%';

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

        function getResultMessage(score) {
            if (score >= 90) return "운명적인 만남! 천생연분이에요! 💕";
            if (score >= 80) return "환상의 궁합! 서로를 위해 태어났어요! ✨";
            if (score >= 70) return "좋은 궁합! 함께라면 행복해요! 😊";
            if (score >= 60) return "괜찮은 궁합! 노력하면 더 좋아져요! 💪";
            if (score >= 50) return "보통 궁합! 서로 이해가 필요해요! 🤔";
            return "도전적인 궁합! 많은 노력이 필요해요! 💭";
        }

        function generateAnalysis(data) {
            const analyses = [
                {
                    title: "💕 두 사람의 케미",
                    texts: [
                        `${data.name1}님과 ${data.name2}님은 서로를 보완하는 관계입니다. 한 사람의 부족한 점을 다른 사람이 채워줄 수 있어요.`,
                        `두 분이 함께할 때 시너지가 발생합니다. 서로의 장점을 살리면 더 큰 결과를 만들 수 있어요.`,
                        `첫인상과 달리 알면 알수록 매력을 느낄 수 있는 조합입니다.`
                    ]
                },
                {
                    title: "💬 소통 스타일",
                    texts: [
                        `서로 다른 표현 방식을 가지고 있어요. ${data.name1}님은 더 직접적이고, ${data.name2}님은 더 섬세한 편입니다.`,
                        `대화할 때 서로의 말을 끝까지 듣는 것이 중요해요. 작은 오해가 큰 갈등이 될 수 있습니다.`,
                        `솔직한 대화를 나눌수록 관계가 깊어질 거예요.`
                    ]
                },
                {
                    title: "✨ 앞으로의 조언",
                    texts: [
                        `서로의 취미나 관심사를 공유해보세요. 새로운 공감대를 발견할 수 있어요.`,
                        `작은 것에도 감사를 표현하면 관계가 더 좋아집니다.`,
                        `가끔은 서로에게 시간을 주는 것도 중요해요. 개인 시간도 존중해주세요.`
                    ]
                }
            ];

            return analyses.map(item => `
                <div class="analysis-item">
                    <h4>${item.title}</h4>
                    <p>${item.texts[Math.floor(Math.random() * item.texts.length)]}</p>
                </div>
            `).join('');
        }

        function shareResult() {
            const text = `💕 AI 궁합 테스트 결과

${resultData.name1} ❤️ ${resultData.name2}
궁합 점수: ${resultData.score}점!

우리의 궁합은 ${getResultMessage(resultData.score)}

💑 너희 커플 궁합도 테스트해볼래?`;

            window.shareWithModal('AI 궁합 테스트', text);
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function resetTest() {
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';

            // 입력 초기화
            document.getElementById('name1').value = '';
            document.getElementById('name2').value = '';
            document.getElementById('year1').value = '';
            document.getElementById('month1').value = '';
            document.getElementById('day1').value = '';
            document.getElementById('year2').value = '';
            document.getElementById('month2').value = '';
            document.getElementById('day2').value = '';

            // 점수 원 초기화
            document.getElementById('progressCircle').style.strokeDashoffset = 490;
            document.getElementById('scoreNumber').textContent = '0%';
        }
    </script>
