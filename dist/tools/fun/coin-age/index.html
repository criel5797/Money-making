        .input-label { font-size: .9rem; margin-bottom: 10px; opacity: .8; }
        .year-input { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); color: #333; font-size: 1.2rem; text-align: center; }
        .year-input:focus { outline: 3px solid rgba(255,255,255,.5); }
        .calc-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
        .result-box { background: rgba(0,0,0,.2); border-radius: 12px; padding: 25px; text-align: center; margin-bottom: 20px; }
        .result-age { font-size: 4rem; font-weight: 700; margin-bottom: 10px; }
        .result-label { font-size: 1rem; opacity: .8; }
        .result-detail { font-size: .9rem; opacity: .7; margin-top: 15px; line-height: 1.8; white-space: pre-line; }
        .coin-visual { width: 150px; height: 150px; border-radius: 50%; background: linear-gradient(145deg, #d4af37, #b8860b); margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; box-shadow: 0 10px 30px rgba(0,0,0,.3); }

<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🪙 동전 연식 계산기</h1>
        </header>
        <div class="coin-section">
            <div class="coin-visual" id="coinVisual">🪙</div>
            <div class="input-group">
                <div class="input-label">동전 발행 연도</div>
                <input type="number" class="year-input" id="yearInput" min="1900" placeholder="예: 1995">
            </div>
            <button class="calc-btn" onclick="calculate()">🔍 연식 계산하기</button>
            <div class="result-box">
                <div class="result-age" id="resultAge">-</div>
                <div class="result-label" id="resultLabel">연도를 입력하세요</div>
                <div class="result-detail" id="resultDetail"></div>
            </div>
            <div class="fun-facts">
                <h3>💡 알고 계셨나요?</h3>
                <ul>
                    <li>한국 동전은 1966년부터 발행되었습니다</li>
                    <li>희귀 동전은 발행 연도에 따라 가치가 달라집니다</li>
                    <li>오래된 동전일수록 수집 가치가 높을 수 있습니다</li>
                </ul>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var yearInput = document.getElementById('yearInput');
        yearInput.max = String(new Date().getFullYear());

        function calculate() {
            var y = parseInt(yearInput.value, 10);
            var now = new Date().getFullYear();
            if (isNaN(y) || y < 1900 || y > now) {
                document.getElementById('resultAge').textContent = '?';
                document.getElementById('resultLabel').textContent = '유효한 연도를 입력하세요';
                document.getElementById('resultDetail').textContent = '';
                return;
            }

            var age = now - y;
            document.getElementById('resultAge').textContent = age + '년';
            document.getElementById('resultLabel').textContent = '이 동전의 나이';

            var detail = '발행 연도: ' + y + '년\n';
            if (age >= 50) detail += '50년 이상! 희귀한 동전일 수 있습니다\n';
            else if (age >= 30) detail += '30년 이상! 빈티지 동전입니다\n';
            else if (age >= 20) detail += '20년 이상! 꽤 오래된 동전입니다\n';
            else detail += '비교적 최근에 발행된 동전입니다\n';
            detail += '\n지난 시간: ' + (age * 365) + '일, ' + (age * 12) + '개월';
            document.getElementById('resultDetail').textContent = detail;
        }
    </script>
</body>
