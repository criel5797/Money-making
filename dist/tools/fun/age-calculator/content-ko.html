<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>

        <header>
            <h1 data-i18n="header.title">🎂 나이 계산기</h1>
            <p class="subtitle" data-i18n="header.subtitle">만 나이와 한국 나이를 한번에 확인하세요</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <label for="birthdate" data-i18n="input.label">생년월일을 선택하세요</label>
                <input type="date" id="birthdate" max="">
            </div>
            <button class="calculate-btn" onclick="calculateAge()" data-i18n="input.btn">나이 계산하기</button>
        </div>

        <div class="result-section" id="result">
            <div class="result-grid">
                <div class="result-card">
                    <div class="result-title" data-i18n="result.intAge">만 나이</div>
                    <div class="result-value" id="internationalAge">-</div>
                </div>
                <div class="result-card">
                    <div class="result-title" data-i18n="result.korAge">한국 나이</div>
                    <div class="result-value" id="koreanAge">-</div>
                </div>
            </div>

            <div class="result-card">
                <div class="result-title" data-i18n="result.nextBirth">다음 생일까지</div>
                <div class="result-value" id="nextBirthday">- <small data-i18n="result.daysLeft">일 남음</small></div>
            </div>

            <div class="extra-info">
                <div class="extra-item">
                    <div class="label" data-i18n="result.zodiac">띠</div>
                    <div class="value" id="zodiac">-</div>
                </div>
                <div class="extra-item">
                    <div class="label" data-i18n="result.constellation">별자리</div>
                    <div class="value" id="constellation">-</div>
                </div>
                <div class="extra-item">
                    <div class="label" data-i18n="result.dayOfWeek">태어난 요일</div>
                    <div class="value" id="birthDay">-</div>
                </div>
                <div class="extra-item">
                    <div class="label" data-i18n="result.daysLived">살아온 일수</div>

    <script>
        // Set max date to today
        document.getElementById('birthdate').max = new Date().toISOString().split('T')[0];

        const zodiacs = ['원숭이', '닭', '개', '돼지', '쥐', '소', '호랑이', '토끼', '용', '뱀', '말', '양'];
        const constellations = [
            { name: '염소자리', start: [1, 1], end: [1, 19] },
            { name: '물병자리', start: [1, 20], end: [2, 18] },
            { name: '물고기자리', start: [2, 19], end: [3, 20] },
            { name: '양자리', start: [3, 21], end: [4, 19] },
            { name: '황소자리', start: [4, 20], end: [5, 20] },
            { name: '쌍둥이자리', start: [5, 21], end: [6, 21] },
            { name: '게자리', start: [6, 22], end: [7, 22] },
            { name: '사자자리', start: [7, 23], end: [8, 22] },
            { name: '처녀자리', start: [8, 23], end: [9, 22] },
            { name: '천칭자리', start: [9, 23], end: [10, 22] },
            { name: '전갈자리', start: [10, 23], end: [11, 21] },
            { name: '사수자리', start: [11, 22], end: [12, 21] },
            { name: '염소자리', start: [12, 22], end: [12, 31] }
        ];
        const days = ['일요일', '월요일', '화요일', '수요일', '목요일', '금요일', '토요일'];

        function calculateAge() {
            const birthdate = document.getElementById('birthdate').value;
            if (!birthdate) {
                alert('생년월일을 선택해주세요.');
                return;
            }

            const birth = new Date(birthdate);
            const today = new Date();

            // 만 나이 계산
            let internationalAge = today.getFullYear() - birth.getFullYear();
            const monthDiff = today.getMonth() - birth.getMonth();
            if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
                internationalAge--;
            }

            // 한국 나이 계산 (2023년 이전 방식)
            const koreanAge = today.getFullYear() - birth.getFullYear() + 1;

            // 다음 생일까지 남은 일수
            let nextBirthday = new Date(today.getFullYear(), birth.getMonth(), birth.getDate());
            if (nextBirthday <= today) {
                nextBirthday = new Date(today.getFullYear() + 1, birth.getMonth(), birth.getDate());
            }
            const daysUntilBirthday = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));

            // 띠 계산
            const zodiac = zodiacs[birth.getFullYear() % 12];

            // 별자리 계산
            const month = birth.getMonth() + 1;
            const day = birth.getDate();
            let constellation = '';
            for (const c of constellations) {
                if ((month === c.start[0] && day >= c.start[1]) || (month === c.end[0] && day <= c.end[1])) {
                    constellation = c.name;
                    break;
                }
            }

            // 태어난 요일
            const birthDay = days[birth.getDay()];

            // 살아온 일수
            const daysLived = Math.floor((today - birth) / (1000 * 60 * 60 * 24));

            // 결과 표시
            document.getElementById('internationalAge').textContent = internationalAge + '세';
            document.getElementById('koreanAge').textContent = koreanAge + '세';
            document.getElementById('nextBirthday').innerHTML = daysUntilBirthday + ' <small>일 남음</small>';
            document.getElementById('zodiac').textContent = zodiac + '띠';
            document.getElementById('constellation').textContent = constellation;
            document.getElementById('birthDay').textContent = birthDay;
            document.getElementById('daysLived').textContent = daysLived.toLocaleString() + '일';

            document.getElementById('result').classList.add('show');
        }

        function shareResult() {
            const internationalAge = document.getElementById('internationalAge').textContent;
            const koreanAge = document.getElementById('koreanAge').textContent;
            const zodiac = document.getElementById('zodiac').textContent;
            const constellation = document.getElementById('constellation').textContent;
            const nextBirthday = document.getElementById('nextBirthday').textContent.split(' ')[0];

            const text = `🎂 나이 계산 결과

만 나이: ${internationalAge}
한국 나이: ${koreanAge}
띠: ${zodiac}
별자리: ${constellation}
다음 생일까지: ${nextBirthday}일

✨ 나도 내 나이 계산해보기!`;

            window.shareWithModal('나이 계산 결과', text);
        }
    </script>
