<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/eye-rest/"><meta property="og:url" content="https://instaidea.org/tools/fun/eye-rest/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/eye-rest/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/eye-rest/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/eye-rest/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/eye-rest/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>눈 휴식 타이머</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #2c3e50, #3498db); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .timer-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .timer-display { background: rgba(0,0,0,.3); border-radius: 16px; padding: 40px; margin-bottom: 20px; text-align: center; }
        .timer-icon { font-size: 4rem; margin-bottom: 15px; }
        .timer-time { font-size: 3rem; font-weight: 700; font-family: monospace; }
        .timer-label { font-size: .9rem; opacity: .8; margin-top: 10px; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .start-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1.1rem; cursor: pointer; font-weight: 600; }
        .reset-btn { padding: 16px 24px; border: none; border-radius: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 1.1rem; cursor: pointer; }
        .rule-box { background: rgba(255,255,255,.1); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .rule-title { font-weight: 600; margin-bottom: 10px; }
        .rule-text { font-size: .9rem; line-height: 1.6; opacity: .9; }
        .settings { margin-top: 15px; }
        .setting-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; }
        .setting-label { font-size: .9rem; }
        .setting-input { width: 80px; padding: 8px; border: none; border-radius: 8px; background: rgba(255,255,255,.9); color: #333; text-align: center; }
        .rest-screen { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #1a1a2e; z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        .rest-screen.active { display: flex; }
        .rest-message { font-size: 2rem; margin-bottom: 20px; }
        .rest-timer { font-size: 4rem; font-weight: 700; margin-bottom: 30px; }
        .rest-tip { font-size: 1rem; opacity: .8; max-width: 300px; text-align: center; }
        .skip-btn { margin-top: 30px; padding: 12px 30px; background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: 10px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>👁️ 눈 휴식 타이머</h1>
        </header>
        <div class="timer-section">
            <div class="timer-display">
                <div class="timer-icon" id="timerIcon">💻</div>
                <div class="timer-time" id="timerTime">20:00</div>
                <div class="timer-label" id="timerLabel">작업 시간</div>
            </div>
            <div class="btn-group">
                <button class="start-btn" id="startBtn" onclick="toggleTimer()">시작</button>
                <button class="reset-btn" onclick="resetTimer()">↻</button>
            </div>
            <div class="rule-box">
                <div class="rule-title">20-20-20 규칙</div>
                <div class="rule-text">20분마다 20피트(6미터) 떨어진 곳을 20초 동안 바라보세요. 눈의 피로를 줄이는 데 도움이 됩니다.</div>
            </div>
            <div class="settings">
                <div class="setting-row">
                    <span class="setting-label">작업 시간 (분)</span>
                    <input type="number" class="setting-input" id="workTime" value="20" min="1" max="60">
                </div>
                <div class="setting-row">
                    <span class="setting-label">휴식 시간 (초)</span>
                    <input type="number" class="setting-input" id="restTime" value="20" min="5" max="120">
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <div class="rest-screen" id="restScreen">
        <div class="rest-message">👁️ 눈을 쉬세요!</div>
        <div class="rest-timer" id="restTimer">20</div>
        <div class="rest-tip">멀리 있는 물체를 바라보며<br>눈을 깜빡여 주세요</div>
        <button class="skip-btn" onclick="skipRest()">건너뛰기</button>
    </div>
    <script>
        var workDuration = 20 * 60;
        var restDuration = 20;
        var timeLeft = workDuration;
        var isRunning = false;
        var isResting = false;
        var interval = null;
        function formatTime(seconds) {
            var m = Math.floor(seconds / 60);
            var s = seconds % 60;
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }
        function toggleTimer() {
            if (isRunning) {
                clearInterval(interval);
                isRunning = false;
                document.getElementById('startBtn').textContent = '시작';
            } else {
                workDuration = parseInt(document.getElementById('workTime').value) * 60;
                restDuration = parseInt(document.getElementById('restTime').value);
                if (timeLeft === 0 || timeLeft === workDuration) timeLeft = workDuration;
                isRunning = true;
                document.getElementById('startBtn').textContent = '일시정지';
                interval = setInterval(tick, 1000);
            }
        }
        function tick() {
            timeLeft--;
            document.getElementById('timerTime').textContent = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(interval);
                isRunning = false;
                startRest();
            }
        }
        function startRest() {
            isResting = true;
            var restLeft = restDuration;
            document.getElementById('restScreen').classList.add('active');
            document.getElementById('restTimer').textContent = restLeft;
            interval = setInterval(function() {
                restLeft--;
                document.getElementById('restTimer').textContent = restLeft;
                if (restLeft <= 0) {
                    endRest();
                }
            }, 1000);
        }
        function endRest() {
            clearInterval(interval);
            isResting = false;
            document.getElementById('restScreen').classList.remove('active');
            timeLeft = workDuration;
            document.getElementById('timerTime').textContent = formatTime(timeLeft);
            document.getElementById('startBtn').textContent = '시작';
        }
        function skipRest() {
            endRest();
        }
        function resetTimer() {
            clearInterval(interval);
            isRunning = false;
            isResting = false;
            workDuration = parseInt(document.getElementById('workTime').value) * 60;
            timeLeft = workDuration;
            document.getElementById('timerTime').textContent = formatTime(timeLeft);
            document.getElementById('startBtn').textContent = '시작';
            document.getElementById('restScreen').classList.remove('active');
        }
    </script>
</body>
</html>
