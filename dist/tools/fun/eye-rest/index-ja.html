<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>👁️ 目の休憩タイマー</h1>
        </header>
        <div class="timer-section">
            <div class="timer-display">
                <div class="timer-icon" id="timerIcon">💻</div>
                <div class="timer-time" id="timerTime">20:00</div>
                <div class="timer-label" id="timerLabel">作業時間</div>
            </div>
            <div class="btn-group">
                <button class="start-btn" id="startBtn" onclick="toggleTimer()">スタート</button>
                <button class="reset-btn" onclick="resetTimer()">↻</button>
            </div>
            <div class="rule-box">
                <div class="rule-title">20-20-20ルール</div>
                <div class="rule-text">20分ごとに、20フィート（6メートル）離れた場所を20秒間見てください。目の疲れを軽減するのに役立ちます。</div>
            </div>
            <div class="settings">
                <div class="setting-row">
                    <span class="setting-label">作業時間（分）</span>
                    <input type="number" class="setting-input" id="workTime" value="20" min="1" max="60">
                </div>
                <div class="setting-row">
                    <span class="setting-label">休憩時間（秒）</span>
                    <input type="number" class="setting-input" id="restTime" value="20" min="5" max="120">
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <div class="rest-screen" id="restScreen">
        <div class="rest-message">👁️ 目を休めてください！</div>
        <div class="rest-timer" id="restTimer">20</div>
        <div class="rest-tip">遠くの物を見て<br>まばたきをしてください</div>
        <button class="skip-btn" onclick="skipRest()">スキップ</button>
    </div>
    <script>
        var workDuration = 20 * 60;
        var restDuration = 20;
        var timeLeft = workDuration;
        var isRunning = false;
        var isResting = false;
        var interval = null;
        function formatTime(seconds) {
            var m = Math.floor(seconds / 60);
            var s = seconds % 60;
            return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }
        function toggleTimer() {
            if (isRunning) {
                clearInterval(interval);
                isRunning = false;
                document.getElementById('startBtn').textContent = 'スタート';
            } else {
                workDuration = parseInt(document.getElementById('workTime').value) * 60;
                restDuration = parseInt(document.getElementById('restTime').value);
                if (timeLeft === 0 || timeLeft === workDuration) timeLeft = workDuration;
                isRunning = true;
                document.getElementById('startBtn').textContent = '一時停止';
                interval = setInterval(tick, 1000);
            }
        }
        function tick() {
            timeLeft--;
            document.getElementById('timerTime').textContent = formatTime(timeLeft);
            if (timeLeft <= 0) {
                clearInterval(interval);
                isRunning = false;
                startRest();
            }
        }
        function startRest() {
            isResting = true;
            var restLeft = restDuration;
            document.getElementById('restScreen').classList.add('active');
            document.getElementById('restTimer').textContent = restLeft;
            interval = setInterval(function() {
                restLeft--;
                document.getElementById('restTimer').textContent = restLeft;
                if (restLeft <= 0) {
                    endRest();
                }
            }, 1000);
        }
        function endRest() {
            clearInterval(interval);
            isResting = false;
            document.getElementById('restScreen').classList.remove('active');
            timeLeft = workDuration;
            document.getElementById('timerTime').textContent = formatTime(timeLeft);
            document.getElementById('startBtn').textContent = 'スタート';
        }
        function skipRest() {
            endRest();
        }
        function resetTimer() {
            clearInterval(interval);
            isRunning = false;
            isResting = false;
            workDuration = parseInt(document.getElementById('workTime').value) * 60;
            timeLeft = workDuration;
            document.getElementById('timerTime').textContent = formatTime(timeLeft);
            document.getElementById('startBtn').textContent = 'スタート';
            document.getElementById('restScreen').classList.remove('active');
        }
    </script>
</body>
