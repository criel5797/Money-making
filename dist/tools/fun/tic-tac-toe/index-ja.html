<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/tic-tac-toe/index-ja.html"><meta property="og:url" content="https://instaidea.org/tools/fun/tic-tac-toe/index-ja.html"><meta property="og:locale" content="ja_JP"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/tic-tac-toe/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/tic-tac-toe/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/tic-tac-toe/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/tic-tac-toe/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>三目並べ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .status { text-align: center; font-size: 1.3rem; margin-bottom: 20px; padding: 12px; background: rgba(255,255,255,.1); border-radius: 8px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
        .cell { aspect-ratio: 1; background: rgba(255,255,255,.1); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 700; cursor: pointer; transition: all .2s; }
        .cell:hover { background: rgba(255,255,255,.2); }
        .cell.x { color: #3b82f6; }
        .cell.o { color: #ef4444; }
        .cell.winning { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { to { transform: scale(1.05); } }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .new-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .mode-btn { background: rgba(255,255,255,.2); color: #fff; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .stat-card.x .stat-value { color: #3b82f6; }
        .stat-card.o .stat-value { color: #ef4444; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>⭕❌ 三目並べ</h1>
        </header>
        <div class="game-section">
            <div class="status" id="status">Xの番</div>
            <div class="board" id="board"></div>
            <div class="action-btns">
                <button class="action-btn new-btn" onclick="newGame()">🔄 ニューゲーム</button>
                <button class="action-btn mode-btn" onclick="toggleMode()">👤 1Pモード</button>
            </div>
            <div class="stats">
                <div class="stat-card x">
                    <div class="stat-value" id="xWins">0</div>
                    <div class="stat-label">X 勝利</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="draws">0</div>
                    <div class="stat-label">引き分け</div>
                </div>
                <div class="stat-card o">
                    <div class="stat-value" id="oWins">0</div>
                    <div class="stat-label">O 勝利</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var board = ['','','','','','','','',''];
        var currentPlayer = 'X';
        var gameOver = false;
        var is1Player = true;
        var stats = JSON.parse(localStorage.getItem('ttt_ja') || '{"x":0,"o":0,"draws":0}');
        var winPatterns = [
            [0,1,2], [3,4,5], [6,7,8],
            [0,3,6], [1,4,7], [2,5,8],
            [0,4,8], [2,4,6]
        ];

        function initBoard() {
            var boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            for (var i = 0; i < 9; i++) {
                var cell = document.createElement('div');
                cell.className = 'cell';
                cell.dataset.idx = i;
                cell.onclick = function() { makeMove(parseInt(this.dataset.idx)); };
                boardEl.appendChild(cell);
            }
        }

        function makeMove(idx) {
            if (board[idx] !== '' || gameOver) return;
            if (is1Player && currentPlayer === 'O') return;

            board[idx] = currentPlayer;
            var cells = document.querySelectorAll('.cell');
            cells[idx].textContent = currentPlayer;
            cells[idx].classList.add(currentPlayer.toLowerCase());

            var winner = checkWin();
            if (winner) {
                gameOver = true;
                document.getElementById('status').textContent = winner + 'の勝ち！🎉';
                if (winner === 'X') stats.x++;
                else stats.o++;
                saveStats();
                return;
            }

            if (board.every(function(c) { return c !== ''; })) {
                gameOver = true;
                document.getElementById('status').textContent = '引き分け！🤝';
                stats.draws++;
                saveStats();
                return;
            }

            currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
            document.getElementById('status').textContent = currentPlayer + 'の番';

            if (is1Player && currentPlayer === 'O') {
                setTimeout(cpuMove, 400);
            }
        }

        function checkWin() {
            for (var i = 0; i < winPatterns.length; i++) {
                var p = winPatterns[i];
                if (board[p[0]] && board[p[0]] === board[p[1]] && board[p[1]] === board[p[2]]) {
                    highlightWin(p);
                    return board[p[0]];
                }
            }
            return null;
        }

        function highlightWin(pattern) {
            var cells = document.querySelectorAll('.cell');
            pattern.forEach(function(idx) {
                cells[idx].classList.add('winning');
            });
        }

        function cpuMove() {
            for (var i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'O';
                    if (checkWinSimple('O')) {
                        board[i] = '';
                        makeMove(i);
                        return;
                    }
                    board[i] = '';
                }
            }

            for (var i = 0; i < 9; i++) {
                if (board[i] === '') {
                    board[i] = 'X';
                    if (checkWinSimple('X')) {
                        board[i] = '';
                        makeMove(i);
                        return;
                    }
                    board[i] = '';
                }
            }

            if (board[4] === '') {
                makeMove(4);
                return;
            }

            var corners = [0, 2, 6, 8];
            for (var i = 0; i < corners.length; i++) {
                if (board[corners[i]] === '') {
                    makeMove(corners[i]);
                    return;
                }
            }

            for (var i = 0; i < 9; i++) {
                if (board[i] === '') {
                    makeMove(i);
                    return;
                }
            }
        }

        function checkWinSimple(player) {
            for (var i = 0; i < winPatterns.length; i++) {
                var p = winPatterns[i];
                if (board[p[0]] === player && board[p[1]] === player && board[p[2]] === player) {
                    return true;
                }
            }
            return false;
        }

        function newGame() {
            board = ['','','','','','','','',''];
            currentPlayer = 'X';
            gameOver = false;
            document.getElementById('status').textContent = 'Xの番';
            initBoard();
        }

        function toggleMode() {
            is1Player = !is1Player;
            document.querySelector('.mode-btn').textContent = is1Player ? '👤 1Pモード' : '👥 2Pモード';
            newGame();
        }

        function saveStats() {
            localStorage.setItem('ttt_ja', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('xWins').textContent = stats.x;
            document.getElementById('oWins').textContent = stats.o;
            document.getElementById('draws').textContent = stats.draws;
        }

        updateStats();
        initBoard();
    </script>
</body>
</html>
