                meaning: "이 인연은 깊은 우정과 지적 교감을 바탕으로 합니다. 연인 이전에 최고의 친구이자 동반자입니다.",
                advice: "친구로서의 관계를 소중히 여기세요. 깊은 대화와 공감이 관계를 더욱 단단하게 만들어줍니다.",
                karma: { trust: 92, passion: 65, destiny: 78, harmony: 95 }
            },
            {
                era: "일본 에도시대",
                relation: "숙명의 라이벌",
                emoji: "⚔️🔥⚔️",
                story: "두 분은 에도시대 유명한 검객이었습니다. 서로를 라이벌로 여기며 경쟁했지만, 그 안에는 깊은 존경이 있었습니다. 서로가 있어 더 강해질 수 있었죠.",
                meaning: "이 인연은 서로를 성장시키는 관계입니다. 경쟁심이 있을 수 있지만, 그것이 오히려 서로를 발전시킵니다.",
                advice: "건강한 경쟁은 좋지만, 상대를 이기려 하기보다 함께 성장한다고 생각하세요.",
                karma: { trust: 70, passion: 90, destiny: 75, harmony: 68 }
            },
            {
                era: "고대 그리스",
                relation: "영혼의 반쪽",
                emoji: "⚡💕☀️",
                story: "플라톤이 말한 '영혼의 반쪽'처럼, 두 분은 원래 하나였던 영혼이 둘로 나뉜 존재입니다. 수천 년을 떨어져 있다가 드디어 현생에서 재회했습니다.",
                meaning: "이 인연은 가장 강력한 영혼의 연결입니다. 만나자마자 오래 알았던 것 같은 느낌, 그것이 전생의 기억입니다.",
                advice: "이미 연결되어 있음을 믿으세요. 서로를 찾았으니 이제는 함께 완전해지는 여정을 즐기세요.",
                karma: { trust: 95, passion: 95, destiny: 99, harmony: 90 }
            },
            {
                era: "빅토리아 시대",
                relation: "선생과 제자",
                emoji: "📖💡🎓",
                story: "한 분은 빅토리아 시대의 학자였고, 다른 분은 그의 가장 뛰어난 제자였습니다. 지식을 나누며 서로에게 깊은 인상을 남겼습니다.",
                meaning: "이 인연은 가르침과 배움의 관계입니다. 서로에게 배울 것이 있고, 함께 성장해 나갑니다.",
                advice: "때로는 가르치고, 때로는 배우세요. 역할을 고정하지 말고 유연하게 주고받으세요.",
                karma: { trust: 85, passion: 60, destiny: 72, harmony: 88 }
            }
        ];

        let resultData = {};

        function startTest() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            if (!name1 || !name2) {
                showToast('⚠️ 두 사람의 이름을 모두 입력해주세요!');
                return;
            }

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('loading').classList.add('show');

            setTimeout(() => {
                calculateResult(name1, name2);
            }, 2500);
        }

        function calculateResult(name1, name2) {
            // 이름 기반 시드 생성
            let seed = 0;
            for (let i = 0; i < name1.length; i++) {
                seed += name1.charCodeAt(i) * (i + 1);
            }
            for (let i = 0; i < name2.length; i++) {
                seed += name2.charCodeAt(i) * (i + 2);
            }

            // 관계 선택
            const relationIndex = seed % relations.length;
            const selectedRelation = relations[relationIndex];

            resultData = {
                name1,
                name2,
                ...selectedRelation
            };

            displayResult();
        }

        function displayResult() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('resultSection').classList.add('show');

            document.getElementById('displayName1').textContent = resultData.name1;
            document.getElementById('displayName2').textContent = resultData.name2;
            document.getElementById('resultEra').textContent = resultData.era;
            document.getElementById('resultEmoji').textContent = resultData.emoji;
            document.getElementById('resultRelation').textContent = resultData.relation;
            document.getElementById('resultStory').textContent = resultData.story;
            document.getElementById('resultMeaning').textContent = resultData.meaning;
            document.getElementById('resultAdvice').textContent = resultData.advice;

            const karmaLabels = {
                trust: '신뢰',
                passion: '열정',
                destiny: '운명',
                harmony: '조화'
            };

            document.getElementById('karmaMeter').innerHTML = Object.entries(resultData.karma).map(([key, value]) => `
                <div class="karma-item">
                    <div class="label">${karmaLabels[key]}</div>
                    <div class="value">${value}%</div>
                </div>
            `).join('');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function shareResult() {
            const text = `💫 전생의 인연 테스트

${resultData.name1} & ${resultData.name2}의 전생 인연
${resultData.emoji} ${resultData.relation}
【${resultData.era}】

✨ 신뢰 ${resultData.karma.trust}% | 열정 ${resultData.karma.passion}%
🌟 운명 ${resultData.karma.destiny}% | 조화 ${resultData.karma.harmony}%

🌙 너희도 전생의 인연을 확인해볼래?`;

            window.shareWithModal('전생의 인연 테스트', text);
        }

        function resetTest() {
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('name1').value = '';
            document.getElementById('name2').value = '';
            ['year1', 'month1', 'day1', 'year2', 'month2', 'day2'].forEach(id => {
                document.getElementById(id).selectedIndex = 0;
            });
        }
    </script>
<script src="/common/share-modal.js"></script><script src="/common/tool-i18n-handler.js"></script></body>
