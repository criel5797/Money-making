                relation: "宿命のライバル",
                emoji: "⚔️🔥⚔️",
                story: "お二人は江戸時代の有名な剣客でした。お互いをライバルと見なして競い合いましたが、その中には深い尊敬がありました。お互いがいたからこそ、より強くなれました。",
                meaning: "この縁はお互いを成長させる関係です。競争心があるかもしれませんが、それがむしろお互いを発展させます。",
                advice: "健全な競争は良いですが、相手に勝とうとするよりも、一緒に成長すると考えてください。",
                karma: { trust: 70, passion: 90, destiny: 75, harmony: 68 }
            },
            {
                era: "古代ギリシャ",
                relation: "魂の片割れ",
                emoji: "⚡💕☀️",
                story: "プラトンが語った「魂の片割れ」のように、お二人は元々一つだった魂が二つに分かれた存在です。数千年離れていて、ようやく現世で再会しました。",
                meaning: "この縁は最も強力な魂の結びつきです。出会った瞬間から長年知っていたような感覚、それが前世の記憶です。",
                advice: "すでに繋がっていることを信じてください。お互いを見つけたのですから、今は一緒に完全になる旅を楽しんでください。",
                karma: { trust: 95, passion: 95, destiny: 99, harmony: 90 }
            },
            {
                era: "ビクトリア時代",
                relation: "師弟",
                emoji: "📖💡🎓",
                story: "一人はビクトリア時代の学者で、もう一人はその最も優秀な弟子でした。知識を分かち合い、お互いに深い印象を残しました。",
                meaning: "この縁は教えと学びの関係です。お互いに学ぶことがあり、一緒に成長していきます。",
                advice: "時には教え、時には学んでください。役割を固定せず、柔軟に与え合ってください。",
                karma: { trust: 85, passion: 60, destiny: 72, harmony: 88 }
            }
        ];

        let resultData = {};

        function startTest() {
            const name1 = document.getElementById('name1').value.trim();
            const name2 = document.getElementById('name2').value.trim();

            if (!name1 || !name2) {
                showToast('⚠️ 二人の名前を両方入力してください！');
                return;
            }

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('loading').classList.add('show');

            setTimeout(() => {
                calculateResult(name1, name2);
            }, 2500);
        }

        function calculateResult(name1, name2) {
            // 名前ベースのシード生成
            let seed = 0;
            for (let i = 0; i < name1.length; i++) {
                seed += name1.charCodeAt(i) * (i + 1);
            }
            for (let i = 0; i < name2.length; i++) {
                seed += name2.charCodeAt(i) * (i + 2);
            }

            // 関係選択
            const relationIndex = seed % relations.length;
            const selectedRelation = relations[relationIndex];

            resultData = {
                name1,
                name2,
                ...selectedRelation
            };

            displayResult();
        }

        function displayResult() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('resultSection').classList.add('show');

            document.getElementById('displayName1').textContent = resultData.name1;
            document.getElementById('displayName2').textContent = resultData.name2;
            document.getElementById('resultEra').textContent = resultData.era;
            document.getElementById('resultEmoji').textContent = resultData.emoji;
            document.getElementById('resultRelation').textContent = resultData.relation;
            document.getElementById('resultStory').textContent = resultData.story;
            document.getElementById('resultMeaning').textContent = resultData.meaning;
            document.getElementById('resultAdvice').textContent = resultData.advice;

            const karmaLabels = {
                trust: '信頼',
                passion: '情熱',
                destiny: '運命',
                harmony: '調和'
            };

            document.getElementById('karmaMeter').innerHTML = Object.entries(resultData.karma).map(([key, value]) => `
                <div class="karma-item">
                    <div class="label">${karmaLabels[key]}</div>
                    <div class="value">${value}%</div>
                </div>
            `).join('');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function shareResult() {
            const text = `💫 前世の縁診断テスト

${resultData.name1} & ${resultData.name2}の前世の縁
${resultData.emoji} ${resultData.relation}
【${resultData.era}】

✨ 信頼 ${resultData.karma.trust}% | 情熱 ${resultData.karma.passion}%
🌟 運命 ${resultData.karma.destiny}% | 調和 ${resultData.karma.harmony}%

🌙 あなたたちも前世の縁を確認してみませんか？`;

            window.shareWithModal('前世の縁診断テスト', text);
        }

        function resetTest() {
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('name1').value = '';
            document.getElementById('name2').value = '';
            ['year1', 'month1', 'day1', 'year2', 'month2', 'day2'].forEach(id => {
                document.getElementById(id).selectedIndex = 0;
            });
        }
    </script>
<script src="/common/share-modal.js"></script><script src="/common/tool-i18n-handler.js"></script></body>
</html>
