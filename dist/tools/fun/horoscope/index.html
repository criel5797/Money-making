<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/horoscope/"><meta property="og:url" content="https://instaidea.org/tools/fun/horoscope/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/horoscope/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/horoscope/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/horoscope/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/horoscope/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 별자리 운세</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .zodiac-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .zodiac-btn { padding: 12px 8px; border: 2px solid transparent; border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: .75rem; cursor: pointer; text-align: center; transition: all .3s; }
        .zodiac-btn:hover { background: rgba(255,255,255,.2); }
        .zodiac-btn.selected { border-color: #fbbf24; background: rgba(251,191,36,.2); }
        .zodiac-emoji { font-size: 1.5rem; display: block; margin-bottom: 4px; }
        .fortune-card { background: linear-gradient(135deg, #4c1d95, #7c3aed); border-radius: 16px; padding: 20px; margin-bottom: 20px; display: none; }
        .fortune-card.show { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .fortune-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .fortune-sign { font-size: 3rem; }
        .fortune-info h2 { font-size: 1.3rem; margin-bottom: 5px; }
        .fortune-date { font-size: .85rem; opacity: .7; }
        .fortune-score { display: flex; gap: 10px; margin-bottom: 15px; }
        .score-item { flex: 1; background: rgba(255,255,255,.1); border-radius: 8px; padding: 10px; text-align: center; }
        .score-label { font-size: .7rem; opacity: .7; margin-bottom: 5px; }
        .score-stars { font-size: 1rem; color: #fbbf24; }
        .fortune-text { font-size: .95rem; line-height: 1.7; margin-bottom: 15px; }
        .lucky-section { background: rgba(255,255,255,.1); border-radius: 8px; padding: 12px; }
        .lucky-title { font-size: .8rem; opacity: .7; margin-bottom: 8px; }
        .lucky-items { display: flex; gap: 15px; font-size: .9rem; }
        .lucky-item span { opacity: .7; }
        .check-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #10b981, #059669); color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: transform .2s; }
        .check-btn:hover { transform: scale(1.02); }
        .check-btn:active { transform: scale(0.98); }
        .check-btn:disabled { background: #6b7280; cursor: not-allowed; }
        .history { margin-top: 15px; }
        .history-label { font-size: .8rem; opacity: .7; margin-bottom: 10px; }
        .history-items { display: flex; gap: 8px; flex-wrap: wrap; }
        .history-item { padding: 8px 12px; background: rgba(255,255,255,.1); border-radius: 8px; font-size: .8rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>오늘의 별자리 운세</h1>
        </header>
        <div class="game-section">
            <div class="zodiac-grid" id="zodiacGrid"></div>
            <div class="fortune-card" id="fortuneCard">
                <div class="fortune-header">
                    <div class="fortune-sign" id="fortuneSign">&#9800;</div>
                    <div class="fortune-info">
                        <h2 id="fortuneName">Aries</h2>
                        <div class="fortune-date" id="fortuneDate">Mar 21 - Apr 19</div>
                    </div>
                </div>
                <div class="fortune-score">
                    <div class="score-item">
                        <div class="score-label">종합</div>
                        <div class="score-stars" id="overallStars">&#9733;&#9733;&#9733;&#9733;&#9734;</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">애정</div>
                        <div class="score-stars" id="loveStars">&#9733;&#9733;&#9733;&#9734;&#9734;</div>
                    </div>
                    <div class="score-item">
                        <div class="score-label">금전</div>
                        <div class="score-stars" id="moneyStars">&#9733;&#9733;&#9733;&#9733;&#9733;</div>
                    </div>
                </div>
                <div class="fortune-text" id="fortuneText">Your fortune will be displayed here.</div>
                <div class="lucky-section">
                    <div class="lucky-title">오늘의 행운</div>
                    <div class="lucky-items">
                        <div class="lucky-item"><span>숫자:</span> <span id="luckyNumber">7</span></div>
                        <div class="lucky-item"><span>색:</span> <span id="luckyColor">Blue</span></div>
                    </div>
                </div>
            </div>
            <button class="check-btn" id="checkBtn" onclick="checkFortune()">운세 보기</button>
            <div class="history">
                <div class="history-label">최근 확인</div>
                <div class="history-items" id="history"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var zodiacSigns = [
            { id: 'aries', name: '양자리', symbol: '?', emoji: '♈', date: '3월21일 - 4월19일' },
            { id: 'taurus', name: '황소자리', symbol: '?', emoji: '♉', date: '4월20일 - 5월20일' },
            { id: 'gemini', name: '쌍둥이자리', symbol: '?', emoji: '♊', date: '5월21일 - 6월21일' },
            { id: 'cancer', name: '게자리', symbol: '?', emoji: '♋', date: '6월22일 - 7월22일' },
            { id: 'leo', name: '사자자리', symbol: '?', emoji: '♌', date: '7월23일 - 8월22일' },
            { id: 'virgo', name: '처녀자리', symbol: '?', emoji: '♍', date: '8월23일 - 9월22일' },
            { id: 'libra', name: '천책자리', symbol: '?', emoji: '♎', date: '9월23일 - 10월22일' },
            { id: 'scorpio', name: '전갈자리', symbol: '?', emoji: '♏', date: '10월23일 - 11월21일' },
            { id: 'sagittarius', name: '사수자리', symbol: '?', emoji: '♐', date: '11월22일 - 12월21일' },
            { id: 'capricorn', name: '염소자리', symbol: '?', emoji: '♑', date: '12월22일 - 1월19일' },
            { id: 'aquarius', name: '물병자리', symbol: '?', emoji: '♒', date: '1월20일 - 2월18일' },
            { id: 'pisces', name: '물고기자리', symbol: '?', emoji: '♓', date: '2월19일 - 3월20일' }
        ];

        var fortunes = [
            'New opportunities will come your way today. Take action!',
            'Your relationships with others will improve today. Communicate more.',
            'Good financial news may be on the horizon. Stay optimistic!',
            'Today is a day for rest. Don\'t overwork yourself.',
            'Creative ideas will flow today. Write them down!',
            'Pay attention to your health today. Stay hydrated.',
            'Reach out to an old friend. You may hear good news.',
            'Projects started today will lead to great results.',
            'Unexpected luck may find you. Keep an open mind.',
            'Recognition awaits you at work or school today.'
        ];

        var colors = ['Red', 'Orange', 'Yellow', 'Green', 'Blue', 'Purple', 'Pink', 'White', 'Black', 'Gold'];
        var selectedSign = null;
        var stats = JSON.parse(localStorage.getItem('horoscope_ko') || '{"checks":0,"history":[]}');

        function init() {
            var grid = document.getElementById('zodiacGrid');
            zodiacSigns.forEach(function(sign, index) {
                var btn = document.createElement('button');
                btn.className = 'zodiac-btn';
                btn.innerHTML = '<span class="zodiac-emoji">' + sign.emoji + '</span>' + sign.name;
                btn.onclick = function() { selectSign(index); };
                grid.appendChild(btn);
            });
            updateHistory();
        }

        function selectSign(index) {
            selectedSign = zodiacSigns[index];
            document.querySelectorAll('.zodiac-btn').forEach(function(btn, i) {
                btn.classList.toggle('selected', i === index);
            });
            document.getElementById('checkBtn').disabled = false;
        }

        function checkFortune() {
            if (!selectedSign) {
                alert('별자리를 선택해 주세요!');
                return;
            }

            var card = document.getElementById('fortuneCard');
            card.classList.remove('show');

            setTimeout(function() {
                document.getElementById('fortuneSign').textContent = selectedSign.emoji;
                document.getElementById('fortuneName').textContent = selectedSign.name;
                document.getElementById('fortuneDate').textContent = selectedSign.date;

                var overall = Math.floor(Math.random() * 3) + 3;
                var love = Math.floor(Math.random() * 5) + 1;
                var money = Math.floor(Math.random() * 5) + 1;

                document.getElementById('overallStars').textContent = getStars(overall);
                document.getElementById('loveStars').textContent = getStars(love);
                document.getElementById('moneyStars').textContent = getStars(money);

                document.getElementById('fortuneText').textContent = fortunes[Math.floor(Math.random() * fortunes.length)];
                document.getElementById('luckyNumber').textContent = Math.floor(Math.random() * 99) + 1;
                document.getElementById('luckyColor').textContent = colors[Math.floor(Math.random() * colors.length)];

                card.classList.add('show');

                stats.checks++;
                stats.history.unshift(selectedSign.name);
                if (stats.history.length > 10) stats.history.pop();
                localStorage.setItem('horoscope_ko', JSON.stringify(stats));
                updateHistory();
            }, 100);
        }

        function getStars(count) {
            var stars = '';
            for (var i = 0; i < 5; i++) {
                stars += i < count ? '\u2605' : '\u2606';
            }
            return stars;
        }

        function updateHistory() {
            var historyEl = document.getElementById('history');
            historyEl.innerHTML = '';
            stats.history.slice(0, 5).forEach(function(name) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = name;
                historyEl.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
