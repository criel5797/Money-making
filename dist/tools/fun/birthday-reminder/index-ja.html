    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #fc4a1a, #f7b733); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .birthday-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .upcoming { background: rgba(0,0,0,.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .upcoming-label { font-size: .9rem; opacity: .7; margin-bottom: 10px; }
        .upcoming-name { font-size: 1.5rem; font-weight: 700; }
        .upcoming-date { font-size: 1rem; opacity: .8; margin-top: 5px; }
        .upcoming-days { font-size: 2rem; font-weight: 700; color: #ffd93d; margin-top: 10px; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .birthday-list { max-height: 300px; overflow-y: auto; }
        .birthday-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; margin-bottom: 10px; }
        .birthday-icon { font-size: 2rem; margin-right: 15px; }
        .birthday-info { flex: 1; }
        .birthday-name { font-weight: 600; font-size: 1.1rem; }
        .birthday-date { font-size: .85rem; opacity: .7; }
        .birthday-days { font-weight: 600; color: #ffd93d; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; }
        .tabs { display: flex; margin-bottom: 15px; }
        .tab { flex: 1; padding: 10px; text-align: center; background: rgba(0,0,0,.2); cursor: pointer; border: none; color: #fff; }
        .tab:first-child { border-radius: 10px 0 0 10px; }
        .tab:last-child { border-radius: 0 10px 10px 0; }
        .tab.active { background: rgba(255,255,255,.2); }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🎂 誕生日リマインダー</h1>
        </header>
        <div class="birthday-section">
            <div class="upcoming" id="upcoming">
                <div class="upcoming-label">次の誕生日</div>
                <div class="upcoming-name" id="upcomingName">-</div>
                <div class="upcoming-date" id="upcomingDate">-</div>
                <div class="upcoming-days" id="upcomingDays">-</div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="personName" placeholder="名前">
                    <input type="date" id="personBirthday">
                </div>
                <button class="add-btn" onclick="addBirthday()">誕生日を追加</button>
            </div>
            <div class="tabs">
                <button class="tab active" onclick="setTab('upcoming')">近日</button>
                <button class="tab" onclick="setTab('all')">全て</button>
            </div>
            <div class="birthday-list" id="birthdayList"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var birthdays = JSON.parse(localStorage.getItem('birthdays') || '[]');
        var currentTab = 'upcoming';
        function save() { localStorage.setItem('birthdays', JSON.stringify(birthdays)); }
        function getDaysUntil(dateStr) {
            var today = new Date();
            var bday = new Date(dateStr);
            bday.setFullYear(today.getFullYear());
            if (bday < today) bday.setFullYear(today.getFullYear() + 1);
            return Math.ceil((bday - today) / (1000 * 60 * 60 * 24));
        }
        function addBirthday() {
            var name = document.getElementById('personName').value.trim();
            var birthday = document.getElementById('personBirthday').value;
            if (!name || !birthday) return;
            birthdays.push({ id: Date.now().toString(), name: name, birthday: birthday });
            save();
            document.getElementById('personName').value = '';
            document.getElementById('personBirthday').value = '';
            render();
        }
        function deleteBirthday(id) {
            birthdays = birthdays.filter(function(b) { return b.id !== id; });
            save();
            render();
        }
        function setTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(function(t, i) { t.classList.toggle('active', ['upcoming','all'][i] === tab); });
            render();
        }
        function render() {
            var sorted = birthdays.slice().sort(function(a, b) { return getDaysUntil(a.birthday) - getDaysUntil(b.birthday); });
            if (sorted.length > 0) {
                var next = sorted[0];
                var days = getDaysUntil(next.birthday);
                var d = new Date(next.birthday);
                document.getElementById('upcomingName').textContent = next.name;
                document.getElementById('upcomingDate').textContent = (d.getMonth() + 1) + '月' + d.getDate() + '日';
                document.getElementById('upcomingDays').textContent = days === 0 ? '今日！' : 'あと' + days + '日';
            } else {
                document.getElementById('upcomingName').textContent = '-';
                document.getElementById('upcomingDate').textContent = '-';
                document.getElementById('upcomingDays').textContent = '-';
            }
            var filtered = currentTab === 'upcoming' ? sorted.filter(function(b) { return getDaysUntil(b.birthday) <= 30; }) : sorted;
            var list = document.getElementById('birthdayList');
            list.innerHTML = '';
            filtered.forEach(function(b) {
                var days = getDaysUntil(b.birthday);
                var d = new Date(b.birthday);
                var div = document.createElement('div');
                div.className = 'birthday-item';
                div.innerHTML = '<div class="birthday-icon">🎂</div><div class="birthday-info"><div class="birthday-name">' + b.name + '</div><div class="birthday-date">' + (d.getMonth() + 1) + '月' + d.getDate() + '日</div></div><span class="birthday-days">' + (days === 0 ? '今日！' : days + '日') + '</span><button class="del-btn" onclick="deleteBirthday(\'' + b.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
