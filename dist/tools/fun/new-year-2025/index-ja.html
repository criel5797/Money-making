            document.getElementById('loading').classList.add('show');

            setTimeout(() => {
                calculateResult(name, year, month, day);
            }, 2000);
        }

        function calculateResult(name, year, month, day) {
            // シード生成
            let seed = 0;
            for (let i = 0; i < name.length; i++) {
                seed += name.charCodeAt(i);
            }
            if (year) seed += parseInt(year);
            if (month) seed += parseInt(month) * 10;
            if (day) seed += parseInt(day);

            // メッセージ選択
            const hopeMessages = messages[selectedHope];
            const messageIndex = seed % hopeMessages.length;
            const selectedMessage = hopeMessages[messageIndex];

            // 運勢とアドバイス選択
            const fortuneIndex = seed % fortunes.length;
            const adviceIndex = (seed + 1) % advices.length;

            // 幸運の要素
            const luckyColor = colors[seed % colors.length];
            const luckyDirection = directions[seed % directions.length];
            const luckyNumber = numbers[seed % numbers.length];
            const luckyDay = days[seed % days.length];

            // 月別運勢
            const monthLuck = [];
            const luckIcons = ['🌟', '⭐', '✨', '💫', '🌙'];
            for (let m = 1; m <= 12; m++) {
                const luck = luckIcons[(seed + m) % luckIcons.length];
                monthLuck.push({ month: m, luck: luck });
            }

            resultData = {
                name: name,
                message: selectedMessage,
                fortune: fortunes[fortuneIndex],
                advice: advices[adviceIndex],
                lucky: { color: luckyColor, direction: luckyDirection, number: luckyNumber, day: luckyDay },
                monthLuck: monthLuck
            };

            displayResult();
        }

        function displayResult() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('resultSection').classList.add('show');

            document.getElementById('resultName').textContent = resultData.name;
            document.getElementById('messageEmoji').textContent = resultData.message.emoji;
            document.getElementById('messageQuote').textContent = '"' + resultData.message.quote + '"';

            document.getElementById('keywordTags').innerHTML = resultData.message.keywords.map(k =>
                `<span class="keyword-tag">#${k}</span>`
            ).join('');

            document.getElementById('yearFortune').textContent = resultData.fortune;
            document.getElementById('specialAdvice').textContent = resultData.advice;

            document.getElementById('luckyGrid').innerHTML = `
                <div class="lucky-item">
                    <div class="label">ラッキーカラー</div>
                    <div class="value">🎨 ${resultData.lucky.color}</div>
                </div>
                <div class="lucky-item">
                    <div class="label">ラッキー方位</div>
                    <div class="value">🧭 ${resultData.lucky.direction}</div>
                </div>
                <div class="lucky-item">
                    <div class="label">ラッキーナンバー</div>
                    <div class="value">🔢 ${resultData.lucky.number}</div>
                </div>
                <div class="lucky-item">
                    <div class="label">ラッキーデー</div>
                    <div class="value">📅 ${resultData.lucky.day}</div>
                </div>
            `;

            document.getElementById('monthFortune').innerHTML = resultData.monthLuck.map(m => `
                <div class="month-item">
                    <div class="month">${m.month}月</div>
                    <div class="luck">${m.luck}</div>
                </div>
            `).join('');
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function shareResult() {
            const text = `🎊 2025年 新年運勢\n\n${resultData.name}さんへのメッセージ:\n\n${resultData.message.emoji} "${resultData.message.quote}"\n\n🏷️ #${resultData.message.keywords.join(' #')}\n\n🍀 ラッキーカラー: ${resultData.lucky.color}\n🔢 ラッキーナンバー: ${resultData.lucky.number}\n\nあけましておめでとうございます! 🐍\n✨ あなたも新年運勢をチェックしてみませんか?`;

            window.shareWithModal('🎊 2025 新年運勢', text);
        }

        function resetTest() {
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('userName').value = '';
            document.getElementById('birthYear').selectedIndex = 0;
            document.getElementById('birthMonth').selectedIndex = 0;
            document.getElementById('birthDay').selectedIndex = 0;
            selectedHope = null;
            document.querySelectorAll('.hope-option').forEach(o => o.classList.remove('selected'));
        }
    </script>
<script src="/common/share-modal.js"></script><script src="/common/tool-i18n-handler.js"></script></body>
</html>
