                var spark = document.createElement('div');
                spark.className = 'spark';
                spark.style.left = Math.random() * 100 + '%';
                spark.style.top = Math.random() * 100 + '%';
                spark.style.background = colors[Math.floor(Math.random() * colors.length)];
                spark.style.animationDelay = Math.random() * 3 + 's';
                spark.style.animationDuration = (2 + Math.random() * 2) + 's';
                container.appendChild(spark);
            }
        }
        createFireworks();

        // 날짜 선택 초기화
        function initDateSelects() {
            var i18n = getI18n();
            var lang = getLang();
            var currentYear = new Date().getFullYear();

            var yearSuffix = (i18n.inputSection && i18n.inputSection.birthDate && i18n.inputSection.birthDate.yearSuffix)
                ? (i18n.inputSection.birthDate.yearSuffix[lang] || '') : '년';
            var monthSuffix = (i18n.inputSection && i18n.inputSection.birthDate && i18n.inputSection.birthDate.monthSuffix)
                ? (i18n.inputSection.birthDate.monthSuffix[lang] || '') : '월';
            var daySuffix = (i18n.inputSection && i18n.inputSection.birthDate && i18n.inputSection.birthDate.daySuffix)
                ? (i18n.inputSection.birthDate.daySuffix[lang] || '') : '일';

            var yearSelect = document.getElementById('birthYear');
            for (var y = currentYear; y >= 1940; y--) {
                yearSelect.innerHTML += '<option value="' + y + '">' + y + yearSuffix + '</option>';
            }
            var monthSelect = document.getElementById('birthMonth');
            for (var m = 1; m <= 12; m++) {
                monthSelect.innerHTML += '<option value="' + m + '">' + m + monthSuffix + '</option>';
            }
            var daySelect = document.getElementById('birthDay');
            for (var d = 1; d <= 31; d++) {
                daySelect.innerHTML += '<option value="' + d + '">' + d + daySuffix + '</option>';
            }
        }
        initDateSelects();

        var selectedHope = null;
        var numbers = [3, 5, 7, 8, 9, 11, 12, 15, 21, 25];
        var resultData = {};

        function selectHope(element, hope) {
            selectedHope = hope;
            document.querySelectorAll('.hope-option').forEach(function(o) { o.classList.remove('selected'); });
            element.classList.add('selected');
        }

        function getMyMessage() {
            var name = document.getElementById('userName').value.trim();
            var year = document.getElementById('birthYear').value;
            var month = document.getElementById('birthMonth').value;
            var day = document.getElementById('birthDay').value;

            if (!name) {
                showToast('⚠️ ' + t('toastMessages.nameRequired', '이름을 입력해주세요!'));
                return;
            }

            if (!selectedHope) {
                showToast('⚠️ ' + t('toastMessages.hopeRequired', '2025년 가장 바라는 것을 선택해주세요!'));
                return;
            }

            document.getElementById('inputSection').style.display = 'none';
            document.getElementById('loading').classList.add('show');

            setTimeout(function() {
                calculateResult(name, year, month, day);
            }, 2000);
        }

        function calculateResult(name, year, month, day) {
            // 로컬라이징된 데이터 가져오기
            var messages = getMessages();
            var fortunes = getFortunes();
            var advices = getAdvices();
            var colors = getColors();
            var directions = getDirections();
            var days = getDays();

            // 시드 생성
            var seed = 0;
            for (var i = 0; i < name.length; i++) {
                seed += name.charCodeAt(i);
            }
            if (year) seed += parseInt(year);
            if (month) seed += parseInt(month) * 10;
            if (day) seed += parseInt(day);

            // 메시지 선택
            var hopeMessages = messages ? messages[selectedHope] : [];
            var messageIndex = seed % (hopeMessages.length || 1);
            var selectedMessage = hopeMessages[messageIndex] || { emoji: '✨', quote: '', keywords: [] };

            // 운세, 조언 선택
            var fortuneIndex = seed % (fortunes.length || 1);
            var adviceIndex = (seed + 1) % (advices.length || 1);

            // 행운 요소
            var luckyColor = colors[seed % (colors.length || 1)] || '';
            var luckyDirection = directions[seed % (directions.length || 1)] || '';
            var luckyNumber = numbers[seed % numbers.length];
            var luckyDay = days[seed % (days.length || 1)] || '';

            // 월별 운세
            var monthLuck = [];
            var luckIcons = ['🌟', '⭐', '✨', '💫', '🌙'];
            for (var m = 1; m <= 12; m++) {
                var luck = luckIcons[(seed + m) % luckIcons.length];
                monthLuck.push({ month: m, luck: luck });
            }

            resultData = {
                name: name,
                message: selectedMessage,
                fortune: fortunes[fortuneIndex] || '',
                advice: advices[adviceIndex] || '',
                lucky: { color: luckyColor, direction: luckyDirection, number: luckyNumber, day: luckyDay },
                monthLuck: monthLuck
            };

            displayResult();
        }

        function displayResult() {
            document.getElementById('loading').classList.remove('show');
            document.getElementById('resultSection').classList.add('show');

            document.getElementById('resultName').textContent = resultData.name;
            document.getElementById('messageEmoji').textContent = resultData.message.emoji;
            document.getElementById('messageQuote').textContent = '"' + resultData.message.quote + '"';

            document.getElementById('keywordTags').innerHTML = resultData.message.keywords.map(function(k) {
                return '<span class="keyword-tag">#' + k + '</span>';
            }).join('');

            document.getElementById('yearFortune').textContent = resultData.fortune;
            document.getElementById('specialAdvice').textContent = resultData.advice;

            var colorLabel = t('resultSection.luckyItems.color', '행운의 색');
            var directionLabel = t('resultSection.luckyItems.direction', '행운의 방향');
            var numberLabel = t('resultSection.luckyItems.number', '행운의 숫자');
            var dayLabel = t('resultSection.luckyItems.day', '행운의 요일');

            document.getElementById('luckyGrid').innerHTML =
                '<div class="lucky-item">' +
                    '<div class="label">' + colorLabel + '</div>' +
                    '<div class="value">🎨 ' + resultData.lucky.color + '</div>' +
                '</div>' +
                '<div class="lucky-item">' +
                    '<div class="label">' + directionLabel + '</div>' +
                    '<div class="value">🧭 ' + resultData.lucky.direction + '</div>' +
                '</div>' +
                '<div class="lucky-item">' +
                    '<div class="label">' + numberLabel + '</div>' +
                    '<div class="value">🔢 ' + resultData.lucky.number + '</div>' +
                '</div>' +
                '<div class="lucky-item">' +
                    '<div class="label">' + dayLabel + '</div>' +
                    '<div class="value">📅 ' + resultData.lucky.day + '</div>' +
                '</div>';

            var monthSuffix = getMonthSuffix();
            document.getElementById('monthFortune').innerHTML = resultData.monthLuck.map(function(m) {
                return '<div class="month-item">' +
                    '<div class="month">' + m.month + monthSuffix + '</div>' +
                    '<div class="luck">' + m.luck + '</div>' +
                '</div>';
            }).join('');
        }

        function showToast(message) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 2500);
        }

        function shareResult() {
            var text = '🎊 2025년 신년 운세\n\n' +
                        resultData.name + '님에게 전하는 메시지:\n\n' +
                        resultData.message.emoji + ' "' + resultData.message.quote + '"\n\n' +
                        '🏷️ #' + resultData.message.keywords.join(' #') + '\n\n' +
                        '🍀 행운의 색: ' + resultData.lucky.color + '\n' +
                        '🔢 행운의 숫자: ' + resultData.lucky.number + '\n\n' +
                        '새해 복 많이 받으세요! 🐍\n' +
                        '✨ 너도 신년 운세 확인해볼래?';

            window.shareWithModal('🎊 2025 신년 운세', text);
        }

        function resetTest() {
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('inputSection').style.display = 'block';
            document.getElementById('userName').value = '';
            document.getElementById('birthYear').selectedIndex = 0;
            document.getElementById('birthMonth').selectedIndex = 0;
            document.getElementById('birthDay').selectedIndex = 0;
            selectedHope = null;
            document.querySelectorAll('.hope-option').forEach(function(o) { o.classList.remove('selected'); });
        }
    </script>
<script src="/common/share-modal.js"></script><script src="/common/tool-i18n-handler.js"></script></body>
