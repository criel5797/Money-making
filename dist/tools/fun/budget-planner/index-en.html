<!DOCTYPE html>
<html lang="en">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/budget-planner/index-en.html"><meta property="og:url" content="https://instaidea.org/tools/fun/budget-planner/index-en.html"><meta property="og:locale" content="en_US"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/budget-planner/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/budget-planner/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/budget-planner/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/budget-planner/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Budget Planner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .budget-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .summary-cards { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .card { background: rgba(0,0,0,.3); padding: 15px; border-radius: 12px; text-align: center; }
        .card-value { font-size: 1.5rem; font-weight: 700; }
        .card-label { font-size: .75rem; opacity: .7; margin-top: 5px; }
        .income { color: #38ef7d; }
        .expense { color: #ff6b6b; }
        .balance { color: #ffd93d; }
        .remaining { color: #6bcfff; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .btn-row { display: flex; gap: 10px; }
        .add-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-weight: 600; }
        .income-btn { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .expense-btn { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .budget-list { max-height: 250px; overflow-y: auto; }
        .budget-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; }
        .item-info { flex: 1; }
        .item-name { font-weight: 500; }
        .item-category { font-size: .75rem; opacity: .7; }
        .item-amount { font-weight: 600; }
        .item-amount.income { color: #38ef7d; }
        .item-amount.expense { color: #ff6b6b; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1rem; margin-left: 10px; }
        .month-nav { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 15px; }
        .month-btn { background: none; border: none; color: #fff; font-size: 1.5rem; cursor: pointer; opacity: .7; }
        .month-display { font-size: 1.1rem; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>💰 Budget Planner</h1>
        </header>
        <div class="budget-section">
            <div class="month-nav">
                <button class="month-btn" onclick="changeMonth(-1)">←</button>
                <div class="month-display" id="monthDisplay"></div>
                <button class="month-btn" onclick="changeMonth(1)">→</button>
            </div>
            <div class="summary-cards">
                <div class="card"><div class="card-value income" id="totalIncome">$0</div><div class="card-label">Income</div></div>
                <div class="card"><div class="card-value expense" id="totalExpense">$0</div><div class="card-label">Expenses</div></div>
                <div class="card"><div class="card-value balance" id="balance">$0</div><div class="card-label">Balance</div></div>
                <div class="card"><div class="card-value remaining" id="budgetGoal">Set Goal</div><div class="card-label">Budget Goal</div></div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="itemName" placeholder="Item name">
                    <input type="number" id="itemAmount" placeholder="Amount">
                </div>
                <div class="form-row">
                    <select id="itemCategory">
                        <option value="salary">Salary</option>
                        <option value="bonus">Bonus</option>
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="housing">Housing</option>
                        <option value="utilities">Utilities</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="add-btn income-btn" onclick="addItem('income')">Add Income</button>
                    <button class="add-btn expense-btn" onclick="addItem('expense')">Add Expense</button>
                </div>
            </div>
            <div class="budget-list" id="budgetList"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var currentMonth = new Date().getMonth();
        var currentYear = new Date().getFullYear();
        var categoryNames = { salary: 'Salary', bonus: 'Bonus', food: 'Food', transport: 'Transport', housing: 'Housing', utilities: 'Utilities', entertainment: 'Entertainment', other: 'Other' };
        var monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        function getKey() { return 'budget_' + currentYear + '_' + currentMonth; }
        function getData() { return JSON.parse(localStorage.getItem(getKey()) || '[]'); }
        function save(data) { localStorage.setItem(getKey(), JSON.stringify(data)); }
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            render();
        }
        function addItem(type) {
            var name = document.getElementById('itemName').value.trim();
            var amount = parseFloat(document.getElementById('itemAmount').value) || 0;
            var category = document.getElementById('itemCategory').value;
            if (!name || !amount) return;
            var data = getData();
            data.push({ id: Date.now().toString(), name: name, amount: amount, category: category, type: type });
            save(data);
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
            render();
        }
        function deleteItem(id) {
            var data = getData().filter(function(item) { return item.id !== id; });
            save(data);
            render();
        }
        function render() {
            document.getElementById('monthDisplay').textContent = monthNames[currentMonth] + ' ' + currentYear;
            var data = getData();
            var income = data.filter(function(i) { return i.type === 'income'; }).reduce(function(s, i) { return s + i.amount; }, 0);
            var expense = data.filter(function(i) { return i.type === 'expense'; }).reduce(function(s, i) { return s + i.amount; }, 0);
            document.getElementById('totalIncome').textContent = '$' + income.toFixed(2);
            document.getElementById('totalExpense').textContent = '$' + expense.toFixed(2);
            document.getElementById('balance').textContent = '$' + (income - expense).toFixed(2);
            var list = document.getElementById('budgetList');
            list.innerHTML = '';
            data.slice().reverse().forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'budget-item';
                div.innerHTML = '<div class="item-info"><div class="item-name">' + item.name + '</div><div class="item-category">' + categoryNames[item.category] + '</div></div><span class="item-amount ' + item.type + '">' + (item.type === 'income' ? '+' : '-') + '$' + item.amount.toFixed(2) + '</span><button class="del-btn" onclick="deleteItem(\'' + item.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
