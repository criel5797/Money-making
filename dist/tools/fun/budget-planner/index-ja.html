        .balance { color: #ffd93d; }

        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .btn-row { display: flex; gap: 10px; }
        .add-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; color: #fff; cursor: pointer; font-weight: 600; }
        .income-btn { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .expense-btn { background: linear-gradient(135deg, #f093fb, #f5576c); }
        .budget-list { max-height: 250px; overflow-y: auto; }
        .budget-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; }
        .item-info { flex: 1; }
        .item-name { font-weight: 500; }
        .item-category { font-size: .75rem; opacity: .7; }
        .item-amount { font-weight: 600; }
        .item-amount.income { color: #38ef7d; }
        .item-amount.expense { color: #ff6b6b; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1rem; margin-left: 10px; }

<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>💰 予算計画</h1>
        </header>
        <div class="budget-section">
            <div class="month-nav">
                <button class="month-btn" onclick="changeMonth(-1)">←</button>
                <div class="month-display" id="monthDisplay"></div>
                <button class="month-btn" onclick="changeMonth(1)">→</button>
            </div>
            <div class="summary-cards">
                <div class="card"><div class="card-value income" id="totalIncome">0円</div><div class="card-label">収入</div></div>
                <div class="card"><div class="card-value expense" id="totalExpense">0円</div><div class="card-label">支出</div></div>
                <div class="card"><div class="card-value balance" id="balance">0円</div><div class="card-label">残高</div></div>
                <div class="card"><div class="card-value remaining" id="budgetGoal">目標設定</div><div class="card-label">予算目標</div></div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="itemName" placeholder="項目名">
                    <input type="number" id="itemAmount" placeholder="金額">
                </div>
                <div class="form-row">
                    <select id="itemCategory">
                        <option value="salary">給料</option>
                        <option value="bonus">ボーナス</option>
                        <option value="food">食費</option>
                        <option value="transport">交通費</option>
                        <option value="housing">住居費</option>
                        <option value="utilities">光熱費</option>
                        <option value="entertainment">娯楽</option>
                        <option value="other">その他</option>
                    </select>
                </div>
                <div class="btn-row">
                    <button class="add-btn income-btn" onclick="addItem('income')">収入追加</button>
                    <button class="add-btn expense-btn" onclick="addItem('expense')">支出追加</button>
                </div>
            </div>
            <div class="budget-list" id="budgetList"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var currentMonth = new Date().getMonth();
        var currentYear = new Date().getFullYear();
        var categoryNames = { salary: '給料', bonus: 'ボーナス', food: '食費', transport: '交通費', housing: '住居費', utilities: '光熱費', entertainment: '娯楽', other: 'その他' };
        function getKey() { return 'budget_' + currentYear + '_' + currentMonth; }
        function getData() { return JSON.parse(localStorage.getItem(getKey()) || '[]'); }
        function save(data) { localStorage.setItem(getKey(), JSON.stringify(data)); }
        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            render();
        }
        function addItem(type) {
            var name = document.getElementById('itemName').value.trim();
            var amount = parseInt(document.getElementById('itemAmount').value) || 0;
            var category = document.getElementById('itemCategory').value;
            if (!name || !amount) return;
            var data = getData();
            data.push({ id: Date.now().toString(), name: name, amount: amount, category: category, type: type });
            save(data);
            document.getElementById('itemName').value = '';
            document.getElementById('itemAmount').value = '';
            render();
        }
        function deleteItem(id) {
            var data = getData().filter(function(item) { return item.id !== id; });
            save(data);
            render();
        }
        function render() {
            document.getElementById('monthDisplay').textContent = currentYear + '年 ' + (currentMonth + 1) + '月';
            var data = getData();
            var income = data.filter(function(i) { return i.type === 'income'; }).reduce(function(s, i) { return s + i.amount; }, 0);
            var expense = data.filter(function(i) { return i.type === 'expense'; }).reduce(function(s, i) { return s + i.amount; }, 0);
            document.getElementById('totalIncome').textContent = income.toLocaleString() + '円';
            document.getElementById('totalExpense').textContent = expense.toLocaleString() + '円';
            document.getElementById('balance').textContent = (income - expense).toLocaleString() + '円';
            var list = document.getElementById('budgetList');
            list.innerHTML = '';
            data.slice().reverse().forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'budget-item';
                div.innerHTML = '<div class="item-info"><div class="item-name">' + item.name + '</div><div class="item-category">' + categoryNames[item.category] + '</div></div><span class="item-amount ' + item.type + '">' + (item.type === 'income' ? '+' : '-') + item.amount.toLocaleString() + '円</span><button class="del-btn" onclick="deleteItem(\'' + item.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
