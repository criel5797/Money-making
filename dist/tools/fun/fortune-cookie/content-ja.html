<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/fortune-cookie/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>フォーチュンクッキー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .cookie-container { display: flex; justify-content: center; margin-bottom: 20px; }
        .cookie { width: 200px; height: 120px; position: relative; cursor: pointer; transition: transform .3s; }
        .cookie:hover { transform: scale(1.05); }
        .cookie-half { position: absolute; width: 100px; height: 120px; background: linear-gradient(135deg, #d4a574, #c4956a); border-radius: 50px 50px 10px 10px; transition: all .5s; }
        .cookie-left { left: 0; transform-origin: right center; border-radius: 50px 10px 10px 50px; }
        .cookie-right { right: 0; transform-origin: left center; border-radius: 10px 50px 50px 10px; }
        .cookie.open .cookie-left { transform: rotateY(-60deg) translateX(-20px); }
        .cookie.open .cookie-right { transform: rotateY(60deg) translateX(20px); }
        .cookie::before { content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 40px; background: #fff; border-radius: 5px; z-index: 1; opacity: 0; transition: opacity .3s .3s; }
        .cookie.open::before { opacity: 1; }
        .fortune-display { text-align: center; min-height: 100px; margin-bottom: 20px; padding: 20px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .fortune-text { font-size: 1.1rem; line-height: 1.6; font-style: italic; }
        .fortune-text.empty { opacity: .5; }
        .open-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #d4a574, #c4956a); color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: transform .2s; }
        .open-btn:hover { transform: scale(1.02); }
        .open-btn:active { transform: scale(0.98); }
        .history { margin-top: 15px; }
        .history-label { font-size: .8rem; opacity: .7; margin-bottom: 10px; }
        .history-items { max-height: 200px; overflow-y: auto; }
        .history-item { padding: 10px; background: rgba(255,255,255,.1); border-radius: 8px; margin-bottom: 8px; font-size: .85rem; font-style: italic; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
        .lucky-numbers { margin-top: 15px; text-align: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .lucky-label { font-size: .8rem; opacity: .7; margin-bottom: 8px; }
        .lucky-nums { display: flex; justify-content: center; gap: 10px; }
        .lucky-num { width: 35px; height: 35px; background: linear-gradient(135deg, #fbbf24, #f59e0b); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #1a1a2e; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🥠 フォーチュンクッキー</h1>
        </header>
        <div class="game-section">
            <div class="cookie-container">
                <div class="cookie" id="cookie" onclick="openCookie()">
                    <div class="cookie-half cookie-left"></div>
                    <div class="cookie-half cookie-right"></div>
                </div>
            </div>
            <div class="fortune-display">
                <div class="fortune-text empty" id="fortune">クッキーをクリックして運勢を見よう！</div>
            </div>
            <div class="lucky-numbers" id="luckySection" style="display:none">
                <div class="lucky-label">ラッキーナンバー</div>
                <div class="lucky-nums" id="luckyNums"></div>
            </div>
            <button class="open-btn" onclick="openCookie()">🥠 クッキーを開く</button>
            <div class="history">
                <div class="history-label">過去の運勢</div>
                <div class="history-items" id="history"></div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="opened">0</div>
                    <div class="stat-label">開いた数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="today">0</div>
                    <div class="stat-label">今日の数</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var fortunes = [
            '良いことがすぐにやってきます。',
            'あなたの努力は必ず報われます。',
            '新しいチャンスがあなたを待っています。',
            '幸運の星があなたを照らしています。',
            '大切な人との出会いが待っています。',
            'あなたの夢は叶います。',
            '今やっていることに集中してください。良い結果が出ます。',
            '予想外の嬉しい知らせが届きます。',
            'あなたの笑顔が幸運を呼びます。',
            '忍耐は苦いが、その実は甘い。',
            'もうすぐ新しい友達ができます。',
            '健康は最大の財産です。自分を大切に。',
            'ポジティブな考えがポジティブな結果を生みます。',
            'あなたは愛されています。',
            '冒険を恐れないでください。',
            '今日始めることが大きな成功につながります。',
            'あなたの創造性が輝く時です。',
            '過去を手放せば、未来は明るくなります。',
            '小さな親切が大きな変化を生みます。',
            'あなたの中には無限の可能性があります。'
        ];

        var stats = JSON.parse(localStorage.getItem('fortune_ja') || '{"opened":0,"today":0,"lastDate":"","history":[]}');
        var isOpening = false;

        function checkToday() {
            var today = new Date().toDateString();
            if (stats.lastDate !== today) {
                stats.today = 0;
                stats.lastDate = today;
                localStorage.setItem('fortune_ja', JSON.stringify(stats));
            }
        }

        function generateLuckyNumbers() {
            var nums = [];
            while (nums.length < 5) {
                var n = Math.floor(Math.random() * 45) + 1;
                if (nums.indexOf(n) === -1) nums.push(n);
            }
            return nums.sort(function(a, b) { return a - b; });
        }

        function openCookie() {
            if (isOpening) return;
            isOpening = true;
            checkToday();

            var cookie = document.getElementById('cookie');
            var fortuneEl = document.getElementById('fortune');
            var luckySection = document.getElementById('luckySection');
            var luckyNums = document.getElementById('luckyNums');

            cookie.classList.remove('open');
            fortuneEl.classList.add('empty');
            luckySection.style.display = 'none';

            setTimeout(function() {
                cookie.classList.add('open');

                setTimeout(function() {
                    var fortune = fortunes[Math.floor(Math.random() * fortunes.length)];
                    fortuneEl.textContent = fortune;
                    fortuneEl.classList.remove('empty');

                    var lucky = generateLuckyNumbers();
                    luckyNums.innerHTML = '';
                    lucky.forEach(function(n) {
                        var div = document.createElement('div');
                        div.className = 'lucky-num';
                        div.textContent = n;
                        luckyNums.appendChild(div);
                    });
                    luckySection.style.display = 'block';

                    stats.opened++;
                    stats.today++;
                    stats.history.unshift(fortune);
                    if (stats.history.length > 20) stats.history.pop();

                    localStorage.setItem('fortune_ja', JSON.stringify(stats));
                    updateDisplay();

                    setTimeout(function() {
                        cookie.classList.remove('open');
                        isOpening = false;
                    }, 2000);
                }, 500);
            }, 100);
        }

        function updateDisplay() {
            document.getElementById('opened').textContent = stats.opened;
            document.getElementById('today').textContent = stats.today;

            var historyEl = document.getElementById('history');
            historyEl.innerHTML = '';
            stats.history.slice(0, 5).forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.textContent = item;
                historyEl.appendChild(div);
            });
        }

        checkToday();
        updateDisplay();
    </script>
</body>
</html>
