<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>コイントス</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .coin-container { display: flex; justify-content: center; margin-bottom: 20px; perspective: 1000px; }
        .coin { width: 150px; height: 150px; position: relative; transform-style: preserve-3d; transition: transform 1s; }
        .coin.flipping { animation: flip 1s ease-in-out; }
        @keyframes flip {
            0% { transform: rotateY(0deg); }
            100% { transform: rotateY(1800deg); }
        }
        .coin-face { position: absolute; width: 100%; height: 100%; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 4rem; backface-visibility: hidden; box-shadow: 0 10px 30px rgba(0,0,0,.3); }
        .coin-front { background: linear-gradient(135deg, #ffd700, #ffb347); }
        .coin-back { background: linear-gradient(135deg, #c0c0c0, #a9a9a9); transform: rotateY(180deg); }
        .result { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 20px; min-height: 50px; }
        .flip-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; margin-bottom: 20px; transition: transform .2s; }
        .flip-btn:hover { transform: scale(1.02); }
        .flip-btn:active { transform: scale(0.98); }
        .flip-btn:disabled { opacity: .5; cursor: not-allowed; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 15px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 700; }
        .stat-label { font-size: .8rem; opacity: .7; }
        .stat-card.heads .stat-value { color: #ffd700; }
        .stat-card.tails .stat-value { color: #c0c0c0; }
        .history { margin-top: 15px; }
        .history-label { font-size: .8rem; opacity: .7; margin-bottom: 8px; }
        .history-items { display: flex; gap: 5px; flex-wrap: wrap; }
        .history-item { width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .8rem; }
        .history-item.heads { background: linear-gradient(135deg, #ffd700, #ffb347); }
        .history-item.tails { background: linear-gradient(135deg, #c0c0c0, #a9a9a9); }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🪙 コイントス</h1>
        </header>
        <div class="game-section">
            <div class="coin-container">
                <div class="coin" id="coin">
                    <div class="coin-face coin-front">👑</div>
                    <div class="coin-face coin-back">🌿</div>
                </div>
            </div>
            <div class="result" id="result">コインを投げよう！</div>
            <button class="flip-btn" id="flipBtn" onclick="flipCoin()">🪙 コインを投げる</button>
            <div class="stats">
                <div class="stat-card heads">
                    <div class="stat-value" id="heads">0</div>
                    <div class="stat-label">👑 表</div>
                </div>
                <div class="stat-card tails">
                    <div class="stat-value" id="tails">0</div>
                    <div class="stat-label">🌿 裏</div>
                </div>
            </div>
            <div class="history">
                <div class="history-label">最近の結果</div>
                <div class="history-items" id="history"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var stats = JSON.parse(localStorage.getItem('coinflip_ja') || '{"heads":0,"tails":0,"history":[]}');
        var isFlipping = false;

        function flipCoin() {
            if (isFlipping) return;
            isFlipping = true;

            var coin = document.getElementById('coin');
            var btn = document.getElementById('flipBtn');
            var resultEl = document.getElementById('result');

            btn.disabled = true;
            coin.classList.add('flipping');
            resultEl.textContent = '...';

            var result = Math.random() < 0.5 ? 'heads' : 'tails';

            setTimeout(function() {
                coin.classList.remove('flipping');
                coin.style.transform = result === 'heads' ? 'rotateY(0deg)' : 'rotateY(180deg)';

                if (result === 'heads') {
                    resultEl.textContent = '👑 表！';
                    stats.heads++;
                } else {
                    resultEl.textContent = '🌿 裏！';
                    stats.tails++;
                }

                stats.history.unshift(result);
                if (stats.history.length > 20) stats.history.pop();

                localStorage.setItem('coinflip_ja', JSON.stringify(stats));
                updateStats();

                btn.disabled = false;
                isFlipping = false;
            }, 1000);
        }

        function updateStats() {
            document.getElementById('heads').textContent = stats.heads;
            document.getElementById('tails').textContent = stats.tails;

            var historyEl = document.getElementById('history');
            historyEl.innerHTML = '';
            stats.history.slice(0, 10).forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'history-item ' + item;
                div.textContent = item === 'heads' ? '👑' : '🌿';
                historyEl.appendChild(div);
            });
        }

        updateStats();
    </script>
</body>
</html>
