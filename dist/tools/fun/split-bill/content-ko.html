<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/split-bill/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>더치페이 계산기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .split-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: .9rem; margin-bottom: 10px; opacity: .8; }
        input[type=number] { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); color: #333; font-size: 1.1rem; }
        .people-control { display: flex; align-items: center; gap: 15px; justify-content: center; margin-bottom: 20px; }
        .people-btn { width: 50px; height: 50px; border: none; border-radius: 50%; background: rgba(255,255,255,.2); color: #fff; font-size: 1.5rem; cursor: pointer; }
        .people-count { font-size: 2.5rem; font-weight: 700; min-width: 60px; text-align: center; }
        .result-card { background: rgba(0,0,0,.3); border-radius: 12px; padding: 25px; }
        .result-main { text-align: center; margin-bottom: 20px; }
        .result-label { font-size: .9rem; opacity: .8; margin-bottom: 5px; }
        .result-value { font-size: 2.5rem; font-weight: 700; }
        .result-detail { display: flex; justify-content: space-between; padding: 12px 0; border-top: 1px solid rgba(255,255,255,.1); font-size: .9rem; }
        .result-detail:first-child { border: none; }
        .tip-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,.2); }
        .tip-row { display: flex; align-items: center; gap: 10px; }
        .tip-row input { width: 80px; padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,.9); color: #333; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header><h1>🧮 더치페이 계산기</h1></header>
        <div class="split-section">
            <div class="input-group">
                <div class="input-label">총 금액</div>
                <input type="number" id="totalAmount" placeholder="0" oninput="calculate()">
            </div>
            <div class="input-label" style="text-align:center">인원 수</div>
            <div class="people-control">
                <button class="people-btn" onclick="changePeople(-1)">-</button>
                <div class="people-count" id="peopleCount">2</div>
                <button class="people-btn" onclick="changePeople(1)">+</button>
            </div>
            <div class="tip-section">
                <div class="tip-row">
                    <span>팁 추가:</span>
                    <input type="number" id="tipPercent" value="0" oninput="calculate()">
                    <span>%</span>
                </div>
            </div>
            <div class="result-card" style="margin-top:20px">
                <div class="result-main">
                    <div class="result-label">1인당 금액</div>
                    <div class="result-value" id="perPerson">0원</div>
                </div>
                <div class="result-detail"><span>원래 금액</span><span id="originalAmount">0원</span></div>
                <div class="result-detail"><span>팁 금액</span><span id="tipAmount">0원</span></div>
                <div class="result-detail"><span>총 금액</span><span id="grandTotal">0원</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var people = 2;
        function changePeople(d) {
            people = Math.max(1, people + d);
            document.getElementById('peopleCount').textContent = people;
            calculate();
        }
        function calculate() {
            var total = parseFloat(document.getElementById('totalAmount').value) || 0;
            var tipPct = parseFloat(document.getElementById('tipPercent').value) || 0;
            var tip = total * (tipPct / 100);
            var grand = total + tip;
            var perPerson = grand / people;
            document.getElementById('originalAmount').textContent = Math.round(total).toLocaleString() + '원';
            document.getElementById('tipAmount').textContent = Math.round(tip).toLocaleString() + '원';
            document.getElementById('grandTotal').textContent = Math.round(grand).toLocaleString() + '원';
            document.getElementById('perPerson').textContent = Math.round(perPerson).toLocaleString() + '원';
        }
    </script>
</body>
</html>
