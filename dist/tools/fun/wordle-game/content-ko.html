<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/wordle-game/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>워들 게임</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .board { display: grid; grid-template-rows: repeat(6, 1fr); gap: 6px; margin-bottom: 20px; }
        .row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px; }
        .tile { aspect-ratio: 1; border: 2px solid #3a3a4c; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; font-weight: 700; text-transform: uppercase; border-radius: 4px; transition: all .3s; }
        .tile.filled { border-color: #565758; animation: pop .1s; }
        .tile.correct { background: #538d4e; border-color: #538d4e; }
        .tile.present { background: #b59f3b; border-color: #b59f3b; }
        .tile.absent { background: #3a3a3c; border-color: #3a3a3c; }
        @keyframes pop { 50% { transform: scale(1.1); } }
        .keyboard { display: flex; flex-direction: column; gap: 6px; }
        .kb-row { display: flex; justify-content: center; gap: 4px; }
        .key { padding: 14px 10px; border: none; border-radius: 4px; background: #818384; color: #fff; font-size: .9rem; font-weight: 600; cursor: pointer; min-width: 32px; text-transform: uppercase; }
        .key.wide { min-width: 55px; font-size: .7rem; }
        .key.correct { background: #538d4e; }
        .key.present { background: #b59f3b; }
        .key.absent { background: #3a3a3c; }
        .message { text-align: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 8px; margin-bottom: 15px; display: none; }
        .new-game-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #538d4e, #3a7d44); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; margin-top: 15px; display: none; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>📝 워들 게임</h1>
        </header>
        <div class="game-section">
            <div class="board" id="board"></div>
            <div class="message" id="message"></div>
            <div class="keyboard" id="keyboard"></div>
            <button class="new-game-btn" id="newGameBtn" onclick="newGame()">🔄 새 게임</button>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="played">0</div>
                    <div class="stat-label">플레이</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="winRate">0%</div>
                    <div class="stat-label">승률</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="streak">0</div>
                    <div class="stat-label">연승</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var words = ['사과','바나나','포도','딸기','수박','참외','키위','오렌지','레몬','망고'].map(function(w) {
            return w.split('').slice(0, 5).join('').padEnd(5, ' ').toUpperCase();
        });
        words = ['APPLE','GRAPE','MELON','LEMON','MANGO','PEACH','BERRY','PLUMB','GUAVA','OLIVE'];
        var target = '';
        var currentRow = 0;
        var currentCol = 0;
        var board = [];
        var gameOver = false;
        var stats = JSON.parse(localStorage.getItem('wordle_ko') || '{"played":0,"wins":0,"streak":0}');
        var keyLayout = [
            ['Q','W','E','R','T','Y','U','I','O','P'],
            ['A','S','D','F','G','H','J','K','L'],
            ['ENTER','Z','X','C','V','B','N','M','⌫']
        ];
        var keyStates = {};

        function initBoard() {
            var boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board = [];
            for (var r = 0; r < 6; r++) {
                var row = [];
                var rowEl = document.createElement('div');
                rowEl.className = 'row';
                for (var c = 0; c < 5; c++) {
                    var tile = document.createElement('div');
                    tile.className = 'tile';
                    tile.id = 'tile-' + r + '-' + c;
                    rowEl.appendChild(tile);
                    row.push('');
                }
                boardEl.appendChild(rowEl);
                board.push(row);
            }
        }

        function initKeyboard() {
            var kbEl = document.getElementById('keyboard');
            kbEl.innerHTML = '';
            keyStates = {};
            keyLayout.forEach(function(row) {
                var rowEl = document.createElement('div');
                rowEl.className = 'kb-row';
                row.forEach(function(key) {
                    var keyEl = document.createElement('button');
                    keyEl.className = 'key' + (key.length > 1 ? ' wide' : '');
                    keyEl.textContent = key;
                    keyEl.id = 'key-' + key;
                    keyEl.onclick = function() { handleKey(key); };
                    rowEl.appendChild(keyEl);
                });
                kbEl.appendChild(rowEl);
            });
        }

        function handleKey(key) {
            if (gameOver) return;
            if (key === 'ENTER') {
                submitGuess();
            } else if (key === '⌫') {
                deleteLetter();
            } else if (currentCol < 5) {
                addLetter(key);
            }
        }

        function addLetter(letter) {
            if (currentCol >= 5) return;
            board[currentRow][currentCol] = letter;
            var tile = document.getElementById('tile-' + currentRow + '-' + currentCol);
            tile.textContent = letter;
            tile.classList.add('filled');
            currentCol++;
        }

        function deleteLetter() {
            if (currentCol <= 0) return;
            currentCol--;
            board[currentRow][currentCol] = '';
            var tile = document.getElementById('tile-' + currentRow + '-' + currentCol);
            tile.textContent = '';
            tile.classList.remove('filled');
        }

        function submitGuess() {
            if (currentCol < 5) {
                showMessage('5글자를 입력하세요!');
                return;
            }
            var guess = board[currentRow].join('');
            var targetArr = target.split('');
            var result = ['absent', 'absent', 'absent', 'absent', 'absent'];

            for (var i = 0; i < 5; i++) {
                if (guess[i] === target[i]) {
                    result[i] = 'correct';
                    targetArr[i] = null;
                }
            }
            for (var i = 0; i < 5; i++) {
                if (result[i] !== 'correct') {
                    var idx = targetArr.indexOf(guess[i]);
                    if (idx !== -1) {
                        result[i] = 'present';
                        targetArr[idx] = null;
                    }
                }
            }

            for (var i = 0; i < 5; i++) {
                var tile = document.getElementById('tile-' + currentRow + '-' + i);
                tile.classList.add(result[i]);
                updateKeyState(guess[i], result[i]);
            }

            if (guess === target) {
                gameOver = true;
                showMessage('정답! 🎉');
                stats.played++;
                stats.wins++;
                stats.streak++;
                saveStats();
            } else if (currentRow >= 5) {
                gameOver = true;
                showMessage('정답: ' + target);
                stats.played++;
                stats.streak = 0;
                saveStats();
            } else {
                currentRow++;
                currentCol = 0;
            }
        }

        function updateKeyState(letter, state) {
            var priority = { correct: 3, present: 2, absent: 1 };
            if (!keyStates[letter] || priority[state] > priority[keyStates[letter]]) {
                keyStates[letter] = state;
                var keyEl = document.getElementById('key-' + letter);
                if (keyEl) {
                    keyEl.className = 'key ' + state;
                }
            }
        }

        function showMessage(msg) {
            var msgEl = document.getElementById('message');
            msgEl.textContent = msg;
            msgEl.style.display = 'block';
            document.getElementById('newGameBtn').style.display = 'block';
        }

        function newGame() {
            target = words[Math.floor(Math.random() * words.length)];
            currentRow = 0;
            currentCol = 0;
            gameOver = false;
            document.getElementById('message').style.display = 'none';
            document.getElementById('newGameBtn').style.display = 'none';
            initBoard();
            initKeyboard();
        }

        function saveStats() {
            localStorage.setItem('wordle_ko', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('played').textContent = stats.played;
            document.getElementById('winRate').textContent = stats.played > 0 ? Math.round(stats.wins / stats.played * 100) + '%' : '0%';
            document.getElementById('streak').textContent = stats.streak;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleKey('ENTER');
            else if (e.key === 'Backspace') handleKey('⌫');
            else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
        });

        updateStats();
        newGame();
    </script>
</body>
</html>
