    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #1a252f 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container { max-width: 700px; width: 100%; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.3);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 0.95rem; }
        .clock-section {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 40px 30px;
            text-align: center;
        }
        .flip-clock {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .flip-group {
            display: flex;
            gap: 5px;
        }
        .flip-card {
            position: relative;
            width: 70px;
            height: 100px;
            perspective: 300px;
        }
        .flip-card-inner {
            position: relative;
            width: 100%;
            height: 100%;
        }
        .flip-card-front, .flip-card-back {
            position: absolute;
            width: 100%;
            height: 50%;
            overflow: hidden;
            backface-visibility: hidden;
        }
        .flip-card-front {
            top: 0;
            background: linear-gradient(180deg, #333 0%, #222 100%);
            border-radius: 10px 10px 0 0;
            border-bottom: 2px solid #111;
        }
        .flip-card-back {
            bottom: 0;
            background: linear-gradient(180deg, #2a2a2a 0%, #1a1a1a 100%);
            border-radius: 0 0 10px 10px;
        }
        .flip-card-front span, .flip-card-back span {
            display: block;
            font-size: 4rem;
            font-weight: 700;
            color: #f1c40f;
            font-family: 'Courier New', monospace;
            line-height: 100px;
        }
        .flip-card-front span {
            transform: translateY(0);
        }
        .flip-card-back span {
            transform: translateY(-50%);
        }
        .separator {
            font-size: 4rem;
            color: #f1c40f;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        .date-display {
            margin-top: 30px;
            font-size: 1.3rem;
            color: rgba(255,255,255,0.7);
        }
        .day-display {
            font-size: 1rem;
            color: rgba(255,255,255,0.5);
            margin-top: 10px;
        }
        .controls {
            margin-top: 30px;
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .theme-btn {
            padding: 12px 20px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 25px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .theme-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .theme-btn.active {
            background: rgba(241, 196, 15, 0.3);
            border-color: #f1c40f;
        }
        .fullscreen-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .fullscreen-btn:hover {
            transform: scale(1.05);
        }

        /* Color Themes */
        .theme-gold .flip-card-front span, .theme-gold .flip-card-back span, .theme-gold .separator { color: #f1c40f; }
        .theme-green .flip-card-front span, .theme-green .flip-card-back span, .theme-green .separator { color: #2ecc71; }
        .theme-blue .flip-card-front span, .theme-blue .flip-card-back span, .theme-blue .separator { color: #3498db; }
        .theme-red .flip-card-front span, .theme-red .flip-card-back span, .theme-red .separator { color: #e74c3c; }
        .theme-white .flip-card-front span, .theme-white .flip-card-back span, .theme-white .separator { color: #ecf0f1; }

        @media (max-width: 500px) {
            .flip-card { width: 50px; height: 70px; }
            .flip-card-front span, .flip-card-back span { font-size: 2.5rem; line-height: 70px; }
            .separator { font-size: 2.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告エリア</div>
        <header>
            <h1>🕐 フリップ時計</h1>
            <p class="subtitle">美しいレトロスタイルの時計</p>
        </header>
        <div class="clock-section theme-gold" id="clockSection">
            <div class="flip-clock">
                <div class="flip-group">
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front"><span id="hour1">0</span></div>
                            <div class="flip-card-back"><span id="hour1b">0</span></div>
                        </div>
                    </div>
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front"><span id="hour2">0</span></div>
                            <div class="flip-card-back"><span id="hour2b">0</span></div>
                        </div>
                    </div>
                </div>
                <span class="separator">:</span>
                <div class="flip-group">
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front"><span id="min1">0</span></div>
                            <div class="flip-card-back"><span id="min1b">0</span></div>
                        </div>
                    </div>
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front"><span id="min2">0</span></div>
                            <div class="flip-card-back"><span id="min2b">0</span></div>
                        </div>
                    </div>
                </div>
                <span class="separator">:</span>
                <div class="flip-group">
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front"><span id="sec1">0</span></div>
                            <div class="flip-card-back"><span id="sec1b">0</span></div>
                        </div>
                    </div>
                    <div class="flip-card">
                        <div class="flip-card-inner">
                            <div class="flip-card-front"><span id="sec2">0</span></div>
                            <div class="flip-card-back"><span id="sec2b">0</span></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="date-display" id="dateDisplay"></div>
            <div class="day-display" id="dayDisplay"></div>
            <div class="controls">
                <button class="theme-btn active" data-theme="gold" onclick="setTheme('gold')">🌟 ゴールド</button>
                <button class="theme-btn" data-theme="green" onclick="setTheme('green')">💚 グリーン</button>
                <button class="theme-btn" data-theme="blue" onclick="setTheme('blue')">💙 ブルー</button>
                <button class="theme-btn" data-theme="red" onclick="setTheme('red')">❤️ レッド</button>
                <button class="theme-btn" data-theme="white" onclick="setTheme('white')">🤍 ホワイト</button>
                <button class="fullscreen-btn" onclick="toggleFullscreen()">⛶ フルスクリーン</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告エリア</div>
    </div>
    <script>
        var days = ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'];

        function updateClock() {
            var now = new Date();
            var hours = String(now.getHours()).padStart(2, '0');
            var mins = String(now.getMinutes()).padStart(2, '0');
            var secs = String(now.getSeconds()).padStart(2, '0');

            document.getElementById('hour1').textContent = hours[0];
            document.getElementById('hour1b').textContent = hours[0];
            document.getElementById('hour2').textContent = hours[1];
            document.getElementById('hour2b').textContent = hours[1];
            document.getElementById('min1').textContent = mins[0];
            document.getElementById('min1b').textContent = mins[0];
            document.getElementById('min2').textContent = mins[1];
            document.getElementById('min2b').textContent = mins[1];
            document.getElementById('sec1').textContent = secs[0];
            document.getElementById('sec1b').textContent = secs[0];
            document.getElementById('sec2').textContent = secs[1];
            document.getElementById('sec2b').textContent = secs[1];

            var year = now.getFullYear();
            var month = now.getMonth() + 1;
            var date = now.getDate();
            document.getElementById('dateDisplay').textContent = year + '年 ' + month + '月 ' + date + '日';
            document.getElementById('dayDisplay').textContent = days[now.getDay()];
        }

        function setTheme(theme) {
            var section = document.getElementById('clockSection');
            section.className = 'clock-section theme-' + theme;
            document.querySelectorAll('.theme-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            document.querySelector('[data-theme="' + theme + '"]').classList.add('active');
            localStorage.setItem('flipClockTheme', theme);
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // Load saved theme
        var savedTheme = localStorage.getItem('flipClockTheme');
        if (savedTheme) setTheme(savedTheme);

        updateClock();
        setInterval(updateClock, 1000);
    </script>
</body>
</html>
