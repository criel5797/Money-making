    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f2709c, #ff9472); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .coupon-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,.2); border-radius: 12px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .coupons { max-height: 300px; overflow-y: auto; }
        .coupon-item { background: rgba(255,255,255,.15); border-radius: 12px; padding: 15px; margin-bottom: 10px; position: relative; overflow: hidden; }
        .coupon-item.expired { opacity: .5; }
        .coupon-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .coupon-store { font-weight: 700; font-size: 1.1rem; }
        .coupon-value { background: #ff6b6b; padding: 3px 10px; border-radius: 10px; font-weight: 600; }
        .coupon-code { background: rgba(0,0,0,.2); padding: 8px 12px; border-radius: 8px; font-family: monospace; margin: 8px 0; display: flex; justify-content: space-between; align-items: center; }
        .copy-btn { background: none; border: none; color: #fff; cursor: pointer; }
        .coupon-expiry { font-size: .8rem; opacity: .8; }
        .del-btn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; }
    </style>

<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🎟️ クーポン管理</h1>
        </header>
        <div class="coupon-section">
            <div class="stats">
                <div class="stat"><div class="stat-value" id="totalCoupons">0</div><div class="stat-label">全体</div></div>
                <div class="stat"><div class="stat-value" id="activeCoupons">0</div><div class="stat-label">有効</div></div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="storeName" placeholder="店舗名">
                    <input type="text" id="couponValue" placeholder="割引 (例: 10%)">
                </div>
                <div class="form-row">
                    <input type="text" id="couponCode" placeholder="クーポンコード">
                    <input type="date" id="expiryDate">
                </div>
                <button class="add-btn" onclick="addCoupon()">クーポン追加</button>
            </div>
            <div class="coupons" id="coupons"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var coupons = JSON.parse(localStorage.getItem('coupons') || '[]');
        function save() { localStorage.setItem('coupons', JSON.stringify(coupons)); }
        function addCoupon() {
            var store = document.getElementById('storeName').value.trim();
            var value = document.getElementById('couponValue').value.trim();
            var code = document.getElementById('couponCode').value.trim();
            var expiry = document.getElementById('expiryDate').value;
            if (!store || !code) return;
            coupons.push({ id: Date.now().toString(), store: store, value: value, code: code, expiry: expiry });
            save();
            document.getElementById('storeName').value = '';
            document.getElementById('couponValue').value = '';
            document.getElementById('couponCode').value = '';
            document.getElementById('expiryDate').value = '';
            render();
        }
        function deleteCoupon(id) {
            coupons = coupons.filter(function(c) { return c.id !== id; });
            save();
            render();
        }
        function copyCode(code) {
            navigator.clipboard.writeText(code);
            alert('コードをコピーしました！');
        }
        function isExpired(expiry) {
            if (!expiry) return false;
            return new Date(expiry) < new Date();
        }
        function render() {
            var active = coupons.filter(function(c) { return !isExpired(c.expiry); }).length;
            document.getElementById('totalCoupons').textContent = coupons.length;
            document.getElementById('activeCoupons').textContent = active;
            var sorted = coupons.slice().sort(function(a, b) {
                if (isExpired(a.expiry) !== isExpired(b.expiry)) return isExpired(a.expiry) ? 1 : -1;
                return new Date(a.expiry || '9999-12-31') - new Date(b.expiry || '9999-12-31');
            });
            var list = document.getElementById('coupons');
            list.innerHTML = '';
            sorted.forEach(function(coupon) {
                var expired = isExpired(coupon.expiry);
                var div = document.createElement('div');
                div.className = 'coupon-item' + (expired ? ' expired' : '');
                div.innerHTML = '<button class="del-btn" onclick="deleteCoupon(\'' + coupon.id + '\')">×</button><div class="coupon-header"><span class="coupon-store">' + coupon.store + '</span><span class="coupon-value">' + (coupon.value || '割引') + '</span></div><div class="coupon-code"><span>' + coupon.code + '</span><button class="copy-btn" onclick="copyCode(\'' + coupon.code + '\')">📋</button></div><div class="coupon-expiry">' + (coupon.expiry ? '有効期限: ' + coupon.expiry + (expired ? ' (期限切れ)' : '') : '無期限') + '</div>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
