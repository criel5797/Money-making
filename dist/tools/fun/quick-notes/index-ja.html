    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #4a00e0, #8e2de2); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .notes-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .add-note { margin-bottom: 20px; }
        .note-input { width: 100%; padding: 15px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; min-height: 100px; resize: vertical; font-size: 1rem; margin-bottom: 10px; }
        .color-picker { display: flex; gap: 8px; margin-bottom: 10px; }
        .color-btn { width: 30px; height: 30px; border: 2px solid transparent; border-radius: 50%; cursor: pointer; }
        .color-btn.active { border-color: #fff; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .notes-grid { display: grid; gap: 12px; }
        .note-card { padding: 15px; border-radius: 12px; position: relative; }
        .note-content { font-size: .95rem; line-height: 1.5; white-space: pre-wrap; word-break: break-word; color: #333; }
        .note-date { font-size: .75rem; opacity: .6; margin-top: 10px; color: #333; }
        .note-actions { position: absolute; top: 10px; right: 10px; display: flex; gap: 5px; }
        .note-btn { background: rgba(0,0,0,.1); border: none; padding: 5px 8px; border-radius: 5px; cursor: pointer; font-size: .8rem; }
        .search-box { margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .stats { text-align: center; margin-bottom: 15px; font-size: .9rem; opacity: .8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>📝 クイックメモ</h1>
        </header>
        <div class="notes-section">
            <div class="stats" id="stats">メモ 0件</div>
            <div class="add-note">
                <textarea class="note-input" id="noteInput" placeholder="新しいメモを書く..."></textarea>
                <div class="color-picker">
                    <button class="color-btn active" style="background:#ffeaa7" onclick="setColor('#ffeaa7')"></button>
                    <button class="color-btn" style="background:#81ecec" onclick="setColor('#81ecec')"></button>
                    <button class="color-btn" style="background:#fab1a0" onclick="setColor('#fab1a0')"></button>
                    <button class="color-btn" style="background:#a29bfe" onclick="setColor('#a29bfe')"></button>
                    <button class="color-btn" style="background:#55efc4" onclick="setColor('#55efc4')"></button>
                    <button class="color-btn" style="background:#fdcb6e" onclick="setColor('#fdcb6e')"></button>
                </div>
                <button class="add-btn" onclick="addNote()">メモを追加</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="メモを検索..." oninput="render()">
            </div>
            <div class="notes-grid" id="notesGrid"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var notes = JSON.parse(localStorage.getItem('quick_notes') || '[]');
        var selectedColor = '#ffeaa7';
        function save() { localStorage.setItem('quick_notes', JSON.stringify(notes)); }
        function setColor(color) {
            selectedColor = color;
            document.querySelectorAll('.color-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.style.background === color || btn.style.backgroundColor === color);
            });
        }
        function addNote() {
            var content = document.getElementById('noteInput').value.trim();
            if (!content) return;
            notes.unshift({ id: Date.now().toString(), content: content, color: selectedColor, date: new Date().toISOString() });
            save();
            document.getElementById('noteInput').value = '';
            render();
        }
        function deleteNote(id) {
            notes = notes.filter(function(n) { return n.id !== id; });
            save();
            render();
        }
        function copyNote(id) {
            var note = notes.find(function(n) { return n.id === id; });
            if (note) {
                navigator.clipboard.writeText(note.content);
                alert('コピーしました！');
            }
        }
        function render() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var filtered = notes.filter(function(n) { return n.content.toLowerCase().indexOf(search) > -1; });
            document.getElementById('stats').textContent = 'メモ ' + notes.length + '件';
            var grid = document.getElementById('notesGrid');
            grid.innerHTML = '';
            filtered.forEach(function(note) {
                var div = document.createElement('div');
                div.className = 'note-card';
                div.style.background = note.color;
                var d = new Date(note.date);
                div.innerHTML = '<div class="note-actions"><button class="note-btn" onclick="copyNote(\'' + note.id + '\')">📋</button><button class="note-btn" onclick="deleteNote(\'' + note.id + '\')">×</button></div><div class="note-content">' + note.content.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</div><div class="note-date">' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes() + '</div>';
                grid.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
