    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .quiz-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .score-bar { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 12px 16px; background: rgba(255,255,255,.1); border-radius: 10px; }
        .score-item { text-align: center; }
        .score-label { font-size: .75rem; opacity: .7; }
        .score-value { font-size: 1.3rem; font-weight: 700; }
        .progress-bar { height: 8px; background: rgba(255,255,255,.2); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: #4ade80; border-radius: 4px; transition: width .3s; }
        .question-card { background: rgba(255,255,255,.15); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .question-num { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .question-text { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 15px 20px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: left; transition: all .2s; }
        .option-btn:hover { background: rgba(255,255,255,.2); transform: translateX(5px); }
        .option-btn.correct { background: #22c55e; border-color: #22c55e; }
        .option-btn.wrong { background: #ef4444; border-color: #ef4444; }
        .option-btn.disabled { pointer-events: none; opacity: .7; }
        .result-area { display: none; text-align: center; }
        .result-area.show { display: block; animation: fadeIn .5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-icon { font-size: 4rem; margin-bottom: 15px; }
        .result-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        .result-score { font-size: 3rem; font-weight: 700; color: #fbbf24; margin-bottom: 15px; }
        .result-text { font-size: 1rem; opacity: .8; margin-bottom: 20px; }
        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .action-btn:hover { transform: scale(1.02); }
        .category-select { margin-bottom: 20px; }
        .category-label { font-size: .9rem; opacity: .8; margin-bottom: 8px; display: block; }
        .category-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-btn { padding: 10px 16px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-btn.active { background: rgba(255,255,255,.4); }
        .stats { margin-top: 15px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
    </style>

<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🧠 雑学クイズ</h1>
        </header>
        <div class="quiz-section">
            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">問題</div>
                    <div class="score-value" id="questionNum">1/10</div>
                </div>
                <div class="score-item">
                    <div class="score-label">正解</div>
                    <div class="score-value" id="correctCount">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">得点</div>
                    <div class="score-value" id="score">0</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="category-select" id="categorySelect">
                <label class="category-label">カテゴリー選択</label>
                <div class="category-btns">
                    <button class="cat-btn active" onclick="setCategory('all')">全て</button>
                    <button class="cat-btn" onclick="setCategory('science')">科学</button>
                    <button class="cat-btn" onclick="setCategory('history')">歴史</button>
                    <button class="cat-btn" onclick="setCategory('geography')">地理</button>
                    <button class="cat-btn" onclick="setCategory('culture')">文化</button>
                </div>
            </div>
            <div class="question-card" id="questionCard">
                <div class="question-num" id="questionLabel">問題 1</div>
                <div class="question-text" id="questionText">スタートを押してください！</div>
                <div class="options" id="options"></div>
            </div>
            <button class="action-btn" id="startBtn" onclick="startQuiz()">🎮 クイズ開始</button>
            <div class="result-area" id="resultArea">
                <div class="result-icon" id="resultIcon">🏆</div>
                <div class="result-title" id="resultTitle">クイズ終了！</div>
                <div class="result-score" id="resultScore">0点</div>
                <div class="result-text" id="resultText">お疲れ様でした！</div>
                <button class="action-btn" onclick="startQuiz()">🔄 もう一度</button>
            </div>
            <div class="stats">
                <div class="stats-title">📊 記録</div>
                <div class="stats-row"><span>総ゲーム数</span><span id="totalGames">0</span></div>
                <div class="stats-row"><span>最高得点</span><span id="bestScore">0</span></div>
                <div class="stats-row"><span>平均正解率</span><span id="avgRate">0%</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var questions = {
            science: [
                { q: '水の化学式は？', o: ['H2O', 'CO2', 'NaCl', 'O2'], a: 0 },
                { q: '太陽系で最大の惑星は？', o: ['木星', '土星', '地球', '火星'], a: 0 },
                { q: '光の速度は秒速約何kmか？', o: ['30万km', '15万km', '50万km', '100万km'], a: 0 },
                { q: 'DNAの二重らせん構造を発見した科学者は？', o: ['ワトソンとクリック', 'アインシュタイン', 'ニュートン', 'ダーウィン'], a: 0 },
                { q: '原子番号1番の元素は？', o: ['水素', 'ヘリウム', '酸素', '窒素'], a: 0 }
            ],
            history: [
                { q: '第二次世界大戦が終わった年は？', o: ['1945年', '1939年', '1950年', '1941年'], a: 0 },
                { q: '江戸幕府を開いた将軍は？', o: ['徳川家康', '徳川家光', '織田信長', '豊臣秀吉'], a: 0 },
                { q: 'フランス革命が起きた年は？', o: ['1789年', '1776年', '1815年', '1848年'], a: 0 },
                { q: '万里の長城を建設した皇帝は？', o: ['秦の始皇帝', 'チンギス・ハン', 'フビライ・ハン', '孔子'], a: 0 },
                { q: '日本で最初の武士政権は？', o: ['鎌倉幕府', '室町幕府', '江戸幕府', '平氏政権'], a: 0 }
            ],
            geography: [
                { q: '世界で最も長い川は？', o: ['ナイル川', 'アマゾン川', '長江', 'ミシシッピ川'], a: 0 },
                { q: '世界で最も高い山は？', o: ['エベレスト', 'K2', 'キリマンジャロ', 'モンブラン'], a: 0 },
                { q: 'ロシアの首都は？', o: ['モスクワ', 'サンクトペテルブルク', 'キエフ', 'ウラジオストク'], a: 0 },
                { q: 'オーストラリアの首都は？', o: ['キャンベラ', 'シドニー', 'メルボルン', 'ブリスベン'], a: 0 },
                { q: '世界最大の砂漠は？', o: ['サハラ砂漠', 'ゴビ砂漠', 'カラハリ砂漠', 'アタカマ砂漠'], a: 0 }
            ],
            culture: [
                { q: '「モナリザ」を描いた画家は？', o: ['レオナルド・ダ・ヴィンチ', 'ミケランジェロ', 'ラファエロ', 'ピカソ'], a: 0 },
                { q: '「ロミオとジュリエット」の作者は？', o: ['シェイクスピア', 'ゲーテ', 'トルストイ', 'ドストエフスキー'], a: 0 },
                { q: 'オリンピックは何年ごとに開催される？', o: ['4年', '2年', '3年', '5年'], a: 0 },
                { q: 'ビートルズの出身国は？', o: ['イギリス', 'アメリカ', 'ドイツ', 'オーストラリア'], a: 0 },
                { q: 'ピラミッドがある国は？', o: ['エジプト', 'ギリシャ', 'インド', '中国'], a: 0 }
            ]
        };
        var currentCategory = 'all';
        var currentQuestions = [];
        var currentIndex = 0;
        var score = 0;
        var correctCount = 0;
        var stats = JSON.parse(localStorage.getItem('trivia_ja') || '{"games":0,"best":0,"total":0,"correct":0}');

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(
                    cat === 'all' ? '全て' : cat === 'science' ? '科学' : cat === 'history' ? '歴史' :
                    cat === 'geography' ? '地理' : '文化'));
            });
        }

        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
            }
            return arr;
        }

        function getQuestions() {
            var pool = [];
            if (currentCategory === 'all') {
                for (var cat in questions) {
                    pool = pool.concat(questions[cat]);
                }
            } else {
                pool = questions[currentCategory].slice();
            }
            return shuffle(pool).slice(0, 10);
        }

        function startQuiz() {
            currentQuestions = getQuestions();
            currentIndex = 0;
            score = 0;
            correctCount = 0;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('categorySelect').style.display = 'none';
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('questionCard').style.display = 'block';
            updateUI();
            showQuestion();
        }

        function showQuestion() {
            var q = currentQuestions[currentIndex];
            document.getElementById('questionLabel').textContent = '問題 ' + (currentIndex + 1);
            document.getElementById('questionText').textContent = q.q;
            var optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            q.o.forEach(function(opt, i) {
                var btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = function() { selectAnswer(i); };
                optionsEl.appendChild(btn);
            });
        }

        function selectAnswer(index) {
            var q = currentQuestions[currentIndex];
            var btns = document.querySelectorAll('.option-btn');
            btns.forEach(function(btn, i) {
                btn.classList.add('disabled');
                if (i === q.a) btn.classList.add('correct');
                if (i === index && i !== q.a) btn.classList.add('wrong');
            });
            if (index === q.a) {
                correctCount++;
                score += 10;
            }
            updateUI();
            setTimeout(function() {
                currentIndex++;
                if (currentIndex < currentQuestions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('questionNum').textContent = (currentIndex + 1) + '/' + currentQuestions.length;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('score').textContent = score;
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / currentQuestions.length * 100) + '%';
        }

        function showResult() {
            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('resultArea').classList.add('show');
            var rate = Math.round(correctCount / currentQuestions.length * 100);
            document.getElementById('resultScore').textContent = score + '点';
            if (rate >= 80) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '素晴らしい！';
                document.getElementById('resultText').textContent = '正解率' + rate + '%！すごい！';
            } else if (rate >= 50) {
                document.getElementById('resultIcon').textContent = '👍';
                document.getElementById('resultTitle').textContent = 'よくできました！';
                document.getElementById('resultText').textContent = '正解率' + rate + '%！もう少し頑張ろう。';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = '次は頑張ろう！';
                document.getElementById('resultText').textContent = '正解率' + rate + '%。もう一度挑戦！';
            }
            stats.games++;
            stats.total += currentQuestions.length;
            stats.correct += correctCount;
            if (score > stats.best) stats.best = score;
            localStorage.setItem('trivia_ja', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalGames').textContent = stats.games;
            document.getElementById('bestScore').textContent = stats.best;
            document.getElementById('avgRate').textContent = stats.total > 0 ? Math.round(stats.correct / stats.total * 100) + '%' : '0%';
        }

        updateStats();
    </script>
</body>
</html>
