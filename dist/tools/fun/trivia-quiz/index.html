    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .quiz-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .score-bar { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 12px 16px; background: rgba(255,255,255,.1); border-radius: 10px; }
        .score-item { text-align: center; }
        .score-label { font-size: .75rem; opacity: .7; }
        .score-value { font-size: 1.3rem; font-weight: 700; }
        .progress-bar { height: 8px; background: rgba(255,255,255,.2); border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .progress-fill { height: 100%; background: #4ade80; border-radius: 4px; transition: width .3s; }
        .question-card { background: rgba(255,255,255,.15); border-radius: 16px; padding: 25px; margin-bottom: 20px; }
        .question-num { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .question-text { font-size: 1.2rem; line-height: 1.5; margin-bottom: 20px; }
        .options { display: flex; flex-direction: column; gap: 10px; }
        .option-btn { padding: 15px 20px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: left; transition: all .2s; }
        .option-btn:hover { background: rgba(255,255,255,.2); transform: translateX(5px); }
        .option-btn.correct { background: #22c55e; border-color: #22c55e; }
        .option-btn.wrong { background: #ef4444; border-color: #ef4444; }
        .option-btn.disabled { pointer-events: none; opacity: .7; }
        .result-area { display: none; text-align: center; }
        .result-area.show { display: block; animation: fadeIn .5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-icon { font-size: 4rem; margin-bottom: 15px; }
        .result-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        .result-score { font-size: 3rem; font-weight: 700; color: #fbbf24; margin-bottom: 15px; }
        .result-text { font-size: 1rem; opacity: .8; margin-bottom: 20px; }
        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; margin-bottom: 10px; }
        .action-btn:hover { transform: scale(1.02); }
        .category-select { margin-bottom: 20px; }
        .category-label { font-size: .9rem; opacity: .8; margin-bottom: 8px; display: block; }
        .category-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-btn { padding: 10px 16px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-btn.active { background: rgba(255,255,255,.4); }
        .stats { margin-top: 15px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
    </style>

<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🧠 상식 퀴즈</h1>
        </header>
        <div class="quiz-section">
            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">문제</div>
                    <div class="score-value" id="questionNum">1/10</div>
                </div>
                <div class="score-item">
                    <div class="score-label">정답</div>
                    <div class="score-value" id="correctCount">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">점수</div>
                    <div class="score-value" id="score">0</div>
                </div>
            </div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="category-select" id="categorySelect">
                <label class="category-label">카테고리 선택</label>
                <div class="category-btns">
                    <button class="cat-btn active" onclick="setCategory('all')">전체</button>
                    <button class="cat-btn" onclick="setCategory('science')">과학</button>
                    <button class="cat-btn" onclick="setCategory('history')">역사</button>
                    <button class="cat-btn" onclick="setCategory('geography')">지리</button>
                    <button class="cat-btn" onclick="setCategory('culture')">문화</button>
                </div>
            </div>
            <div class="question-card" id="questionCard">
                <div class="question-num" id="questionLabel">문제 1</div>
                <div class="question-text" id="questionText">시작 버튼을 눌러주세요!</div>
                <div class="options" id="options"></div>
            </div>
            <button class="action-btn" id="startBtn" onclick="startQuiz()">🎮 퀴즈 시작</button>
            <div class="result-area" id="resultArea">
                <div class="result-icon" id="resultIcon">🏆</div>
                <div class="result-title" id="resultTitle">퀴즈 완료!</div>
                <div class="result-score" id="resultScore">0점</div>
                <div class="result-text" id="resultText">수고하셨습니다!</div>
                <button class="action-btn" onclick="startQuiz()">🔄 다시 하기</button>
            </div>
            <div class="stats">
                <div class="stats-title">📊 내 기록</div>
                <div class="stats-row"><span>총 게임</span><span id="totalGames">0</span></div>
                <div class="stats-row"><span>최고 점수</span><span id="bestScore">0</span></div>
                <div class="stats-row"><span>평균 정답률</span><span id="avgRate">0%</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var questions = {
            science: [
                { q: '물의 화학식은?', o: ['H2O', 'CO2', 'NaCl', 'O2'], a: 0 },
                { q: '태양계에서 가장 큰 행성은?', o: ['목성', '토성', '지구', '화성'], a: 0 },
                { q: '빛의 속도는 초당 약 몇 km인가?', o: ['30만 km', '15만 km', '50만 km', '100만 km'], a: 0 },
                { q: 'DNA의 이중나선 구조를 발견한 과학자는?', o: ['왓슨과 크릭', '아인슈타인', '뉴턴', '다윈'], a: 0 },
                { q: '원자번호 1번 원소는?', o: ['수소', '헬륨', '산소', '질소'], a: 0 }
            ],
            history: [
                { q: '제2차 세계대전이 끝난 해는?', o: ['1945년', '1939년', '1950년', '1941년'], a: 0 },
                { q: '대한민국 임시정부가 수립된 해는?', o: ['1919년', '1910년', '1945년', '1948년'], a: 0 },
                { q: '조선을 건국한 왕은?', o: ['이성계', '왕건', '광개토대왕', '세종대왕'], a: 0 },
                { q: '프랑스 혁명이 일어난 해는?', o: ['1789년', '1776년', '1815년', '1848년'], a: 0 },
                { q: '한글을 창제한 왕은?', o: ['세종대왕', '태종', '성종', '정조'], a: 0 }
            ],
            geography: [
                { q: '세계에서 가장 긴 강은?', o: ['나일강', '아마존강', '양쯔강', '미시시피강'], a: 0 },
                { q: '세계에서 가장 높은 산은?', o: ['에베레스트', 'K2', '킬리만자로', '몽블랑'], a: 0 },
                { q: '러시아의 수도는?', o: ['모스크바', '상트페테르부르크', '키예프', '블라디보스토크'], a: 0 },
                { q: '호주의 수도는?', o: ['캔버라', '시드니', '멜버른', '브리즈번'], a: 0 },
                { q: '세계에서 가장 큰 사막은?', o: ['사하라 사막', '고비 사막', '칼라하리 사막', '아타카마 사막'], a: 0 }
            ],
            culture: [
                { q: '"모나리자"를 그린 화가는?', o: ['레오나르도 다빈치', '미켈란젤로', '라파엘로', '피카소'], a: 0 },
                { q: '"로미오와 줄리엣"의 작가는?', o: ['셰익스피어', '괴테', '톨스토이', '도스토예프스키'], a: 0 },
                { q: '올림픽은 몇 년마다 열리나?', o: ['4년', '2년', '3년', '5년'], a: 0 },
                { q: '비틀즈의 출신 국가는?', o: ['영국', '미국', '독일', '호주'], a: 0 },
                { q: '피라미드가 있는 나라는?', o: ['이집트', '그리스', '인도', '중국'], a: 0 }
            ]
        };
        var currentCategory = 'all';
        var currentQuestions = [];
        var currentIndex = 0;
        var score = 0;
        var correctCount = 0;
        var stats = JSON.parse(localStorage.getItem('trivia_ko') || '{"games":0,"best":0,"total":0,"correct":0}');

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(
                    cat === 'all' ? '전체' : cat === 'science' ? '과학' : cat === 'history' ? '역사' :
                    cat === 'geography' ? '지리' : '문화'));
            });
        }

        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
            }
            return arr;
        }

        function getQuestions() {
            var pool = [];
            if (currentCategory === 'all') {
                for (var cat in questions) {
                    pool = pool.concat(questions[cat]);
                }
            } else {
                pool = questions[currentCategory].slice();
            }
            return shuffle(pool).slice(0, 10);
        }

        function startQuiz() {
            currentQuestions = getQuestions();
            currentIndex = 0;
            score = 0;
            correctCount = 0;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('categorySelect').style.display = 'none';
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('questionCard').style.display = 'block';
            updateUI();
            showQuestion();
        }

        function showQuestion() {
            var q = currentQuestions[currentIndex];
            document.getElementById('questionLabel').textContent = '문제 ' + (currentIndex + 1);
            document.getElementById('questionText').textContent = q.q;
            var optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            q.o.forEach(function(opt, i) {
                var btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = function() { selectAnswer(i); };
                optionsEl.appendChild(btn);
            });
        }

        function selectAnswer(index) {
            var q = currentQuestions[currentIndex];
            var btns = document.querySelectorAll('.option-btn');
            btns.forEach(function(btn, i) {
                btn.classList.add('disabled');
                if (i === q.a) btn.classList.add('correct');
                if (i === index && i !== q.a) btn.classList.add('wrong');
            });
            if (index === q.a) {
                correctCount++;
                score += 10;
            }
            updateUI();
            setTimeout(function() {
                currentIndex++;
                if (currentIndex < currentQuestions.length) {
                    showQuestion();
                } else {
                    showResult();
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('questionNum').textContent = (currentIndex + 1) + '/' + currentQuestions.length;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('score').textContent = score;
            document.getElementById('progressFill').style.width = ((currentIndex + 1) / currentQuestions.length * 100) + '%';
        }

        function showResult() {
            document.getElementById('questionCard').style.display = 'none';
            document.getElementById('resultArea').classList.add('show');
            var rate = Math.round(correctCount / currentQuestions.length * 100);
            document.getElementById('resultScore').textContent = score + '점';
            if (rate >= 80) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = '훌륭합니다!';
                document.getElementById('resultText').textContent = '정답률 ' + rate + '%! 대단해요!';
            } else if (rate >= 50) {
                document.getElementById('resultIcon').textContent = '👍';
                document.getElementById('resultTitle').textContent = '잘했어요!';
                document.getElementById('resultText').textContent = '정답률 ' + rate + '%! 조금만 더 노력해봐요.';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = '다음엔 더 잘할 수 있어요!';
                document.getElementById('resultText').textContent = '정답률 ' + rate + '%! 다시 도전해보세요.';
            }
            stats.games++;
            stats.total += currentQuestions.length;
            stats.correct += correctCount;
            if (score > stats.best) stats.best = score;
            localStorage.setItem('trivia_ko', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalGames').textContent = stats.games;
            document.getElementById('bestScore').textContent = stats.best;
            document.getElementById('avgRate').textContent = stats.total > 0 ? Math.round(stats.correct / stats.total * 100) + '%' : '0%';
        }

        updateStats();
    </script>
</body>
</html>
