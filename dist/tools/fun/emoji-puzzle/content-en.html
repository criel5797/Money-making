<!DOCTYPE html>
<html lang="en">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/emoji-puzzle/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emoji Puzzle</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f093fb, #f5576c); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .score-bar { display: flex; justify-content: space-between; margin-bottom: 20px; padding: 12px 16px; background: rgba(255,255,255,.1); border-radius: 10px; }
        .score-item { text-align: center; }
        .score-label { font-size: .75rem; opacity: .7; }
        .score-value { font-size: 1.3rem; font-weight: 700; }
        .puzzle-card { background: rgba(255,255,255,.15); border-radius: 16px; padding: 25px; margin-bottom: 20px; text-align: center; }
        .puzzle-emoji { font-size: 3rem; margin-bottom: 15px; letter-spacing: 10px; }
        .puzzle-hint { font-size: .9rem; opacity: .8; margin-bottom: 15px; }
        .puzzle-category { font-size: .8rem; background: rgba(255,255,255,.2); display: inline-block; padding: 5px 12px; border-radius: 20px; margin-bottom: 15px; }
        .options { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .option-btn { padding: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: .95rem; cursor: pointer; transition: all .2s; }
        .option-btn:hover { background: rgba(255,255,255,.2); transform: scale(1.02); }
        .option-btn.correct { background: #22c55e; border-color: #22c55e; }
        .option-btn.wrong { background: #ef4444; border-color: #ef4444; }
        .option-btn.disabled { pointer-events: none; opacity: .6; }
        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
        .action-btn:hover { transform: scale(1.02); }
        .result-area { display: none; text-align: center; }
        .result-area.show { display: block; animation: fadeIn .5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .result-icon { font-size: 4rem; margin-bottom: 15px; }
        .result-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 10px; }
        .result-score { font-size: 3rem; font-weight: 700; color: #fbbf24; margin-bottom: 15px; }
        .stats { margin-top: 15px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🧩 Emoji Puzzle</h1>
        </header>
        <div class="game-section">
            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">Question</div>
                    <div class="score-value" id="questionNum">1/10</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Correct</div>
                    <div class="score-value" id="correctCount">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">Score</div>
                    <div class="score-value" id="score">0</div>
                </div>
            </div>
            <div class="puzzle-card" id="puzzleCard">
                <div class="puzzle-category" id="category">Category</div>
                <div class="puzzle-emoji" id="emojiDisplay">🎬🎭</div>
                <div class="puzzle-hint" id="hint">What do these emojis represent?</div>
                <div class="options" id="options"></div>
            </div>
            <button class="action-btn" id="startBtn" onclick="startGame()">🎮 Start Game</button>
            <div class="result-area" id="resultArea">
                <div class="result-icon" id="resultIcon">🏆</div>
                <div class="result-title" id="resultTitle">Game Complete!</div>
                <div class="result-score" id="resultScore">0 pts</div>
                <button class="action-btn" onclick="startGame()">🔄 Play Again</button>
            </div>
            <div class="stats">
                <div class="stats-title">📊 My Stats</div>
                <div class="stats-row"><span>Total Games</span><span id="totalGames">0</span></div>
                <div class="stats-row"><span>Best Score</span><span id="bestScore">0</span></div>
                <div class="stats-row"><span>Avg. Accuracy</span><span id="avgRate">0%</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var puzzles = [
            { emoji: '🎬🦁👑', answer: 'Lion King', category: 'Movie', options: ['Lion King', 'Jungle Book', 'Aladdin', 'Frozen'] },
            { emoji: '🧙‍♂️⚡👓', answer: 'Harry Potter', category: 'Movie', options: ['Harry Potter', 'Lord of the Rings', 'Narnia', 'Hunger Games'] },
            { emoji: '🚢❄️💔', answer: 'Titanic', category: 'Movie', options: ['Titanic', 'Poseidon', 'Deep Blue Sea', 'Cast Away'] },
            { emoji: '🕷️🦸‍♂️🏙️', answer: 'Spider-Man', category: 'Movie', options: ['Spider-Man', 'Batman', 'Iron Man', 'Superman'] },
            { emoji: '🐭🏰✨', answer: 'Disney', category: 'Brand', options: ['Disney', 'Pixar', 'DreamWorks', 'Universal'] },
            { emoji: '☕📱', answer: 'Starbucks', category: 'Brand', options: ['Starbucks', 'Costa', 'Dunkin', 'Peets'] },
            { emoji: '🍔🤡', answer: 'McDonalds', category: 'Brand', options: ['McDonalds', 'Burger King', 'Wendys', 'KFC'] },
            { emoji: '🍕🇮🇹', answer: 'Pizza', category: 'Food', options: ['Pizza', 'Pasta', 'Risotto', 'Lasagna'] },
            { emoji: '🍣🇯🇵', answer: 'Sushi', category: 'Food', options: ['Sushi', 'Ramen', 'Udon', 'Tempura'] },
            { emoji: '🌙⭐💤', answer: 'Sleep', category: 'Daily', options: ['Sleep', 'Dream', 'Night', 'Rest'] },
            { emoji: '📚✏️🎓', answer: 'Study', category: 'Daily', options: ['Study', 'School', 'Exam', 'Homework'] },
            { emoji: '🎸🎤🎶', answer: 'Concert', category: 'Daily', options: ['Concert', 'Karaoke', 'Music', 'Band'] },
            { emoji: '✈️🌴🏖️', answer: 'Travel', category: 'Daily', options: ['Travel', 'Vacation', 'Holiday', 'Trip'] },
            { emoji: '💍👰🤵', answer: 'Wedding', category: 'Daily', options: ['Wedding', 'Engagement', 'Romance', 'Date'] },
            { emoji: '🎂🎁🎉', answer: 'Birthday', category: 'Daily', options: ['Birthday', 'Party', 'Celebration', 'Anniversary'] },
            { emoji: '🏀⛹️', answer: 'Basketball', category: 'Sports', options: ['Basketball', 'Volleyball', 'Handball', 'Baseball'] },
            { emoji: '⚽🥅', answer: 'Soccer', category: 'Sports', options: ['Soccer', 'Futsal', 'Rugby', 'Hockey'] },
            { emoji: '🎾🏸', answer: 'Tennis', category: 'Sports', options: ['Tennis', 'Badminton', 'Ping Pong', 'Squash'] },
            { emoji: '🏊‍♂️🌊', answer: 'Swimming', category: 'Sports', options: ['Swimming', 'Surfing', 'Diving', 'Water Ski'] },
            { emoji: '🎹🎵', answer: 'Piano', category: 'Music', options: ['Piano', 'Guitar', 'Violin', 'Cello'] }
        ];

        var currentPuzzles = [];
        var currentIndex = 0;
        var score = 0;
        var correctCount = 0;
        var stats = JSON.parse(localStorage.getItem('emoji_puzzle_en') || '{"games":0,"best":0,"total":0,"correct":0}');

        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
            }
            return arr;
        }

        function startGame() {
            currentPuzzles = shuffle(puzzles.slice()).slice(0, 10);
            currentIndex = 0;
            score = 0;
            correctCount = 0;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('resultArea').classList.remove('show');
            document.getElementById('puzzleCard').style.display = 'block';
            updateUI();
            showPuzzle();
        }

        function showPuzzle() {
            var p = currentPuzzles[currentIndex];
            document.getElementById('category').textContent = p.category;
            document.getElementById('emojiDisplay').textContent = p.emoji;
            document.getElementById('hint').textContent = 'What do these emojis represent?';
            var optionsEl = document.getElementById('options');
            optionsEl.innerHTML = '';
            var shuffledOptions = shuffle(p.options.slice());
            shuffledOptions.forEach(function(opt) {
                var btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = function() { selectAnswer(opt); };
                optionsEl.appendChild(btn);
            });
        }

        function selectAnswer(selected) {
            var p = currentPuzzles[currentIndex];
            var btns = document.querySelectorAll('.option-btn');
            btns.forEach(function(btn) {
                btn.classList.add('disabled');
                if (btn.textContent === p.answer) btn.classList.add('correct');
                if (btn.textContent === selected && selected !== p.answer) btn.classList.add('wrong');
            });
            if (selected === p.answer) {
                correctCount++;
                score += 10;
            }
            updateUI();
            setTimeout(function() {
                currentIndex++;
                if (currentIndex < currentPuzzles.length) {
                    showPuzzle();
                } else {
                    showResult();
                }
            }, 1000);
        }

        function updateUI() {
            document.getElementById('questionNum').textContent = (currentIndex + 1) + '/' + currentPuzzles.length;
            document.getElementById('correctCount').textContent = correctCount;
            document.getElementById('score').textContent = score;
        }

        function showResult() {
            document.getElementById('puzzleCard').style.display = 'none';
            document.getElementById('resultArea').classList.add('show');
            var rate = Math.round(correctCount / currentPuzzles.length * 100);
            document.getElementById('resultScore').textContent = score + ' pts';
            if (rate >= 80) {
                document.getElementById('resultIcon').textContent = '🏆';
                document.getElementById('resultTitle').textContent = 'Emoji Master!';
            } else if (rate >= 50) {
                document.getElementById('resultIcon').textContent = '👍';
                document.getElementById('resultTitle').textContent = 'Good Job!';
            } else {
                document.getElementById('resultIcon').textContent = '💪';
                document.getElementById('resultTitle').textContent = 'Try Again!';
            }
            stats.games++;
            stats.total += currentPuzzles.length;
            stats.correct += correctCount;
            if (score > stats.best) stats.best = score;
            localStorage.setItem('emoji_puzzle_en', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalGames').textContent = stats.games;
            document.getElementById('bestScore').textContent = stats.best;
            document.getElementById('avgRate').textContent = stats.total > 0 ? Math.round(stats.correct / stats.total * 100) + '%' : '0%';
        }

        updateStats();
    </script>
</body>
</html>
