    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1e3a5f, #0f172a); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .timer-display { text-align: center; padding: 40px 20px; margin-bottom: 25px; }
        .time-value { font-size: 5rem; font-weight: 700; font-family: monospace; letter-spacing: 4px; }
        .time-value.warning { color: #fbbf24; }
        .time-value.danger { color: #ef4444; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        .time-label { font-size: .9rem; opacity: .7; margin-top: 10px; }
        .time-inputs { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .time-input-group { text-align: center; }
        .time-input-group label { display: block; font-size: .8rem; opacity: .7; margin-bottom: 5px; }
        .time-input { width: 70px; padding: 15px 10px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1.5rem; text-align: center; font-weight: 700; }
        .time-input:focus { outline: none; border-color: #22c55e; }
        .presets { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-bottom: 25px; }
        .preset-btn { padding: 10px 18px; border: 2px solid rgba(255,255,255,.3); border-radius: 20px; background: rgba(255,255,255,.1); color: #fff; font-size: .9rem; cursor: pointer; transition: all .3s; }
        .preset-btn:hover { background: rgba(255,255,255,.2); }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; }
        .control-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: 700; cursor: pointer; transition: all .3s; }
        .start-btn { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
        .pause-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .reset-btn { background: rgba(255,255,255,.2); color: #fff; }
        .sound-toggle { text-align: center; margin-top: 15px; }
        .sound-btn { padding: 10px 20px; border: 2px solid rgba(255,255,255,.3); border-radius: 20px; background: rgba(255,255,255,.1); color: #fff; font-size: .9rem; cursor: pointer; }
        .sound-btn.active { background: #22c55e; border-color: #22c55e; }
        .hidden { display: none !important; }

</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>⏱️ Countdown Timer</h1>
        </header>
        <div class="game-section">
            <div class="timer-display">
                <div class="time-value" id="timerDisplay">00:00:00</div>
                <div class="time-label" id="timerLabel">Set your time</div>
            </div>
            <div class="time-inputs" id="timeInputs">
                <div class="time-input-group">
                    <label>Hours</label>
                    <input type="number" class="time-input" id="hoursInput" min="0" max="23" value="0">
                </div>
                <div class="time-input-group">
                    <label>Minutes</label>
                    <input type="number" class="time-input" id="minutesInput" min="0" max="59" value="5">
                </div>
                <div class="time-input-group">
                    <label>Seconds</label>
                    <input type="number" class="time-input" id="secondsInput" min="0" max="59" value="0">
                </div>
            </div>
            <div class="presets" id="presets">
                <button class="preset-btn" onclick="setPreset(1)">1 min</button>
                <button class="preset-btn" onclick="setPreset(3)">3 min</button>
                <button class="preset-btn" onclick="setPreset(5)">5 min</button>
                <button class="preset-btn" onclick="setPreset(10)">10 min</button>
                <button class="preset-btn" onclick="setPreset(15)">15 min</button>
                <button class="preset-btn" onclick="setPreset(30)">30 min</button>
            </div>
            <div class="controls">
                <button class="control-btn reset-btn" onclick="resetTimer()">🔄 Reset</button>
                <button class="control-btn start-btn" id="startBtn" onclick="toggleTimer()">▶️ Start</button>
            </div>
            <div class="sound-toggle">
                <button class="sound-btn active" id="soundBtn" onclick="toggleSound()">🔔 Sound On</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var totalSeconds = 0;
        var remainingSeconds = 0;
        var timer = null;
        var isRunning = false;
        var soundEnabled = true;
        var audioContext = null;

        function setPreset(minutes) {
            document.getElementById('hoursInput').value = 0;
            document.getElementById('minutesInput').value = minutes;
            document.getElementById('secondsInput').value = 0;
            updateDisplay(minutes * 60);
        }

        function getInputSeconds() {
            var hours = parseInt(document.getElementById('hoursInput').value) || 0;
            var minutes = parseInt(document.getElementById('minutesInput').value) || 0;
            var seconds = parseInt(document.getElementById('secondsInput').value) || 0;
            return hours * 3600 + minutes * 60 + seconds;
        }

        function formatTime(seconds) {
            var h = Math.floor(seconds / 3600);
            var m = Math.floor((seconds % 3600) / 60);
            var s = seconds % 60;
            return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
        }

        function updateDisplay(seconds) {
            var display = document.getElementById('timerDisplay');
            display.textContent = formatTime(seconds);
            display.classList.remove('warning', 'danger');
            if (seconds <= 10 && seconds > 0) {
                display.classList.add('danger');
            } else if (seconds <= 60 && seconds > 0) {
                display.classList.add('warning');
            }
        }

        function toggleTimer() {
            if (isRunning) {
                pauseTimer();
            } else {
                startTimer();
            }
        }

        function startTimer() {
            if (remainingSeconds <= 0) {
                remainingSeconds = getInputSeconds();
                totalSeconds = remainingSeconds;
            }
            if (remainingSeconds <= 0) return;

            isRunning = true;
            document.getElementById('startBtn').innerHTML = '⏸️ Pause';
            document.getElementById('startBtn').classList.remove('start-btn');
            document.getElementById('startBtn').classList.add('pause-btn');
            document.getElementById('timeInputs').classList.add('hidden');
            document.getElementById('presets').classList.add('hidden');
            document.getElementById('timerLabel').textContent = 'Counting down...';

            timer = setInterval(function() {
                remainingSeconds--;
                updateDisplay(remainingSeconds);

                if (remainingSeconds <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    document.getElementById('timerLabel').textContent = 'Time\'s up!';
                    document.getElementById('startBtn').innerHTML = '▶️ Start';
                    document.getElementById('startBtn').classList.add('start-btn');
                    document.getElementById('startBtn').classList.remove('pause-btn');
                    if (soundEnabled) playAlarm();
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timer);
            isRunning = false;
            document.getElementById('startBtn').innerHTML = '▶️ Resume';
            document.getElementById('startBtn').classList.add('start-btn');
            document.getElementById('startBtn').classList.remove('pause-btn');
            document.getElementById('timerLabel').textContent = 'Paused';
        }

        function resetTimer() {
            clearInterval(timer);
            isRunning = false;
            remainingSeconds = 0;
            updateDisplay(getInputSeconds());
            document.getElementById('startBtn').innerHTML = '▶️ Start';
            document.getElementById('startBtn').classList.add('start-btn');
            document.getElementById('startBtn').classList.remove('pause-btn');
            document.getElementById('timeInputs').classList.remove('hidden');
            document.getElementById('presets').classList.remove('hidden');
            document.getElementById('timerLabel').textContent = 'Set your time';
        }

        function toggleSound() {
            soundEnabled = !soundEnabled;
            var btn = document.getElementById('soundBtn');
            btn.textContent = soundEnabled ? '🔔 Sound On' : '🔕 Sound Off';
            btn.classList.toggle('active', soundEnabled);
        }

        function playAlarm() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            for (var i = 0; i < 3; i++) {
                setTimeout(function() {
                    var oscillator = audioContext.createOscillator();
                    var gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.frequency.value = 880;
                    oscillator.type = 'sine';
                    gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    oscillator.start(audioContext.currentTime);
                    oscillator.stop(audioContext.currentTime + 0.5);
                }, i * 600);
            }
        }

        document.querySelectorAll('.time-input').forEach(function(input) {
            input.addEventListener('change', function() {
                updateDisplay(getInputSeconds());
            });
        });

        updateDisplay(getInputSeconds());
    </script>
</body>
</html>
