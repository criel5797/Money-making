<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/parking-location/index-ja.html"><meta property="og:url" content="https://instaidea.org/tools/fun/parking-location/index-ja.html"><meta property="og:locale" content="ja_JP"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/parking-location/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/parking-location/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/parking-location/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/parking-location/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>駐車位置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #4776e6, #8e54e9); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .parking-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .current-location { background: rgba(0,0,0,.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .location-icon { font-size: 3rem; margin-bottom: 10px; }
        .location-info { font-size: 1rem; margin-bottom: 5px; }
        .location-time { font-size: .85rem; opacity: .8; }
        .location-note { font-size: .9rem; margin-top: 10px; opacity: .9; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 20px; }
        .save-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .clear-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .form-row { margin-bottom: 15px; }
        .form-row input, .form-row textarea { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .form-row textarea { resize: vertical; min-height: 60px; }
        .form-label { font-size: .85rem; margin-bottom: 5px; display: block; opacity: .8; }
        .history-title { font-size: .9rem; margin-bottom: 10px; opacity: .8; }
        .history-list { max-height: 150px; overflow-y: auto; }
        .history-item { padding: 12px 15px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; }
        .history-floor { font-weight: 600; }
        .history-detail { font-size: .8rem; opacity: .8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🚗 駐車位置</h1>
        </header>
        <div class="parking-section">
            <div class="current-location">
                <div class="location-icon" id="locationIcon">🅿️</div>
                <div class="location-info" id="locationInfo">保存された位置なし</div>
                <div class="location-time" id="locationTime"></div>
                <div class="location-note" id="locationNote"></div>
            </div>
            <div class="form-row">
                <label class="form-label">階/ゾーン</label>
                <input type="text" id="floorInput" placeholder="例: B2, 3階Aゾーン">
            </div>
            <div class="form-row">
                <label class="form-label">メモ (任意)</label>
                <textarea id="noteInput" placeholder="例: エレベーター近く、柱の横"></textarea>
            </div>
            <div class="btn-group">
                <button class="save-btn" onclick="saveLocation()">位置を保存</button>
                <button class="clear-btn" onclick="clearLocation()">クリア</button>
            </div>
            <div class="history-title">最近の履歴</div>
            <div class="history-list" id="historyList"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var parkingData = JSON.parse(localStorage.getItem('parking_data_ja') || '{"current":null,"history":[]}');
        function save() { localStorage.setItem('parking_data_ja', JSON.stringify(parkingData)); }
        function formatDate(iso) {
            var d = new Date(iso);
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0') + ' ' + String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
        }
        function saveLocation() {
            var floor = document.getElementById('floorInput').value.trim();
            var note = document.getElementById('noteInput').value.trim();
            if (floor) {
                var entry = { floor: floor, note: note, time: new Date().toISOString() };
                parkingData.current = entry;
                parkingData.history.unshift(entry);
                if (parkingData.history.length > 10) parkingData.history.pop();
                save();
                render();
                document.getElementById('floorInput').value = '';
                document.getElementById('noteInput').value = '';
            }
        }
        function clearLocation() {
            parkingData.current = null;
            save();
            render();
        }
        function render() {
            var icon = document.getElementById('locationIcon');
            var info = document.getElementById('locationInfo');
            var time = document.getElementById('locationTime');
            var noteEl = document.getElementById('locationNote');
            if (parkingData.current) {
                icon.textContent = '📍';
                info.textContent = parkingData.current.floor;
                time.textContent = '保存時間: ' + formatDate(parkingData.current.time);
                noteEl.textContent = parkingData.current.note || '';
            } else {
                icon.textContent = '🅿️';
                info.textContent = '保存された位置なし';
                time.textContent = '';
                noteEl.textContent = '';
            }
            var list = document.getElementById('historyList');
            list.innerHTML = '';
            parkingData.history.forEach(function(h) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = '<div class="history-floor">' + h.floor + '</div><div class="history-detail">' + formatDate(h.time) + (h.note ? ' - ' + h.note : '') + '</div>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
