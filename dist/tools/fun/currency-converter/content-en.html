<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .currency-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .converter-box { background: rgba(0,0,0,.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-label { font-size: .85rem; margin-bottom: 5px; display: block; opacity: .8; }
        .currency-row { display: flex; gap: 10px; }
        .currency-row input { flex: 1; padding: 15px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; font-size: 1.2rem; }
        .currency-row select { width: 100px; padding: 15px 10px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .swap-btn { display: block; margin: 15px auto; background: rgba(255,255,255,.2); border: none; color: #fff; padding: 10px 20px; border-radius: 20px; cursor: pointer; font-size: 1.2rem; }
        .result-box { background: linear-gradient(135deg, #667eea, #764ba2); padding: 20px; border-radius: 12px; text-align: center; margin-bottom: 20px; }
        .result-value { font-size: 1.8rem; font-weight: 700; }
        .result-rate { font-size: .85rem; opacity: .8; margin-top: 5px; }
        .quick-rates { font-size: .85rem; }
        .rate-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,.1); }
        .rate-item:last-child { border-bottom: none; }
        .note { text-align: center; font-size: .75rem; opacity: .6; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>💱 Currency Converter</h1>
        </header>
        <div class="currency-section">
            <div class="converter-box">
                <div class="input-group">
                    <label class="input-label">Amount to convert</label>
                    <div class="currency-row">
                        <input type="number" id="fromAmount" value="100" oninput="convert()">
                        <select id="fromCurrency" onchange="convert()">
                            <option value="USD" selected>USD</option>
                            <option value="EUR">EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="JPY">JPY</option>
                            <option value="CNY">CNY</option>
                            <option value="KRW">KRW</option>
                        </select>
                    </div>
                </div>
                <button class="swap-btn" onclick="swapCurrency()">⇅</button>
                <div class="input-group">
                    <label class="input-label">Converted amount</label>
                    <div class="currency-row">
                        <input type="text" id="toAmount" readonly>
                        <select id="toCurrency" onchange="convert()">
                            <option value="USD">USD</option>
                            <option value="EUR" selected>EUR</option>
                            <option value="GBP">GBP</option>
                            <option value="JPY">JPY</option>
                            <option value="CNY">CNY</option>
                            <option value="KRW">KRW</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="result-box">
                <div class="result-value" id="rateDisplay">1 USD = 0.93 EUR</div>
                <div class="result-rate">Example rates (may differ from actual)</div>
            </div>
            <div class="quick-rates">
                <div class="rate-item"><span>🇺🇸 USD</span><span>$1.00</span></div>
                <div class="rate-item"><span>🇪🇺 EUR</span><span>$1.07</span></div>
                <div class="rate-item"><span>🇬🇧 GBP</span><span>$1.26</span></div>
                <div class="rate-item"><span>🇯🇵 JPY (100)</span><span>$0.67</span></div>
                <div class="rate-item"><span>🇰🇷 KRW (1000)</span><span>$0.74</span></div>
            </div>
            <div class="note">※ These are example rates. Check with your bank for actual exchange rates.</div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var rates = {
            USD: 1,
            EUR: 0.93,
            GBP: 0.79,
            JPY: 150,
            CNY: 7.25,
            KRW: 1350
        };
        function convert() {
            var fromAmount = parseFloat(document.getElementById('fromAmount').value) || 0;
            var fromCurrency = document.getElementById('fromCurrency').value;
            var toCurrency = document.getElementById('toCurrency').value;
            var inUSD = fromAmount / rates[fromCurrency];
            var result = inUSD * rates[toCurrency];
            document.getElementById('toAmount').value = result.toFixed(2);
            document.getElementById('rateDisplay').textContent = '1 ' + fromCurrency + ' = ' + (rates[toCurrency] / rates[fromCurrency]).toFixed(4) + ' ' + toCurrency;
        }
        function swapCurrency() {
            var from = document.getElementById('fromCurrency');
            var to = document.getElementById('toCurrency');
            var temp = from.value;
            from.value = to.value;
            to.value = temp;
            convert();
        }
        convert();
    </script>
</body>
</html>
