<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>カウントダウンウィジェット</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff6b6b, #ee5a24); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .countdown-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .countdown-display { text-align: center; margin-bottom: 25px; }
        .countdown-title { font-size: 1.2rem; margin-bottom: 15px; opacity: .9; }
        .countdown-timer { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
        .time-box { background: rgba(0,0,0,.3); padding: 15px; border-radius: 12px; min-width: 70px; }
        .time-value { font-size: 2.5rem; font-weight: 700; }
        .time-label { font-size: .7rem; opacity: .7; margin-top: 5px; }
        .add-form { margin-bottom: 20px; }
        .form-row { margin-bottom: 10px; }
        .form-row input { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; }
        .countdown-list { max-height: 250px; overflow-y: auto; }
        .countdown-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 10px; cursor: pointer; }
        .countdown-item.active { background: rgba(255,255,255,.25); border: 2px solid rgba(255,255,255,.5); }
        .item-info { flex: 1; }
        .item-title { font-weight: 600; margin-bottom: 3px; }
        .item-date { font-size: .8rem; opacity: .7; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.6); cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>⏰ カウントダウンウィジェット</h1>
        </header>
        <div class="countdown-section">
            <div class="countdown-display">
                <div class="countdown-title" id="activeTitle">イベントを追加してください</div>
                <div class="countdown-timer">
                    <div class="time-box"><div class="time-value" id="days">00</div><div class="time-label">日</div></div>
                    <div class="time-box"><div class="time-value" id="hours">00</div><div class="time-label">時間</div></div>
                    <div class="time-box"><div class="time-value" id="mins">00</div><div class="time-label">分</div></div>
                    <div class="time-box"><div class="time-value" id="secs">00</div><div class="time-label">秒</div></div>
                </div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="eventTitle" placeholder="イベントタイトル">
                </div>
                <div class="form-row">
                    <input type="datetime-local" id="eventDate">
                </div>
                <button class="add-btn" onclick="addCountdown()">カウントダウン追加</button>
            </div>
            <div class="countdown-list" id="countdownList"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var countdowns = JSON.parse(localStorage.getItem('countdowns') || '[]');
        var activeId = localStorage.getItem('active_countdown') || null;
        function save() { localStorage.setItem('countdowns', JSON.stringify(countdowns)); }
        function addCountdown() {
            var title = document.getElementById('eventTitle').value.trim();
            var date = document.getElementById('eventDate').value;
            if (!title || !date) return;
            var id = Date.now().toString();
            countdowns.push({ id: id, title: title, date: date });
            if (!activeId) { activeId = id; localStorage.setItem('active_countdown', id); }
            save();
            document.getElementById('eventTitle').value = '';
            document.getElementById('eventDate').value = '';
            render();
        }
        function setActive(id) {
            activeId = id;
            localStorage.setItem('active_countdown', id);
            render();
        }
        function deleteCountdown(id) {
            countdowns = countdowns.filter(function(c) { return c.id !== id; });
            if (activeId === id) {
                activeId = countdowns.length > 0 ? countdowns[0].id : null;
                localStorage.setItem('active_countdown', activeId || '');
            }
            save();
            render();
        }
        function updateTimer() {
            var active = countdowns.find(function(c) { return c.id === activeId; });
            if (!active) {
                document.getElementById('activeTitle').textContent = 'イベントを追加してください';
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('mins').textContent = '00';
                document.getElementById('secs').textContent = '00';
                return;
            }
            document.getElementById('activeTitle').textContent = active.title;
            var diff = new Date(active.date) - new Date();
            if (diff <= 0) {
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('mins').textContent = '00';
                document.getElementById('secs').textContent = '00';
                return;
            }
            var d = Math.floor(diff / (1000 * 60 * 60 * 24));
            var h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            var m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            var s = Math.floor((diff % (1000 * 60)) / 1000);
            document.getElementById('days').textContent = d < 10 ? '0' + d : d;
            document.getElementById('hours').textContent = h < 10 ? '0' + h : h;
            document.getElementById('mins').textContent = m < 10 ? '0' + m : m;
            document.getElementById('secs').textContent = s < 10 ? '0' + s : s;
        }
        function render() {
            var list = document.getElementById('countdownList');
            list.innerHTML = '';
            countdowns.forEach(function(c) {
                var div = document.createElement('div');
                div.className = 'countdown-item' + (c.id === activeId ? ' active' : '');
                div.onclick = function() { setActive(c.id); };
                var d = new Date(c.date);
                div.innerHTML = '<div class="item-info"><div class="item-title">' + c.title + '</div><div class="item-date">' + (d.getMonth() + 1) + '/' + d.getDate() + ' ' + d.getHours() + ':' + (d.getMinutes() < 10 ? '0' : '') + d.getMinutes() + '</div></div><button class="del-btn" onclick="event.stopPropagation(); deleteCountdown(\'' + c.id + '\')">×</button>';
                list.appendChild(div);
            });
            updateTimer();
        }
        setInterval(updateTimer, 1000);
        render();
    </script>
</body>
</html>
