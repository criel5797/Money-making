        .statement-group { margin-bottom: 15px; }

        .action-btn { flex: 1; padding: 16px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .reveal-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .new-btn { background: rgba(255,255,255,.2); color: #fff; }

<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>✌️ 2つの真実と1つの嘘</h1>
            <p class="subtitle">2つの真実と1つの嘘を言って、友達に当てさせよう！</p>
        </header>
        <div class="game-section">
            <div class="player-section">
                <div class="player-label">プレイヤー名</div>
                <input type="text" class="player-input" id="playerName" placeholder="名前を入力">
            </div>
            <div class="statements-section">
                <div class="statement-group">
                    <div class="statement-label"><span class="statement-emoji">1️⃣</span> 最初の文</div>
                    <input type="text" class="statement-input" id="statement1" placeholder="真実か嘘を入力">
                </div>
                <div class="statement-group">
                    <div class="statement-label"><span class="statement-emoji">2️⃣</span> 2番目の文</div>
                    <input type="text" class="statement-input" id="statement2" placeholder="真実か嘘を入力">
                </div>
                <div class="statement-group">
                    <div class="statement-label"><span class="statement-emoji">3️⃣</span> 3番目の文</div>
                    <input type="text" class="statement-input" id="statement3" placeholder="真実か嘘を入力">
                </div>
            </div>
            <div class="player-label">どれが嘘ですか？</div>
            <div class="lie-select">
                <button class="lie-btn" onclick="selectLie(1)">1番</button>
                <button class="lie-btn" onclick="selectLie(2)">2番</button>
                <button class="lie-btn" onclick="selectLie(3)">3番</button>
            </div>
            <div class="actions">
                <button class="action-btn new-btn" onclick="newRound()">🔄 新しいゲーム</button>
                <button class="action-btn reveal-btn" onclick="revealLie()">🎭 嘘を公開！</button>
            </div>
            <div class="reveal-section" id="revealSection">
                <div class="reveal-title">🎉 嘘が明らかになりました！</div>
                <div class="reveal-statement">
                    <div class="reveal-label">嘘は...</div>
                    <div class="reveal-text" id="revealText"></div>
                </div>
            </div>
            <div class="stats">
                <div class="stats-title">📊 ゲーム統計</div>
                <div class="stats-row"><span>総ラウンド</span><span id="totalRounds">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var selectedLie = 0;
        var totalRounds = 0;

        function selectLie(num) {
            selectedLie = num;
            document.querySelectorAll('.lie-btn').forEach(function(btn, i) {
                btn.classList.toggle('active', i + 1 === num);
            });
        }

        function revealLie() {
            if (selectedLie === 0) {
                alert('まず嘘の文を選んでください！');
                return;
            }

            var statement = document.getElementById('statement' + selectedLie).value || selectedLie + '番の文';
            document.getElementById('revealText').textContent = statement;
            document.getElementById('revealSection').style.display = 'block';

            totalRounds++;
            document.getElementById('totalRounds').textContent = totalRounds;
            saveStats();
        }

        function newRound() {
            selectedLie = 0;
            document.querySelectorAll('.lie-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.statement-input').forEach(function(input) {
                input.value = '';
            });
            document.getElementById('playerName').value = '';
            document.getElementById('revealSection').style.display = 'none';
        }

        function saveStats() {
            var stats = JSON.parse(localStorage.getItem('twotruthsonelie_ja') || '{"rounds":0}');
            stats.rounds = totalRounds;
            localStorage.setItem('twotruthsonelie_ja', JSON.stringify(stats));
        }

        function loadStats() {
            var stats = JSON.parse(localStorage.getItem('twotruthsonelie_ja') || '{"rounds":0}');
            totalRounds = stats.rounds;
            document.getElementById('totalRounds').textContent = totalRounds;
        }

        loadStats();
    </script>
</body>
