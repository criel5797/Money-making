    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #a18cd1, #fbc2eb); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .journal-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .date-display { text-align: center; margin-bottom: 20px; }
        .date-text { font-size: 1.2rem; font-weight: 600; }
        .mood-section { margin-bottom: 20px; }
        .mood-label { font-size: .9rem; margin-bottom: 10px; opacity: .9; }
        .mood-options { display: flex; justify-content: space-around; }
        .mood-btn { font-size: 2rem; background: rgba(255,255,255,.2); border: none; padding: 12px; border-radius: 12px; cursor: pointer; transition: transform .2s; }
        .mood-btn.selected { background: rgba(255,255,255,.4); transform: scale(1.1); }
        .entry-area { margin-bottom: 20px; }
        .entry-label { font-size: .9rem; margin-bottom: 8px; opacity: .9; }
        .entry-textarea { width: 100%; min-height: 150px; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); color: #333; resize: vertical; font-size: 1rem; line-height: 1.6; }
        .save-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; margin-bottom: 20px; }
        .history-title { font-size: .9rem; margin-bottom: 10px; opacity: .8; }
        .history-list { max-height: 200px; overflow-y: auto; }
        .history-item { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; margin-bottom: 8px; cursor: pointer; }
        .history-date { font-weight: 600; font-size: .85rem; }
        .history-preview { font-size: .8rem; opacity: .8; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-mood { float: right; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>📔 今日の日記</h1>
        </header>
        <div class="journal-section">
            <div class="date-display">
                <div class="date-text" id="dateText"></div>
            </div>
            <div class="mood-section">
                <div class="mood-label">今日の気分は？</div>
                <div class="mood-options">
                    <button class="mood-btn" onclick="selectMood('😊')">😊</button>
                    <button class="mood-btn" onclick="selectMood('😐')">😐</button>
                    <button class="mood-btn" onclick="selectMood('😢')">😢</button>
                    <button class="mood-btn" onclick="selectMood('😡')">😡</button>
                    <button class="mood-btn" onclick="selectMood('😴')">😴</button>
                </div>
            </div>
            <div class="entry-area">
                <div class="entry-label">今日はどんな一日でしたか？</div>
                <textarea class="entry-textarea" id="entryText" placeholder="今日のことを書いてみましょう..."></textarea>
            </div>
            <button class="save-btn" onclick="saveEntry()">保存する</button>
            <div class="history-title">過去の日記</div>
            <div class="history-list" id="historyList"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var entries = JSON.parse(localStorage.getItem('daily_journal_ja') || '[]');
        var selectedMood = '';
        var today = new Date().toISOString().split('T')[0];
        function save() { localStorage.setItem('daily_journal_ja', JSON.stringify(entries)); }
        function selectMood(mood) {
            selectedMood = mood;
            document.querySelectorAll('.mood-btn').forEach(function(btn) {
                btn.classList.toggle('selected', btn.textContent === mood);
            });
        }
        function saveEntry() {
            var text = document.getElementById('entryText').value.trim();
            if (!text) { alert('日記を書いてください。'); return; }
            var existing = entries.findIndex(function(e) { return e.date === today; });
            var entry = { date: today, mood: selectedMood, text: text };
            if (existing >= 0) {
                entries[existing] = entry;
            } else {
                entries.unshift(entry);
            }
            save();
            render();
            alert('保存しました！');
        }
        function loadEntry(date) {
            var entry = entries.find(function(e) { return e.date === date; });
            if (entry) {
                document.getElementById('entryText').value = entry.text;
                if (entry.mood) selectMood(entry.mood);
            }
        }
        function formatDate(dateStr) {
            var d = new Date(dateStr);
            return (d.getMonth() + 1) + '月' + d.getDate() + '日';
        }
        function render() {
            var todayDate = new Date();
            var days = ['日曜日', '月曜日', '火曜日', '水曜日', '木曜日', '金曜日', '土曜日'];
            document.getElementById('dateText').textContent = (todayDate.getMonth() + 1) + '月' + todayDate.getDate() + '日 ' + days[todayDate.getDay()];
            var todayEntry = entries.find(function(e) { return e.date === today; });
            if (todayEntry) {
                document.getElementById('entryText').value = todayEntry.text;
                if (todayEntry.mood) selectMood(todayEntry.mood);
            }
            var list = document.getElementById('historyList');
            list.innerHTML = '';
            entries.slice(0, 10).forEach(function(e) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.onclick = function() { loadEntry(e.date); };
                div.innerHTML = '<span class="history-mood">' + (e.mood || '') + '</span><div class="history-date">' + formatDate(e.date) + '</div><div class="history-preview">' + e.text + '</div>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
