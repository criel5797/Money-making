    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .main-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .result-display {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .result-number {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .range-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;

            margin-bottom: 8px;
        }
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        .separator {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.6);
            padding-top: 25px;
        }
        .options {
            margin-bottom: 20px;
        }
        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .option-row:last-child { border: none; }
        .option-label {
            font-size: 0.95rem;
        }
        .count-input {
            width: 80px;
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39,174,96,0.4);
        }
        .history {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .history h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.8);
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;

        }

            background: rgba(255,255,255,0.2);
            color: white;
            border: none;

<body>
    <div class="container">
        <div class="ad-banner">広告エリア</div>
        <header>
            <h1>🎲 ランダム数字生成</h1>
            <p class="subtitle">範囲を設定してランダムな数字を生成します</p>
        </header>
        <div class="main-section">
            <div class="result-display">
                <div class="result-number" id="result">?</div>
            </div>
            <div class="range-inputs">
                <div class="input-group">
                    <label>最小値</label>
                    <input type="number" id="minVal" value="1">
                </div>
                <div class="separator">~</div>
                <div class="input-group">
                    <label>最大値</label>
                    <input type="number" id="maxVal" value="100">
                </div>
            </div>
            <div class="options">
                <div class="option-row">
                    <span class="option-label">生成数</span>
                    <input type="number" class="count-input" id="count" value="1" min="1" max="10">
                </div>
            </div>
            <button class="generate-btn" onclick="generate()">生成</button>
            <div class="history">
                <h3>📋 履歴 <button class="clear-btn" onclick="clearHistory()">クリア</button></h3>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告エリア</div>
    </div>
    <script>
        var history = [];

        function generate() {
            var min = parseInt(document.getElementById('minVal').value) || 1;
            var max = parseInt(document.getElementById('maxVal').value) || 100;
            var count = parseInt(document.getElementById('count').value) || 1;
            if (min > max) { var temp = min; min = max; max = temp; }
            count = Math.min(count, 10);

            var results = [];
            for (var i = 0; i < count; i++) {
                results.push(Math.floor(Math.random() * (max - min + 1)) + min);
            }

            var resultEl = document.getElementById('result');
            resultEl.textContent = results.join(', ');
            resultEl.style.animation = 'none';
            resultEl.offsetHeight;
            resultEl.style.animation = 'pop 0.3s ease';

            history.unshift(results.join(', '));
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            var html = '';
            for (var i = 0; i < history.length; i++) {
                html += '<div class="history-item">' + history[i] + '</div>';
            }
            document.getElementById('historyList').innerHTML = html;
        }

        function clearHistory() {
            history = [];
            document.getElementById('historyList').innerHTML = '';
        }
    </script>
</body>
