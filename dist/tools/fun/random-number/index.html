<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/random-number/"><meta property="og:url" content="https://instaidea.org/tools/fun/random-number/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/random-number/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/random-number/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/random-number/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/random-number/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>랜덤 숫자 생성기 - 무작위 번호 추첨</title>
    <meta name="description" content="랜덤 숫자 생성기. 지정한 범위 내에서 무작위 숫자를 생성합니다. 추첨, 게임에 유용합니다.">
    <meta name="keywords" content="랜덤 숫자, 무작위 번호, 숫자 생성기, 추첨기, 랜덤 넘버">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .main-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .result-display {
            text-align: center;
            padding: 40px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            margin-bottom: 25px;
        }
        .result-number {
            font-size: 4rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 4px 10px rgba(0,0,0,0.2);
            animation: pop 0.3s ease;
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        .range-inputs {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 15px;
            align-items: center;
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            font-size: 0.85rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 8px;
        }
        input[type="number"] {
            width: 100%;
            padding: 14px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1.2rem;
            text-align: center;
        }
        input:focus {
            outline: none;
            border-color: #fff;
        }
        .separator {
            font-size: 1.5rem;
            color: rgba(255,255,255,0.6);
            padding-top: 25px;
        }
        .options {
            margin-bottom: 20px;
        }
        .option-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .option-row:last-child { border: none; }
        .option-label {
            font-size: 0.95rem;
        }
        .count-input {
            width: 80px;
            padding: 8px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 1rem;
            text-align: center;
        }
        .generate-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .generate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(39,174,96,0.4);
        }
        .history {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .history h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            color: rgba(255,255,255,0.8);
        }
        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .history-item {
            background: rgba(255,255,255,0.15);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
        }
        .clear-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: pointer;
            margin-left: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고 영역</div>
        <header>
            <h1>🎲 랜덤 숫자 생성기</h1>
            <p class="subtitle">범위를 설정하고 무작위 숫자를 뽑으세요</p>
        </header>
        <div class="main-section">
            <div class="result-display">
                <div class="result-number" id="result">?</div>
            </div>
            <div class="range-inputs">
                <div class="input-group">
                    <label>최소값</label>
                    <input type="number" id="minVal" value="1">
                </div>
                <div class="separator">~</div>
                <div class="input-group">
                    <label>최대값</label>
                    <input type="number" id="maxVal" value="100">
                </div>
            </div>
            <div class="options">
                <div class="option-row">
                    <span class="option-label">생성 개수</span>
                    <input type="number" class="count-input" id="count" value="1" min="1" max="10">
                </div>
            </div>
            <button class="generate-btn" onclick="generate()">숫자 생성</button>
            <div class="history">
                <h3>📋 기록 <button class="clear-btn" onclick="clearHistory()">지우기</button></h3>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고 영역</div>
    </div>
    <script>
        var history = [];

        function generate() {
            var min = parseInt(document.getElementById('minVal').value) || 1;
            var max = parseInt(document.getElementById('maxVal').value) || 100;
            var count = parseInt(document.getElementById('count').value) || 1;
            if (min > max) { var temp = min; min = max; max = temp; }
            count = Math.min(count, 10);

            var results = [];
            for (var i = 0; i < count; i++) {
                results.push(Math.floor(Math.random() * (max - min + 1)) + min);
            }

            var resultEl = document.getElementById('result');
            resultEl.textContent = results.join(', ');
            resultEl.style.animation = 'none';
            resultEl.offsetHeight;
            resultEl.style.animation = 'pop 0.3s ease';

            history.unshift(results.join(', '));
            if (history.length > 10) history.pop();
            renderHistory();
        }

        function renderHistory() {
            var html = '';
            for (var i = 0; i < history.length; i++) {
                html += '<div class="history-item">' + history[i] + '</div>';
            }
            document.getElementById('historyList').innerHTML = html;
        }

        function clearHistory() {
            history = [];
            document.getElementById('historyList').innerHTML = '';
        }
    </script>
</body>
</html>
