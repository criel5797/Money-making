<!DOCTYPE html>
<html lang="en">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/number-guessing/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .difficulty { display: flex; gap: 10px; margin-bottom: 20px; }
        .diff-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .9rem; }
        .diff-btn.active { background: rgba(255,255,255,.4); font-weight: 700; }
        .game-info { background: rgba(0,0,0,.2); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .range-text { font-size: 1.1rem; margin-bottom: 10px; }
        .attempts-text { font-size: .9rem; opacity: .8; }
        .input-section { margin-bottom: 20px; }
        .guess-input { width: 100%; padding: 18px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); font-size: 1.5rem; text-align: center; color: #333; }
        .guess-input::placeholder { color: #999; }
        .guess-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.2rem; cursor: pointer; font-weight: 600; margin-bottom: 15px; }
        .guess-btn:disabled { opacity: .5; cursor: not-allowed; }
        .feedback { text-align: center; padding: 20px; border-radius: 12px; margin-bottom: 20px; font-size: 1.2rem; font-weight: 600; min-height: 70px; display: flex; align-items: center; justify-content: center; }
        .feedback.higher { background: rgba(231,76,60,.3); }
        .feedback.lower { background: rgba(52,152,219,.3); }
        .feedback.correct { background: rgba(46,204,113,.4); }
        .feedback.empty { background: rgba(255,255,255,.1); }
        .history { margin-bottom: 20px; }
        .history-title { font-size: .9rem; opacity: .8; margin-bottom: 10px; }
        .guess-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .guess-item { padding: 8px 14px; border-radius: 20px; font-size: .9rem; }
        .guess-item.higher { background: rgba(231,76,60,.4); }
        .guess-item.lower { background: rgba(52,152,219,.4); }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
        .new-game-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🔢 Number Guessing</h1>
        </header>
        <div class="game-section">
            <div class="difficulty">
                <button class="diff-btn active" onclick="setDifficulty(1, 50, 7)">Easy</button>
                <button class="diff-btn" onclick="setDifficulty(1, 100, 7)">Normal</button>
                <button class="diff-btn" onclick="setDifficulty(1, 200, 8)">Hard</button>
            </div>
            <div class="game-info">
                <div class="range-text" id="rangeText">Number between 1 and 50</div>
                <div class="attempts-text">Attempts left: <span id="attemptsLeft">7</span></div>
            </div>
            <div class="input-section">
                <input type="number" class="guess-input" id="guessInput" placeholder="Enter number" onkeypress="if(event.key==='Enter')makeGuess()">
            </div>
            <button class="guess-btn" id="guessBtn" onclick="makeGuess()">Guess!</button>
            <div class="feedback empty" id="feedback">Enter a number!</div>
            <div class="history">
                <div class="history-title">Guess History</div>
                <div class="guess-list" id="guessList"></div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="gamesPlayed">0</div>
                    <div class="stat-label">Games</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="gamesWon">0</div>
                    <div class="stat-label">Wins</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="bestScore">-</div>
                    <div class="stat-label">Best</div>
                </div>
            </div>
            <button class="new-game-btn" onclick="newGame()">↻ New Game</button>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var minNum = 1;
        var maxNum = 50;
        var maxAttempts = 7;
        var secretNumber;
        var attemptsLeft;
        var guesses = [];
        var gameOver = false;
        var stats = JSON.parse(localStorage.getItem('number_guess_en') || '{"played":0,"won":0,"best":null}');

        function setDifficulty(min, max, attempts) {
            minNum = min;
            maxNum = max;
            maxAttempts = attempts;
            document.querySelectorAll('.diff-btn').forEach(function(btn, i) {
                btn.classList.toggle('active', (i === 0 && max === 50) || (i === 1 && max === 100) || (i === 2 && max === 200));
            });
            newGame();
        }

        function newGame() {
            secretNumber = Math.floor(Math.random() * (maxNum - minNum + 1)) + minNum;
            attemptsLeft = maxAttempts;
            guesses = [];
            gameOver = false;
            document.getElementById('rangeText').textContent = 'Number between ' + minNum + ' and ' + maxNum;
            document.getElementById('attemptsLeft').textContent = attemptsLeft;
            document.getElementById('guessInput').value = '';
            document.getElementById('guessInput').disabled = false;
            document.getElementById('guessBtn').disabled = false;
            document.getElementById('feedback').className = 'feedback empty';
            document.getElementById('feedback').textContent = 'Enter a number!';
            document.getElementById('guessList').innerHTML = '';
            updateStats();
        }

        function makeGuess() {
            if (gameOver) return;
            var input = document.getElementById('guessInput');
            var guess = parseInt(input.value);
            var feedback = document.getElementById('feedback');

            if (isNaN(guess) || guess < minNum || guess > maxNum) {
                feedback.className = 'feedback empty';
                feedback.textContent = 'Enter a number between ' + minNum + ' and ' + maxNum;
                return;
            }

            attemptsLeft--;
            guesses.push({ num: guess, dir: guess < secretNumber ? 'higher' : guess > secretNumber ? 'lower' : 'correct' });

            if (guess === secretNumber) {
                feedback.className = 'feedback correct';
                feedback.textContent = '🎉 Correct! You got it in ' + (maxAttempts - attemptsLeft) + ' tries!';
                gameOver = true;
                stats.played++;
                stats.won++;
                var attempts = maxAttempts - attemptsLeft;
                if (!stats.best || attempts < stats.best) stats.best = attempts;
                localStorage.setItem('number_guess_en', JSON.stringify(stats));
            } else if (attemptsLeft === 0) {
                feedback.className = 'feedback empty';
                feedback.textContent = '😢 Game Over! The number was ' + secretNumber;
                gameOver = true;
                stats.played++;
                localStorage.setItem('number_guess_en', JSON.stringify(stats));
            } else if (guess < secretNumber) {
                feedback.className = 'feedback higher';
                feedback.textContent = '📈 Go higher!';
            } else {
                feedback.className = 'feedback lower';
                feedback.textContent = '📉 Go lower!';
            }

            document.getElementById('attemptsLeft').textContent = attemptsLeft;
            input.value = '';
            if (gameOver) {
                input.disabled = true;
                document.getElementById('guessBtn').disabled = true;
            }
            renderGuesses();
            updateStats();
        }

        function renderGuesses() {
            var list = document.getElementById('guessList');
            list.innerHTML = '';
            guesses.forEach(function(g) {
                var span = document.createElement('span');
                span.className = 'guess-item ' + g.dir;
                span.textContent = g.num + (g.dir === 'higher' ? ' ↑' : g.dir === 'lower' ? ' ↓' : ' ✓');
                list.appendChild(span);
            });
        }

        function updateStats() {
            document.getElementById('gamesPlayed').textContent = stats.played;
            document.getElementById('gamesWon').textContent = stats.won;
            document.getElementById('bestScore').textContent = stats.best || '-';
        }

        newGame();
    </script>
</body>
</html>
