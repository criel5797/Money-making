<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>팁 계산기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f5af19, #f12711); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .tip-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .input-group { margin-bottom: 20px; }
        .input-label { font-size: .9rem; margin-bottom: 10px; opacity: .8; }
        input[type=number] { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.9); color: #333; font-size: 1.2rem; }
        .tip-btns { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .tip-btn { flex: 1; min-width: 60px; padding: 12px; border: 1px solid rgba(255,255,255,.3); border-radius: 10px; background: transparent; color: #fff; cursor: pointer; font-size: .9rem; }
        .tip-btn.active { background: rgba(255,255,255,.3); border-color: #fff; }
        .custom-tip { display: flex; gap: 10px; align-items: center; margin-bottom: 20px; }
        .custom-tip input { width: 80px; padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,.9); color: #333; text-align: center; }
        .result-card { background: rgba(0,0,0,.3); border-radius: 12px; padding: 25px; text-align: center; }
        .result-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.1); }
        .result-row:last-child { border: none; }
        .result-label { opacity: .8; }
        .result-value { font-weight: 600; }
        .total-row { font-size: 1.3rem; padding-top: 15px; margin-top: 10px; border-top: 2px solid rgba(255,255,255,.3); }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header><h1>💵 팁 계산기</h1></header>
        <div class="tip-section">
            <div class="input-group">
                <div class="input-label">금액</div>
                <input type="number" id="billAmount" placeholder="0" oninput="calculate()">
            </div>
            <div class="input-label">팁 비율</div>
            <div class="tip-btns">
                <button class="tip-btn" onclick="setTip(10)">10%</button>
                <button class="tip-btn active" onclick="setTip(15)">15%</button>
                <button class="tip-btn" onclick="setTip(20)">20%</button>
                <button class="tip-btn" onclick="setTip(25)">25%</button>
            </div>
            <div class="custom-tip">
                <span>직접 입력:</span>
                <input type="number" id="customTip" value="15" oninput="setCustomTip()">
                <span>%</span>
            </div>
            <div class="result-card">
                <div class="result-row">
                    <span class="result-label">팁 금액</span>
                    <span class="result-value" id="tipAmount">0원</span>
                </div>
                <div class="result-row total-row">
                    <span class="result-label">총 금액</span>
                    <span class="result-value" id="totalAmount">0원</span>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var tipPercent = 15;
        function setTip(pct) {
            tipPercent = pct;
            document.getElementById('customTip').value = pct;
            document.querySelectorAll('.tip-btn').forEach(function(b) {
                b.classList.toggle('active', parseInt(b.textContent) === pct);
            });
            calculate();
        }
        function setCustomTip() {
            tipPercent = parseFloat(document.getElementById('customTip').value) || 0;
            document.querySelectorAll('.tip-btn').forEach(function(b) { b.classList.remove('active'); });
            calculate();
        }
        function calculate() {
            var bill = parseFloat(document.getElementById('billAmount').value) || 0;
            var tip = bill * (tipPercent / 100);
            var total = bill + tip;
            document.getElementById('tipAmount').textContent = Math.round(tip).toLocaleString() + '원';
            document.getElementById('totalAmount').textContent = Math.round(total).toLocaleString() + '원';
        }
    </script>
</body>
</html>
