                interpretation: '물은 감정의 상태를 반영합니다. 맑은 물은 평온함을, 탁한 물은 혼란스러운 감정을 의미할 수 있습니다.',
                advice: '자신의 감정 상태를 돌아보고 정리하는 시간을 가져보세요.'
            },
            '나는': {
                icon: '🦅',
                meaning: '자유와 성취',
                good: true,
                interpretation: '하늘을 나는 꿈은 자유에 대한 갈망이나 목표 달성에 대한 자신감을 나타냅니다.',
                advice: '당신의 능력을 믿고 도전하세요. 좋은 결과가 있을 것입니다.'
            },
            '죽은': {
                icon: '👻',
                meaning: '그리움과 메시지',
                good: null,
                interpretation: '돌아가신 분이 나오는 꿈은 그리움의 표현이거나 무의식에서 보내는 메시지일 수 있습니다.',
                advice: '고인을 추모하는 시간을 갖거나, 삶에서 중요한 것이 무엇인지 되돌아보세요.'
            },
            '쫓기': {
                icon: '🏃',
                meaning: '회피와 두려움',
                good: false,
                interpretation: '쫓기는 꿈은 현실에서 피하고 싶은 문제나 두려움을 상징합니다.',
                advice: '회피하고 있는 문제가 있다면 용기를 내어 마주해보세요.'
            },
            '돈': {
                icon: '💰',
                meaning: '가치와 기회',
                good: true,
                interpretation: '돈과 관련된 꿈은 자기 가치에 대한 인식이나 기회를 상징합니다.',
                advice: '자신의 가치를 믿고, 다가오는 기회를 놓치지 마세요.'
            },
            '결혼': {
                icon: '💒',
                meaning: '결합과 새로운 시작',
                good: true,
                interpretation: '결혼 꿈은 새로운 시작, 파트너십, 또는 자아의 통합을 의미할 수 있습니다.',
                advice: '인간관계에서 좋은 일이 있을 수 있으니 주변 사람들을 소중히 하세요.'
            },
            '아기': {
                icon: '👶',
                meaning: '새로운 시작',
                good: true,
                interpretation: '아기는 새로운 시작, 창의성, 가능성을 상징합니다.',
                advice: '새로운 프로젝트나 아이디어를 시작하기 좋은 때입니다.'
            },
            '집': {
                icon: '🏠',
                meaning: '자아와 안정',
                good: null,
                interpretation: '집은 자아와 내면을 상징합니다. 집의 상태가 현재 심리 상태를 반영할 수 있습니다.',
                advice: '내면의 안정을 찾는 시간을 가져보세요.'
            },
            '시험': {
                icon: '📝',
                meaning: '평가와 준비',
                good: false,
                interpretation: '시험 꿈은 자신에 대한 평가나 준비 부족에 대한 불안을 나타냅니다.',
                advice: '현실에서 중요한 일이 있다면 미리 준비하세요. 준비가 불안을 줄여줍니다.'
            }
        };

        const colors = ['금색', '붉은색', '파란색', '녹색', '보라색', '흰색', '노란색'];
        const directions = ['동쪽', '서쪽', '남쪽', '북쪽', '동남쪽', '북서쪽'];

        function setQuickDream(dream) {
            document.getElementById('dreamInput').value = dream + '을 꾸었어요.';
        }

        function interpretDream() {
            const dream = document.getElementById('dreamInput').value.trim();

            if (!dream) {
                showToast('꿈 내용을 입력해주세요');
                return;
            }

            const btn = document.getElementById('interpretBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading-animation"></span> 해몽 중...';

            setTimeout(() => {
                generateInterpretation(dream);
                btn.disabled = false;
                btn.innerHTML = '🔮 꿈 해몽하기';
            }, 2000);
        }

        function generateInterpretation(dream) {
            // Find matching symbols
            const foundSymbols = [];
            let isGood = null;
            let mainInterpretation = '';
            let mainAdvice = '';

            for (const [keyword, data] of Object.entries(dreamInterpretations)) {
                if (dream.includes(keyword)) {
                    foundSymbols.push(data);
                    if (isGood === null) isGood = data.good;
                    if (!mainInterpretation) {
                        mainInterpretation = data.interpretation;
                        mainAdvice = data.advice;
                    }
                }
            }

            // Default interpretation if no keywords found
            if (foundSymbols.length === 0) {
                foundSymbols.push({
                    icon: '🌙',
                    meaning: '무의식의 메시지',
                    good: null
                });
                mainInterpretation = '이 꿈은 당신의 무의식이 보내는 개인적인 메시지입니다. 꿈에서 느꼈던 감정이 현재 당신의 심리 상태를 반영할 수 있습니다. 기분 좋은 꿈이었다면 긍정적인 에너지가 함께하고 있는 것이고, 불안한 꿈이었다면 해소되지 않은 감정이 있을 수 있습니다.';
                mainAdvice = '꿈에서 느꼈던 감정을 되돌아보고, 현실에서 비슷한 감정을 느끼는 상황이 있는지 생각해보세요.';
                isGood = Math.random() > 0.5;
            }

            // Calculate fortune
            const fortuneScore = isGood === true ? Math.floor(Math.random() * 20) + 75 :
                                 isGood === false ? Math.floor(Math.random() * 30) + 30 :
                                 Math.floor(Math.random() * 30) + 50;

            const fortuneType = fortuneScore >= 70 ? '길몽' : fortuneScore >= 50 ? '평몽' : '주의가 필요한 꿈';
            const fortuneClass = fortuneScore >= 70 ? 'fortune-good' : fortuneScore >= 50 ? 'fortune-neutral' : 'fortune-bad';

            // Update UI
            document.getElementById('fortuneType').textContent = fortuneType;
            document.getElementById('fortuneType').className = `fortune-type ${fortuneClass}`;
            document.getElementById('fortunePercent').textContent = `행운 지수: ${fortuneScore}%`;
            document.getElementById('interpretation').textContent = mainInterpretation;
            document.getElementById('advice').textContent = mainAdvice;

            // Generate symbols
            const symbolsGrid = document.getElementById('symbolsGrid');
            symbolsGrid.innerHTML = foundSymbols.slice(0, 4).map(s => `
                <div class="symbol-item">
                    <div class="symbol-icon">${s.icon}</div>
                    <div class="symbol-name">${s.meaning}</div>
                </div>
            `).join('');

            // Generate lucky info
            const luckyNums = [];
            while (luckyNums.length < 3) {
                const n = Math.floor(Math.random() * 45) + 1;
                if (!luckyNums.includes(n)) luckyNums.push(n);
            }
            document.getElementById('luckyNumber').textContent = luckyNums.sort((a,b) => a-b).join(', ');
            document.getElementById('luckyColor').textContent = colors[Math.floor(Math.random() * colors.length)];
            document.getElementById('luckyDirection').textContent = directions[Math.floor(Math.random() * directions.length)];

            document.getElementById('resultSection').classList.add('show');
            showToast('해몽이 완료되었습니다!');
        }

        function copyResult() {
            const fortune = document.getElementById('fortuneType').textContent;
            const score = document.getElementById('fortunePercent').textContent;
            const interpretation = document.getElementById('interpretation').textContent;
            const advice = document.getElementById('advice').textContent;

            const text = `🔮 AI 꿈 해몽 결과\n\n` +
                        `[${fortune}] ${score}\n\n` +
                        `📖 해석:\n${interpretation}\n\n` +
                        `💡 조언:\n${advice}\n\n` +
                        `꿈 해몽 더 보기 👉 [사이트주소]`;

            navigator.clipboard.writeText(text);
            showToast('결과가 복사되었습니다!');
        }

        function shareResult() {
            const dreamInput = document.getElementById('dreamInput').value.trim();
            const interpretation = document.getElementById('interpretation').textContent;

            const text = `🌙 꿈 해몽 결과

나의 꿈: ${dreamInput.substring(0, 50)}${dreamInput.length > 50 ? '...' : ''}

✨ 해몽:
${interpretation}

💫 너도 꿈 해몽 받아볼래?`;

            window.shareWithModal('AI 꿈 해몽', text);
        }

        function newDream() {
            document.getElementById('dreamInput').value = '';
            document.getElementById('resultSection').classList.remove('show');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
<script src="/common/share-modal.js"></script><script src="/common/tool-i18n-handler.js"></script></body>
