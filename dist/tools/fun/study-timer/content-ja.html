<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>勉強タイマー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #0f2027, #203a43, #2c5364); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .timer-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; text-align: center; }
        .timer-display { font-size: 4rem; font-weight: 700; font-family: monospace; margin: 30px 0; text-shadow: 0 0 20px rgba(255,255,255,.3); }
        .subject-input { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; margin-bottom: 20px; text-align: center; font-size: 1rem; }
        .controls { display: flex; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .btn { padding: 15px 30px; border: none; border-radius: 10px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .start-btn { background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; }
        .pause-btn { background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; }
        .reset-btn { background: rgba(255,255,255,.2); color: #fff; }
        .stats { display: flex; justify-content: space-around; padding: 20px; background: rgba(0,0,0,.2); border-radius: 12px; margin-bottom: 20px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .history { max-height: 200px; overflow-y: auto; }
        .history-title { font-size: .9rem; opacity: .7; margin-bottom: 10px; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; background: rgba(255,255,255,.1); border-radius: 8px; margin-bottom: 8px; font-size: .9rem; }
        .motivate { margin-top: 20px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 10px; font-style: italic; opacity: .8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>📖 勉強タイマー</h1>
        </header>
        <div class="timer-section">
            <input type="text" class="subject-input" id="subject" placeholder="科目を入力">
            <div class="timer-display" id="timerDisplay">00:00:00</div>
            <div class="controls">
                <button class="btn start-btn" id="startBtn" onclick="startTimer()">開始</button>
                <button class="btn pause-btn" id="pauseBtn" onclick="pauseTimer()" style="display:none">一時停止</button>
                <button class="btn reset-btn" onclick="resetTimer()">リセット</button>
            </div>
            <div class="stats">
                <div class="stat"><div class="stat-value" id="todayTime">0分</div><div class="stat-label">今日</div></div>
                <div class="stat"><div class="stat-value" id="totalSessions">0回</div><div class="stat-label">セッション</div></div>
                <div class="stat"><div class="stat-value" id="totalTime">0時間</div><div class="stat-label">累計時間</div></div>
            </div>
            <div class="history-title">最近の勉強記録</div>
            <div class="history" id="history"></div>
            <div class="motivate" id="motivate">頑張っていますね！素晴らしい！</div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var seconds = 0;
        var timer = null;
        var isRunning = false;
        var history = JSON.parse(localStorage.getItem('study_history') || '[]');
        var quotes = ['継続は力なり！', '今日の努力が明日の自分を作る。', '諦めないで、もう少しだよ！', '小さな進歩も進歩です。', 'あなたならできる！'];
        function formatTime(s) {
            var h = Math.floor(s / 3600);
            var m = Math.floor((s % 3600) / 60);
            var sec = s % 60;
            return (h < 10 ? '0' : '') + h + ':' + (m < 10 ? '0' : '') + m + ':' + (sec < 10 ? '0' : '') + sec;
        }
        function startTimer() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('pauseBtn').style.display = 'inline-block';
            timer = setInterval(function() {
                seconds++;
                document.getElementById('timerDisplay').textContent = formatTime(seconds);
            }, 1000);
        }
        function pauseTimer() {
            if (!isRunning) return;
            isRunning = false;
            clearInterval(timer);
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';
        }
        function resetTimer() {
            if (seconds > 60) {
                var subject = document.getElementById('subject').value.trim() || '勉強';
                history.unshift({ subject: subject, duration: seconds, date: new Date().toISOString() });
                if (history.length > 50) history.pop();
                localStorage.setItem('study_history', JSON.stringify(history));
            }
            pauseTimer();
            seconds = 0;
            document.getElementById('timerDisplay').textContent = '00:00:00';
            document.getElementById('motivate').textContent = quotes[Math.floor(Math.random() * quotes.length)];
            renderStats();
        }
        function renderStats() {
            var today = new Date().toDateString();
            var todaySeconds = history.filter(function(h) { return new Date(h.date).toDateString() === today; }).reduce(function(s, h) { return s + h.duration; }, 0);
            var totalSeconds = history.reduce(function(s, h) { return s + h.duration; }, 0);
            document.getElementById('todayTime').textContent = Math.round(todaySeconds / 60) + '分';
            document.getElementById('totalSessions').textContent = history.length + '回';
            document.getElementById('totalTime').textContent = Math.round(totalSeconds / 3600) + '時間';
            var historyEl = document.getElementById('history');
            historyEl.innerHTML = '';
            history.slice(0, 10).forEach(function(h) {
                var div = document.createElement('div');
                div.className = 'history-item';
                var d = new Date(h.date);
                div.innerHTML = '<span>' + h.subject + '</span><span>' + Math.round(h.duration / 60) + '分 · ' + (d.getMonth() + 1) + '/' + d.getDate() + '</span>';
                historyEl.appendChild(div);
            });
        }
        renderStats();
    </script>
</body>
</html>
