<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/balance-game/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バランスゲーム</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #8b5cf6, #7c3aed); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { opacity: .8; font-size: .9rem; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-section { margin-bottom: 20px; }
        .category-label { font-size: .9rem; opacity: .7; margin-bottom: 10px; display: block; text-align: center; }
        .category-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .category-btn { padding: 12px 8px; border: 2px solid rgba(255,255,255,.3); border-radius: 10px; background: rgba(255,255,255,.1); color: #fff; font-size: .85rem; cursor: pointer; text-align: center; transition: all .3s; }
        .category-btn.active { background: rgba(255,255,255,.3); border-color: #fff; }
        .start-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ec4899, #db2777); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .question-section { display: none; }
        .question-number { text-align: center; font-size: .9rem; opacity: .7; margin-bottom: 15px; }
        .vs-container { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .choice-btn { padding: 30px 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 16px; background: rgba(255,255,255,.1); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; text-align: center; transition: all .3s; line-height: 1.4; }
        .choice-btn:hover { background: rgba(255,255,255,.2); transform: scale(1.02); }
        .choice-btn.selected { border-color: #22c55e; background: rgba(34,197,94,.3); }
        .vs-divider { text-align: center; font-size: 1.5rem; font-weight: 700; color: #fbbf24; }
        .result-bar { display: none; margin-top: 15px; }
        .bar-container { height: 40px; background: rgba(255,255,255,.1); border-radius: 20px; overflow: hidden; display: flex; }
        .bar-left { background: linear-gradient(90deg, #3b82f6, #2563eb); display: flex; align-items: center; justify-content: center; font-weight: 600; transition: width 0.5s; }
        .bar-right { background: linear-gradient(90deg, #ec4899, #db2777); display: flex; align-items: center; justify-content: center; font-weight: 600; transition: width 0.5s; }
        .navigation { display: flex; gap: 12px; margin-top: 20px; }
        .nav-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; }
        .nav-btn.primary { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
        .stats { padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; margin-top: 20px; text-align: center; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: center; gap: 20px; font-size: .9rem; }
        .complete-section { display: none; text-align: center; }
        .complete-icon { font-size: 5rem; margin-bottom: 20px; }
        .complete-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>⚖️ バランスゲーム</h1>
            <p class="subtitle">難しい選択、あなたの答えは？</p>
        </header>
        <div class="game-section">
            <div class="setup-section" id="setupSection">
                <div class="category-section">
                    <span class="category-label">カテゴリー選択</span>
                    <div class="category-grid">
                        <button class="category-btn active" onclick="selectCategory(0)">日常</button>
                        <button class="category-btn" onclick="selectCategory(1)">恋愛</button>
                        <button class="category-btn" onclick="selectCategory(2)">食べ物</button>
                        <button class="category-btn" onclick="selectCategory(3)">お金</button>
                        <button class="category-btn" onclick="selectCategory(4)">能力</button>
                        <button class="category-btn" onclick="selectCategory(5)">ランダム</button>
                    </div>
                </div>
                <button class="start-btn" onclick="startGame()">🎮 ゲーム開始！</button>
            </div>
            <div class="question-section" id="questionSection">
                <div class="question-number" id="questionNumber">質問 1 / 10</div>
                <div class="vs-container">
                    <button class="choice-btn" id="choiceA" onclick="selectChoice('A')">選択 A</button>
                    <div class="vs-divider">VS</div>
                    <button class="choice-btn" id="choiceB" onclick="selectChoice('B')">選択 B</button>
                </div>
                <div class="result-bar" id="resultBar">
                    <div class="bar-container">
                        <div class="bar-left" id="barLeft">50%</div>
                        <div class="bar-right" id="barRight">50%</div>
                    </div>
                </div>
                <div class="navigation" id="navigation" style="display:none">
                    <button class="nav-btn primary" onclick="nextQuestion()">次の質問 ➡️</button>
                </div>
                <div class="stats">
                    <div class="stats-title">現在の進捗</div>
                    <div class="stats-row">
                        <span>A選択: <span id="countA">0</span></span>
                        <span>B選択: <span id="countB">0</span></span>
                    </div>
                </div>
            </div>
            <div class="complete-section" id="completeSection">
                <div class="complete-icon">🎉</div>
                <div class="complete-text">ゲーム完了！</div>
                <div class="stats">
                    <div class="stats-row">
                        <span>A選択: <span id="finalA">0</span></span>
                        <span>B選択: <span id="finalB">0</span></span>
                    </div>
                </div>
                <button class="start-btn" style="margin-top:20px" onclick="resetGame()">🔄 もう一度</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var questions = {
            0: [ // 日常
                ['永遠に夏だけ', '永遠に冬だけ'],
                ['2時間睡眠で疲れない', '12時間寝ないと疲れる'],
                ['いつも10分遅刻', 'いつも2時間早く到着'],
                ['TVなしで生きる', 'スマホなしで生きる'],
                ['汗をかかない', '口臭がない'],
                ['在宅勤務のみ', 'オフィス勤務のみ'],
                ['100歳まで健康', '50歳まで大金持ち'],
                ['記憶力2倍', '体力2倍'],
                ['超ラッキー', '超才能がある'],
                ['死ぬ時を知る', '死に方を知る']
            ],
            1: [ // 恋愛
                ['初恋の人と結婚', '最後の恋人と結婚'],
                ['外見だけ完璧な恋人', '性格だけ完璧な恋人'],
                ['浮気する金持ち恋人', '誠実な貧乏恋人'],
                ['毎日喧嘩して仲直り', '喧嘩しないけど無関心'],
                ['恋人が全パスワード知ってる', '恋人のパスワード知らない'],
                ['10歳年下', '10歳年上'],
                ['公開恋愛', '秘密恋愛'],
                ['趣味が全く違う', '趣味が全く同じ'],
                ['遠距離3年', '同棲3ヶ月で結婚'],
                ['親が反対する結婚', '友達が反対する結婚']
            ],
            2: [ // 食べ物
                ['甘いものだけ一生', '塩辛いものだけ一生'],
                ['冷たいものだけ一生', '熱いものだけ一生'],
                ['まずいけど健康な食事', '美味しいけど不健康な食事'],
                ['ご飯だけ一生', 'パンだけ一生'],
                ['毎日同じ無料の食事', '高いけど自由な食事'],
                ['一人で名店', '友達と普通の店'],
                ['牛肉一生食べれない', '海鮮一生食べれない'],
                ['カップ麺だけ', 'コンビニ弁当だけ'],
                ['コーヒー一生飲めない', 'お酒一生飲めない'],
                ['朝食が一生同じ', '夕食が一生同じ']
            ],
            3: [ // お金
                ['10億円で3年刑務所', '1億円で自由'],
                ['年収500万円で安定', '年収0〜3000万円で不安定'],
                ['金持ちだけど時間なし', '貧乏だけど時間あり'],
                ['今すぐ宝くじ当選', '10年後に資産10倍'],
                ['金持ちで友達なし', '貧乏で友達多い'],
                ['田舎で金持ち', '都会で貧乏'],
                ['今すぐ1億円', '10年後10億円'],
                ['買い物50%オフ', '食事無料'],
                ['無料の狭い家', '有料の広い家'],
                ['年収800万円固定', '成果次第で0〜3000万円']
            ],
            4: [ // 能力
                ['空を飛べる能力', '瞬間移動能力'],
                ['心を読む能力', '未来を見る能力'],
                ['透明になる能力', '時間を止める能力'],
                ['全言語話せる', '全楽器弾ける'],
                ['天才的頭脳', '完璧な外見'],
                ['寝なくていい', '食べなくていい'],
                ['過去に行ける', '未来に行ける'],
                ['動物と話せる', '植物を操れる'],
                ['完璧な記憶力', '感情コントロール能力'],
                ['老けない', '病気にならない']
            ]
        };

        var selectedCategory = 0;
        var currentQuestions = [];
        var currentIndex = 0;
        var countA = 0;
        var countB = 0;
        var hasSelected = false;

        function selectCategory(index) {
            selectedCategory = index;
            var btns = document.querySelectorAll('.category-btn');
            btns.forEach(function(btn, i) {
                btn.classList.toggle('active', i === index);
            });
        }

        function shuffleArray(array) {
            var arr = array.slice();
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i];
                arr[i] = arr[j];
                arr[j] = temp;
            }
            return arr;
        }

        function startGame() {
            if (selectedCategory === 5) {
                var allQuestions = [];
                for (var i = 0; i < 5; i++) {
                    allQuestions = allQuestions.concat(questions[i]);
                }
                currentQuestions = shuffleArray(allQuestions).slice(0, 10);
            } else {
                currentQuestions = shuffleArray(questions[selectedCategory]).slice(0, 10);
            }

            currentIndex = 0;
            countA = 0;
            countB = 0;

            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('questionSection').style.display = 'block';
            document.getElementById('completeSection').style.display = 'none';

            showQuestion();
        }

        function showQuestion() {
            hasSelected = false;
            var q = currentQuestions[currentIndex];
            document.getElementById('questionNumber').textContent = '質問 ' + (currentIndex + 1) + ' / ' + currentQuestions.length;
            document.getElementById('choiceA').textContent = q[0];
            document.getElementById('choiceB').textContent = q[1];
            document.getElementById('choiceA').classList.remove('selected');
            document.getElementById('choiceB').classList.remove('selected');
            document.getElementById('resultBar').style.display = 'none';
            document.getElementById('navigation').style.display = 'none';
            updateStats();
        }

        function selectChoice(choice) {
            if (hasSelected) return;
            hasSelected = true;

            if (choice === 'A') {
                countA++;
                document.getElementById('choiceA').classList.add('selected');
            } else {
                countB++;
                document.getElementById('choiceB').classList.add('selected');
            }

            var percentA = Math.floor(Math.random() * 40) + 30;
            var percentB = 100 - percentA;

            document.getElementById('barLeft').style.width = percentA + '%';
            document.getElementById('barLeft').textContent = percentA + '%';
            document.getElementById('barRight').style.width = percentB + '%';
            document.getElementById('barRight').textContent = percentB + '%';
            document.getElementById('resultBar').style.display = 'block';
            document.getElementById('navigation').style.display = 'flex';

            updateStats();
        }

        function updateStats() {
            document.getElementById('countA').textContent = countA;
            document.getElementById('countB').textContent = countB;
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= currentQuestions.length) {
                endGame();
            } else {
                showQuestion();
            }
        }

        function endGame() {
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('completeSection').style.display = 'block';
            document.getElementById('finalA').textContent = countA;
            document.getElementById('finalB').textContent = countB;
        }

        function resetGame() {
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('completeSection').style.display = 'none';
        }
    </script>
</body>
</html>
