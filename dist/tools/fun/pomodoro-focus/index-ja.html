    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .timer-section {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }
        .mode-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }
        .mode-tab {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 12px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-tab:hover {
            background: rgba(255,255,255,0.2);
        }
        .mode-tab.active {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }
        .timer-display {
            text-align: center;
            margin: 30px 0;
        }
        .timer-circle {
            width: 250px;
            height: 250px;
            border-radius: 50%;
            background: rgba(0,0,0,0.2);
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .timer-circle::before {
            content: '';
            position: absolute;
            width: 230px;
            height: 230px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.3);
        }
        .timer-time {
            font-size: 4rem;
            font-weight: 700;
            font-family: 'Courier New', monospace;
        }
        .timer-label {
            margin-top: 15px;
            font-size: 1.1rem;
            opacity: 0.8;
        }
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }
        .control-btn {
            width: 70px;
            height: 70px;
            border: none;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .play-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        .pause-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        .reset-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .control-btn:hover {
            transform: scale(1.1);
        }
        .stats {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .stats h3 {
            font-size: 1rem;
            margin-bottom: 15px;
            text-align: center;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }
        .stat-item {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 700;
        }
        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .settings {
            margin-top: 25px;
        }
        .setting-row {
            display: flex;
            justify-content: space-between;

            padding: 12px 0;

        }
        .setting-label {
            font-size: 0.9rem;
        }
        .setting-value {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .setting-btn {
            width: 30px;
            height: 30px;
            border: none;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
        }
        .setting-num {
            width: 40px;
            text-align: center;
            font-weight: 600;
        }
        .theme-work { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); }
        .theme-break { background: linear-gradient(135deg, #27ae60 0%, #1e8449 100%); }
        .theme-longbreak { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); }
    </style>

<body class="theme-work">
    <div class="container">
        <div class="ad-banner">広告エリア</div>
        <header>
            <h1>🍅 ポモドーロタイマー</h1>
            <p class="subtitle">集中と休息の完璧なバランス</p>
        </header>
        <div class="timer-section">
            <div class="mode-tabs">
                <button class="mode-tab active" data-mode="work" onclick="setMode('work')">🎯 集中</button>
                <button class="mode-tab" data-mode="break" onclick="setMode('break')">☕ 休憩</button>
                <button class="mode-tab" data-mode="longbreak" onclick="setMode('longbreak')">🌴 長い休憩</button>
            </div>
            <div class="timer-display">
                <div class="timer-circle">
                    <span class="timer-time" id="timerDisplay">25:00</span>
                </div>
                <div class="timer-label" id="timerLabel">集中してください!</div>
            </div>
            <div class="control-buttons">
                <button class="control-btn play-btn" id="playBtn" onclick="toggleTimer()">▶</button>
                <button class="control-btn reset-btn" onclick="resetTimer()">↺</button>
            </div>
            <div class="stats">
                <h3>📊 今日の記録</h3>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="completedPomos">0</div>
                        <div class="stat-label">完了数</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="focusTime">0</div>
                        <div class="stat-label">集中時間(分)</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="streakDays">0</div>
                        <div class="stat-label">連続日数</div>
                    </div>
                </div>
            </div>
            <div class="settings">
                <div class="setting-row">
                    <span class="setting-label">集中時間（分）</span>
                    <div class="setting-value">
                        <button class="setting-btn" onclick="adjustSetting('work', -5)">-</button>
                        <span class="setting-num" id="workTime">25</span>
                        <button class="setting-btn" onclick="adjustSetting('work', 5)">+</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">休憩時間（分）</span>
                    <div class="setting-value">
                        <button class="setting-btn" onclick="adjustSetting('break', -1)">-</button>
                        <span class="setting-num" id="breakTime">5</span>
                        <button class="setting-btn" onclick="adjustSetting('break', 1)">+</button>
                    </div>
                </div>
                <div class="setting-row">
                    <span class="setting-label">長い休憩時間（分）</span>
                    <div class="setting-value">
                        <button class="setting-btn" onclick="adjustSetting('longbreak', -5)">-</button>
                        <span class="setting-num" id="longbreakTime">15</span>
                        <button class="setting-btn" onclick="adjustSetting('longbreak', 5)">+</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告エリア</div>
    </div>
    <script>
        var settings = {
            work: 25,
            break: 5,
            longbreak: 15
        };
        var currentMode = 'work';
        var timeLeft = settings.work * 60;
        var isRunning = false;
        var timerInterval = null;
        var stats = JSON.parse(localStorage.getItem('pomoStats') || '{"completed":0,"focusTime":0,"lastDate":"","streak":0}');

        function updateDisplay() {
            var mins = Math.floor(timeLeft / 60);
            var secs = timeLeft % 60;
            document.getElementById('timerDisplay').textContent =
                String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
        }

        function setMode(mode) {
            currentMode = mode;
            timeLeft = settings[mode] * 60;
            isRunning = false;
            clearInterval(timerInterval);
            document.getElementById('playBtn').textContent = '▶';

            document.querySelectorAll('.mode-tab').forEach(function(tab) {
                tab.classList.remove('active');
            });
            document.querySelector('[data-mode="' + mode + '"]').classList.add('active');

            document.body.className = 'theme-' + mode;

            var labels = { work: '集中してください!', break: '少し休憩しましょう', longbreak: 'ゆっくり休んでください' };
            document.getElementById('timerLabel').textContent = labels[mode];

            updateDisplay();
        }

        function toggleTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                document.getElementById('playBtn').textContent = '▶';
            } else {
                timerInterval = setInterval(function() {
                    timeLeft--;
                    updateDisplay();
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        onTimerComplete();
                    }
                }, 1000);
                isRunning = true;
                document.getElementById('playBtn').textContent = '⏸';
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            timeLeft = settings[currentMode] * 60;
            document.getElementById('playBtn').textContent = '▶';
            updateDisplay();
        }

        function onTimerComplete() {
            playSound();
            if (currentMode === 'work') {
                stats.completed++;
                stats.focusTime += settings.work;
                checkStreak();
                saveStats();
                updateStatsDisplay();
                alert('集中時間完了！休憩しましょう。');
                setMode('break');
            } else {
                alert('休憩終了！また集中する時間です。');
                setMode('work');
            }
        }

        function playSound() {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var o = ctx.createOscillator();
            var g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.frequency.value = 800;
            g.gain.value = 0.3;
            o.start();
            setTimeout(function() { o.stop(); }, 300);
        }

        function adjustSetting(mode, delta) {
            settings[mode] = Math.max(1, settings[mode] + delta);
            document.getElementById(mode + 'Time').textContent = settings[mode];
            if (mode === currentMode) {
                timeLeft = settings[mode] * 60;
                updateDisplay();
            }
            localStorage.setItem('pomoSettings', JSON.stringify(settings));
        }

        function checkStreak() {
            var today = new Date().toDateString();
            if (stats.lastDate !== today) {
                var yesterday = new Date();
                yesterday.setDate(yesterday.getDate() - 1);
                if (stats.lastDate === yesterday.toDateString()) {
                    stats.streak++;
                } else {
                    stats.streak = 1;
                }
                stats.lastDate = today;
            }
        }

        function saveStats() {
            localStorage.setItem('pomoStats', JSON.stringify(stats));
        }

        function updateStatsDisplay() {
            document.getElementById('completedPomos').textContent = stats.completed;
            document.getElementById('focusTime').textContent = stats.focusTime;
            document.getElementById('streakDays').textContent = stats.streak;
        }

        // Load saved settings
        var savedSettings = localStorage.getItem('pomoSettings');
        if (savedSettings) {
            settings = JSON.parse(savedSettings);
            document.getElementById('workTime').textContent = settings.work;
            document.getElementById('breakTime').textContent = settings.break;
            document.getElementById('longbreakTime').textContent = settings.longbreak;
        }

        updateDisplay();
        updateStatsDisplay();
    </script>
</body>
</html>
