    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .machine { background: linear-gradient(180deg, #8b5a2b, #654321); border-radius: 20px; padding: 20px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,.5); }
        .reels-container { background: #000; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .reels { display: flex; justify-content: center; gap: 10px; }
        .reel { width: 80px; height: 80px; background: #fff; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 3rem; overflow: hidden; }
        .reel.spinning { animation: spin 0.1s linear infinite; }
        @keyframes spin { 0% { transform: translateY(-10px); } 100% { transform: translateY(10px); } }
        .result { text-align: center; font-size: 1.5rem; font-weight: 700; min-height: 40px; margin-bottom: 15px; }
        .result.win { color: #ffd700; animation: glow 0.5s ease-in-out infinite alternate; }
        @keyframes glow { to { text-shadow: 0 0 20px #ffd700; } }
        .spin-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ef4444, #dc2626); color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: transform .2s; box-shadow: 0 5px 15px rgba(239,68,68,.4); }
        .spin-btn:hover { transform: scale(1.02); }
        .spin-btn:active { transform: scale(0.98); }
        .spin-btn:disabled { opacity: .5; cursor: not-allowed; }
        .coins { text-align: center; margin-bottom: 15px; }
        .coins-label { font-size: .9rem; opacity: .7; }
        .coins-value { font-size: 2.5rem; font-weight: 700; color: #ffd700; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
        .payouts { margin-top: 15px; padding: 15px; background: rgba(0,0,0,.2); border-radius: 10px; }
        .payouts-title { font-size: .8rem; opacity: .7; margin-bottom: 10px; }
        .payout-row { display: flex; justify-content: space-between; font-size: .85rem; padding: 5px 0; }

<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🎰 슬롯머신</h1>
        </header>
        <div class="game-section">
            <div class="coins">
                <div class="coins-label">보유 코인</div>
                <div class="coins-value" id="coins">100</div>
            </div>
            <div class="machine">
                <div class="reels-container">
                    <div class="reels">
                        <div class="reel" id="reel1">🍒</div>
                        <div class="reel" id="reel2">🍋</div>
                        <div class="reel" id="reel3">🍇</div>
                    </div>
                </div>
                <div class="result" id="result">레버를 당겨보세요!</div>
                <button class="spin-btn" id="spinBtn" onclick="spin()">🎰 스핀! (-10)</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="spins">0</div>
                    <div class="stat-label">총 스핀</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="wins">0</div>
                    <div class="stat-label">당첨</div>
                </div>
            </div>
            <div class="payouts">
                <div class="payouts-title">당첨 조건</div>
                <div class="payout-row"><span>🍒🍒🍒</span><span>x5</span></div>
                <div class="payout-row"><span>🍋🍋🍋</span><span>x3</span></div>
                <div class="payout-row"><span>🍇🍇🍇</span><span>x3</span></div>
                <div class="payout-row"><span>⭐⭐⭐</span><span>x10</span></div>
                <div class="payout-row"><span>💎💎💎</span><span>x20</span></div>
                <div class="payout-row"><span>7️⃣7️⃣7️⃣</span><span>x50</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var symbols = ['🍒', '🍋', '🍇', '⭐', '💎', '7️⃣'];
        var payouts = { '🍒🍒🍒': 5, '🍋🍋🍋': 3, '🍇🍇🍇': 3, '⭐⭐⭐': 10, '💎💎💎': 20, '7️⃣7️⃣7️⃣': 50 };
        var stats = JSON.parse(localStorage.getItem('slots_ko') || '{"coins":100,"spins":0,"wins":0}');
        var isSpinning = false;

        function spin() {
            if (isSpinning || stats.coins < 10) return;
            isSpinning = true;

            stats.coins -= 10;
            stats.spins++;
            updateDisplay();

            var reels = [document.getElementById('reel1'), document.getElementById('reel2'), document.getElementById('reel3')];
            var btn = document.getElementById('spinBtn');
            var resultEl = document.getElementById('result');

            btn.disabled = true;
            resultEl.textContent = '...';
            resultEl.classList.remove('win');

            reels.forEach(function(reel) { reel.classList.add('spinning'); });

            var results = [];
            var delays = [500, 800, 1100];

            delays.forEach(function(delay, i) {
                setTimeout(function() {
                    reels[i].classList.remove('spinning');
                    var symbol = symbols[Math.floor(Math.random() * symbols.length)];
                    reels[i].textContent = symbol;
                    results.push(symbol);

                    if (results.length === 3) {
                        checkWin(results);
                    }
                }, delay);
            });
        }

        function checkWin(results) {
            var combo = results.join('');
            var btn = document.getElementById('spinBtn');
            var resultEl = document.getElementById('result');

            if (payouts[combo]) {
                var winAmount = 10 * payouts[combo];
                stats.coins += winAmount;
                stats.wins++;
                resultEl.textContent = '당첨! +' + winAmount + ' 🎉';
                resultEl.classList.add('win');
            } else if (results[0] === results[1] || results[1] === results[2]) {
                resultEl.textContent = '아쉽네요!';
            } else {
                resultEl.textContent = '다시 도전!';
            }

            localStorage.setItem('slots_ko', JSON.stringify(stats));
            updateDisplay();
            btn.disabled = false;
            isSpinning = false;

            if (stats.coins < 10) {
                resultEl.textContent = '코인 부족! 리셋하세요';
                btn.disabled = true;
            }
        }

        function updateDisplay() {
            document.getElementById('coins').textContent = stats.coins;
            document.getElementById('spins').textContent = stats.spins;
            document.getElementById('wins').textContent = stats.wins;
        }

        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') {
                e.preventDefault();
                spin();
            }
        });

        updateDisplay();
    </script>
</body>
</html>
