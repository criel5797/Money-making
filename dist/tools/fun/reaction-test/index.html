<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/reaction-test/"><meta property="og:url" content="https://instaidea.org/tools/fun/reaction-test/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/reaction-test/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/reaction-test/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/reaction-test/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/reaction-test/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반응속도 테스트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.05); border-radius: 16px; padding: 25px; }
        .test-area { width: 100%; height: 300px; border-radius: 16px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; margin-bottom: 20px; transition: background .3s; user-select: none; }
        .test-area.waiting { background: #e74c3c; }
        .test-area.ready { background: #f39c12; }
        .test-area.go { background: #2ecc71; }
        .test-area.result { background: #3498db; }
        .test-area.early { background: #9b59b6; }
        .test-icon { font-size: 4rem; margin-bottom: 15px; }
        .test-message { font-size: 1.3rem; font-weight: 600; text-align: center; }
        .test-time { font-size: 3rem; font-weight: 700; margin-top: 10px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 12px; padding: 15px; text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; color: #4ade80; }
        .stat-label { font-size: .8rem; opacity: .7; margin-top: 5px; }
        .history { margin-bottom: 20px; }
        .history-title { font-size: .9rem; opacity: .8; margin-bottom: 10px; display: flex; justify-content: space-between; }
        .clear-btn { background: none; border: none; color: #fff; opacity: .6; cursor: pointer; font-size: .85rem; }
        .history-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { background: rgba(255,255,255,.1); padding: 8px 12px; border-radius: 8px; font-size: .85rem; }
        .history-item.best { background: rgba(46,204,113,.3); color: #2ecc71; }
        .ranking { background: rgba(255,255,255,.1); border-radius: 12px; padding: 15px; }
        .ranking-title { font-size: .9rem; font-weight: 600; margin-bottom: 10px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.1); font-size: .85rem; }
        .ranking-item:last-child { border-bottom: none; }
        .tips { margin-top: 20px; background: rgba(255,255,255,.05); border-radius: 12px; padding: 15px; }
        .tips-title { font-size: .9rem; font-weight: 600; margin-bottom: 10px; }
        .tips-text { font-size: .8rem; opacity: .7; line-height: 1.6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>⚡ 반응속도 테스트</h1>
        </header>
        <div class="game-section">
            <div class="test-area waiting" id="testArea" onclick="handleClick()">
                <div class="test-icon" id="testIcon">🎯</div>
                <div class="test-message" id="testMessage">클릭하여 시작</div>
                <div class="test-time" id="testTime"></div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="bestTime">-</div>
                    <div class="stat-label">최고 기록</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgTime">-</div>
                    <div class="stat-label">평균 기록</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="attempts">0</div>
                    <div class="stat-label">시도 횟수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="rank">-</div>
                    <div class="stat-label">랭킹</div>
                </div>
            </div>
            <div class="history">
                <div class="history-title">
                    <span>최근 기록 (ms)</span>
                    <button class="clear-btn" onclick="clearHistory()">초기화</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
            <div class="ranking">
                <div class="ranking-title">🏆 랭킹 기준</div>
                <div class="ranking-item"><span>⚡ 번개</span><span>&lt; 150ms</span></div>
                <div class="ranking-item"><span>🚀 매우 빠름</span><span>150-200ms</span></div>
                <div class="ranking-item"><span>✨ 빠름</span><span>200-250ms</span></div>
                <div class="ranking-item"><span>👍 보통</span><span>250-350ms</span></div>
                <div class="ranking-item"><span>🐢 느림</span><span>&gt; 350ms</span></div>
            </div>
            <div class="tips">
                <div class="tips-title">💡 팁</div>
                <div class="tips-text">화면이 초록색으로 변하면 최대한 빠르게 클릭하세요! 너무 일찍 클릭하면 무효가 됩니다.</div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var state = 'waiting';
        var startTime = 0;
        var timeoutId = null;
        var results = JSON.parse(localStorage.getItem('reaction_test_ko') || '[]');

        function handleClick() {
            var area = document.getElementById('testArea');
            var icon = document.getElementById('testIcon');
            var message = document.getElementById('testMessage');
            var time = document.getElementById('testTime');

            if (state === 'waiting' || state === 'result' || state === 'early') {
                state = 'ready';
                area.className = 'test-area ready';
                icon.textContent = '⏳';
                message.textContent = '초록색을 기다리세요...';
                time.textContent = '';

                var delay = Math.random() * 3000 + 2000;
                timeoutId = setTimeout(function() {
                    state = 'go';
                    area.className = 'test-area go';
                    icon.textContent = '🟢';
                    message.textContent = '지금 클릭!';
                    startTime = Date.now();
                }, delay);
            } else if (state === 'ready') {
                clearTimeout(timeoutId);
                state = 'early';
                area.className = 'test-area early';
                icon.textContent = '❌';
                message.textContent = '너무 빨랐어요!';
                time.textContent = '';
                setTimeout(function() {
                    message.textContent = '다시 클릭하세요';
                }, 1000);
            } else if (state === 'go') {
                var reactionTime = Date.now() - startTime;
                state = 'result';
                area.className = 'test-area result';
                icon.textContent = '⚡';
                message.textContent = getRank(reactionTime);
                time.textContent = reactionTime + 'ms';

                results.unshift(reactionTime);
                if (results.length > 20) results.pop();
                localStorage.setItem('reaction_test_ko', JSON.stringify(results));
                updateStats();
            }
        }

        function getRank(time) {
            if (time < 150) return '번개같은 반응!';
            if (time < 200) return '매우 빠름!';
            if (time < 250) return '빠름!';
            if (time < 350) return '좋아요!';
            return '조금 느려요';
        }

        function getRankEmoji(time) {
            if (time < 150) return '⚡';
            if (time < 200) return '🚀';
            if (time < 250) return '✨';
            if (time < 350) return '👍';
            return '🐢';
        }

        function updateStats() {
            var best = results.length > 0 ? Math.min.apply(null, results) : null;
            var avg = results.length > 0 ? Math.round(results.reduce(function(a, b) { return a + b; }, 0) / results.length) : null;

            document.getElementById('bestTime').textContent = best ? best + 'ms' : '-';
            document.getElementById('avgTime').textContent = avg ? avg + 'ms' : '-';
            document.getElementById('attempts').textContent = results.length;
            document.getElementById('rank').textContent = best ? getRankEmoji(best) : '-';

            var historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            results.slice(0, 10).forEach(function(r, i) {
                var div = document.createElement('div');
                div.className = 'history-item' + (r === best ? ' best' : '');
                div.textContent = r + 'ms';
                historyList.appendChild(div);
            });
        }

        function clearHistory() {
            results = [];
            localStorage.removeItem('reaction_test_ko');
            updateStats();
        }

        updateStats();
    </script>
</body>
</html>
