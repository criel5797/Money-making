<body>
    <div class="container">
        <div class="ad-banner">広告</div>

        <header>
            <h1>🔢 パーセント計算機</h1>
            <p class="subtitle">簡単なパーセント計算</p>
        </header>

        <div class="tabs">
            <button class="tab active" onclick="showTab('basic')">基本</button>
            <button class="tab" onclick="showTab('discount')">割引</button>
            <button class="tab" onclick="showTab('change')">変化率</button>
            <button class="tab" onclick="showTab('ratio')">比率</button>
        </div>

        <div class="calculator-section active" id="basic">
            <div class="calc-title">AのB%は?</div>
            <div class="formula">
                <input type="number" id="basic-a" placeholder="50000">
                <span>の</span>
                <input type="number" id="basic-b" placeholder="20">
                <span>%</span>
            </div>
            <button class="calculate-btn" onclick="calcBasic()">計算する</button>
            <div class="result-box" id="basic-result">
                <div class="result-label">結果</div>
                <div class="result-value" id="basic-value">0</div>
                <button class="copy-btn" onclick="copyResult('basic-value')">📋 コピー</button>
            </div>
            <div class="quick-calc">
                <h4>クイック計算</h4>
                <div class="quick-buttons">
                    <button class="quick-btn" onclick="quickBasic(10)">10%</button>
                    <button class="quick-btn" onclick="quickBasic(20)">20%</button>
                    <button class="quick-btn" onclick="quickBasic(50)">50%</button>
                </div>
            </div>
        </div>

        <div class="calculator-section" id="discount">
            <div class="calc-title">割引計算機</div>
            <div class="formula">
                <input type="number" id="discount-price" placeholder="50000">
                <span>-</span>
                <input type="number" id="discount-rate" placeholder="20">
                <span>%</span>
            </div>
            <button class="calculate-btn" onclick="calcDiscount()">計算する</button>
            <div class="result-box" id="discount-result">
                <div class="result-label">価格</div>
                <div class="result-value" id="discount-value">0</div>
                <div class="result-detail" id="discount-detail"></div>
                <button class="copy-btn" onclick="copyResult('discount-value')">📋 コピー</button>
            </div>
        </div>

        <div class="calculator-section" id="change">
            <div class="calc-title">変化率計算</div>
            <div class="formula">
                <input type="number" id="change-from" placeholder="100">
                <span>→</span>
                <input type="number" id="change-to" placeholder="150">
            </div>
            <button class="calculate-btn" onclick="calcChange()">計算する</button>
            <div class="result-box" id="change-result">
                <div class="result-label">変化率</div>
                <div class="result-value" id="change-value">0%</div>
                <button class="copy-btn" onclick="copyResult('change-value')">📋 コピー</button>
            </div>
        </div>

        <div class="calculator-section" id="ratio">
            <div class="calc-title">比率計算機</div>
            <div class="formula">
                <input type="number" id="ratio-part" placeholder="30">
                <span>:</span>
                <input type="number" id="ratio-total" placeholder="120">
            </div>
            <button class="calculate-btn" onclick="calcRatio()">計算する</button>
            <div class="result-box" id="ratio-result">
                <div class="result-label">比率</div>
                <div class="result-value" id="ratio-value">0%</div>
                <button class="copy-btn" onclick="copyResult('ratio-value')">📋 コピー</button>
            </div>
        </div>

        <div class="ad-banner" style="margin-top: 20px;">広告</div>

        <footer>
            <p>© 2024 パーセント計算機</p>
        </footer>
    </div>

    <div class="toast" id="toast">コピーしました!</div>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.calculator-section').forEach(s => s.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById(tabId).classList.add('active');
        }

        function formatNumber(num) { return num.toLocaleString('ja-JP', { maximumFractionDigits: 2 }); }

        function calcBasic() {
            const a = parseFloat(document.getElementById('basic-a').value);
            const b = parseFloat(document.getElementById('basic-b').value);
            if (isNaN(a) || isNaN(b)) return;
            const result = a * (b / 100);
            document.getElementById('basic-value').textContent = formatNumber(result);
            document.getElementById('basic-result').classList.add('show');
        }

        function quickBasic(percent) {
            document.getElementById('basic-b').value = percent;
            if (document.getElementById('basic-a').value) calcBasic();
        }

        function calcDiscount() {
            const price = parseFloat(document.getElementById('discount-price').value);
            const rate = parseFloat(document.getElementById('discount-rate').value);
            if (isNaN(price) || isNaN(rate)) return;
            const discountAmount = price * (rate / 100);
            const finalPrice = price - discountAmount;
            document.getElementById('discount-value').textContent = formatNumber(finalPrice);
            document.getElementById('discount-detail').textContent = `節約: ${formatNumber(discountAmount)}`;
            document.getElementById('discount-result').classList.add('show');
        }

        function calcChange() {
            const from = parseFloat(document.getElementById('change-from').value);
            const to = parseFloat(document.getElementById('change-to').value);
            if (isNaN(from) || isNaN(to) || from === 0) return;
            const change = ((to - from) / from) * 100;
            const sign = change >= 0 ? '+' : '';
            document.getElementById('change-value').textContent = sign + formatNumber(change) + '%';
            document.getElementById('change-result').classList.add('show');
        }

        function calcRatio() {
            const part = parseFloat(document.getElementById('ratio-part').value);
            const total = parseFloat(document.getElementById('ratio-total').value);
            if (isNaN(part) || isNaN(total) || total === 0) return;
            const ratio = (part / total) * 100;
            document.getElementById('ratio-value').textContent = formatNumber(ratio) + '%';
            document.getElementById('ratio-result').classList.add('show');
        }

        function copyResult(elementId) {
            const text = document.getElementById(elementId).textContent;
            navigator.clipboard.writeText(text).then(() => {
                const toast = document.getElementById('toast');
                toast.classList.add('show');
                setTimeout(() => toast.classList.remove('show'), 2000);
            });
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    const section = this.closest('.calculator-section');
                    section.querySelector('.calculate-btn').click();
                }
            });
        });
    </script>
<script src="/common/share-modal.js"></script><script src="/common/tool-i18n-handler.js"></script></body>
