<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/invoice-generator/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>請求書作成</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #3a7bd5, #3a6073); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .invoice-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .form-group { margin-bottom: 15px; }
        .form-label { font-size: .85rem; margin-bottom: 5px; display: block; opacity: .8; }
        .form-input { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .items-section { background: rgba(0,0,0,.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .item-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .item-row input { flex: 1; padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,.8); color: #333; font-size: .9rem; }
        .item-row input:nth-child(2), .item-row input:nth-child(3) { max-width: 70px; }
        .remove-btn { background: #ff6b6b; border: none; color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; }
        .add-item-btn { width: 100%; padding: 10px; border: 1px dashed rgba(255,255,255,.5); border-radius: 8px; background: transparent; color: #fff; cursor: pointer; margin-top: 10px; }
        .total-section { background: rgba(255,255,255,.2); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .total-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .total-row.grand { font-size: 1.2rem; font-weight: 700; border-top: 1px solid rgba(255,255,255,.3); padding-top: 10px; margin-top: 10px; }
        .generate-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>📄 請求書作成</h1>
        </header>
        <div class="invoice-section">
            <div class="form-group">
                <label class="form-label">顧客名</label>
                <input type="text" class="form-input" id="clientName" placeholder="顧客名を入力">
            </div>
            <div class="form-group">
                <label class="form-label">項目</label>
                <div class="items-section" id="itemsSection">
                    <div class="item-row">
                        <input type="text" placeholder="品目" oninput="calculate()">
                        <input type="number" placeholder="数量" value="1" oninput="calculate()">
                        <input type="number" placeholder="単価" oninput="calculate()">
                        <button class="remove-btn" onclick="removeItem(this)">×</button>
                    </div>
                </div>
                <button class="add-item-btn" onclick="addItem()">+ 項目追加</button>
            </div>
            <div class="total-section">
                <div class="total-row"><span>小計</span><span id="subtotal">0円</span></div>
                <div class="total-row"><span>消費税 (10%)</span><span id="tax">0円</span></div>
                <div class="total-row grand"><span>合計</span><span id="grandTotal">0円</span></div>
            </div>
            <button class="generate-btn" onclick="generateInvoice()">請求書を保存</button>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        function addItem() {
            var section = document.getElementById('itemsSection');
            var div = document.createElement('div');
            div.className = 'item-row';
            div.innerHTML = '<input type="text" placeholder="品目" oninput="calculate()"><input type="number" placeholder="数量" value="1" oninput="calculate()"><input type="number" placeholder="単価" oninput="calculate()"><button class="remove-btn" onclick="removeItem(this)">×</button>';
            section.appendChild(div);
        }
        function removeItem(btn) {
            var rows = document.querySelectorAll('.item-row');
            if (rows.length > 1) {
                btn.parentElement.remove();
                calculate();
            }
        }
        function calculate() {
            var rows = document.querySelectorAll('.item-row');
            var subtotal = 0;
            rows.forEach(function(row) {
                var qty = parseInt(row.children[1].value) || 0;
                var price = parseInt(row.children[2].value) || 0;
                subtotal += qty * price;
            });
            var tax = Math.round(subtotal * 0.1);
            var total = subtotal + tax;
            document.getElementById('subtotal').textContent = subtotal.toLocaleString() + '円';
            document.getElementById('tax').textContent = tax.toLocaleString() + '円';
            document.getElementById('grandTotal').textContent = total.toLocaleString() + '円';
        }
        function generateInvoice() {
            var client = document.getElementById('clientName').value.trim();
            var rows = document.querySelectorAll('.item-row');
            var items = [];
            rows.forEach(function(row) {
                var name = row.children[0].value.trim();
                var qty = parseInt(row.children[1].value) || 0;
                var price = parseInt(row.children[2].value) || 0;
                if (name && qty && price) {
                    items.push({ name: name, qty: qty, price: price });
                }
            });
            if (!client || items.length === 0) {
                alert('顧客名と少なくとも1つの項目を入力してください。');
                return;
            }
            var invoices = JSON.parse(localStorage.getItem('invoices') || '[]');
            invoices.push({ id: Date.now().toString(), client: client, items: items, date: new Date().toISOString() });
            localStorage.setItem('invoices', JSON.stringify(invoices));
            alert('請求書を保存しました！');
        }
    </script>
</body>
</html>
