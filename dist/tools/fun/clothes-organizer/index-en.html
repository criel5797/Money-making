    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #a18cd1, #fbc2eb); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .closet-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,.2); border-radius: 12px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .category-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .cat-tab { padding: 8px 15px; border: 1px solid rgba(255,255,255,.3); border-radius: 20px; background: transparent; color: #fff; cursor: pointer; font-size: .85rem; white-space: nowrap; }
        .cat-tab.active { background: rgba(255,255,255,.2); border-color: #fff; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .clothes { max-height: 280px; overflow-y: auto; }
        .clothes-item { display: flex; align-items: center; padding: 12px 15px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; }
        .clothes-color { width: 30px; height: 30px; border-radius: 50%; margin-right: 12px; border: 2px solid rgba(255,255,255,.3); }
        .clothes-info { flex: 1; }
        .clothes-name { font-weight: 600; }
        .clothes-meta { font-size: .8rem; opacity: .7; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>👗 Clothes Organizer</h1>
        </header>
        <div class="closet-section">
            <div class="stats">
                <div class="stat"><div class="stat-value" id="totalClothes">0</div><div class="stat-label">Total</div></div>
            </div>
            <div class="category-tabs" id="categoryTabs"></div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="clothesName" placeholder="Item name">
                </div>
                <div class="form-row">
                    <select id="clothesCategory">
                        <option value="top">Tops</option>
                        <option value="bottom">Bottoms</option>
                        <option value="outer">Outerwear</option>
                        <option value="dress">Dresses</option>
                        <option value="shoes">Shoes</option>
                        <option value="accessory">Accessories</option>
                    </select>
                    <select id="clothesColor">
                        <option value="#000000">Black</option>
                        <option value="#ffffff">White</option>
                        <option value="#808080">Gray</option>
                        <option value="#ff0000">Red</option>
                        <option value="#0000ff">Blue</option>
                        <option value="#00ff00">Green</option>
                        <option value="#ffff00">Yellow</option>
                        <option value="#ffc0cb">Pink</option>
                        <option value="#8b4513">Brown</option>
                        <option value="#000080">Navy</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addClothes()">Add Item</button>
            </div>
            <div class="clothes" id="clothes"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var clothes = JSON.parse(localStorage.getItem('clothes') || '[]');
        var currentCategory = 'all';
        var categoryNames = { all: 'All', top: 'Tops', bottom: 'Bottoms', outer: 'Outerwear', dress: 'Dresses', shoes: 'Shoes', accessory: 'Accessories' };
        var colorNames = { '#000000': 'Black', '#ffffff': 'White', '#808080': 'Gray', '#ff0000': 'Red', '#0000ff': 'Blue', '#00ff00': 'Green', '#ffff00': 'Yellow', '#ffc0cb': 'Pink', '#8b4513': 'Brown', '#000080': 'Navy' };
        function save() { localStorage.setItem('clothes', JSON.stringify(clothes)); }
        function addClothes() {
            var name = document.getElementById('clothesName').value.trim();
            var category = document.getElementById('clothesCategory').value;
            var color = document.getElementById('clothesColor').value;
            if (!name) return;
            clothes.push({ id: Date.now().toString(), name: name, category: category, color: color });
            save();
            document.getElementById('clothesName').value = '';
            render();
        }
        function deleteClothes(id) {
            clothes = clothes.filter(function(c) { return c.id !== id; });
            save();
            render();
        }
        function setCategory(cat) {
            currentCategory = cat;
            render();
        }
        function render() {
            document.getElementById('totalClothes').textContent = clothes.length;
            var tabs = document.getElementById('categoryTabs');
            tabs.innerHTML = '';
            ['all', 'top', 'bottom', 'outer', 'dress', 'shoes', 'accessory'].forEach(function(cat) {
                var btn = document.createElement('button');
                btn.className = 'cat-tab' + (currentCategory === cat ? ' active' : '');
                btn.textContent = categoryNames[cat];
                btn.onclick = function() { setCategory(cat); };
                tabs.appendChild(btn);
            });
            var filtered = clothes.filter(function(c) {
                return currentCategory === 'all' || c.category === currentCategory;
            });
            var list = document.getElementById('clothes');
            list.innerHTML = '';
            filtered.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'clothes-item';
                div.innerHTML = '<div class="clothes-color" style="background:' + item.color + '"></div><div class="clothes-info"><div class="clothes-name">' + item.name + '</div><div class="clothes-meta">' + categoryNames[item.category] + ' · ' + (colorNames[item.color] || item.color) + '</div></div><button class="del-btn" onclick="deleteClothes(\'' + item.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
