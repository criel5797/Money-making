    <meta charset="UTF-8">
    
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff6b6b, #feca57); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .gift-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .gifts { max-height: 350px; overflow-y: auto; }
        .gift-card { background: rgba(255,255,255,.15); border-radius: 12px; padding: 15px; margin-bottom: 12px; }
        .gift-header { display: flex; align-items: center; margin-bottom: 10px; }
        .gift-person { flex: 1; font-weight: 700; font-size: 1.1rem; }
        .gift-occasion { font-size: .75rem; padding: 3px 10px; border-radius: 10px; background: rgba(255,255,255,.2); }
        .gift-del { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1rem; margin-left: 10px; }
        .gift-ideas { margin-top: 10px; }
        .idea-item { display: flex; align-items: center; padding: 8px 12px; background: rgba(0,0,0,.15); border-radius: 8px; margin-bottom: 5px; }
        .idea-item.bought { opacity: .6; }
        .idea-check { width: 18px; height: 18px; border: 2px solid #fff; border-radius: 4px; margin-right: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: .7rem; }
        .idea-item.bought .idea-check { background: #38ef7d; border-color: #38ef7d; }
        .idea-name { flex: 1; font-size: .9rem; }
        .idea-item.bought .idea-name { text-decoration: line-through; }
        .idea-del { background: none; border: none; color: rgba(255,255,255,.4); cursor: pointer; }
        .add-idea { display: flex; gap: 8px; margin-top: 8px; }
        .add-idea input { flex: 1; padding: 8px 12px; border: none; border-radius: 8px; background: rgba(255,255,255,.8); color: #333; font-size: .9rem; }
        .add-idea button { padding: 8px 15px; border: none; border-radius: 8px; background: #38ef7d; color: #000; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🎁 선물 아이디어</h1>
        </header>
        <div class="gift-section">
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="personName" placeholder="받는 사람">
                    <select id="occasion">
                        <option value="birthday">생일</option>
                        <option value="christmas">크리스마스</option>
                        <option value="anniversary">기념일</option>
                        <option value="wedding">결혼</option>
                        <option value="other">기타</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addPerson()">사람 추가</button>
            </div>
            <div class="gifts" id="gifts"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var giftList = JSON.parse(localStorage.getItem('gift_ideas') || '[]');
        var occasionNames = { birthday: '생일', christmas: '크리스마스', anniversary: '기념일', wedding: '결혼', other: '기타' };
        function save() { localStorage.setItem('gift_ideas', JSON.stringify(giftList)); }
        function addPerson() {
            var name = document.getElementById('personName').value.trim();
            var occasion = document.getElementById('occasion').value;
            if (!name) return;
            giftList.push({ id: Date.now().toString(), name: name, occasion: occasion, ideas: [] });
            save();
            document.getElementById('personName').value = '';
            render();
        }
        function deletePerson(id) {
            giftList = giftList.filter(function(g) { return g.id !== id; });
            save();
            render();
        }
        function addIdea(personId) {
            var input = document.getElementById('idea_' + personId);
            var idea = input.value.trim();
            if (!idea) return;
            var person = giftList.find(function(g) { return g.id === personId; });
            if (person) {
                person.ideas.push({ id: Date.now().toString(), name: idea, bought: false });
                save();
                input.value = '';
                render();
            }
        }
        function toggleIdea(personId, ideaId) {
            var person = giftList.find(function(g) { return g.id === personId; });
            if (person) {
                var idea = person.ideas.find(function(i) { return i.id === ideaId; });
                if (idea) { idea.bought = !idea.bought; save(); render(); }
            }
        }
        function deleteIdea(personId, ideaId) {
            var person = giftList.find(function(g) { return g.id === personId; });
            if (person) {
                person.ideas = person.ideas.filter(function(i) { return i.id !== ideaId; });
                save();
                render();
            }
        }
        function render() {
            var list = document.getElementById('gifts');
            list.innerHTML = '';
            giftList.forEach(function(person) {
                var ideasHtml = '';
                person.ideas.forEach(function(idea) {
                    ideasHtml += '<div class="idea-item' + (idea.bought ? ' bought' : '') + '"><div class="idea-check" onclick="toggleIdea(\'' + person.id + '\',\'' + idea.id + '\')">' + (idea.bought ? '✓' : '') + '</div><span class="idea-name">' + idea.name + '</span><button class="idea-del" onclick="deleteIdea(\'' + person.id + '\',\'' + idea.id + '\')">×</button></div>';
                });
                var div = document.createElement('div');
                div.className = 'gift-card';
                div.innerHTML = '<div class="gift-header"><span class="gift-person">' + person.name + '</span><span class="gift-occasion">' + occasionNames[person.occasion] + '</span><button class="gift-del" onclick="deletePerson(\'' + person.id + '\')">×</button></div><div class="gift-ideas">' + ideasHtml + '</div><div class="add-idea"><input type="text" id="idea_' + person.id + '" placeholder="아이디어 추가" onkeypress="if(event.key===\'Enter\')addIdea(\'' + person.id + '\')"><button onclick="addIdea(\'' + person.id + '\')">+</button></div>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
