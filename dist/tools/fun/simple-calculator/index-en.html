<!DOCTYPE html><html lang="en"><head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/simple-calculator/index-en.html"><meta property="og:url" content="https://instaidea.org/tools/fun/simple-calculator/index-en.html"><meta property="og:locale" content="en_US"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/simple-calculator/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/simple-calculator/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/simple-calculator/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/simple-calculator/"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Calculator</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:linear-gradient(135deg,#2d3436,#636e72);min-height:100vh;color:#fff;padding:20px}.container{max-width:400px;margin:0 auto}.ad-banner{background:rgba(255,255,255,.1);padding:20px;text-align:center;border-radius:12px;margin-bottom:20px}header{text-align:center;margin-bottom:30px}h1{font-size:1.8rem;margin-bottom:10px}.calc-section{background:rgba(255,255,255,.1);border-radius:16px;padding:25px}.display{background:#1e272e;border-radius:12px;padding:20px;margin-bottom:20px;text-align:right;min-height:80px}.expression{font-size:1rem;color:rgba(255,255,255,.6);margin-bottom:10px;min-height:20px}.result{font-size:2.5rem;font-weight:700}.buttons{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}.btn{padding:20px;border:none;border-radius:12px;font-size:1.3rem;font-weight:600;cursor:pointer;transition:all .2s}.btn:hover{transform:scale(1.05)}.btn-num{background:rgba(255,255,255,.2);color:#fff}.btn-op{background:#00b894;color:#fff}.btn-func{background:rgba(255,255,255,.1);color:#fff}.btn-eq{background:#0984e3;color:#fff}.btn-clear{background:#d63031;color:#fff}</style></head><body><div class="container"><div class="ad-banner">Ad</div><header><h1>🔢 Calculator</h1></header><div class="calc-section"><div class="display"><div class="expression" id="expression"></div><div class="result" id="result">0</div></div><div class="buttons"><button class="btn btn-clear" onclick="clearAll()">C</button><button class="btn btn-func" onclick="backspace()">⌫</button><button class="btn btn-func" onclick="addOp("%")" >%</button><button class="btn btn-op" onclick="addOp("/")">/</button><button class="btn btn-num" onclick="addNum(7)">7</button><button class="btn btn-num" onclick="addNum(8)">8</button><button class="btn btn-num" onclick="addNum(9)">9</button><button class="btn btn-op" onclick="addOp("*")">×</button><button class="btn btn-num" onclick="addNum(4)">4</button><button class="btn btn-num" onclick="addNum(5)">5</button><button class="btn btn-num" onclick="addNum(6)">6</button><button class="btn btn-op" onclick="addOp("-")">-</button><button class="btn btn-num" onclick="addNum(1)">1</button><button class="btn btn-num" onclick="addNum(2)">2</button><button class="btn btn-num" onclick="addNum(3)">3</button><button class="btn btn-op" onclick="addOp("+")">+</button><button class="btn btn-num" onclick="addNum(0)">0</button><button class="btn btn-num" onclick="addDot()">.</button><button class="btn btn-eq" style="grid-column:span 2" onclick="calculate()">=</button></div></div><div class="ad-banner" style="margin-top:20px">Ad</div></div><script>var expr="",res="0";function addNum(n){if(res==="0"&&expr==="")res=n.toString();else res+=n;update()}function addOp(o){if(res!=="0"||expr!==""){expr+=res+" "+o+" ";res="0";update()}}function addDot(){if(!res.includes("."))res+=".";update()}function clearAll(){expr="";res="0";update()}function backspace(){if(res.length>1)res=res.slice(0,-1);else res="0";update()}function calculate(){try{var full=expr+res;var r=eval(full.replace(/×/g,"*").replace(/÷/g,"/"));expr="";res=parseFloat(r.toFixed(10)).toString();update()}catch(e){res="Error";update()}}function update(){document.getElementById("expression").textContent=expr;document.getElementById("result").textContent=res}</script></body></html>
