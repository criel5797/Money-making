<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/whisper-challenge/"><meta property="og:url" content="https://instaidea.org/tools/fun/whisper-challenge/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/whisper-challenge/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/whisper-challenge/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/whisper-challenge/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/whisper-challenge/"><script async src="https://www.googletagmanager.com/gtag/js?id=G-CGCL4G4YMY"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js", new Date());gtag("config", "G-CGCL4G4YMY");</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>속삭임 챌린지</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #14b8a6, #0d9488); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { opacity: .8; font-size: .9rem; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .category-btn { padding: 15px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: center; transition: all .3s; }
        .category-btn.active { background: rgba(255,255,255,.3); border-color: #fff; }
        .category-emoji { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .start-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .play-section { display: none; }
        .round-info { text-align: center; font-size: 1rem; opacity: .8; margin-bottom: 15px; }
        .phrase-card { background: linear-gradient(135deg, rgba(255,255,255,.95), rgba(255,255,255,.9)); border-radius: 20px; padding: 40px 25px; text-align: center; margin-bottom: 20px; min-height: 150px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .phrase-label { font-size: .9rem; color: #64748b; margin-bottom: 15px; }
        .phrase-text { font-size: 1.8rem; font-weight: 700; color: #1e293b; line-height: 1.4; }
        .phrase-hidden { font-size: 1.2rem; color: #64748b; }
        .role-badge { display: inline-block; padding: 8px 20px; border-radius: 20px; font-size: 1rem; font-weight: 600; margin-bottom: 15px; }
        .role-speaker { background: #3b82f6; }
        .role-listener { background: #ec4899; }
        .controls { display: flex; gap: 12px; margin-bottom: 20px; }
        .control-btn { flex: 1; padding: 18px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .reveal-btn { background: rgba(255,255,255,.2); color: #fff; }
        .next-btn { background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; }
        .score-section { padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; text-align: center; }
        .score-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .score-row { display: flex; justify-content: center; gap: 30px; font-size: 1.1rem; }
        .score-value { font-size: 1.5rem; font-weight: 700; color: #fbbf24; }
        .result-section { display: none; text-align: center; }
        .result-icon { font-size: 5rem; margin-bottom: 20px; }
        .result-text { font-size: 1.5rem; font-weight: 700; margin-bottom: 10px; }
        .result-score { font-size: 2rem; color: #fbbf24; margin-bottom: 25px; }
        .instruction { background: rgba(255,255,255,.1); padding: 15px; border-radius: 12px; margin-bottom: 20px; text-align: center; font-size: .9rem; line-height: 1.5; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🤫 속삭임 챌린지</h1>
            <p class="subtitle">헤드폰 끼고 입모양 읽기!</p>
        </header>
        <div class="game-section">
            <div class="setup-section" id="setupSection">
                <div class="instruction">한 명은 헤드폰으로 음악을 크게 듣고,<br>다른 사람이 말하는 것을 입모양으로 읽어야 해요!</div>
                <div class="category-grid">
                    <button class="category-btn active" onclick="selectCategory(0)"><span class="category-emoji">🍔</span>음식</button>
                    <button class="category-btn" onclick="selectCategory(1)"><span class="category-emoji">🎬</span>영화</button>
                    <button class="category-btn" onclick="selectCategory(2)"><span class="category-emoji">🏠</span>일상</button>
                    <button class="category-btn" onclick="selectCategory(3)"><span class="category-emoji">😂</span>웃긴말</button>
                </div>
                <button class="start-btn" onclick="startGame()">🎮 게임 시작!</button>
            </div>
            <div class="play-section" id="playSection">
                <div class="round-info" id="roundInfo">라운드 1 / 10</div>
                <div class="phrase-card">
                    <span class="role-badge role-speaker" id="roleBadge">말하는 사람</span>
                    <div class="phrase-label" id="phraseLabel">이 문장을 입모양으로 말하세요</div>
                    <div class="phrase-text" id="phraseText">오늘 점심 뭐 먹을까?</div>
                </div>
                <div class="controls">
                    <button class="control-btn reveal-btn" id="revealBtn" onclick="toggleReveal()">👁️ 정답 보기</button>
                    <button class="control-btn next-btn" onclick="nextRound()">다음 ➡️</button>
                </div>
                <div class="score-section">
                    <div class="score-title">점수</div>
                    <div class="score-row">
                        <span>정답: <span class="score-value" id="correctScore">0</span></span>
                        <span>오답: <span class="score-value" id="wrongScore">0</span></span>
                    </div>
                </div>
            </div>
            <div class="result-section" id="resultSection">
                <div class="result-icon">🏆</div>
                <div class="result-text">게임 완료!</div>
                <div class="result-score"><span id="finalScore">0</span> / 10 정답</div>
                <button class="start-btn" onclick="resetGame()">🔄 다시 하기</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var phrases = {
            0: [ // 음식
                '오늘 점심 뭐 먹을까?', '치킨 먹고 싶어', '배고파 죽겠어',
                '맛있는 거 먹으러 가자', '커피 한 잔 할래?', '아이스크림 먹을래?',
                '피자 시켜 먹자', '라면 끓여 줘', '초콜릿 하나만 줘',
                '밥 먹었어?', '간식 먹고 싶다', '물 좀 줘',
                '배불러서 못 먹겠어', '디저트는 별도야', '맵찔이라서 못 먹어'
            ],
            1: [ // 영화
                '이 영화 재밌어?', '팝콘 사 왔어', '무서운 영화 보자',
                '로맨스 영화 볼래?', '주인공 너무 멋있어', '결말이 충격적이야',
                '눈물 날 것 같아', '액션 영화가 좋아', '내가 티켓 살게',
                '예매했어?', '자막 없이 볼 수 있어?', '소리가 너무 커',
                '감독이 누구야?', '속편 나왔대', '평점 얼마야?'
            ],
            2: [ // 일상
                '오늘 날씨 좋다', '주말에 뭐 해?', '집에 가고 싶어',
                '피곤해 죽겠어', '잠이 안 와', '운동 같이 할래?',
                '쇼핑 가자', '생일 축하해', '나 지금 바빠',
                '내일 만나자', '전화해 줘', '문자 보냈어',
                '오늘 월요일이야', '주말이 빨리 왔으면', '휴가 언제야?'
            ],
            3: [ // 웃긴말
                '나 방금 방귀 뀌었어', '코에서 코털 보여', '입에 뭐 묻었어',
                '지퍼 열렸어', '양말이 짝짝이야', '머리에 뭐 붙었어',
                '웃긴 얼굴 해봐', '배꼽 빠지겠어', '아 웃겨 죽겠어',
                '왜 그렇게 웃겨', '방금 실수했어', '얼굴이 빨개졌어',
                '창피해서 죽겠어', '엄마한테 혼났어', '화장실 급해'
            ]
        };

        var selectedCategory = 0;
        var currentPhrases = [];
        var roundIndex = 0;
        var correctCount = 0;
        var wrongCount = 0;
        var isRevealed = false;

        function selectCategory(index) {
            selectedCategory = index;
            var btns = document.querySelectorAll('.category-btn');
            btns.forEach(function(btn, i) {
                btn.classList.toggle('active', i === index);
            });
        }

        function shuffleArray(arr) {
            var a = arr.slice();
            for (var i = a.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = a[i]; a[i] = a[j]; a[j] = t;
            }
            return a;
        }

        function startGame() {
            currentPhrases = shuffleArray(phrases[selectedCategory]).slice(0, 10);
            roundIndex = 0;
            correctCount = 0;
            wrongCount = 0;

            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('playSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            showRound();
        }

        function showRound() {
            isRevealed = false;
            document.getElementById('roundInfo').textContent = '라운드 ' + (roundIndex + 1) + ' / ' + currentPhrases.length;
            document.getElementById('phraseText').textContent = currentPhrases[roundIndex];
            document.getElementById('revealBtn').textContent = '👁️ 정답 보기';
            document.getElementById('correctScore').textContent = correctCount;
            document.getElementById('wrongScore').textContent = wrongCount;
        }

        function toggleReveal() {
            isRevealed = !isRevealed;
            if (isRevealed) {
                document.getElementById('revealBtn').textContent = '🙈 숨기기';
            } else {
                document.getElementById('revealBtn').textContent = '👁️ 정답 보기';
            }
        }

        function nextRound() {
            var result = confirm('정답을 맞췄나요?');
            if (result) {
                correctCount++;
            } else {
                wrongCount++;
            }

            roundIndex++;
            if (roundIndex >= currentPhrases.length) {
                endGame();
            } else {
                showRound();
            }
        }

        function endGame() {
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('finalScore').textContent = correctCount;

            var stats = JSON.parse(localStorage.getItem('whisper_ko') || '{"best":0}');
            if (correctCount > stats.best) stats.best = correctCount;
            localStorage.setItem('whisper_ko', JSON.stringify(stats));
        }

        function resetGame() {
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
