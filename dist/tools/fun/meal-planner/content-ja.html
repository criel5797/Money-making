<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>食事プランナー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff9966, #ff5e62); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .meal-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .day-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .day-tab { padding: 8px 12px; border: 1px solid rgba(255,255,255,.3); border-radius: 10px; background: transparent; color: #fff; cursor: pointer; font-size: .8rem; }
        .day-tab.active { background: rgba(255,255,255,.2); border-color: #fff; }
        .meal-types { margin-bottom: 20px; }
        .meal-type { background: rgba(0,0,0,.2); border-radius: 12px; padding: 15px; margin-bottom: 10px; }
        .meal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .meal-title { font-weight: 600; }
        .meal-add { background: none; border: none; color: #fff; cursor: pointer; font-size: 1.2rem; }
        .meal-items { }
        .meal-item { display: flex; align-items: center; padding: 8px 12px; background: rgba(255,255,255,.1); border-radius: 8px; margin-bottom: 5px; }
        .meal-name { flex: 1; }
        .meal-del { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; }
        .add-modal { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); align-items: center; justify-content: center; z-index: 100; }
        .add-modal.show { display: flex; }
        .modal-content { background: linear-gradient(135deg, #667eea, #764ba2); padding: 25px; border-radius: 16px; width: 90%; max-width: 350px; }
        .modal-title { text-align: center; margin-bottom: 15px; font-size: 1.2rem; }
        .modal-input { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; margin-bottom: 10px; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btn { flex: 1; padding: 12px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; }
        .modal-cancel { background: rgba(255,255,255,.2); color: #fff; }
        .modal-add { background: #38ef7d; color: #000; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🍽️ 食事プランナー</h1>
        </header>
        <div class="meal-section">
            <div class="day-tabs" id="dayTabs"></div>
            <div class="meal-types" id="mealTypes"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <div class="add-modal" id="addModal">
        <div class="modal-content">
            <div class="modal-title" id="modalTitle">食事を追加</div>
            <input type="text" class="modal-input" id="mealInput" placeholder="料理名">
            <div class="modal-btns">
                <button class="modal-btn modal-cancel" onclick="closeModal()">キャンセル</button>
                <button class="modal-btn modal-add" onclick="confirmAdd()">追加</button>
            </div>
        </div>
    </div>
    <script>
        var mealPlan = JSON.parse(localStorage.getItem('meal_plan') || '{}');
        var currentDay = 0;
        var currentMealType = '';
        var days = ['月', '火', '水', '木', '金', '土', '日'];
        var mealTypes = [
            { id: 'breakfast', name: '朝食', icon: '🌅' },
            { id: 'lunch', name: '昼食', icon: '☀️' },
            { id: 'dinner', name: '夕食', icon: '🌙' },
            { id: 'snack', name: 'おやつ', icon: '🍪' }
        ];
        function save() { localStorage.setItem('meal_plan', JSON.stringify(mealPlan)); }
        function getMeals(day, type) {
            var key = day + '_' + type;
            return mealPlan[key] || [];
        }
        function setMeals(day, type, meals) {
            var key = day + '_' + type;
            mealPlan[key] = meals;
            save();
        }
        function setDay(d) {
            currentDay = d;
            render();
        }
        function openModal(type) {
            currentMealType = type;
            var mealType = mealTypes.find(function(m) { return m.id === type; });
            document.getElementById('modalTitle').textContent = mealType.name + 'を追加';
            document.getElementById('mealInput').value = '';
            document.getElementById('addModal').classList.add('show');
            document.getElementById('mealInput').focus();
        }
        function closeModal() {
            document.getElementById('addModal').classList.remove('show');
        }
        function confirmAdd() {
            var name = document.getElementById('mealInput').value.trim();
            if (!name) return;
            var meals = getMeals(currentDay, currentMealType);
            meals.push({ id: Date.now().toString(), name: name });
            setMeals(currentDay, currentMealType, meals);
            closeModal();
            render();
        }
        function deleteMeal(type, id) {
            var meals = getMeals(currentDay, type).filter(function(m) { return m.id !== id; });
            setMeals(currentDay, type, meals);
            render();
        }
        function render() {
            var tabs = document.getElementById('dayTabs');
            tabs.innerHTML = '';
            days.forEach(function(d, i) {
                var btn = document.createElement('button');
                btn.className = 'day-tab' + (currentDay === i ? ' active' : '');
                btn.textContent = d;
                btn.onclick = function() { setDay(i); };
                tabs.appendChild(btn);
            });
            var types = document.getElementById('mealTypes');
            types.innerHTML = '';
            mealTypes.forEach(function(mt) {
                var meals = getMeals(currentDay, mt.id);
                var div = document.createElement('div');
                div.className = 'meal-type';
                var itemsHtml = '';
                meals.forEach(function(m) {
                    itemsHtml += '<div class="meal-item"><span class="meal-name">' + m.name + '</span><button class="meal-del" onclick="deleteMeal(\'' + mt.id + '\',\'' + m.id + '\')">×</button></div>';
                });
                div.innerHTML = '<div class="meal-header"><span class="meal-title">' + mt.icon + ' ' + mt.name + '</span><button class="meal-add" onclick="openModal(\'' + mt.id + '\')">+</button></div><div class="meal-items">' + itemsHtml + '</div>';
                types.appendChild(div);
            });
        }
        document.getElementById('mealInput').addEventListener('keypress', function(e) { if (e.key === 'Enter') confirmAdd(); });
        render();
    </script>
</body>
</html>
