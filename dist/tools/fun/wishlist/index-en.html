    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #e91e63, #9c27b0); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .wishlist-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,.2); border-radius: 12px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .wishlist { max-height: 350px; overflow-y: auto; }
        .wish-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; margin-bottom: 10px; }
        .wish-item.purchased { opacity: .6; }
        .wish-checkbox { width: 24px; height: 24px; border: 2px solid #fff; border-radius: 50%; margin-right: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .wish-item.purchased .wish-checkbox { background: #38ef7d; border-color: #38ef7d; }
        .wish-info { flex: 1; }
        .wish-name { font-weight: 600; }
        .wish-item.purchased .wish-name { text-decoration: line-through; }
        .wish-meta { font-size: .8rem; opacity: .7; margin-top: 3px; }
        .wish-price { font-weight: 600; color: #ffd93d; }
        .wish-priority { font-size: .7rem; padding: 2px 8px; border-radius: 10px; margin-left: 8px; }
        .priority-high { background: #ff6b6b; }
        .priority-medium { background: #ffd93d; color: #333; }
        .priority-low { background: #74b9ff; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🎁 Wishlist</h1>
        </header>
        <div class="wishlist-section">
            <div class="stats">
                <div class="stat"><div class="stat-value" id="totalItems">0</div><div class="stat-label">Total</div></div>
                <div class="stat"><div class="stat-value" id="purchasedItems">0</div><div class="stat-label">Purchased</div></div>
                <div class="stat"><div class="stat-value" id="totalPrice">$0</div><div class="stat-label">Total Cost</div></div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="itemName" placeholder="Item name">
                    <input type="number" id="itemPrice" placeholder="Price">
                </div>
                <div class="form-row">
                    <select id="itemPriority">
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                    </select>
                    <select id="itemCategory">
                        <option value="electronics">Electronics</option>
                        <option value="fashion">Fashion</option>
                        <option value="home">Home</option>
                        <option value="hobby">Hobby</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addItem()">Add to Wishlist</button>
            </div>
            <div class="wishlist" id="wishlist"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var wishlist = JSON.parse(localStorage.getItem('wishlist') || '[]');
        var priorityNames = { high: 'High', medium: 'Medium', low: 'Low' };
        var categoryNames = { electronics: 'Electronics', fashion: 'Fashion', home: 'Home', hobby: 'Hobby', other: 'Other' };
        function save() { localStorage.setItem('wishlist', JSON.stringify(wishlist)); }
        function addItem() {
            var name = document.getElementById('itemName').value.trim();
            var price = parseFloat(document.getElementById('itemPrice').value) || 0;
            var priority = document.getElementById('itemPriority').value;
            var category = document.getElementById('itemCategory').value;
            if (!name) return;
            wishlist.push({ id: Date.now().toString(), name: name, price: price, priority: priority, category: category, purchased: false });
            save();
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            render();
        }
        function togglePurchased(id) {
            var item = wishlist.find(function(w) { return w.id === id; });
            if (item) { item.purchased = !item.purchased; save(); render(); }
        }
        function deleteItem(id) {
            wishlist = wishlist.filter(function(w) { return w.id !== id; });
            save();
            render();
        }
        function render() {
            var purchased = wishlist.filter(function(w) { return w.purchased; }).length;
            var totalPrice = wishlist.filter(function(w) { return !w.purchased; }).reduce(function(s, w) { return s + w.price; }, 0);
            document.getElementById('totalItems').textContent = wishlist.length;
            document.getElementById('purchasedItems').textContent = purchased;
            document.getElementById('totalPrice').textContent = '$' + totalPrice.toFixed(2);
            var sorted = wishlist.slice().sort(function(a, b) {
                if (a.purchased !== b.purchased) return a.purchased ? 1 : -1;
                var order = { high: 0, medium: 1, low: 2 };
                return order[a.priority] - order[b.priority];
            });
            var list = document.getElementById('wishlist');
            list.innerHTML = '';
            sorted.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'wish-item' + (item.purchased ? ' purchased' : '');
                div.innerHTML = '<div class="wish-checkbox" onclick="togglePurchased(\'' + item.id + '\')">' + (item.purchased ? '✓' : '') + '</div><div class="wish-info"><div class="wish-name">' + item.name + '<span class="wish-priority priority-' + item.priority + '">' + priorityNames[item.priority] + '</span></div><div class="wish-meta">' + categoryNames[item.category] + '</div></div><span class="wish-price">$' + item.price.toFixed(2) + '</span><button class="del-btn" onclick="deleteItem(\'' + item.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
