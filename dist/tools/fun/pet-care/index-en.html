    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f093fb, #f5576c); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .pet-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .pets { max-height: 400px; overflow-y: auto; }
        .pet-card { background: rgba(255,255,255,.15); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .pet-header { display: flex; align-items: center; margin-bottom: 15px; }
        .pet-icon { font-size: 2.5rem; margin-right: 15px; }
        .pet-info { flex: 1; }
        .pet-name { font-weight: 700; font-size: 1.2rem; }
        .pet-details { font-size: .8rem; opacity: .8; margin-top: 3px; }
        .pet-del { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; }
        .care-tasks { display: flex; flex-wrap: wrap; gap: 8px; }
        .care-task { padding: 8px 12px; border-radius: 20px; font-size: .8rem; cursor: pointer; border: none; }
        .care-task.done { background: #38ef7d; color: #000; }
        .care-task.pending { background: rgba(255,255,255,.2); color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🐾 Pet Care</h1>
        </header>
        <div class="pet-section">
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="petName" placeholder="Pet name">
                    <select id="petType">
                        <option value="dog">🐕 Dog</option>
                        <option value="cat">🐈 Cat</option>
                        <option value="bird">🐦 Bird</option>
                        <option value="fish">🐠 Fish</option>
                        <option value="hamster">🐹 Hamster</option>
                        <option value="rabbit">🐰 Rabbit</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addPet()">Add Pet</button>
            </div>
            <div class="pets" id="pets"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var pets = JSON.parse(localStorage.getItem('pets') || '[]');
        var todayKey = 'pet_care_' + new Date().toDateString();
        var todayTasks = JSON.parse(localStorage.getItem(todayKey) || '{}');
        var petIcons = { dog: '🐕', cat: '🐈', bird: '🐦', fish: '🐠', hamster: '🐹', rabbit: '🐰' };
        var petNames = { dog: 'Dog', cat: 'Cat', bird: 'Bird', fish: 'Fish', hamster: 'Hamster', rabbit: 'Rabbit' };
        var careTasks = [
            { id: 'feed', name: 'Feed', icon: '🍽️' },
            { id: 'water', name: 'Water', icon: '💧' },
            { id: 'walk', name: 'Walk', icon: '🚶' },
            { id: 'play', name: 'Play', icon: '🎾' },
            { id: 'groom', name: 'Groom', icon: '✨' }
        ];
        function save() {
            localStorage.setItem('pets', JSON.stringify(pets));
            localStorage.setItem(todayKey, JSON.stringify(todayTasks));
        }
        function addPet() {
            var name = document.getElementById('petName').value.trim();
            var type = document.getElementById('petType').value;
            if (!name) return;
            pets.push({ id: Date.now().toString(), name: name, type: type, createdAt: new Date().toISOString() });
            save();
            document.getElementById('petName').value = '';
            render();
        }
        function deletePet(id) {
            pets = pets.filter(function(p) { return p.id !== id; });
            save();
            render();
        }
        function toggleTask(petId, taskId) {
            var key = petId + '_' + taskId;
            todayTasks[key] = !todayTasks[key];
            save();
            render();
        }
        function isTaskDone(petId, taskId) {
            return todayTasks[petId + '_' + taskId] || false;
        }
        function render() {
            var list = document.getElementById('pets');
            list.innerHTML = '';
            pets.forEach(function(pet) {
                var div = document.createElement('div');
                div.className = 'pet-card';
                var tasksHtml = '';
                careTasks.forEach(function(task) {
                    var done = isTaskDone(pet.id, task.id);
                    tasksHtml += '<button class="care-task ' + (done ? 'done' : 'pending') + '" onclick="toggleTask(\'' + pet.id + '\',\'' + task.id + '\')">' + task.icon + ' ' + task.name + '</button>';
                });
                div.innerHTML = '<div class="pet-header"><div class="pet-icon">' + petIcons[pet.type] + '</div><div class="pet-info"><div class="pet-name">' + pet.name + '</div><div class="pet-details">' + petNames[pet.type] + '</div></div><button class="pet-del" onclick="deletePet(\'' + pet.id + '\')">×</button></div><div class="care-tasks">' + tasksHtml + '</div>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
