    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Affirmation</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff9a9e, #fecfef); min-height: 100vh; color: #333; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 500px; width: 100%; }
        .ad-banner { background: rgba(255,255,255,.3); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; color: #c44569; }
        .affirmation-section { background: rgba(255,255,255,.8); border-radius: 20px; padding: 40px 30px; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,.1); }
        .affirmation-icon { font-size: 4rem; margin-bottom: 25px; }
        .affirmation-text { font-size: 1.4rem; line-height: 1.8; color: #555; margin-bottom: 30px; font-style: italic; min-height: 100px; }
        .new-btn { padding: 16px 40px; border: none; border-radius: 30px; background: linear-gradient(135deg, #ff9a9e, #fad0c4); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-bottom: 25px; box-shadow: 0 5px 20px rgba(255,154,158,.4); }
        .category-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px; }
        .cat-btn { padding: 10px 18px; border: 1px solid #fad0c4; border-radius: 20px; background: transparent; color: #c44569; cursor: pointer; font-size: .9rem; }
        .cat-btn.active { background: #fad0c4; color: #fff; }
        .share-btn { display: block; margin: 0 auto; padding: 12px 25px; border: 1px solid #c44569; border-radius: 20px; background: transparent; color: #c44569; cursor: pointer; font-size: .9rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header><h1>✨ Daily Affirmation</h1></header>
        <div class="affirmation-section">
            <div class="category-btns">
                <button class="cat-btn active" onclick="setCat('all')">All</button>
                <button class="cat-btn" onclick="setCat('confidence')">Confidence</button>
                <button class="cat-btn" onclick="setCat('success')">Success</button>
                <button class="cat-btn" onclick="setCat('peace')">Peace</button>
                <button class="cat-btn" onclick="setCat('love')">Love</button>
            </div>
            <div class="affirmation-icon">💖</div>
            <div class="affirmation-text" id="affirmationText">Get a new affirmation</div>
            <button class="new-btn" onclick="newAffirmation()">New Affirmation</button>
            <button class="share-btn" onclick="copyToClipboard()">Copy</button>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var affirmations = {
            confidence: [
                "I am worthy of love and respect.",
                "I love and accept myself just as I am.",
                "I have the power to overcome any challenge.",
                "My presence adds light to the world."
            ],
            success: [
                "I am moving toward success every single day.",
                "I have the ability to achieve anything I desire.",
                "Every failure is a stepping stone to success.",
                "I can turn my dreams into reality."
            ],
            peace: [
                "I am at peace in this present moment.",
                "I release stress and choose inner calm.",
                "I start my day with gratitude.",
                "Everything is falling into place."
            ],
            love: [
                "I am worthy of love.",
                "I spread love and kindness to others.",
                "My heart is filled with love.",
                "I am kind and gentle with myself."
            ]
        };
        var category = 'all';
        function setCat(c) {
            category = c;
            document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
            event.target.classList.add('active');
            newAffirmation();
        }
        function newAffirmation() {
            var pool = [];
            if (category === 'all') {
                Object.keys(affirmations).forEach(function(k) { pool = pool.concat(affirmations[k]); });
            } else {
                pool = affirmations[category] || [];
            }
            var text = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('affirmationText').textContent = text;
        }
        function copyToClipboard() {
            var text = document.getElementById('affirmationText').textContent;
            navigator.clipboard.writeText(text).then(function() { alert('Copied!'); });
        }
        newAffirmation();
    </script>
</body>
</html>
