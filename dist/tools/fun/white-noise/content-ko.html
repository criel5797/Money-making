<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="noindex,follow"><meta name="googlebot" content="noindex"><link rel="canonical" href="https://instaidea.org/tools/fun/white-noise/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>백색 소음 - 집중력 향상 사운드</title>
    <meta name="description" content="무료 백색 소음 생성기. 집중력 향상과 수면에 도움이 되는 다양한 소리를 들어보세요.">
    <meta name="keywords" content="백색 소음, 화이트 노이즈, 집중력, 수면, ASMR">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.3);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.6); font-size: 0.95rem; }
        .noise-section {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .sound-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .sound-btn {
            aspect-ratio: 1;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            background: rgba(255,255,255,0.05);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .sound-btn span {
            font-size: 0.75rem;
            opacity: 0.7;
        }
        .sound-btn:hover {
            background: rgba(255,255,255,0.1);
            border-color: rgba(255,255,255,0.3);
        }
        .sound-btn.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
            box-shadow: 0 0 20px rgba(102, 126, 234, 0.3);
        }
        .volume-control {
            margin: 20px 0;
        }
        .volume-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
        .volume-slider {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255,255,255,0.1);
            -webkit-appearance: none;
        }
        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #667eea;
            cursor: pointer;
        }
        .master-control {
            text-align: center;
            margin-top: 25px;
        }
        .play-btn {
            width: 80px;
            height: 80px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            font-size: 2rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.4);
        }
        .play-btn:hover {
            transform: scale(1.05);
        }
        .play-btn.playing {
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 20px rgba(102, 126, 234, 0.4); }
            50% { box-shadow: 0 0 40px rgba(102, 126, 234, 0.6); }
        }
        .timer-section {
            margin-top: 25px;
            text-align: center;
        }
        .timer-label {
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 10px;
        }
        .timer-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        .timer-btn {
            padding: 8px 16px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 20px;
            background: transparent;
            color: white;
            font-size: 0.85rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .timer-btn:hover {
            background: rgba(255,255,255,0.1);
        }
        .timer-btn.active {
            background: rgba(102, 126, 234, 0.3);
            border-color: #667eea;
        }
        .timer-display {
            margin-top: 15px;
            font-size: 1.2rem;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고 영역</div>
        <header>
            <h1>🎧 백색 소음</h1>
            <p class="subtitle">집중력 향상과 편안한 수면을 위한 소리</p>
        </header>
        <div class="noise-section">
            <div class="sound-grid">
                <button class="sound-btn" data-sound="white" onclick="toggleSound('white')">
                    📻<span>화이트</span>
                </button>
                <button class="sound-btn" data-sound="pink" onclick="toggleSound('pink')">
                    🌸<span>핑크</span>
                </button>
                <button class="sound-btn" data-sound="brown" onclick="toggleSound('brown')">
                    🍂<span>브라운</span>
                </button>
                <button class="sound-btn" data-sound="rain" onclick="toggleSound('rain')">
                    🌧️<span>빗소리</span>
                </button>
                <button class="sound-btn" data-sound="ocean" onclick="toggleSound('ocean')">
                    🌊<span>파도</span>
                </button>
                <button class="sound-btn" data-sound="fire" onclick="toggleSound('fire')">
                    🔥<span>모닥불</span>
                </button>
                <button class="sound-btn" data-sound="forest" onclick="toggleSound('forest')">
                    🌲<span>숲</span>
                </button>
                <button class="sound-btn" data-sound="wind" onclick="toggleSound('wind')">
                    💨<span>바람</span>
                </button>
                <button class="sound-btn" data-sound="thunder" onclick="toggleSound('thunder')">
                    ⛈️<span>천둥</span>
                </button>
            </div>
            <div class="volume-control">
                <div class="volume-label">
                    <span>🔈 볼륨</span>
                    <span id="volumeValue">50%</span>
                </div>
                <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" oninput="setVolume(this.value)">
            </div>
            <div class="master-control">
                <button class="play-btn" id="playBtn" onclick="toggleMaster()">▶</button>
            </div>
            <div class="timer-section">
                <div class="timer-label">⏰ 자동 종료 타이머</div>
                <div class="timer-buttons">
                    <button class="timer-btn" onclick="setTimer(0)">없음</button>
                    <button class="timer-btn" onclick="setTimer(15)">15분</button>
                    <button class="timer-btn" onclick="setTimer(30)">30분</button>
                    <button class="timer-btn" onclick="setTimer(60)">1시간</button>
                    <button class="timer-btn" onclick="setTimer(120)">2시간</button>
                </div>
                <div class="timer-display" id="timerDisplay"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고 영역</div>
    </div>
    <script>
        var audioContext = null;
        var activeSounds = {};
        var isPlaying = false;
        var masterVolume = 0.5;
        var timerMinutes = 0;
        var timerInterval = null;

        function getAudioContext() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            return audioContext;
        }

        function createNoise(type) {
            var ctx = getAudioContext();
            var bufferSize = 2 * ctx.sampleRate;
            var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            var data = buffer.getChannelData(0);

            if (type === 'white') {
                for (var i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
            } else if (type === 'pink') {
                var b0 = 0, b1 = 0, b2 = 0, b3 = 0, b4 = 0, b5 = 0, b6 = 0;
                for (var i = 0; i < bufferSize; i++) {
                    var white = Math.random() * 2 - 1;
                    b0 = 0.99886 * b0 + white * 0.0555179;
                    b1 = 0.99332 * b1 + white * 0.0750759;
                    b2 = 0.96900 * b2 + white * 0.1538520;
                    b3 = 0.86650 * b3 + white * 0.3104856;
                    b4 = 0.55000 * b4 + white * 0.5329522;
                    b5 = -0.7616 * b5 - white * 0.0168980;
                    data[i] = (b0 + b1 + b2 + b3 + b4 + b5 + b6 + white * 0.5362) * 0.11;
                    b6 = white * 0.115926;
                }
            } else if (type === 'brown') {
                var lastOut = 0;
                for (var i = 0; i < bufferSize; i++) {
                    var white = Math.random() * 2 - 1;
                    data[i] = (lastOut + (0.02 * white)) / 1.02;
                    lastOut = data[i];
                    data[i] *= 3.5;
                }
            } else {
                for (var i = 0; i < bufferSize; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
            }

            return buffer;
        }

        function createNatureSound(type) {
            var ctx = getAudioContext();
            var bufferSize = 4 * ctx.sampleRate;
            var buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
            var data = buffer.getChannelData(0);

            for (var i = 0; i < bufferSize; i++) {
                var t = i / ctx.sampleRate;
                var noise = Math.random() * 2 - 1;

                if (type === 'rain') {
                    data[i] = noise * 0.3 * (1 + 0.3 * Math.sin(t * 0.5));
                } else if (type === 'ocean') {
                    data[i] = noise * 0.4 * (0.5 + 0.5 * Math.sin(t * 0.1));
                } else if (type === 'fire') {
                    data[i] = noise * 0.2 * (1 + 0.5 * Math.random());
                } else if (type === 'forest') {
                    data[i] = noise * 0.15 * (1 + 0.2 * Math.sin(t * 2));
                } else if (type === 'wind') {
                    data[i] = noise * 0.25 * (0.7 + 0.3 * Math.sin(t * 0.3));
                } else if (type === 'thunder') {
                    data[i] = noise * 0.35 * (0.6 + 0.4 * Math.sin(t * 0.05));
                } else {
                    data[i] = noise * 0.3;
                }
            }
            return buffer;
        }

        function toggleSound(type) {
            var btn = document.querySelector('[data-sound="' + type + '"]');

            if (activeSounds[type]) {
                activeSounds[type].source.stop();
                delete activeSounds[type];
                btn.classList.remove('active');
            } else {
                var ctx = getAudioContext();
                var buffer = (type === 'white' || type === 'pink' || type === 'brown')
                    ? createNoise(type) : createNatureSound(type);

                var source = ctx.createBufferSource();
                source.buffer = buffer;
                source.loop = true;

                var gainNode = ctx.createGain();
                gainNode.gain.value = masterVolume;

                source.connect(gainNode);
                gainNode.connect(ctx.destination);

                if (isPlaying) source.start();

                activeSounds[type] = { source: source, gain: gainNode };
                btn.classList.add('active');
            }
        }

        function toggleMaster() {
            var btn = document.getElementById('playBtn');
            var ctx = getAudioContext();

            if (isPlaying) {
                Object.keys(activeSounds).forEach(function(key) {
                    activeSounds[key].source.stop();
                    var newSource = ctx.createBufferSource();
                    newSource.buffer = activeSounds[key].source.buffer;
                    newSource.loop = true;
                    newSource.connect(activeSounds[key].gain);
                    activeSounds[key].source = newSource;
                });
                isPlaying = false;
                btn.textContent = '▶';
                btn.classList.remove('playing');
            } else {
                Object.keys(activeSounds).forEach(function(key) {
                    activeSounds[key].source.start();
                });
                isPlaying = true;
                btn.textContent = '■';
                btn.classList.add('playing');
            }
        }

        function setVolume(value) {
            masterVolume = value / 100;
            document.getElementById('volumeValue').textContent = value + '%';
            Object.keys(activeSounds).forEach(function(key) {
                activeSounds[key].gain.gain.value = masterVolume;
            });
        }

        function setTimer(minutes) {
            document.querySelectorAll('.timer-btn').forEach(function(btn) {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            if (timerInterval) clearInterval(timerInterval);

            if (minutes === 0) {
                document.getElementById('timerDisplay').textContent = '';
                return;
            }

            timerMinutes = minutes;
            var seconds = minutes * 60;

            timerInterval = setInterval(function() {
                seconds--;
                var m = Math.floor(seconds / 60);
                var s = seconds % 60;
                document.getElementById('timerDisplay').textContent =
                    m + ':' + (s < 10 ? '0' : '') + s + ' 남음';

                if (seconds <= 0) {
                    clearInterval(timerInterval);
                    if (isPlaying) toggleMaster();
                    document.getElementById('timerDisplay').textContent = '종료됨';
                }
            }, 1000);
        }
    </script>
</body>
</html>
