<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/minesweeper/index-ja.html"><meta property="og:url" content="https://instaidea.org/tools/fun/minesweeper/index-ja.html"><meta property="og:locale" content="ja_JP"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/minesweeper/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/minesweeper/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/minesweeper/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/minesweeper/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マインスイーパー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #c0c0c0, #808080); min-height: 100vh; color: #333; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(0,0,0,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; color: #666; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: #c0c0c0; border-radius: 8px; padding: 15px; border: 3px outset #fff; }
        .info-bar { display: flex; justify-content: space-between; background: #000; padding: 8px; margin-bottom: 10px; border: 2px inset #808080; }
        .info-box { background: #300; color: #f00; font-family: monospace; font-size: 1.5rem; font-weight: 700; padding: 4px 8px; min-width: 60px; text-align: center; }
        .face-btn { background: #c0c0c0; border: 2px outset #fff; padding: 4px 8px; font-size: 1.3rem; cursor: pointer; }
        .face-btn:active { border-style: inset; }
        .grid { display: grid; gap: 0; border: 3px inset #808080; background: #c0c0c0; margin-bottom: 15px; }
        .cell { aspect-ratio: 1; border: 2px outset #fff; background: #c0c0c0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: .9rem; cursor: pointer; user-select: none; }
        .cell.revealed { border: 1px solid #808080; background: #bdbdbd; }
        .cell.mine { background: #f00; }
        .cell.flagged::after { content: '🚩'; }
        .cell[data-num="1"] { color: #0000ff; }
        .cell[data-num="2"] { color: #008000; }
        .cell[data-num="3"] { color: #ff0000; }
        .cell[data-num="4"] { color: #000080; }
        .cell[data-num="5"] { color: #800000; }
        .cell[data-num="6"] { color: #008080; }
        .cell[data-num="7"] { color: #000; }
        .cell[data-num="8"] { color: #808080; }
        .difficulty { display: flex; gap: 8px; margin-bottom: 15px; }
        .diff-btn { flex: 1; padding: 10px; border: 2px outset #fff; background: #c0c0c0; font-size: .85rem; cursor: pointer; }
        .diff-btn:active, .diff-btn.active { border-style: inset; background: #a0a0a0; }
        .game-over { text-align: center; padding: 15px; background: rgba(0,0,0,.1); border-radius: 8px; margin-bottom: 15px; display: none; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: #a0a0a0; border: 2px inset #808080; padding: 10px; text-align: center; }
        .stat-value { font-size: 1.1rem; font-weight: 700; }
        .stat-label { font-size: .7rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>💣 マインスイーパー</h1>
        </header>
        <div class="game-section">
            <div class="info-bar">
                <div class="info-box" id="mineCount">010</div>
                <button class="face-btn" id="faceBtn" onclick="newGame()">😊</button>
                <div class="info-box" id="timer">000</div>
            </div>
            <div class="difficulty">
                <button class="diff-btn active" onclick="setDifficulty(9,9,10)">易しい</button>
                <button class="diff-btn" onclick="setDifficulty(16,16,40)">普通</button>
                <button class="diff-btn" onclick="setDifficulty(9,9,20)">難しい</button>
            </div>
            <div class="grid" id="grid"></div>
            <div id="gameOver" class="game-over">
                <h2 id="endMessage">ゲームオーバー！</h2>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="wins">0</div>
                    <div class="stat-label">勝利</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="bestTime">-</div>
                    <div class="stat-label">ベストタイム</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var rows = 9, cols = 9, mines = 10;
        var grid = [], revealed = [], flagged = [];
        var gameOver = false, firstClick = true;
        var timer = 0, timerInterval = null;
        var stats = JSON.parse(localStorage.getItem('mine_ja') || '{"wins":0,"best":null}');

        function initGrid() {
            grid = [];
            revealed = [];
            flagged = [];
            for (var i = 0; i < rows; i++) {
                grid.push(new Array(cols).fill(0));
                revealed.push(new Array(cols).fill(false));
                flagged.push(new Array(cols).fill(false));
            }
        }

        function placeMines(excludeR, excludeC) {
            var placed = 0;
            while (placed < mines) {
                var r = Math.floor(Math.random() * rows);
                var c = Math.floor(Math.random() * cols);
                if (grid[r][c] !== -1 && !(r === excludeR && c === excludeC)) {
                    grid[r][c] = -1;
                    placed++;
                }
            }
            for (var r = 0; r < rows; r++) {
                for (var c = 0; c < cols; c++) {
                    if (grid[r][c] !== -1) {
                        var count = 0;
                        for (var dr = -1; dr <= 1; dr++) {
                            for (var dc = -1; dc <= 1; dc++) {
                                var nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < rows && nc >= 0 && nc < cols && grid[nr][nc] === -1) count++;
                            }
                        }
                        grid[r][c] = count;
                    }
                }
            }
        }

        function render() {
            var container = document.getElementById('grid');
            container.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
            container.innerHTML = '';
            for (var r = 0; r < rows; r++) {
                for (var c = 0; c < cols; c++) {
                    var cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.r = r;
                    cell.dataset.c = c;
                    if (revealed[r][c]) {
                        cell.classList.add('revealed');
                        if (grid[r][c] === -1) {
                            cell.textContent = '💣';
                            cell.classList.add('mine');
                        } else if (grid[r][c] > 0) {
                            cell.textContent = grid[r][c];
                            cell.dataset.num = grid[r][c];
                        }
                    } else if (flagged[r][c]) {
                        cell.classList.add('flagged');
                    }
                    cell.onclick = function() { handleClick(this); };
                    cell.oncontextmenu = function(e) { e.preventDefault(); handleRightClick(this); };
                    container.appendChild(cell);
                }
            }
            document.getElementById('mineCount').textContent = String(mines - countFlags()).padStart(3, '0');
        }

        function countFlags() {
            var count = 0;
            for (var r = 0; r < rows; r++) {
                for (var c = 0; c < cols; c++) {
                    if (flagged[r][c]) count++;
                }
            }
            return count;
        }

        function handleClick(cell) {
            if (gameOver) return;
            var r = parseInt(cell.dataset.r);
            var c = parseInt(cell.dataset.c);
            if (flagged[r][c] || revealed[r][c]) return;

            if (firstClick) {
                firstClick = false;
                placeMines(r, c);
                startTimer();
            }

            reveal(r, c);
            render();
            checkWin();
        }

        function handleRightClick(cell) {
            if (gameOver) return;
            var r = parseInt(cell.dataset.r);
            var c = parseInt(cell.dataset.c);
            if (revealed[r][c]) return;
            flagged[r][c] = !flagged[r][c];
            render();
        }

        function reveal(r, c) {
            if (r < 0 || r >= rows || c < 0 || c >= cols) return;
            if (revealed[r][c] || flagged[r][c]) return;
            revealed[r][c] = true;
            if (grid[r][c] === -1) {
                endGame(false);
                return;
            }
            if (grid[r][c] === 0) {
                for (var dr = -1; dr <= 1; dr++) {
                    for (var dc = -1; dc <= 1; dc++) {
                        reveal(r + dr, c + dc);
                    }
                }
            }
        }

        function checkWin() {
            for (var r = 0; r < rows; r++) {
                for (var c = 0; c < cols; c++) {
                    if (grid[r][c] !== -1 && !revealed[r][c]) return;
                }
            }
            endGame(true);
        }

        function endGame(won) {
            gameOver = true;
            stopTimer();
            document.getElementById('faceBtn').textContent = won ? '😎' : '😵';
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('endMessage').textContent = won ? 'おめでとう！🎉' : 'ゲームオーバー！';
            if (!won) {
                for (var r = 0; r < rows; r++) {
                    for (var c = 0; c < cols; c++) {
                        if (grid[r][c] === -1) revealed[r][c] = true;
                    }
                }
                render();
            } else {
                stats.wins++;
                if (stats.best === null || timer < stats.best) stats.best = timer;
                localStorage.setItem('mine_ja', JSON.stringify(stats));
                updateStats();
            }
        }

        function newGame() {
            gameOver = false;
            firstClick = true;
            timer = 0;
            stopTimer();
            document.getElementById('timer').textContent = '000';
            document.getElementById('faceBtn').textContent = '😊';
            document.getElementById('gameOver').style.display = 'none';
            initGrid();
            render();
        }

        function setDifficulty(r, c, m) {
            rows = r; cols = c; mines = m;
            document.querySelectorAll('.diff-btn').forEach(function(btn) { btn.classList.remove('active'); });
            event.target.classList.add('active');
            newGame();
        }

        function startTimer() {
            timerInterval = setInterval(function() {
                timer++;
                document.getElementById('timer').textContent = String(timer).padStart(3, '0');
            }, 1000);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
        }

        function updateStats() {
            document.getElementById('wins').textContent = stats.wins;
            document.getElementById('bestTime').textContent = stats.best !== null ? stats.best + '秒' : '-';
        }

        updateStats();
        newGame();
    </script>
</body>
</html>
