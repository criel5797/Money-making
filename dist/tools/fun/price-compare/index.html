<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/price-compare/"><meta property="og:url" content="https://instaidea.org/tools/fun/price-compare/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/price-compare/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/price-compare/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/price-compare/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/price-compare/"><script async src="https://www.googletagmanager.com/gtag/js?id=G-CGCL4G4YMY"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js", new Date());gtag("config", "G-CGCL4G4YMY");</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단가 비교</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f093fb, #f5576c); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .compare-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .product-card { background: rgba(255,255,255,.15); border-radius: 12px; padding: 15px; margin-bottom: 15px; }
        .product-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .product-label { font-weight: 600; }
        .remove-btn { background: #ff6b6b; border: none; color: #fff; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
        .product-inputs { display: flex; gap: 10px; }
        .product-inputs input { flex: 1; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,.9); color: #333; }
        .product-inputs select { width: 80px; padding: 12px 5px; border: none; border-radius: 8px; background: rgba(255,255,255,.9); color: #333; }
        .unit-price { text-align: right; margin-top: 8px; font-size: .9rem; }
        .unit-price.best { color: #38ef7d; font-weight: 700; }
        .add-btn { width: 100%; padding: 14px; border: 1px dashed rgba(255,255,255,.5); border-radius: 10px; background: transparent; color: #fff; cursor: pointer; font-size: 1rem; margin-bottom: 15px; }
        .result-box { background: linear-gradient(135deg, #11998e, #38ef7d); padding: 20px; border-radius: 12px; text-align: center; }
        .result-title { font-size: .9rem; opacity: .9; margin-bottom: 5px; }
        .result-value { font-size: 1.3rem; font-weight: 700; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>⚖️ 단가 비교</h1>
        </header>
        <div class="compare-section">
            <div id="productList"></div>
            <button class="add-btn" onclick="addProduct()">+ 상품 추가</button>
            <div class="result-box">
                <div class="result-title">가장 저렴한 상품</div>
                <div class="result-value" id="bestResult">상품을 입력하세요</div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var products = [
            { id: 1, name: '상품 A', price: 0, amount: 0, unit: 'g' },
            { id: 2, name: '상품 B', price: 0, amount: 0, unit: 'g' }
        ];
        var nextId = 3;
        function addProduct() {
            products.push({ id: nextId++, name: '상품 ' + String.fromCharCode(64 + products.length + 1), price: 0, amount: 0, unit: 'g' });
            render();
        }
        function removeProduct(id) {
            if (products.length > 2) {
                products = products.filter(function(p) { return p.id !== id; });
                render();
            }
        }
        function updateProduct(id, field, value) {
            var product = products.find(function(p) { return p.id === id; });
            if (product) {
                if (field === 'price' || field === 'amount') {
                    product[field] = parseFloat(value) || 0;
                } else {
                    product[field] = value;
                }
                calculate();
            }
        }
        function calculate() {
            var validProducts = products.filter(function(p) { return p.price > 0 && p.amount > 0; });
            if (validProducts.length === 0) {
                document.getElementById('bestResult').textContent = '상품을 입력하세요';
                document.querySelectorAll('.unit-price').forEach(function(el) { el.classList.remove('best'); });
                return;
            }
            validProducts.forEach(function(p) {
                p.unitPrice = p.price / p.amount;
            });
            var best = validProducts.reduce(function(a, b) { return a.unitPrice < b.unitPrice ? a : b; });
            document.getElementById('bestResult').textContent = best.name + ' (' + best.unitPrice.toFixed(2) + '원/' + best.unit + ')';
            products.forEach(function(p) {
                var el = document.getElementById('unit-' + p.id);
                if (el) {
                    if (p.price > 0 && p.amount > 0) {
                        el.textContent = (p.price / p.amount).toFixed(2) + '원/' + p.unit;
                        el.classList.toggle('best', p.id === best.id);
                    } else {
                        el.textContent = '-';
                        el.classList.remove('best');
                    }
                }
            });
        }
        function render() {
            var list = document.getElementById('productList');
            list.innerHTML = '';
            products.forEach(function(p, i) {
                var div = document.createElement('div');
                div.className = 'product-card';
                div.innerHTML = '<div class="product-header"><input type="text" value="' + p.name + '" onchange="updateProduct(' + p.id + ', \'name\', this.value)" style="background:transparent;border:none;color:#fff;font-weight:600;width:100px">' + (products.length > 2 ? '<button class="remove-btn" onclick="removeProduct(' + p.id + ')">×</button>' : '') + '</div><div class="product-inputs"><input type="number" placeholder="가격" value="' + (p.price || '') + '" oninput="updateProduct(' + p.id + ', \'price\', this.value)"><input type="number" placeholder="용량" value="' + (p.amount || '') + '" oninput="updateProduct(' + p.id + ', \'amount\', this.value)"><select onchange="updateProduct(' + p.id + ', \'unit\', this.value)"><option value="g"' + (p.unit === 'g' ? ' selected' : '') + '>g</option><option value="ml"' + (p.unit === 'ml' ? ' selected' : '') + '>ml</option><option value="개"' + (p.unit === '개' ? ' selected' : '') + '>개</option><option value="kg"' + (p.unit === 'kg' ? ' selected' : '') + '>kg</option><option value="L"' + (p.unit === 'L' ? ' selected' : '') + '>L</option></select></div><div class="unit-price" id="unit-' + p.id + '">-</div>';
                list.appendChild(div);
            });
            calculate();
        }
        render();
    </script>
</body>
</html>
