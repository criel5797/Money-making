        let currentQuestion = 0;
        let answers = [];
        let resultData = {};

        function startTest() {
            document.getElementById('introSection').style.display = 'none';
            document.getElementById('questionSection').classList.add('active');
            showQuestion(0);
        }

        function showQuestion(index) {
            const q = questions[index];
            const container = document.getElementById('questionCard');

            let optionsHtml = q.options.map((opt, i) =>
                `<div class="option" onclick="selectOption(${i}, '${opt.type}')">${opt.text}</div>`
            ).join('');

            container.innerHTML = `
                <div class="question-emoji">${q.emoji}</div>
                <div class="question-text">${q.text}</div>
                <div class="options">${optionsHtml}</div>
            `;

            document.getElementById('progressFill').style.width = ((index + 1) / questions.length * 100) + '%';
            document.getElementById('progressText').textContent = `${index + 1} / ${questions.length}`;
        }

        function selectOption(optionIndex, type) {
            answers.push(type);
            document.querySelectorAll('.option')[optionIndex].classList.add('selected');

            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    showQuestion(currentQuestion);
                } else {
                    calculateResult();
                }
            }, 400);
        }

        function calculateResult() {
            const counts = {};
            answers.forEach(type => {
                counts[type] = (counts[type] || 0) + 1;
            });

            // 最も多いタイプを探す
            let maxType = 'stable';
            let maxCount = 0;
            Object.entries(counts).forEach(([type, count]) => {
                if (count > maxCount) {
                    maxCount = count;
                    maxType = type;
                }
            });

            resultData = loveTypes[maxType];
            displayResult();
        }

        function displayResult() {
            document.getElementById('questionSection').classList.remove('active');
            document.getElementById('resultSection').classList.add('show');

            document.getElementById('typeEmoji').textContent = resultData.emoji;
            document.getElementById('typeName').textContent = resultData.name;
            document.getElementById('typeTitle').textContent = resultData.title;
            document.getElementById('typeDescription').textContent = resultData.description;
            document.getElementById('typeStrength').textContent = resultData.strength;
            document.getElementById('typeWeakness').textContent = resultData.weakness;
            document.getElementById('typeAdvice').textContent = resultData.advice;

            document.getElementById('keywordTags').innerHTML = resultData.keywords.map(k =>
                `<span class="keyword-tag">#${k}</span>`
            ).join('');

            const traitLabels = {
                passion: '情熱度',
                independence: '独立性',
                romance: 'ロマンス',
                stability: '安定感'
            };

            document.getElementById('percentageSection').innerHTML = Object.entries(resultData.traits).map(([key, value]) => `
                <div class="percentage-item">
                    <div class="label-row">
                        <span class="label">${traitLabels[key]}</span>
                        <span class="value">${value}%</span>
                    </div>
                    <div class="percentage-bar">
                        <div class="percentage-fill" style="width: ${value}%"></div>
                    </div>
                </div>
            `).join('');

            document.getElementById('matchSection').innerHTML = `
                <div class="match-item good">
                    <div class="label">相性の良いタイプ</div>
                    <div class="type">💚 ${resultData.goodMatch}</div>
                </div>
                <div class="match-item bad">
                    <div class="label">注意するタイプ</div>
                    <div class="type">💔 ${resultData.badMatch}</div>
                </div>
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function shareResult() {
            const text = `💗 恋愛性向テスト結果

私の恋愛タイプ: ${resultData.emoji} ${resultData.name}
${resultData.title}

${resultData.description}

💘 あなたの恋愛スタイルも調べてみませんか？`;

            window.shareWithModal('恋愛性向テスト結果', text);
        }

        function resetTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('questionSection').classList.remove('active');
            document.getElementById('introSection').style.display = 'block';
        }
