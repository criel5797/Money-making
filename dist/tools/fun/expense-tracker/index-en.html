<!DOCTYPE html>
<html lang="en">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/expense-tracker/index-en.html"><meta property="og:url" content="https://instaidea.org/tools/fun/expense-tracker/index-en.html"><meta property="og:locale" content="en_US"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/expense-tracker/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/expense-tracker/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/expense-tracker/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/expense-tracker/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1e3c72, #2a5298); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .month-display { font-size: 1rem; opacity: .8; }
        .expense-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .summary-card { background: rgba(0,0,0,.3); border-radius: 12px; padding: 20px; margin-bottom: 20px; text-align: center; }
        .summary-label { font-size: .9rem; opacity: .7; margin-bottom: 5px; }
        .summary-value { font-size: 2rem; font-weight: 700; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; }
        .expense-list { max-height: 300px; overflow-y: auto; }
        .expense-item { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 10px; }
        .expense-info { flex: 1; }
        .expense-category { font-size: .8rem; opacity: .7; }
        .expense-amount { font-weight: 600; color: #ff6b6b; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; }
        .category-summary { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
        .cat-chip { padding: 8px 15px; background: rgba(255,255,255,.1); border-radius: 20px; font-size: .85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>💸 Expense Tracker</h1>
            <div class="month-display" id="monthDisplay"></div>
        </header>
        <div class="expense-section">
            <div class="summary-card">
                <div class="summary-label">Total This Month</div>
                <div class="summary-value" id="totalExpense">$0</div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="expenseName" placeholder="Description">
                    <input type="number" id="expenseAmount" placeholder="Amount">
                </div>
                <div class="form-row">
                    <select id="expenseCategory">
                        <option value="food">Food</option>
                        <option value="transport">Transport</option>
                        <option value="shopping">Shopping</option>
                        <option value="entertainment">Entertainment</option>
                        <option value="bills">Bills</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addExpense()">Add Expense</button>
            </div>
            <div class="expense-list" id="expenseList"></div>
            <div class="category-summary" id="categorySummary"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var catNames = { food: 'Food', transport: 'Transport', shopping: 'Shopping', entertainment: 'Entertainment', bills: 'Bills', other: 'Other' };
        var month = new Date().getMonth() + 1;
        var year = new Date().getFullYear();
        var key = 'expenses_' + year + '_' + month;
        var expenses = JSON.parse(localStorage.getItem(key) || '[]');
        document.getElementById('monthDisplay').textContent = new Date().toLocaleDateString('en-US', { year: 'numeric', month: 'long' });
        function save() { localStorage.setItem(key, JSON.stringify(expenses)); }
        function addExpense() {
            var name = document.getElementById('expenseName').value.trim();
            var amount = parseFloat(document.getElementById('expenseAmount').value) || 0;
            var category = document.getElementById('expenseCategory').value;
            if (!name || !amount) return;
            expenses.push({ name: name, amount: amount, category: category, date: new Date().toISOString() });
            save();
            document.getElementById('expenseName').value = '';
            document.getElementById('expenseAmount').value = '';
            render();
        }
        function delExpense(i) { expenses.splice(i, 1); save(); render(); }
        function render() {
            var total = expenses.reduce(function(s, e) { return s + e.amount; }, 0);
            document.getElementById('totalExpense').textContent = '$' + total.toFixed(2);
            var list = document.getElementById('expenseList');
            list.innerHTML = '';
            expenses.slice().reverse().forEach(function(e, i) {
                var div = document.createElement('div');
                div.className = 'expense-item';
                div.innerHTML = '<div class="expense-info"><div>' + e.name + '</div><div class="expense-category">' + catNames[e.category] + '</div></div><span class="expense-amount">-$' + e.amount.toFixed(2) + '</span><button class="del-btn" onclick="delExpense(' + (expenses.length - 1 - i) + ')">×</button>';
                list.appendChild(div);
            });
            var catTotals = {};
            expenses.forEach(function(e) { catTotals[e.category] = (catTotals[e.category] || 0) + e.amount; });
            var summary = document.getElementById('categorySummary');
            summary.innerHTML = '';
            Object.keys(catTotals).forEach(function(c) {
                var chip = document.createElement('span');
                chip.className = 'cat-chip';
                chip.textContent = catNames[c] + ' $' + catTotals[c].toFixed(2);
                summary.appendChild(chip);
            });
        }
        render();
    </script>
</body>
</html>
