    <meta charset="UTF-8">
    
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .card-container { margin-bottom: 20px; }
        .scratch-card { position: relative; width: 100%; height: 200px; border-radius: 16px; overflow: hidden; cursor: crosshair; touch-action: none; }
        .card-content { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #fbbf24, #f59e0b); }
        .prize { font-size: 3rem; font-weight: 700; color: #1a1a2e; text-align: center; }
        .prize-text { font-size: 1rem; }
        .scratch-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        .result { text-align: center; font-size: 1.5rem; font-weight: 700; margin-bottom: 15px; min-height: 50px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .result.win { color: #fbbf24; }
        .new-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #10b981, #059669); color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: transform .2s; }
        .new-btn:hover { transform: scale(1.02); }
        .new-btn:active { transform: scale(0.98); }
        .progress { margin-top: 15px; }
        .progress-label { font-size: .8rem; opacity: .7; margin-bottom: 8px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #10b981, #34d399); width: 0%; transition: width .3s; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .65rem; opacity: .7; }
        .history { margin-top: 15px; }
        .history-label { font-size: .8rem; opacity: .7; margin-bottom: 10px; }
        .history-items { display: flex; gap: 8px; flex-wrap: wrap; }
        .history-item { padding: 8px 12px; background: rgba(255,255,255,.1); border-radius: 8px; font-size: .85rem; }
        .history-item.win { background: rgba(251,191,36,.2); color: #fbbf24; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🎫 스크래치 카드</h1>
        </header>
        <div class="game-section">
            <div class="card-container">
                <div class="scratch-card" id="scratchCard">
                    <div class="card-content">
                        <div class="prize">
                            <div id="prizeAmount">?</div>
                            <div class="prize-text" id="prizeText">긁어서 확인하세요!</div>
                        </div>
                    </div>
                    <canvas class="scratch-layer" id="scratchCanvas"></canvas>
                </div>
            </div>
            <div class="progress">
                <div class="progress-label">긁은 영역: <span id="progressPercent">0</span>%</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>
            <div class="result" id="result">카드를 긁어보세요!</div>
            <button class="new-btn" onclick="newCard()">🎫 새 카드</button>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="cards">0</div>
                    <div class="stat-label">총 카드</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="wins">0</div>
                    <div class="stat-label">당첨</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="totalWin">0</div>
                    <div class="stat-label">총 상금</div>
                </div>
            </div>
            <div class="history">
                <div class="history-label">기록</div>
                <div class="history-items" id="history"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var prizes = [
            { amount: 0, text: '꽝!', weight: 50 },
            { amount: 100, text: '100원!', weight: 25 },
            { amount: 500, text: '500원!', weight: 15 },
            { amount: 1000, text: '1,000원!', weight: 7 },
            { amount: 5000, text: '5,000원!', weight: 2 },
            { amount: 10000, text: '10,000원!', weight: 1 }
        ];

        var canvas, ctx;
        var isDrawing = false;
        var currentPrize = null;
        var revealed = false;
        var stats = JSON.parse(localStorage.getItem('scratch_ko') || '{"cards":0,"wins":0,"totalWin":0,"history":[]}');

        function init() {
            canvas = document.getElementById('scratchCanvas');
            ctx = canvas.getContext('2d');
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            setupEvents();
            newCard();
            updateDisplay();
        }

        function resizeCanvas() {
            var rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width;
            canvas.height = rect.height;
            if (currentPrize !== null && !revealed) {
                fillScratchLayer();
            }
        }

        function fillScratchLayer() {
            ctx.fillStyle = '#6b7280';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#9ca3af';
            ctx.font = 'bold 20px sans-serif';
            ctx.textAlign = 'center';
            ctx.fillText('여기를 긁어주세요', canvas.width / 2, canvas.height / 2);
        }

        function setupEvents() {
            canvas.addEventListener('mousedown', startDraw);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', endDraw);
            canvas.addEventListener('mouseleave', endDraw);
            canvas.addEventListener('touchstart', startDraw);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', endDraw);
        }

        function getPos(e) {
            var rect = canvas.getBoundingClientRect();
            var x, y;
            if (e.touches) {
                x = e.touches[0].clientX - rect.left;
                y = e.touches[0].clientY - rect.top;
            } else {
                x = e.clientX - rect.left;
                y = e.clientY - rect.top;
            }
            return { x: x, y: y };
        }

        function startDraw(e) {
            if (revealed) return;
            e.preventDefault();
            isDrawing = true;
            draw(e);
        }

        function draw(e) {
            if (!isDrawing || revealed) return;
            e.preventDefault();
            var pos = getPos(e);
            ctx.globalCompositeOperation = 'destination-out';
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 25, 0, Math.PI * 2);
            ctx.fill();
            checkProgress();
        }

        function endDraw() {
            isDrawing = false;
        }

        function checkProgress() {
            var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            var pixels = imageData.data;
            var transparent = 0;
            var total = pixels.length / 4;

            for (var i = 3; i < pixels.length; i += 4) {
                if (pixels[i] === 0) transparent++;
            }

            var percent = Math.round((transparent / total) * 100);
            document.getElementById('progressPercent').textContent = percent;
            document.getElementById('progressFill').style.width = percent + '%';

            if (percent >= 60 && !revealed) {
                revealPrize();
            }
        }

        function revealPrize() {
            revealed = true;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            var resultEl = document.getElementById('result');
            if (currentPrize.amount > 0) {
                resultEl.textContent = '축하합니다! ' + currentPrize.text;
                resultEl.classList.add('win');
                stats.wins++;
                stats.totalWin += currentPrize.amount;
                stats.history.unshift('당첨: ' + currentPrize.text);
            } else {
                resultEl.textContent = '아쉽네요! 다음 기회에!';
                resultEl.classList.remove('win');
                stats.history.unshift('꽝');
            }

            if (stats.history.length > 10) stats.history.pop();
            localStorage.setItem('scratch_ko', JSON.stringify(stats));
            updateDisplay();
        }

        function selectPrize() {
            var totalWeight = prizes.reduce(function(sum, p) { return sum + p.weight; }, 0);
            var random = Math.random() * totalWeight;
            var cumulative = 0;

            for (var i = 0; i < prizes.length; i++) {
                cumulative += prizes[i].weight;
                if (random < cumulative) return prizes[i];
            }
            return prizes[0];
        }

        function newCard() {
            revealed = false;
            currentPrize = selectPrize();
            stats.cards++;
            localStorage.setItem('scratch_ko', JSON.stringify(stats));

            document.getElementById('prizeAmount').textContent = currentPrize.amount > 0 ? currentPrize.text : '꽝!';
            document.getElementById('prizeText').textContent = currentPrize.amount > 0 ? '당첨!' : '다음 기회에!';
            document.getElementById('result').textContent = '카드를 긁어보세요!';
            document.getElementById('result').classList.remove('win');
            document.getElementById('progressPercent').textContent = '0';
            document.getElementById('progressFill').style.width = '0%';

            fillScratchLayer();
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('cards').textContent = stats.cards;
            document.getElementById('wins').textContent = stats.wins;
            document.getElementById('totalWin').textContent = stats.totalWin.toLocaleString();

            var historyEl = document.getElementById('history');
            historyEl.innerHTML = '';
            stats.history.slice(0, 5).forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'history-item' + (item.indexOf('당첨') >= 0 ? ' win' : '');
                div.textContent = item;
                historyEl.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
