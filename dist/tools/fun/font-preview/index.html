<!DOCTYPE html><html lang="ko"><head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/font-preview/"><meta property="og:url" content="https://instaidea.org/tools/fun/font-preview/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/font-preview/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/font-preview/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/font-preview/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/font-preview/"><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>폰트 미리보기</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:linear-gradient(135deg,#2c3e50,#3498db);min-height:100vh;color:#fff;padding:20px}.container{max-width:600px;margin:0 auto}.ad-banner{background:rgba(255,255,255,.1);padding:20px;text-align:center;border-radius:12px;margin-bottom:20px}header{text-align:center;margin-bottom:30px}h1{font-size:1.8rem;margin-bottom:10px}.font-section{background:rgba(255,255,255,.1);border-radius:16px;padding:25px}.input-group{margin-bottom:20px}.input-label{font-size:.9rem;margin-bottom:10px;opacity:.8}textarea{width:100%;padding:15px;border:none;border-radius:12px;background:rgba(255,255,255,.9);color:#333;font-size:1rem;resize:vertical;min-height:80px}.controls{display:grid;grid-template-columns:1fr 1fr;gap:15px;margin-bottom:20px}select,input[type=range]{width:100%;padding:12px;border:none;border-radius:8px;background:rgba(255,255,255,.9);color:#333}.font-list{display:flex;flex-direction:column;gap:15px}.font-card{background:rgba(255,255,255,.95);border-radius:12px;padding:20px;color:#333}.font-name{font-size:.8rem;color:#666;margin-bottom:10px}.font-preview{font-size:24px;line-height:1.5;word-break:break-all}.size-label{font-size:.85rem;opacity:.8}</style></head><body><div class="container"><div class="ad-banner">광고</div><header><h1>🔤 폰트 미리보기</h1></header><div class="font-section"><div class="input-group"><div class="input-label">미리볼 텍스트</div><textarea id="previewText" placeholder="여기에 텍스트를 입력하세요">가나다라마바사 ABCDEFG 1234567890</textarea></div><div class="controls"><div><div class="size-label">글자 크기: <span id="sizeValue">24</span>px</div><input type="range" id="fontSize" min="12" max="72" value="24"></div><div><div class="size-label">글자 굵기</div><select id="fontWeight"><option value="400">보통</option><option value="700">굵게</option><option value="300">얇게</option></select></div></div><div class="font-list" id="fontList"></div></div><div class="ad-banner" style="margin-top:20px">광고</div></div><script>var fonts=["Arial","Verdana","Georgia","Times New Roman","Courier New","Impact","Comic Sans MS","Trebuchet MS","Palatino Linotype","Lucida Console"];var text=document.getElementById("previewText");var size=document.getElementById("fontSize");var weight=document.getElementById("fontWeight");function render(){var t=text.value||"가나다라마바사 ABCDEFG";var s=size.value+"px";var w=weight.value;document.getElementById("sizeValue").textContent=size.value;var list=document.getElementById("fontList");list.innerHTML="";fonts.forEach(function(f){var div=document.createElement("div");div.className="font-card";div.innerHTML='<div class="font-name"></div><div class="font-preview"></div>';div.querySelector('.font-name').textContent=f;var previewEl=div.querySelector('.font-preview');previewEl.textContent=t;previewEl.style.fontFamily=f;previewEl.style.fontSize=s;previewEl.style.fontWeight=w;list.appendChild(div)})}text.oninput=render;size.oninput=render;weight.onchange=render;render();</script></body></html>
