<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기억력 게임</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #11998e, #38ef7d); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 15px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .board { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 15px; }
        .card { aspect-ratio: 1; background: rgba(0,0,0,.3); border: none; border-radius: 10px; font-size: 2rem; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .3s; }
        .card.flipped { background: rgba(255,255,255,.9); transform: rotateY(180deg); }
        .card.matched { background: rgba(56,239,125,.5); pointer-events: none; }
        .card:not(.flipped):not(.matched):hover { background: rgba(255,255,255,.2); }
        .difficulty { display: flex; gap: 8px; margin-bottom: 15px; }
        .diff-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,.15); color: #fff; cursor: pointer; font-size: .85rem; }
        .diff-btn.active { background: rgba(255,255,255,.35); }
        .reset-btn { width: 100%; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .best-score { margin-top: 15px; text-align: center; font-size: .9rem; opacity: .8; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🧠 기억력 게임</h1>
        </header>
        <div class="game-section">
            <div class="stats">
                <div class="stat">
                    <div class="stat-value" id="moves">0</div>
                    <div class="stat-label">시도</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="matched">0</div>
                    <div class="stat-label">매칭</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="time">0s</div>
                    <div class="stat-label">시간</div>
                </div>
            </div>
            <div class="board" id="board"></div>
            <div class="difficulty">
                <button class="diff-btn active" onclick="setDifficulty(4)">쉬움</button>
                <button class="diff-btn" onclick="setDifficulty(6)">보통</button>
                <button class="diff-btn" onclick="setDifficulty(8)">어려움</button>
            </div>
            <button class="reset-btn" onclick="startGame()">새 게임</button>
            <div class="best-score" id="bestScore"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var emojis = ['🍎', '🍊', '🍋', '🍇', '🍓', '🍒', '🥝', '🍑', '🥭', '🍍', '🥥', '🍌', '🌽', '🥕', '🍆', '🌶️'];
        var gridSize = 4;
        var cards = [];
        var flipped = [];
        var matched = 0;
        var moves = 0;
        var timer = null;
        var seconds = 0;
        var isLocked = false;
        var bestScores = JSON.parse(localStorage.getItem('memory_match_ko') || '{}');
        function setDifficulty(size) {
            gridSize = size;
            document.querySelectorAll('.diff-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(size === 4 ? '쉬움' : size === 6 ? '보통' : '어려움'));
            });
            startGame();
        }
        function shuffle(array) {
            for (var i = array.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = array[i];
                array[i] = array[j];
                array[j] = temp;
            }
            return array;
        }
        function startGame() {
            clearInterval(timer);
            var pairCount = (gridSize * gridSize) / 2;
            var selectedEmojis = emojis.slice(0, pairCount);
            cards = shuffle(selectedEmojis.concat(selectedEmojis));
            flipped = [];
            matched = 0;
            moves = 0;
            seconds = 0;
            isLocked = false;
            document.getElementById('moves').textContent = '0';
            document.getElementById('matched').textContent = '0';
            document.getElementById('time').textContent = '0s';
            renderBoard();
            timer = setInterval(function() {
                seconds++;
                document.getElementById('time').textContent = seconds + 's';
            }, 1000);
            updateBestScore();
        }
        function renderBoard() {
            var board = document.getElementById('board');
            board.style.gridTemplateColumns = 'repeat(' + gridSize + ', 1fr)';
            board.innerHTML = '';
            cards.forEach(function(emoji, index) {
                var card = document.createElement('button');
                card.className = 'card';
                card.dataset.index = index;
                card.onclick = function() { flipCard(index); };
                board.appendChild(card);
            });
        }
        function flipCard(index) {
            if (isLocked) return;
            var cardEl = document.querySelectorAll('.card')[index];
            if (cardEl.classList.contains('flipped') || cardEl.classList.contains('matched')) return;
            if (flipped.length >= 2) return;
            cardEl.classList.add('flipped');
            cardEl.textContent = cards[index];
            flipped.push(index);
            if (flipped.length === 2) {
                moves++;
                document.getElementById('moves').textContent = moves;
                checkMatch();
            }
        }
        function checkMatch() {
            var first = flipped[0];
            var second = flipped[1];
            var cardEls = document.querySelectorAll('.card');
            if (cards[first] === cards[second]) {
                cardEls[first].classList.add('matched');
                cardEls[second].classList.add('matched');
                matched++;
                document.getElementById('matched').textContent = matched;
                flipped = [];
                if (matched === cards.length / 2) {
                    endGame();
                }
            } else {
                isLocked = true;
                setTimeout(function() {
                    cardEls[first].classList.remove('flipped');
                    cardEls[second].classList.remove('flipped');
                    cardEls[first].textContent = '';
                    cardEls[second].textContent = '';
                    flipped = [];
                    isLocked = false;
                }, 1000);
            }
        }
        function endGame() {
            clearInterval(timer);
            var key = 'grid' + gridSize;
            if (!bestScores[key] || moves < bestScores[key].moves) {
                bestScores[key] = { moves: moves, time: seconds };
                localStorage.setItem('memory_match_ko', JSON.stringify(bestScores));
            }
            updateBestScore();
            setTimeout(function() {
                alert('축하합니다! ' + moves + '번 시도, ' + seconds + '초 소요');
            }, 300);
        }
        function updateBestScore() {
            var key = 'grid' + gridSize;
            var best = bestScores[key];
            if (best) {
                document.getElementById('bestScore').textContent = '최고 기록: ' + best.moves + '회 / ' + best.time + '초';
            } else {
                document.getElementById('bestScore').textContent = '';
            }
        }
        startGame();
    </script>
</body>
</html>
