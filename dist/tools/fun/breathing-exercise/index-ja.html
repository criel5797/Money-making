="-";document.getElementById("breathingCircle").classList.remove("inhale");document.querySelectorAll(".phase").forEach(function(p){p.classList.remove("active")});if(cyc>0){var t=new Date().toDateString(),s=JSON.parse(localStorage.getItem("bStats")||"{}");if(s.d===t)s.c=(s.c||0)+cyc;else s={d:t,c:cyc};localStorage.setItem("bStats",JSON.stringify(s));load()}}function tick(){if(!R)return;sec++;var d=C[phs[ph]];if(sec>=d){sec=0;ph++;if(ph>=4){ph=0;cyc++;document.getElementById("cycleCount").textContent=cyc}while(C[phs[ph]]===0){ph++;if(ph>=4){ph=0;cyc++;document.getElementById("cycleCount").textContent=cyc}}run()}document.getElementById("timer").textContent=C[phs[ph]]-sec;var e=Math.floor((Date.now()-st)/1000),m=Math.floor(e/60),ss=e%60;document.getElementById("totalTime").textContent=m+":"+(ss<10?"0":"")+ss}function run(){var p=phs[ph],c=document.getElementById("breathingCircle");document.querySelectorAll(".phase").forEach(function(x){x.classList.remove("active")});if(p==="i"){document.getElementById("instruction").textContent="吸う";c.classList.remove("exhale");c.classList.add("inhale");document.getElementById("phaseInhale").classList.add("active")}else if(p==="e"){document.getElementById("instruction").textContent="吐く";c.classList.remove("inhale");document.getElementById("phaseExhale").classList.add("active")}else{document.getElementById("instruction").textContent="止める";document.getElementById(p==="h1"?"phaseHold1":"phaseHold2").classList.add("active")}document.getElementById("timer").textContent=C[p]}function load(){var t=new Date().toDateString(),s=JSON.parse(localStorage.getItem("bStats")||"{}");document.getElementById("todayCount").textContent=s.d===t?(s.c||0):0}upd();load();</script></body></html>
