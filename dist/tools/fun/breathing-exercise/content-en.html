<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Breathing Exercise</title><style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:sans-serif;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;color:#fff;padding:20px}.container{max-width:500px;margin:0 auto}.ad-banner{background:rgba(255,255,255,.1);padding:20px;text-align:center;border-radius:12px;margin-bottom:20px}header{text-align:center;margin-bottom:30px}h1{font-size:1.8rem;margin-bottom:10px}.breathing-section{background:rgba(255,255,255,.1);border-radius:16px;padding:30px;text-align:center}.pattern-select{display:flex;gap:10px;margin-bottom:30px;flex-wrap:wrap}.pattern-btn{flex:1;min-width:80px;padding:12px;border:2px solid rgba(255,255,255,.2);border-radius:10px;background:rgba(255,255,255,.1);color:#fff;cursor:pointer}.pattern-btn.active{background:rgba(255,255,255,.3);border-color:#fff}.circle-container{width:250px;height:250px;margin:0 auto 30px}.breathing-circle{width:100%;height:100%;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;transition:transform 4s ease-in-out}.breathing-circle.inhale{transform:scale(1.3)}.instruction{font-size:1.8rem;font-weight:600}.timer{font-size:3rem;font-weight:700}.phase-indicator{display:flex;justify-content:center;gap:20px;margin-bottom:25px}.phase{text-align:center}.phase.active .phase-value{color:#00cec9}.controls{display:flex;gap:15px;margin-bottom:25px}.control-btn{flex:1;padding:18px;border:none;border-radius:12px;font-size:1.1rem;font-weight:600;cursor:pointer}.start-btn{background:linear-gradient(135deg,#00b894,#00cec9);color:#fff}.stop-btn{background:rgba(255,255,255,.2);color:#fff}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;margin-bottom:20px}.stat-box{background:rgba(255,255,255,.1);padding:15px;border-radius:12px}.stat-value{font-size:1.5rem;font-weight:700}.stat-label{font-size:.8rem;opacity:.7}</style></head><body><div class="container"><div class="ad-banner">Ad</div><header><h1>🧘 Breathing Exercise</h1></header><div class="breathing-section"><div class="pattern-select"><button class="pattern-btn active" data-pattern="4-4-4-4">Box 4-4-4-4</button><button class="pattern-btn" data-pattern="4-7-8">Sleep 4-7-8</button><button class="pattern-btn" data-pattern="5-5">Relax 5-5</button></div><div class="phase-indicator"><div class="phase" id="phaseInhale"><div>Inhale</div><div class="phase-value" id="inhaleTime">4s</div></div><div class="phase" id="phaseHold1"><div>Hold</div><div class="phase-value" id="hold1Time">4s</div></div><div class="phase" id="phaseExhale"><div>Exhale</div><div class="phase-value" id="exhaleTime">4s</div></div><div class="phase" id="phaseHold2"><div>Hold</div><div class="phase-value" id="hold2Time">4s</div></div></div><div class="circle-container"><div class="breathing-circle" id="breathingCircle"><div><div class="instruction" id="instruction">Ready</div><div class="timer" id="timer">-</div></div></div></div><div class="controls"><button class="control-btn start-btn" id="startBtn" onclick="startExercise()">▶ Start</button><button class="control-btn stop-btn" onclick="stopExercise()">⏹ Stop</button></div><div class="stats"><div class="stat-box"><div class="stat-value" id="cycleCount">0</div><div class="stat-label">Breaths</div></div><div class="stat-box"><div class="stat-value" id="totalTime">0:00</div><div class="stat-label">Time</div></div><div class="stat-box"><div class="stat-value" id="todayCount">0</div><div class="stat-label">Today</div></div></div></div><div class="ad-banner" style="margin-top:20px">Ad</div></div><script>var P={"4-4-4-4":{i:4,h1:4,e:4,h2:4},"4-7-8":{i:4,h1:7,e:8,h2:0},"5-5":{i:5,h1:0,e:5,h2:0}},C=P["4-4-4-4"],R=false,ph=0,sec=0,cyc=0,st=null,iv=null,phs=["i","h1","e","h2"];document.querySelectorAll(".pattern-btn").forEach(function(b){b.onclick=function(){if(R)return;document.querySelectorAll(".pattern-btn").forEach(function(x){x.classList.remove("active")});b.classList.add("active");C=P[b.dataset.pattern];upd()}});function upd(){document.getElementById("inhaleTime").textContent=C.i+"s";document.getElementById("hold1Time").textContent=C.h1>0?C.h1+"s":"-";document.getElementById("exhaleTime").textContent=C.e+"s";document.getElementById("hold2Time").textContent=C.h2>0?C.h2+"s":"-";document.getElementById("phaseHold1").style.display=C.h1>0?"block":"none";document.getElementById("phaseHold2").style.display=C.h2>0?"block":"none"}function startExercise(){if(R)return;R=true;ph=0;sec=0;cyc=0;st=Date.now();document.getElementById("startBtn").textContent="Running";run();iv=setInterval(tick,1000)}function stopExercise(){R=false;clearInterval(iv);document.getElementById("startBtn").textContent="▶ Start";document.getElementById("instruction").textContent="Ready";document.getElementById("timer").textContent="-";document.getElementById("breathingCircle").classList.remove("inhale");document.querySelectorAll(".phase").forEach(function(p){p.classList.remove("active")});if(cyc>0){var t=new Date().toDateString(),s=JSON.parse(localStorage.getItem("bStats")||"{}");if(s.d===t)s.c=(s.c||0)+cyc;else s={d:t,c:cyc};localStorage.setItem("bStats",JSON.stringify(s));load()}}function tick(){if(!R)return;sec++;var d=C[phs[ph]];if(sec>=d){sec=0;ph++;if(ph>=4){ph=0;cyc++;document.getElementById("cycleCount").textContent=cyc}while(C[phs[ph]]===0){ph++;if(ph>=4){ph=0;cyc++;document.getElementById("cycleCount").textContent=cyc}}run()}document.getElementById("timer").textContent=C[phs[ph]]-sec;var e=Math.floor((Date.now()-st)/1000),m=Math.floor(e/60),ss=e%60;document.getElementById("totalTime").textContent=m+":"+(ss<10?"0":"")+ss}function run(){var p=phs[ph],c=document.getElementById("breathingCircle");document.querySelectorAll(".phase").forEach(function(x){x.classList.remove("active")});if(p==="i"){document.getElementById("instruction").textContent="Inhale";c.classList.remove("exhale");c.classList.add("inhale");document.getElementById("phaseInhale").classList.add("active")}else if(p==="e"){document.getElementById("instruction").textContent="Exhale";c.classList.remove("inhale");document.getElementById("phaseExhale").classList.add("active")}else{document.getElementById("instruction").textContent="Hold";document.getElementById(p==="h1"?"phaseHold1":"phaseHold2").classList.add("active")}document.getElementById("timer").textContent=C[p]}function load(){var t=new Date().toDateString(),s=JSON.parse(localStorage.getItem("bStats")||"{}");document.getElementById("todayCount").textContent=s.d===t?(s.c||0):0}upd();load();</script></body></html>
