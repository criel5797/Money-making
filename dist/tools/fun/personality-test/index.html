<!DOCTYPE html>
<html lang="ko">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/personality-test/"><meta property="og:url" content="https://instaidea.org/tools/fun/personality-test/"><meta property="og:locale" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/personality-test/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/personality-test/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/personality-test/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/personality-test/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>성격 테스트</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .intro { text-align: center; margin-bottom: 25px; }
        .intro p { opacity: .9; line-height: 1.6; }
        .start-btn, .restart-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .start-btn:hover, .restart-btn:hover { transform: scale(1.02); }
        .question-section { display: none; }
        .progress { background: rgba(255,255,255,.2); border-radius: 10px; height: 10px; margin-bottom: 20px; overflow: hidden; }
        .progress-bar { background: linear-gradient(90deg, #22c55e, #16a34a); height: 100%; transition: width .3s; }
        .question-num { font-size: .9rem; opacity: .7; margin-bottom: 10px; }
        .question-text { font-size: 1.2rem; font-weight: 600; margin-bottom: 25px; line-height: 1.5; }
        .options { display: flex; flex-direction: column; gap: 12px; }
        .option-btn { padding: 15px 20px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: left; transition: all .3s; }
        .option-btn:hover { background: rgba(255,255,255,.2); border-color: rgba(255,255,255,.5); }
        .result-section { display: none; text-align: center; }
        .result-type { font-size: 4rem; margin-bottom: 15px; }
        .result-title { font-size: 1.8rem; font-weight: 700; margin-bottom: 15px; }
        .result-desc { font-size: 1rem; line-height: 1.7; opacity: .9; margin-bottom: 20px; }
        .traits { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .trait { background: rgba(255,255,255,.2); padding: 8px 16px; border-radius: 20px; font-size: .9rem; }
        .share-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; font-weight: 600; cursor: pointer; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🧠 성격 테스트</h1>
        </header>
        <div class="game-section">
            <div class="intro-section" id="introSection">
                <div class="intro">
                    <p>12가지 질문에 답하고<br>당신의 성격 유형을 알아보세요!</p>
                </div>
                <button class="start-btn" onclick="startTest()">테스트 시작하기</button>
            </div>
            <div class="question-section" id="questionSection">
                <div class="progress"><div class="progress-bar" id="progressBar"></div></div>
                <div class="question-num" id="questionNum"></div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="options"></div>
            </div>
            <div class="result-section" id="resultSection">
                <div class="result-type" id="resultType"></div>
                <div class="result-title" id="resultTitle"></div>
                <div class="result-desc" id="resultDesc"></div>
                <div class="traits" id="traits"></div>
                <button class="share-btn" onclick="shareResult()">결과 공유하기</button>
                <button class="restart-btn" onclick="restartTest()">다시 테스트하기</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var questions = [
            { q: "주말에 시간이 생기면?", a: ["친구들과 모임을 갖는다", "집에서 혼자 쉰다"], type: ["E", "I"] },
            { q: "새로운 프로젝트를 시작할 때?", a: ["큰 그림을 먼저 그린다", "세부 계획부터 세운다"], type: ["N", "S"] },
            { q: "중요한 결정을 내릴 때?", a: ["논리와 원칙을 따른다", "감정과 가치를 고려한다"], type: ["T", "F"] },
            { q: "여행 계획을 세울 때?", a: ["미리 상세하게 계획한다", "즉흥적으로 움직인다"], type: ["J", "P"] },
            { q: "파티에서 나는?", a: ["여러 사람과 대화를 나눈다", "소수의 친한 사람과 대화한다"], type: ["E", "I"] },
            { q: "문제를 해결할 때?", a: ["상상력과 직관을 활용한다", "경험과 사실에 의존한다"], type: ["N", "S"] },
            { q: "친구가 고민을 털어놓으면?", a: ["해결책을 제시한다", "공감하고 들어준다"], type: ["T", "F"] },
            { q: "일을 처리하는 방식은?", a: ["마감 전에 미리 끝낸다", "마감 직전에 몰아서 한다"], type: ["J", "P"] },
            { q: "새로운 사람을 만날 때?", a: ["먼저 다가가서 말을 건다", "상대가 먼저 다가오길 기다린다"], type: ["E", "I"] },
            { q: "책이나 영화를 볼 때?", a: ["숨겨진 의미를 찾는다", "있는 그대로를 즐긴다"], type: ["N", "S"] },
            { q: "팀 프로젝트에서?", a: ["효율성을 중시한다", "팀원들의 화합을 중시한다"], type: ["T", "F"] },
            { q: "생활 방식은?", a: ["체계적이고 정돈된", "유연하고 자유로운"], type: ["J", "P"] }
        ];

        var types = {
            "INTJ": { emoji: "🦉", title: "전략가", desc: "독립적이고 분석적인 사고를 가진 당신은 복잡한 문제를 해결하는 것을 즐깁니다. 높은 목표를 세우고 체계적으로 달성해 나갑니다.", traits: ["분석적", "독립적", "전략적", "완벽주의"] },
            "INTP": { emoji: "🔬", title: "논리술사", desc: "호기심이 많고 창의적인 당신은 이론과 아이디어에 매료됩니다. 논리적 분석을 통해 세상을 이해하려 합니다.", traits: ["논리적", "창의적", "호기심", "분석적"] },
            "ENTJ": { emoji: "👔", title: "통솔자", desc: "카리스마 있고 결단력 있는 리더입니다. 비전을 제시하고 팀을 이끌어 목표를 달성합니다.", traits: ["리더십", "결단력", "효율적", "자신감"] },
            "ENTP": { emoji: "💡", title: "변론가", desc: "도전을 즐기고 새로운 아이디어를 탐구합니다. 논쟁을 통해 진실을 찾아갑니다.", traits: ["혁신적", "도전적", "재치있는", "적응력"] },
            "INFJ": { emoji: "🌙", title: "옹호자", desc: "이상주의적이고 통찰력이 뛰어납니다. 다른 사람을 돕고 세상을 더 나은 곳으로 만들고자 합니다.", traits: ["통찰력", "이상주의", "헌신적", "창의적"] },
            "INFP": { emoji: "🦋", title: "중재자", desc: "깊은 감성과 풍부한 상상력을 가졌습니다. 진정성 있는 삶과 의미를 추구합니다.", traits: ["이상주의", "감성적", "창의적", "공감능력"] },
            "ENFJ": { emoji: "🌟", title: "선도자", desc: "따뜻하고 카리스마 있는 당신은 다른 사람들에게 영감을 줍니다. 팀을 화합시키는 능력이 있습니다.", traits: ["카리스마", "공감능력", "리더십", "열정적"] },
            "ENFP": { emoji: "🎨", title: "활동가", desc: "열정적이고 창의적인 자유로운 영혼입니다. 가능성을 보고 사람들과 연결되는 것을 즐깁니다.", traits: ["열정적", "창의적", "사교적", "낙관적"] },
            "ISTJ": { emoji: "📋", title: "현실주의자", desc: "책임감 있고 신뢰할 수 있습니다. 전통과 규칙을 존중하며 성실하게 일을 처리합니다.", traits: ["책임감", "신뢰성", "체계적", "현실적"] },
            "ISFJ": { emoji: "🛡️", title: "수호자", desc: "따뜻하고 헌신적인 당신은 사랑하는 사람들을 보호합니다. 세심하고 배려심이 깊습니다.", traits: ["헌신적", "배려심", "신뢰성", "인내심"] },
            "ESTJ": { emoji: "🏛️", title: "경영자", desc: "조직적이고 결단력 있습니다. 규칙과 질서를 중시하며 효율적으로 일을 처리합니다.", traits: ["조직적", "결단력", "책임감", "실용적"] },
            "ESFJ": { emoji: "🤝", title: "집정관", desc: "사교적이고 협력적입니다. 다른 사람을 돌보고 조화로운 환경을 만드는 것을 좋아합니다.", traits: ["사교적", "배려심", "협력적", "충성심"] },
            "ISTP": { emoji: "🔧", title: "장인", desc: "논리적이고 실용적입니다. 손으로 직접 만들고 문제를 해결하는 것을 즐깁니다.", traits: ["실용적", "논리적", "독립적", "적응력"] },
            "ISFP": { emoji: "🎭", title: "모험가", desc: "예술적 감각과 따뜻한 마음을 가졌습니다. 현재를 즐기고 아름다움을 추구합니다.", traits: ["예술적", "온화한", "유연한", "감성적"] },
            "ESTP": { emoji: "🏄", title: "사업가", desc: "에너지 넘치고 행동 지향적입니다. 위험을 감수하고 즉각적인 결과를 추구합니다.", traits: ["대담한", "에너지", "실용적", "적응력"] },
            "ESFP": { emoji: "🎉", title: "연예인", desc: "사교적이고 즉흥적입니다. 삶을 즐기고 주변 사람들에게 기쁨을 줍니다.", traits: ["사교적", "낙관적", "즉흥적", "열정적"] }
        };

        var currentQ = 0;
        var scores = { E: 0, I: 0, N: 0, S: 0, T: 0, F: 0, J: 0, P: 0 };

        function startTest() {
            currentQ = 0;
            scores = { E: 0, I: 0, N: 0, S: 0, T: 0, F: 0, J: 0, P: 0 };
            document.getElementById('introSection').style.display = 'none';
            document.getElementById('questionSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';
            showQuestion();
        }

        function showQuestion() {
            var q = questions[currentQ];
            document.getElementById('progressBar').style.width = ((currentQ / questions.length) * 100) + '%';
            document.getElementById('questionNum').textContent = '질문 ' + (currentQ + 1) + ' / ' + questions.length;
            document.getElementById('questionText').textContent = q.q;
            var optionsHtml = '';
            for (var i = 0; i < q.a.length; i++) {
                optionsHtml += '<button class="option-btn" onclick="selectOption(' + i + ')">' + q.a[i] + '</button>';
            }
            document.getElementById('options').innerHTML = optionsHtml;
        }

        function selectOption(idx) {
            var q = questions[currentQ];
            scores[q.type[idx]]++;
            currentQ++;
            if (currentQ < questions.length) {
                showQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            var mbti = '';
            mbti += scores.E >= scores.I ? 'E' : 'I';
            mbti += scores.N >= scores.S ? 'N' : 'S';
            mbti += scores.T >= scores.F ? 'T' : 'F';
            mbti += scores.J >= scores.P ? 'J' : 'P';

            var result = types[mbti];
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultType').textContent = result.emoji;
            document.getElementById('resultTitle').textContent = mbti + ' - ' + result.title;
            document.getElementById('resultDesc').textContent = result.desc;

            var traitsHtml = '';
            for (var i = 0; i < result.traits.length; i++) {
                traitsHtml += '<span class="trait">' + result.traits[i] + '</span>';
            }
            document.getElementById('traits').innerHTML = traitsHtml;

            var history = JSON.parse(localStorage.getItem('personality_ko') || '[]');
            history.unshift({ type: mbti, date: new Date().toLocaleDateString() });
            if (history.length > 10) history.pop();
            localStorage.setItem('personality_ko', JSON.stringify(history));
        }

        function shareResult() {
            var resultTitle = document.getElementById('resultTitle').textContent;
            var text = '나의 성격 유형: ' + resultTitle + ' - 성격 테스트에서 확인해보세요!';
            if (navigator.share) {
                navigator.share({ title: '성격 테스트 결과', text: text });
            } else {
                navigator.clipboard.writeText(text);
                alert('결과가 클립보드에 복사되었습니다!');
            }
        }

        function restartTest() {
            document.getElementById('introSection').style.display = 'block';
            document.getElementById('questionSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
