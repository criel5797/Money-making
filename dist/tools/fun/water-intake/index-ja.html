<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/water-intake/index-ja.html"><meta property="og:url" content="https://instaidea.org/tools/fun/water-intake/index-ja.html"><meta property="og:locale" content="ja_JP"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/water-intake/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/water-intake/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/water-intake/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/water-intake/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>水分摂取トラッカー</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #00c6fb, #005bea); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .water-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 30px; text-align: center; }
        .water-display { position: relative; width: 200px; height: 200px; margin: 0 auto 30px; }
        .water-circle { width: 100%; height: 100%; border-radius: 50%; border: 8px solid rgba(255,255,255,.3); position: relative; overflow: hidden; }
        .water-fill { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,.4); transition: height .5s; }
        .water-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; }
        .water-amount { font-size: 2.5rem; font-weight: 700; }
        .water-goal { font-size: .9rem; opacity: .8; }
        .cup-btns { display: flex; gap: 15px; justify-content: center; margin-bottom: 25px; }
        .cup-btn { padding: 15px 25px; border: none; border-radius: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; }
        .cup-btn:hover { background: rgba(255,255,255,.3); }
        .goal-setting { margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,.2); }
        .goal-label { font-size: .9rem; opacity: .8; margin-bottom: 10px; }
        .goal-input { display: flex; gap: 10px; align-items: center; justify-content: center; }
        .goal-input input { width: 100px; padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,.9); color: #333; text-align: center; }
        .reset-btn { width: 100%; padding: 15px; margin-top: 20px; border: 1px solid rgba(255,255,255,.3); border-radius: 10px; background: transparent; color: #fff; cursor: pointer; }
        .history { margin-top: 20px; font-size: .85rem; opacity: .7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header><h1>💧 水分摂取トラッカー</h1></header>
        <div class="water-section">
            <div class="water-display">
                <div class="water-circle">
                    <div class="water-fill" id="waterFill"></div>
                </div>
                <div class="water-text">
                    <div class="water-amount" id="waterAmount">0</div>
                    <div class="water-goal">/ <span id="goalDisplay">2000</span>ml</div>
                </div>
            </div>
            <div class="cup-btns">
                <button class="cup-btn" onclick="addWater(200)">200ml</button>
                <button class="cup-btn" onclick="addWater(300)">300ml</button>
                <button class="cup-btn" onclick="addWater(500)">500ml</button>
            </div>
            <div class="goal-setting">
                <div class="goal-label">1日の目標 (ml)</div>
                <div class="goal-input">
                    <input type="number" id="goalInput" value="2000" onchange="setGoal()">
                    <span>ml</span>
                </div>
            </div>
            <button class="reset-btn" onclick="resetWater()">リセット</button>
            <div class="history" id="history"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var today = new Date().toDateString();
        var key = 'water_' + today;
        var data = JSON.parse(localStorage.getItem(key) || '{"amount":0,"goal":2000,"logs":[]}');
        function save() { localStorage.setItem(key, JSON.stringify(data)); }
        function render() {
            document.getElementById('waterAmount').textContent = data.amount;
            document.getElementById('goalDisplay').textContent = data.goal;
            document.getElementById('goalInput').value = data.goal;
            var pct = Math.min(100, (data.amount / data.goal) * 100);
            document.getElementById('waterFill').style.height = pct + '%';
            var logs = data.logs.slice(-5).reverse();
            document.getElementById('history').innerHTML = logs.length ? '最近: ' + logs.map(function(l) { return l.amount + 'ml (' + l.time + ')'; }).join(', ') : '';
        }
        function addWater(ml) {
            data.amount += ml;
            data.logs.push({ amount: ml, time: new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) });
            save();
            render();
        }
        function setGoal() {
            data.goal = parseInt(document.getElementById('goalInput').value) || 2000;
            save();
            render();
        }
        function resetWater() {
            data.amount = 0;
            data.logs = [];
            save();
            render();
        }
        render();
    </script>
</body>
</html>
