    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .score-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .score-item { text-align: center; }
        .score-label { font-size: .8rem; opacity: .7; }
        .score-value { font-size: 1.5rem; font-weight: 700; }
        .game-canvas { display: flex; justify-content: center; margin-bottom: 15px; }
        #gameCanvas { background: #0f0f23; border-radius: 8px; border: 3px solid #4ade80; }
        .controls { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; max-width: 200px; margin: 0 auto 20px; }
        .ctrl-btn { padding: 15px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; font-size: 1.3rem; cursor: pointer; }
        .ctrl-btn:active { background: rgba(255,255,255,.4); }
        .ctrl-empty { visibility: hidden; }
        .action-btns { display: flex; gap: 10px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .start-btn { background: linear-gradient(135deg, #4ade80, #22c55e); color: #fff; }
        .pause-btn { background: rgba(255,255,255,.2); color: #fff; }
        .game-over { text-align: center; padding: 20px; background: rgba(239,68,68,.2); border-radius: 12px; margin-bottom: 15px; display: none; }
        .game-over h2 { font-size: 1.5rem; margin-bottom: 10px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
        .speed-control { margin-top: 15px; text-align: center; }
        .speed-label { font-size: .8rem; opacity: .7; margin-bottom: 8px; }
        .speed-btns { display: flex; justify-content: center; gap: 8px; }
        .speed-btn { padding: 8px 16px; border: none; border-radius: 8px; background: rgba(255,255,255,.1); color: #fff; font-size: .85rem; cursor: pointer; }
        .speed-btn.active { background: #4ade80; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🐍 뱀 게임</h1>
        </header>
        <div class="game-section">
            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">점수</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">최고기록</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>
            <div class="game-canvas">
                <canvas id="gameCanvas" width="300" height="300"></canvas>
            </div>
            <div id="gameOver" class="game-over">
                <h2>게임 오버!</h2>
                <p>점수: <span id="finalScore">0</span></p>
            </div>
            <div class="controls">
                <div class="ctrl-empty"></div>
                <button class="ctrl-btn" onclick="changeDir('up')">⬆️</button>
                <div class="ctrl-empty"></div>
                <button class="ctrl-btn" onclick="changeDir('left')">⬅️</button>
                <button class="ctrl-btn" onclick="changeDir('down')">⬇️</button>
                <button class="ctrl-btn" onclick="changeDir('right')">➡️</button>
            </div>
            <div class="action-btns">
                <button class="action-btn start-btn" id="startBtn" onclick="startGame()">🎮 시작</button>
                <button class="action-btn pause-btn" id="pauseBtn" onclick="togglePause()">⏸️ 일시정지</button>
            </div>
            <div class="speed-control">
                <div class="speed-label">난이도</div>
                <div class="speed-btns">
                    <button class="speed-btn" onclick="setSpeed(150)">쉬움</button>
                    <button class="speed-btn active" onclick="setSpeed(100)">보통</button>
                    <button class="speed-btn" onclick="setSpeed(60)">어려움</button>
                </div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalGames">0</div>
                    <div class="stat-label">게임 수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgScore">0</div>
                    <div class="stat-label">평균 점수</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var gridSize = 15;
        var tileCount = canvas.width / gridSize;
        var snake = [{x: 10, y: 10}];
        var food = {x: 5, y: 5};
        var dx = 0, dy = 0;
        var score = 0;
        var gameLoop = null;
        var isPaused = false;
        var isGameOver = true;
        var speed = 100;
        var stats = JSON.parse(localStorage.getItem('snake_ko') || '{"games":0,"total":0,"high":0}');

        function drawGame() {
            ctx.fillStyle = '#0f0f23';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#ef4444';
            ctx.beginPath();
            ctx.arc(food.x * gridSize + gridSize/2, food.y * gridSize + gridSize/2, gridSize/2 - 2, 0, Math.PI * 2);
            ctx.fill();

            snake.forEach(function(segment, i) {
                ctx.fillStyle = i === 0 ? '#4ade80' : '#22c55e';
                ctx.fillRect(segment.x * gridSize + 1, segment.y * gridSize + 1, gridSize - 2, gridSize - 2);
            });
        }

        function moveSnake() {
            if (dx === 0 && dy === 0) return;

            var head = {x: snake[0].x + dx, y: snake[0].y + dy};

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                endGame();
                return;
            }

            for (var i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    endGame();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                placeFood();
            } else {
                snake.pop();
            }
        }

        function placeFood() {
            do {
                food.x = Math.floor(Math.random() * tileCount);
                food.y = Math.floor(Math.random() * tileCount);
            } while (snake.some(function(s) { return s.x === food.x && s.y === food.y; }));
        }

        function changeDir(dir) {
            if (isGameOver || isPaused) return;
            if (dir === 'up' && dy !== 1) { dx = 0; dy = -1; }
            else if (dir === 'down' && dy !== -1) { dx = 0; dy = 1; }
            else if (dir === 'left' && dx !== 1) { dx = -1; dy = 0; }
            else if (dir === 'right' && dx !== -1) { dx = 1; dy = 0; }
        }

        function startGame() {
            snake = [{x: 10, y: 10}];
            dx = 0; dy = 0;
            score = 0;
            isGameOver = false;
            isPaused = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').textContent = '🔄 재시작';
            placeFood();
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(function() {
                if (!isPaused && !isGameOver) {
                    moveSnake();
                    drawGame();
                }
            }, speed);
        }

        function togglePause() {
            if (isGameOver) return;
            isPaused = !isPaused;
            document.getElementById('pauseBtn').textContent = isPaused ? '▶️ 계속' : '⏸️ 일시정지';
        }

        function endGame() {
            isGameOver = true;
            if (gameLoop) clearInterval(gameLoop);
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('startBtn').textContent = '🎮 다시 시작';

            stats.games++;
            stats.total += score;
            if (score > stats.high) stats.high = score;
            localStorage.setItem('snake_ko', JSON.stringify(stats));
            updateStats();
        }

        function setSpeed(s) {
            speed = s;
            document.querySelectorAll('.speed-btn').forEach(function(btn) { btn.classList.remove('active'); });
            event.target.classList.add('active');
            if (!isGameOver && !isPaused) {
                clearInterval(gameLoop);
                gameLoop = setInterval(function() {
                    if (!isPaused && !isGameOver) {
                        moveSnake();
                        drawGame();
                    }
                }, speed);
            }
        }

        function updateStats() {
            document.getElementById('highScore').textContent = stats.high;
            document.getElementById('totalGames').textContent = stats.games;
            document.getElementById('avgScore').textContent = stats.games > 0 ? Math.round(stats.total / stats.games) : 0;
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'ArrowUp') changeDir('up');
            else if (e.key === 'ArrowDown') changeDir('down');
            else if (e.key === 'ArrowLeft') changeDir('left');
            else if (e.key === 'ArrowRight') changeDir('right');
        });

        updateStats();
        drawGame();
    </script>
</body>
</html>
