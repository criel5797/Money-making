    <meta charset="UTF-8">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #a855f7, #9333ea); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { opacity: .8; font-size: .9rem; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .category-btn { padding: 15px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; text-align: center; transition: all .3s; }
        .category-btn.active { background: rgba(255,255,255,.3); border-color: #fff; }
        .category-emoji { font-size: 1.5rem; display: block; margin-bottom: 5px; }
        .start-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #ec4899, #db2777); color: #fff; font-size: 1.2rem; font-weight: 700; cursor: pointer; }
        .play-section { display: none; }
        .question-num { text-align: center; font-size: .9rem; opacity: .7; margin-bottom: 15px; }
        .lyrics-card { background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1)); border-radius: 20px; padding: 30px; text-align: center; margin-bottom: 20px; min-height: 150px; }
        .lyrics-label { font-size: .9rem; opacity: .7; margin-bottom: 15px; }
        .lyrics-text { font-size: 1.3rem; font-weight: 600; line-height: 1.6; }
        .hint-section { margin-bottom: 20px; }
        .hint-btn { width: 100%; padding: 12px; border: 2px solid rgba(255,255,255,.3); border-radius: 10px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; margin-bottom: 10px; }
        .hint-text { background: rgba(255,255,255,.1); padding: 15px; border-radius: 10px; text-align: center; display: none; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .option-btn { padding: 15px; border: 2px solid rgba(255,255,255,.3); border-radius: 12px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; transition: all .3s; }
        .option-btn.correct { background: #22c55e; border-color: #22c55e; }
        .option-btn.wrong { background: #ef4444; border-color: #ef4444; }
        .score-display { text-align: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .score-text { font-size: 1.2rem; }
        .score-value { font-size: 2rem; font-weight: 700; color: #fbbf24; }
        .result-section { display: none; text-align: center; }
        .result-icon { font-size: 5rem; margin-bottom: 20px; }
        .result-score { font-size: 3rem; font-weight: 700; margin-bottom: 5px; }
        .result-total { font-size: 1.2rem; opacity: .8; margin-bottom: 25px; }
        .next-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, #22c55e, #16a34a); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; margin-top: 15px; display: none; }

<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🎵 Song Guess</h1>
            <p class="subtitle">Guess the song from lyrics!</p>
        </header>
        <div class="game-section">
            <div class="setup-section" id="setupSection">
                <div class="category-grid">
                    <button class="category-btn active" onclick="selectCategory(0)"><span class="category-emoji">🎤</span>Pop</button>
                    <button class="category-btn" onclick="selectCategory(1)"><span class="category-emoji">👶</span>Kids</button>
                    <button class="category-btn" onclick="selectCategory(2)"><span class="category-emoji">🎬</span>Movie</button>
                    <button class="category-btn" onclick="selectCategory(3)"><span class="category-emoji">🎸</span>Rock</button>
                </div>
                <button class="start-btn" onclick="startGame()">🎮 Start Game!</button>
            </div>
            <div class="play-section" id="playSection">
                <div class="question-num" id="questionNum">Question 1 / 10</div>
                <div class="lyrics-card">
                    <div class="lyrics-label">What song is this?</div>
                    <div class="lyrics-text" id="lyricsText">Lyrics appear here</div>
                </div>
                <div class="hint-section">
                    <button class="hint-btn" onclick="showHint()">💡 Show Hint</button>
                    <div class="hint-text" id="hintText">Artist: </div>
                </div>
                <div class="options-grid" id="optionsGrid"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question ➡️</button>
                <div class="score-display">
                    <div class="score-text">Current Score</div>
                    <div class="score-value" id="scoreValue">0</div>
                </div>
            </div>
            <div class="result-section" id="resultSection">
                <div class="result-icon">🏆</div>
                <div class="result-score" id="resultScore">0</div>
                <div class="result-total">/ 10 correct</div>
                <button class="start-btn" onclick="resetGame()">🔄 Play Again</button>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var songData = {
            0: [ // Pop
                { lyrics: 'Cause baby you\'re a\nfirework', answer: 'Firework', artist: 'Katy Perry', options: ['Firework', 'Roar', 'Dark Horse', 'Hot N Cold'] },
                { lyrics: 'Just dance, gonna be okay\nDa da doo-doo-mmm', answer: 'Just Dance', artist: 'Lady Gaga', options: ['Just Dance', 'Poker Face', 'Bad Romance', 'Born This Way'] },
                { lyrics: 'Hello from the other side\nI must\'ve called a thousand times', answer: 'Hello', artist: 'Adele', options: ['Hello', 'Someone Like You', 'Rolling in the Deep', 'Set Fire to the Rain'] },
                { lyrics: 'Cause I\'m happy\nClap along if you feel', answer: 'Happy', artist: 'Pharrell', options: ['Happy', 'Get Lucky', 'Blurred Lines', 'Uptown Funk'] },
                { lyrics: 'We are never ever ever\nGetting back together', answer: 'We Are Never Getting Back Together', artist: 'Taylor Swift', options: ['We Are Never Getting Back Together', 'Shake It Off', 'Blank Space', '22'] },
                { lyrics: 'I just wanna stay\nIn that lavender haze', answer: 'Lavender Haze', artist: 'Taylor Swift', options: ['Lavender Haze', 'Anti-Hero', 'Karma', 'Midnight Rain'] },
                { lyrics: 'Shape of you\nI\'m in love with your body', answer: 'Shape of You', artist: 'Ed Sheeran', options: ['Shape of You', 'Perfect', 'Thinking Out Loud', 'Photograph'] }
            ],
            1: [ // Kids
                { lyrics: 'Twinkle twinkle little star\nHow I wonder what you are', answer: 'Twinkle Twinkle', artist: 'Traditional', options: ['Twinkle Twinkle', 'ABC Song', 'Mary Had a Little Lamb', 'Row Row Row'] },
                { lyrics: 'Baby shark doo doo doo\ndoo doo doo', answer: 'Baby Shark', artist: 'Pinkfong', options: ['Baby Shark', 'Wheels on the Bus', 'Old MacDonald', 'Itsy Bitsy Spider'] },
                { lyrics: 'Let it go let it go\nCan\'t hold it back anymore', answer: 'Let It Go', artist: 'Frozen', options: ['Let It Go', 'Do You Want to Build a Snowman', 'Into the Unknown', 'Show Yourself'] },
                { lyrics: 'Hakuna Matata\nWhat a wonderful phrase', answer: 'Hakuna Matata', artist: 'Lion King', options: ['Hakuna Matata', 'Circle of Life', 'Can You Feel the Love', 'Be Prepared'] },
                { lyrics: 'Under the sea\nUnder the sea', answer: 'Under the Sea', artist: 'Little Mermaid', options: ['Under the Sea', 'Part of Your World', 'Kiss the Girl', 'Poor Unfortunate Souls'] },
                { lyrics: 'A whole new world\nA new fantastic point of view', answer: 'A Whole New World', artist: 'Aladdin', options: ['A Whole New World', 'Friend Like Me', 'Arabian Nights', 'Prince Ali'] }
            ],
            2: [ // Movie
                { lyrics: 'My heart will go on\nand on', answer: 'My Heart Will Go On', artist: 'Celine Dion', options: ['My Heart Will Go On', 'Because You Loved Me', 'The Power of Love', 'All By Myself'] },
                { lyrics: 'I will always love you\nI will always love you', answer: 'I Will Always Love You', artist: 'Whitney Houston', options: ['I Will Always Love You', 'Greatest Love of All', 'I Wanna Dance', 'Saving All My Love'] },
                { lyrics: 'See the line where the sky\nmeets the sea', answer: 'How Far I\'ll Go', artist: 'Moana', options: ['How Far Ill Go', 'Youre Welcome', 'We Know the Way', 'Shiny'] },
                { lyrics: 'This is me\nI\'m not scared to be seen', answer: 'This Is Me', artist: 'Greatest Showman', options: ['This Is Me', 'A Million Dreams', 'Never Enough', 'Rewrite the Stars'] },
                { lyrics: 'Shallow\nI\'m off the deep end', answer: 'Shallow', artist: 'Lady Gaga', options: ['Shallow', 'Always Remember Us', 'Maybe Its Time', 'Ill Never Love Again'] }
            ],
            3: [ // Rock
                { lyrics: 'We will we will\nrock you', answer: 'We Will Rock You', artist: 'Queen', options: ['We Will Rock You', 'We Are the Champions', 'Bohemian Rhapsody', 'Another One Bites'] },
                { lyrics: 'Is this the real life\nIs this just fantasy', answer: 'Bohemian Rhapsody', artist: 'Queen', options: ['Bohemian Rhapsody', 'Somebody to Love', 'Killer Queen', 'Radio Ga Ga'] },
                { lyrics: 'Hey Jude\nDon\'t make it bad', answer: 'Hey Jude', artist: 'The Beatles', options: ['Hey Jude', 'Let It Be', 'Yesterday', 'Come Together'] },
                { lyrics: 'Sweet child o mine\nSweet child o mine', answer: 'Sweet Child O Mine', artist: 'Guns N Roses', options: ['Sweet Child O Mine', 'Welcome to the Jungle', 'Paradise City', 'November Rain'] },
                { lyrics: 'I want to break free\nI want to break free', answer: 'I Want to Break Free', artist: 'Queen', options: ['I Want to Break Free', 'Dont Stop Me Now', 'Under Pressure', 'Crazy Little Thing'] },
                { lyrics: 'Dont stop believing\nHold on to that feeling', answer: 'Dont Stop Believing', artist: 'Journey', options: ['Dont Stop Believing', 'Open Arms', 'Faithfully', 'Separate Ways'] }
            ]
        };

        var selectedCategory = 0;
        var currentSongs = [];
        var songIndex = 0;
        var score = 0;
        var answered = false;

        function selectCategory(index) {
            selectedCategory = index;
            var btns = document.querySelectorAll('.category-btn');
            btns.forEach(function(btn, i) {
                btn.classList.toggle('active', i === index);
            });
        }

        function shuffleArray(arr) {
            var a = arr.slice();
            for (var i = a.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var t = a[i]; a[i] = a[j]; a[j] = t;
            }
            return a;
        }

        function startGame() {
            currentSongs = shuffleArray(songData[selectedCategory]).slice(0, 10);
            songIndex = 0;
            score = 0;

            document.getElementById('setupSection').style.display = 'none';
            document.getElementById('playSection').style.display = 'block';
            document.getElementById('resultSection').style.display = 'none';

            showSong();
        }

        function showSong() {
            answered = false;
            var song = currentSongs[songIndex];
            document.getElementById('questionNum').textContent = 'Question ' + (songIndex + 1) + ' / ' + currentSongs.length;
            document.getElementById('lyricsText').textContent = song.lyrics;
            document.getElementById('hintText').textContent = 'Artist: ' + song.artist;
            document.getElementById('hintText').style.display = 'none';
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('scoreValue').textContent = score;

            var shuffledOptions = shuffleArray(song.options);
            var html = '';
            shuffledOptions.forEach(function(opt) {
                html += '<button class="option-btn" onclick="selectAnswer(this, \'' + opt + '\', \'' + song.answer + '\')">' + opt + '</button>';
            });
            document.getElementById('optionsGrid').innerHTML = html;
        }

        function showHint() {
            document.getElementById('hintText').style.display = 'block';
        }

        function selectAnswer(btn, selected, correct) {
            if (answered) return;
            answered = true;

            var btns = document.querySelectorAll('.option-btn');
            btns.forEach(function(b) {
                if (b.textContent === correct) b.classList.add('correct');
                else if (b === btn && selected !== correct) b.classList.add('wrong');
            });

            if (selected === correct) score++;
            document.getElementById('scoreValue').textContent = score;
            document.getElementById('nextBtn').style.display = 'block';
        }

        function nextQuestion() {
            songIndex++;
            if (songIndex >= currentSongs.length) {
                endGame();
            } else {
                showSong();
            }
        }

        function endGame() {
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'block';
            document.getElementById('resultScore').textContent = score;

            var stats = JSON.parse(localStorage.getItem('songguess_en') || '{"best":0}');
            if (score > stats.best) stats.best = score;
            localStorage.setItem('songguess_en', JSON.stringify(stats));
        }

        function resetGame() {
            document.getElementById('setupSection').style.display = 'block';
            document.getElementById('playSection').style.display = 'none';
            document.getElementById('resultSection').style.display = 'none';
        }
    </script>
</body>
</html>
