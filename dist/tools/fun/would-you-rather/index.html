    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #4facfe, #00f2fe); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .question-num { text-align: center; font-size: .9rem; opacity: .8; margin-bottom: 15px; }
        .vs-container { position: relative; margin-bottom: 20px; }
        .choice-btn { width: 100%; padding: 25px 20px; border: 3px solid rgba(255,255,255,.3); border-radius: 16px; background: rgba(255,255,255,.1); color: #fff; font-size: 1.1rem; line-height: 1.5; cursor: pointer; transition: all .3s; text-align: center; }
        .choice-btn:first-child { margin-bottom: 15px; }
        .choice-btn:hover { background: rgba(255,255,255,.2); transform: scale(1.02); }
        .choice-btn.selected { background: linear-gradient(135deg, #667eea, #764ba2); border-color: #fff; }
        .choice-btn .percent { display: none; font-size: 2rem; font-weight: 700; margin-top: 10px; }
        .choice-btn.revealed .percent { display: block; }
        .vs-badge { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #f093fb, #f5576c); width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.2rem; z-index: 10; }
        .next-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.1rem; font-weight: 700; cursor: pointer; display: none; }
        .next-btn.show { display: block; }
        .next-btn:hover { transform: scale(1.02); }
        .category-select { margin-bottom: 20px; }
        .category-label { font-size: .9rem; opacity: .8; margin-bottom: 8px; display: block; }
        .category-btns { display: flex; flex-wrap: wrap; gap: 8px; }
        .cat-btn { padding: 8px 14px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-btn.active { background: rgba(255,255,255,.4); }
        .stats { margin-top: 15px; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🤔 이거 아니면 저거</h1>
        </header>
        <div class="game-section">
            <div class="category-select">
                <label class="category-label">카테고리</label>
                <div class="category-btns">
                    <button class="cat-btn active" onclick="setCategory('all')">전체</button>
                    <button class="cat-btn" onclick="setCategory('life')">일상</button>
                    <button class="cat-btn" onclick="setCategory('power')">능력</button>
                    <button class="cat-btn" onclick="setCategory('food')">음식</button>
                </div>
            </div>
            <div class="question-num" id="questionNum">질문 1</div>
            <div class="vs-container">
                <button class="choice-btn" id="choice1" onclick="select(1)">
                    <span class="text">선택 1</span>
                    <div class="percent" id="percent1">50%</div>
                </button>
                <div class="vs-badge">VS</div>
                <button class="choice-btn" id="choice2" onclick="select(2)">
                    <span class="text">선택 2</span>
                    <div class="percent" id="percent2">50%</div>
                </button>
            </div>
            <button class="next-btn" id="nextBtn" onclick="nextQuestion()">다음 질문 →</button>
            <div class="stats">
                <div class="stats-title">📊 통계</div>
                <div class="stats-row"><span>답변한 질문</span><span id="totalAnswered">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var questions = {
            life: [
                { a: '평생 여름만 사는 것', b: '평생 겨울만 사는 것' },
                { a: '모든 사람의 마음을 읽을 수 있는 것', b: '아무도 내 마음을 읽지 못하는 것' },
                { a: '과거로 돌아갈 수 있는 것', b: '미래를 볼 수 있는 것' },
                { a: '혼자 여행하기', b: '친구와 여행하기' },
                { a: '아침형 인간', b: '저녁형 인간' },
                { a: '도시에서 살기', b: '시골에서 살기' }
            ],
            power: [
                { a: '하늘을 날 수 있는 것', b: '투명인간이 될 수 있는 것' },
                { a: '시간을 멈출 수 있는 것', b: '순간이동할 수 있는 것' },
                { a: '모든 언어를 할 수 있는 것', b: '모든 악기를 연주할 수 있는 것' },
                { a: '불사의 능력', b: '무한한 부' },
                { a: '초인적인 힘', b: '초인적인 속도' },
                { a: '동물과 대화하기', b: '식물과 대화하기' }
            ],
            food: [
                { a: '평생 피자만 먹기', b: '평생 치킨만 먹기' },
                { a: '매운 음식만', b: '단 음식만' },
                { a: '평생 라면만 먹기', b: '평생 밥만 먹기' },
                { a: '커피 없이 살기', b: '디저트 없이 살기' },
                { a: '좋아하는 음식 하나만 평생', b: '새로운 음식만 계속' },
                { a: '항상 뜨거운 음식', b: '항상 차가운 음식' }
            ]
        };

        var currentCategory = 'all';
        var currentQuestions = [];
        var currentIndex = 0;
        var stats = JSON.parse(localStorage.getItem('wyr_ko') || '{"answered":0,"votes":{}}');
        var answered = false;

        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.textContent.includes(
                    cat === 'all' ? '전체' : cat === 'life' ? '일상' : cat === 'power' ? '능력' : '음식'));
            });
            startGame();
        }

        function shuffle(arr) {
            for (var i = arr.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = arr[i]; arr[i] = arr[j]; arr[j] = temp;
            }
            return arr;
        }

        function getQuestions() {
            var pool = [];
            if (currentCategory === 'all') {
                for (var cat in questions) {
                    pool = pool.concat(questions[cat]);
                }
            } else {
                pool = questions[currentCategory].slice();
            }
            return shuffle(pool);
        }

        function startGame() {
            currentQuestions = getQuestions();
            currentIndex = 0;
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            var q = currentQuestions[currentIndex];
            document.getElementById('questionNum').textContent = '질문 ' + (currentIndex + 1);
            document.getElementById('choice1').querySelector('.text').textContent = q.a;
            document.getElementById('choice2').querySelector('.text').textContent = q.b;
            document.getElementById('choice1').className = 'choice-btn';
            document.getElementById('choice2').className = 'choice-btn';
            document.getElementById('nextBtn').classList.remove('show');
        }

        function select(choice) {
            if (answered) return;
            answered = true;
            var q = currentQuestions[currentIndex];
            var key = q.a + '|' + q.b;
            if (!stats.votes[key]) stats.votes[key] = { a: 0, b: 0 };
            if (choice === 1) {
                stats.votes[key].a++;
                document.getElementById('choice1').classList.add('selected');
            } else {
                stats.votes[key].b++;
                document.getElementById('choice2').classList.add('selected');
            }
            stats.answered++;
            localStorage.setItem('wyr_ko', JSON.stringify(stats));
            var total = stats.votes[key].a + stats.votes[key].b;
            var p1 = Math.round(stats.votes[key].a / total * 100);
            var p2 = 100 - p1;
            document.getElementById('percent1').textContent = p1 + '%';
            document.getElementById('percent2').textContent = p2 + '%';
            document.getElementById('choice1').classList.add('revealed');
            document.getElementById('choice2').classList.add('revealed');
            document.getElementById('nextBtn').classList.add('show');
            updateStats();
        }

        function nextQuestion() {
            currentIndex++;
            if (currentIndex >= currentQuestions.length) {
                currentIndex = 0;
                currentQuestions = getQuestions();
            }
            showQuestion();
        }

        function updateStats() {
            document.getElementById('totalAnswered').textContent = stats.answered;
        }

        startGame();
        updateStats();
    </script>
</body>
</html>
