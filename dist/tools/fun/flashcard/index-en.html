    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ff512f, #f09819); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .card-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .flashcard { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; padding: 30px; min-height: 200px; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; margin-bottom: 20px; transition: transform .3s; }
        .flashcard:hover { transform: scale(1.02); }
        .flashcard-content { font-size: 1.3rem; font-weight: 600; }
        .flashcard.flipped { background: linear-gradient(135deg, #11998e, #38ef7d); }
        .nav-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; font-size: 1.2rem; cursor: pointer; }
        .progress { text-align: center; margin-bottom: 20px; font-size: .9rem; opacity: .8; }
        .deck-section { margin-top: 20px; }
        .deck-title { font-size: .9rem; margin-bottom: 10px; }
        .add-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 15px; }
        .add-form input, .add-form textarea { padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-form textarea { min-height: 60px; resize: vertical; }
        .add-btn { padding: 12px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-weight: 600; cursor: pointer; }
        .card-count { font-size: .8rem; opacity: .7; margin-top: 10px; }
        .shuffle-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>📚 Flashcards</h1>
        </header>
        <div class="card-section">
            <div class="progress" id="progress">1 / 0</div>
            <div class="flashcard" id="flashcard" onclick="flipCard()">
                <div class="flashcard-content" id="cardContent">Add some cards</div>
            </div>
            <div class="nav-btns">
                <button class="nav-btn" onclick="prevCard()">◀</button>
                <button class="nav-btn" onclick="nextCard()">▶</button>
            </div>
            <button class="shuffle-btn" onclick="shuffleDeck()">🔀 Shuffle</button>
            <div class="deck-section">
                <div class="deck-title">Add New Card</div>
                <div class="add-form">
                    <input type="text" id="frontInput" placeholder="Front (Question)">
                    <textarea id="backInput" placeholder="Back (Answer)"></textarea>
                    <button class="add-btn" onclick="addCard()">Add Card</button>
                </div>
                <div class="card-count" id="cardCount">0 cards total</div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var cards = JSON.parse(localStorage.getItem('flashcards_en') || '[]');
        var currentIndex = 0;
        var isFlipped = false;
        function save() { localStorage.setItem('flashcards_en', JSON.stringify(cards)); }
        function addCard() {
            var front = document.getElementById('frontInput').value.trim();
            var back = document.getElementById('backInput').value.trim();
            if (front && back) {
                cards.push({ front: front, back: back });
                save();
                document.getElementById('frontInput').value = '';
                document.getElementById('backInput').value = '';
                render();
            }
        }
        function flipCard() {
            if (cards.length === 0) return;
            isFlipped = !isFlipped;
            var flashcard = document.getElementById('flashcard');
            var content = document.getElementById('cardContent');
            flashcard.classList.toggle('flipped', isFlipped);
            content.textContent = isFlipped ? cards[currentIndex].back : cards[currentIndex].front;
        }
        function prevCard() {
            if (cards.length === 0) return;
            currentIndex = (currentIndex - 1 + cards.length) % cards.length;
            isFlipped = false;
            render();
        }
        function nextCard() {
            if (cards.length === 0) return;
            currentIndex = (currentIndex + 1) % cards.length;
            isFlipped = false;
            render();
        }
        function shuffleDeck() {
            for (var i = cards.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = cards[i];
                cards[i] = cards[j];
                cards[j] = temp;
            }
            currentIndex = 0;
            isFlipped = false;
            save();
            render();
        }
        function render() {
            var flashcard = document.getElementById('flashcard');
            var content = document.getElementById('cardContent');
            flashcard.classList.remove('flipped');
            if (cards.length === 0) {
                content.textContent = 'Add some cards';
                document.getElementById('progress').textContent = '0 / 0';
            } else {
                content.textContent = cards[currentIndex].front;
                document.getElementById('progress').textContent = (currentIndex + 1) + ' / ' + cards.length;
            }
            document.getElementById('cardCount').textContent = cards.length + ' cards total';
        }
        render();
    </script>
</body>
