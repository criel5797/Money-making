<!DOCTYPE html>
<html lang="en">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/quiz-game/index-en.html"><meta property="og:url" content="https://instaidea.org/tools/fun/quiz-game/index-en.html"><meta property="og:locale" content="en_US"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="ja_JP"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/quiz-game/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/quiz-game/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/quiz-game/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/quiz-game/">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Game</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #4facfe, #00f2fe); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.15); border-radius: 16px; padding: 25px; }
        .progress { display: flex; gap: 6px; margin-bottom: 20px; }
        .progress-dot { flex: 1; height: 8px; border-radius: 4px; background: rgba(255,255,255,.3); }
        .progress-dot.correct { background: #4ade80; }
        .progress-dot.wrong { background: #ef4444; }
        .progress-dot.current { background: #ffd93d; }
        .category { text-align: center; font-size: .85rem; opacity: .8; margin-bottom: 10px; }
        .question-container { background: rgba(0,0,0,.2); border-radius: 14px; padding: 20px; margin-bottom: 20px; min-height: 100px; }
        .question-number { font-size: .9rem; opacity: .7; margin-bottom: 10px; }
        .question-text { font-size: 1.15rem; line-height: 1.5; }
        .answers { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
        .answer-btn { padding: 16px; border: none; border-radius: 12px; background: rgba(255,255,255,.2); color: #fff; font-size: 1rem; cursor: pointer; text-align: left; transition: background .2s, transform .1s; }
        .answer-btn:hover:not(:disabled) { background: rgba(255,255,255,.3); }
        .answer-btn:active:not(:disabled) { transform: scale(0.98); }
        .answer-btn.correct { background: #4ade80 !important; }
        .answer-btn.wrong { background: #ef4444 !important; }
        .answer-btn:disabled { cursor: not-allowed; opacity: .7; }
        .result-box { text-align: center; padding: 30px; background: rgba(0,0,0,.2); border-radius: 14px; margin-bottom: 20px; display: none; }
        .result-score { font-size: 3rem; font-weight: 700; margin-bottom: 10px; }
        .result-text { font-size: 1.1rem; opacity: .9; }
        .next-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.1rem; cursor: pointer; font-weight: 600; display: none; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.3rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
        .start-screen { text-align: center; padding: 30px 0; }
        .start-btn { padding: 18px 40px; border: none; border-radius: 14px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.2rem; cursor: pointer; font-weight: 600; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🧠 Quiz Game</h1>
        </header>
        <div class="game-section">
            <div id="startScreen" class="start-screen">
                <p style="margin-bottom:20px;font-size:1.1rem">Test your knowledge with trivia!</p>
                <button class="start-btn" onclick="startGame()">🎯 Start Game</button>
            </div>
            <div id="gameScreen" style="display:none">
                <div class="progress" id="progress"></div>
                <div class="category" id="category"></div>
                <div class="question-container">
                    <div class="question-number" id="questionNumber"></div>
                    <div class="question-text" id="questionText"></div>
                </div>
                <div class="answers" id="answers"></div>
                <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Next Question ▶</button>
            </div>
            <div id="resultScreen" style="display:none">
                <div class="result-box" style="display:block">
                    <div class="result-score" id="finalScore">0/10</div>
                    <div class="result-text" id="resultText">Well done!</div>
                </div>
                <button class="next-btn" style="display:block" onclick="startGame()">🔄 Play Again</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalGames">0</div>
                    <div class="stat-label">Games</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="highScore">0</div>
                    <div class="stat-label">Best</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgScore">0%</div>
                    <div class="stat-label">Avg</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var questions = [
            { category: 'Science', q: 'What is the chemical formula for water?', answers: ['H2O', 'CO2', 'O2', 'N2'], correct: 0 },
            { category: 'History', q: 'In what year did World War II end?', answers: ['1945', '1944', '1946', '1939'], correct: 0 },
            { category: 'Geography', q: 'What is the largest continent?', answers: ['Asia', 'Africa', 'Europe', 'North America'], correct: 0 },
            { category: 'Sports', q: 'How many players on a soccer team?', answers: ['11', '9', '10', '12'], correct: 0 },
            { category: 'Science', q: 'What is the largest planet in our solar system?', answers: ['Jupiter', 'Saturn', 'Earth', 'Mars'], correct: 0 },
            { category: 'Culture', q: 'What is the capital of France?', answers: ['Paris', 'London', 'Berlin', 'Madrid'], correct: 0 },
            { category: 'Math', q: 'What is the value of Pi (approximately)?', answers: ['3.14', '2.71', '1.41', '1.73'], correct: 0 },
            { category: 'Geography', q: 'What is the largest ocean?', answers: ['Pacific', 'Atlantic', 'Indian', 'Arctic'], correct: 0 },
            { category: 'History', q: 'Who painted the Mona Lisa?', answers: ['Da Vinci', 'Picasso', 'Van Gogh', 'Monet'], correct: 0 },
            { category: 'Science', q: 'What gas do plants absorb?', answers: ['Carbon dioxide', 'Oxygen', 'Nitrogen', 'Hydrogen'], correct: 0 }
        ];
        var currentQuestion = 0;
        var score = 0;
        var answered = false;
        var results = [];
        var stats = JSON.parse(localStorage.getItem('quiz_en') || '{"games":0,"total":0,"correct":0,"high":0}');

        function shuffleArray(arr) {
            var shuffled = arr.slice();
            for (var i = shuffled.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = shuffled[i];
                shuffled[i] = shuffled[j];
                shuffled[j] = temp;
            }
            return shuffled;
        }

        function startGame() {
            questions = shuffleArray(questions);
            currentQuestion = 0;
            score = 0;
            results = [];
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('gameScreen').style.display = 'block';
            showQuestion();
        }

        function showQuestion() {
            answered = false;
            var q = questions[currentQuestion];
            document.getElementById('category').textContent = '📚 ' + q.category;
            document.getElementById('questionNumber').textContent = 'Question ' + (currentQuestion + 1) + ' / ' + questions.length;
            document.getElementById('questionText').textContent = q.q;

            var answersDiv = document.getElementById('answers');
            answersDiv.innerHTML = '';
            q.answers.forEach(function(answer, i) {
                var btn = document.createElement('button');
                btn.className = 'answer-btn';
                btn.textContent = answer;
                btn.onclick = function() { checkAnswer(i); };
                answersDiv.appendChild(btn);
            });

            var progress = document.getElementById('progress');
            progress.innerHTML = '';
            for (var i = 0; i < questions.length; i++) {
                var dot = document.createElement('div');
                dot.className = 'progress-dot';
                if (i < results.length) {
                    dot.classList.add(results[i] ? 'correct' : 'wrong');
                } else if (i === currentQuestion) {
                    dot.classList.add('current');
                }
                progress.appendChild(dot);
            }

            document.getElementById('nextBtn').style.display = 'none';
        }

        function checkAnswer(selected) {
            if (answered) return;
            answered = true;
            var q = questions[currentQuestion];
            var buttons = document.querySelectorAll('.answer-btn');

            buttons.forEach(function(btn, i) {
                btn.disabled = true;
                if (i === q.correct) btn.classList.add('correct');
                else if (i === selected) btn.classList.add('wrong');
            });

            if (selected === q.correct) {
                score++;
                results.push(true);
            } else {
                results.push(false);
            }

            var progress = document.getElementById('progress');
            progress.children[currentQuestion].className = 'progress-dot ' + (results[currentQuestion] ? 'correct' : 'wrong');

            if (currentQuestion < questions.length - 1) {
                document.getElementById('nextBtn').style.display = 'block';
            } else {
                setTimeout(endGame, 1000);
            }
        }

        function nextQuestion() {
            currentQuestion++;
            showQuestion();
        }

        function endGame() {
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('resultScreen').style.display = 'block';
            document.getElementById('finalScore').textContent = score + '/' + questions.length;

            var percent = Math.round(score / questions.length * 100);
            var text = percent >= 80 ? 'Excellent! 🎉' : percent >= 60 ? 'Well done! 👍' : percent >= 40 ? 'Good try! 😊' : 'Keep practicing! 💪';
            document.getElementById('resultText').textContent = text;

            stats.games++;
            stats.total += questions.length;
            stats.correct += score;
            if (score > stats.high) stats.high = score;
            localStorage.setItem('quiz_en', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('totalGames').textContent = stats.games;
            document.getElementById('highScore').textContent = stats.high;
            document.getElementById('avgScore').textContent = stats.total > 0 ? Math.round(stats.correct / stats.total * 100) + '%' : '0%';
        }

        updateStats();
    </script>
</body>
</html>
