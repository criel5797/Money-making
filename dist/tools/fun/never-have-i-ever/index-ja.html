    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>私は〜したことがない</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ec4899, #8b5cf6); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-section { margin-bottom: 20px; }
        .category-title { font-size: .9rem; opacity: .7; margin-bottom: 12px; }
        .categories { display: flex; flex-wrap: wrap; gap: 8px; }
        .category-btn { padding: 10px 16px; border: 2px solid rgba(255,255,255,.3); border-radius: 20px; background: rgba(255,255,255,.1); color: #fff; font-size: .9rem; cursor: pointer; transition: all .3s; }
        .category-btn.active { background: #fff; color: #8b5cf6; border-color: #fff; }
        .card-area { min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; }
        .card { width: 100%; background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1)); border-radius: 20px; padding: 40px 30px; text-align: center; transform-style: preserve-3d; transition: transform .6s; }
        .card.flip { animation: flipCard .6s ease; }
        @keyframes flipCard { 0% { transform: rotateY(0); } 50% { transform: rotateY(90deg); } 100% { transform: rotateY(0); } }
        .card-label { font-size: 1rem; opacity: .8; margin-bottom: 15px; }
        .card-text { font-size: 1.4rem; font-weight: 700; line-height: 1.6; }
        .actions { display: flex; gap: 12px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all .3s; }
        .next-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .next-btn:hover { transform: scale(1.02); }
        .shuffle-btn { background: rgba(255,255,255,.2); color: #fff; }
        .stats { padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
        .intensity-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,.2); }
        .intensity-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .intensity-btns { display: flex; gap: 8px; }
        .intensity-btn { flex: 1; padding: 10px; border: 2px solid rgba(255,255,255,.3); border-radius: 10px; background: rgba(255,255,255,.1); color: #fff; font-size: .85rem; cursor: pointer; }
        .intensity-btn.active { background: #fff; color: #8b5cf6; border-color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🙈 私は〜したことがない</h1>
        </header>
        <div class="game-section">
            <div class="category-section">
                <div class="category-title">カテゴリー</div>
                <div class="categories" id="categories"></div>
            </div>
            <div class="intensity-section">
                <div class="intensity-title">強度</div>
                <div class="intensity-btns">
                    <button class="intensity-btn active" onclick="setIntensity('mild')">マイルド</button>
                    <button class="intensity-btn" onclick="setIntensity('medium')">普通</button>
                    <button class="intensity-btn" onclick="setIntensity('spicy')">スパイシー</button>
                </div>
            </div>
            <div class="card-area">
                <div class="card" id="card">
                    <div class="card-label">私は...</div>
                    <div class="card-text" id="cardText">ボタンを押して始めましょう！</div>
                </div>
            </div>
            <div class="actions">
                <button class="action-btn shuffle-btn" onclick="shuffle()">🔀 シャッフル</button>
                <button class="action-btn next-btn" onclick="nextCard()">👉 次へ</button>
            </div>
            <div class="stats">
                <div class="stats-title">📊 統計</div>
                <div class="stats-row"><span>見たカード</span><span id="seenCount">0</span></div>
                <div class="stats-row"><span>残りカード</span><span id="remainCount">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var prompts = {
            general: {
                mild: ["授業中に寝たこと", "嘘をついて約束をキャンセルしたこと", "一人でカラオケで歌ったこと", "傘なしで雨の中を歩いたこと", "好きな人の前で転んだこと", "こっそり泣いたこと", "一日中寝たこと", "100枚以上自撮りしたこと", "好きな食べ物を一人で全部食べたこと", "友達へのプレゼントを買い忘れたこと"],
                medium: ["友達の悪口を言ったこと", "テストでカンニングしたこと", "親に嘘をついたこと", "こっそり夜食を食べたこと", "授業をサボって遊びに行ったこと", "友達の秘密を他の人に話したこと", "喧嘩して先に連絡しなかったこと", "嫉妬で狂ったふりをしたこと", "興味ないのにあるふりをしたこと", "SNSのストーリーをこっそり見たこと"],
                spicy: ["好きな人のSNSを全部見たこと", "元恋人の様子をこっそり確認したこと", "酔って記憶をなくしたこと", "友達の恋人に興味を持ったこと", "こっそり他人の携帯を見たこと", "嘘の告白をもらったこと", "好きな人がいながら他の人と会ったこと", "酔って後悔する連絡をしたこと", "嫉妬で狂った行動をしたこと", "こっそり涙を流したこと"]
            },
            travel: {
                mild: ["飛行機に乗ったこと", "海外旅行に行ったこと", "一人旅をしたこと", "キャンプをしたこと", "道に迷ったこと", "旅行中に雨に濡れたこと", "ペンションで徹夜で遊んだこと", "ドライブしながら歌ったこと", "日の出を見に行ったこと", "旅先で友達を作ったこと"],
                medium: ["旅行でお金を使い果たしたこと", "計画なしに出発したこと", "飛行機に乗り遅れたこと", "旅行中に病気になったこと", "宿泊先で問題が起きたこと", "旅先で騙されたこと", "路上で寝たこと", "旅行中に喧嘩したこと", "お金がなくて飢えたこと", "パスポートをなくしたこと"],
                spicy: ["旅先でロマンスがあったこと", "こっそり一人で旅行に行ったこと", "旅行中に危険なことがあったこと", "違法なことをしたこと", "旅行で完全に酔っぱらったこと", "知らない人の家で泊まったこと", "旅行予算の10倍使ったこと", "親に内緒で旅行に行ったこと", "旅行中に入院したこと", "海外で警察に会ったこと"]
            },
            food: {
                mild: ["一人で食事したこと", "ラーメンで食事を済ませたこと", "辛い食べ物で泣いたこと", "食べながらこぼしたこと", "料理を焦がしたこと", "デリバリーを頼んで一人で全部食べたこと", "夜中にラーメンを食べたこと", "まずい料理を美味しいと言ったこと", "冷蔵庫を漁って食べたこと", "飢えてから暴食したこと"],
                medium: ["食べて吐いたこと", "ダイエット中に暴食したこと", "食い逃げしたこと", "賞味期限切れのものを食べたこと", "食べ物のことで喧嘩したこと", "食べながら泣いたこと", "お金がなくて飢えたこと", "他人の食べ物をこっそり食べたこと", "食べ過ぎて救急車を呼んだこと", "モッパンを撮ったこと"],
                spicy: ["酔って食べて全部吐いたこと", "デートで食べ物のせいで失敗したこと", "レストランで騒ぎを起こしたこと", "食べてトイレを我慢できなかったこと", "酔って変なものを食べたこと", "お金がなくて逃げたこと", "3日以上トイレに行けなかったこと", "食物アレルギーで救急病院に行ったこと", "誰よりも多く食べて驚かれたこと", "食べてすぐまた食べたこと"]
            }
        };

        var categories = ['general', 'travel', 'food'];
        var categoryNames = { general: '一般', travel: '旅行', food: '食べ物' };
        var currentCategory = 'general';
        var currentIntensity = 'mild';
        var deck = [];
        var usedCards = [];

        function initCategories() {
            var html = '';
            for (var i = 0; i < categories.length; i++) {
                var cat = categories[i];
                var active = cat === currentCategory ? 'active' : '';
                html += '<button class="category-btn ' + active + '" onclick="setCategory(\'' + cat + '\')">' + categoryNames[cat] + '</button>';
            }
            document.getElementById('categories').innerHTML = html;
        }

        function setCategory(cat) {
            currentCategory = cat;
            initCategories();
            resetDeck();
        }

        function setIntensity(level) {
            currentIntensity = level;
            document.querySelectorAll('.intensity-btn').forEach(function(btn, i) {
                var levels = ['mild', 'medium', 'spicy'];
                btn.classList.toggle('active', levels[i] === level);
            });
            resetDeck();
        }

        function resetDeck() {
            deck = prompts[currentCategory][currentIntensity].slice();
            shuffle();
            usedCards = [];
            updateStats();
        }

        function shuffle() {
            for (var i = deck.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = deck[i];
                deck[i] = deck[j];
                deck[j] = temp;
            }
        }

        function nextCard() {
            if (deck.length === 0) {
                deck = usedCards.slice();
                usedCards = [];
                shuffle();
            }

            var card = deck.pop();
            usedCards.push(card);

            var cardEl = document.getElementById('card');
            cardEl.classList.add('flip');

            setTimeout(function() {
                document.getElementById('cardText').textContent = card + 'がない';
                cardEl.classList.remove('flip');
            }, 300);

            updateStats();
            saveStats();
        }

        function updateStats() {
            document.getElementById('seenCount').textContent = usedCards.length;
            document.getElementById('remainCount').textContent = deck.length;
        }

        function saveStats() {
            var stats = JSON.parse(localStorage.getItem('nhie_ja') || '{"played":0}');
            stats.played++;
            localStorage.setItem('nhie_ja', JSON.stringify(stats));
        }

        initCategories();
        resetDeck();
    </script>
</body>
</html>
