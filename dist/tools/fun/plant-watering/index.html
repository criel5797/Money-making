    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #56ab2f, #a8e063); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .plant-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,.2); border-radius: 12px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .plants { max-height: 350px; overflow-y: auto; }
        .plant-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; margin-bottom: 10px; }
        .plant-icon { font-size: 2rem; margin-right: 15px; }
        .plant-info { flex: 1; }
        .plant-name { font-weight: 600; font-size: 1.1rem; }
        .plant-schedule { font-size: .8rem; opacity: .8; margin-top: 3px; }
        .plant-status { font-size: .75rem; padding: 3px 8px; border-radius: 10px; margin-top: 5px; display: inline-block; }
        .status-ok { background: #38ef7d; color: #000; }
        .status-soon { background: #ffd93d; color: #000; }
        .status-overdue { background: #ff6b6b; color: #fff; }
        .water-btn { padding: 8px 15px; border: none; border-radius: 8px; background: #4fc3f7; color: #fff; cursor: pointer; font-weight: 600; margin-right: 8px; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🌱 식물 물주기</h1>
        </header>
        <div class="plant-section">
            <div class="stats">
                <div class="stat"><div class="stat-value" id="totalPlants">0</div><div class="stat-label">총 식물</div></div>
                <div class="stat"><div class="stat-value" id="needWater">0</div><div class="stat-label">물 필요</div></div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="plantName" placeholder="식물 이름">
                    <select id="plantIcon">
                        <option value="🌱">🌱 새싹</option>
                        <option value="🌿">🌿 잎</option>
                        <option value="🌵">🌵 선인장</option>
                        <option value="🌸">🌸 꽃</option>
                        <option value="🌳">🌳 나무</option>
                        <option value="🌻">🌻 해바라기</option>
                    </select>
                </div>
                <div class="form-row">
                    <select id="waterInterval">
                        <option value="1">매일</option>
                        <option value="2">2일마다</option>
                        <option value="3">3일마다</option>
                        <option value="7">일주일마다</option>
                        <option value="14">2주마다</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addPlant()">식물 추가</button>
            </div>
            <div class="plants" id="plants"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var plants = JSON.parse(localStorage.getItem('plants') || '[]');
        var intervalNames = { 1: '매일', 2: '2일마다', 3: '3일마다', 7: '일주일마다', 14: '2주마다' };
        function save() { localStorage.setItem('plants', JSON.stringify(plants)); }
        function addPlant() {
            var name = document.getElementById('plantName').value.trim();
            var icon = document.getElementById('plantIcon').value;
            var interval = parseInt(document.getElementById('waterInterval').value);
            if (!name) return;
            plants.push({ id: Date.now().toString(), name: name, icon: icon, interval: interval, lastWatered: new Date().toISOString() });
            save();
            document.getElementById('plantName').value = '';
            render();
        }
        function waterPlant(id) {
            var plant = plants.find(function(p) { return p.id === id; });
            if (plant) { plant.lastWatered = new Date().toISOString(); save(); render(); }
        }
        function deletePlant(id) {
            plants = plants.filter(function(p) { return p.id !== id; });
            save();
            render();
        }
        function getDaysUntilWater(plant) {
            var last = new Date(plant.lastWatered);
            var next = new Date(last.getTime() + plant.interval * 24 * 60 * 60 * 1000);
            var now = new Date();
            return Math.ceil((next - now) / (24 * 60 * 60 * 1000));
        }
        function render() {
            var needWaterCount = plants.filter(function(p) { return getDaysUntilWater(p) <= 0; }).length;
            document.getElementById('totalPlants').textContent = plants.length;
            document.getElementById('needWater').textContent = needWaterCount;
            var sorted = plants.slice().sort(function(a, b) { return getDaysUntilWater(a) - getDaysUntilWater(b); });
            var list = document.getElementById('plants');
            list.innerHTML = '';
            sorted.forEach(function(plant) {
                var days = getDaysUntilWater(plant);
                var status, statusText;
                if (days <= 0) { status = 'overdue'; statusText = '물 필요!'; }
                else if (days <= 1) { status = 'soon'; statusText = '내일 물주기'; }
                else { status = 'ok'; statusText = days + '일 후'; }
                var div = document.createElement('div');
                div.className = 'plant-item';
                div.innerHTML = '<div class="plant-icon">' + plant.icon + '</div><div class="plant-info"><div class="plant-name">' + plant.name + '</div><div class="plant-schedule">' + intervalNames[plant.interval] + '</div><span class="plant-status status-' + status + '">' + statusText + '</span></div><button class="water-btn" onclick="waterPlant(\'' + plant.id + '\')">💧</button><button class="del-btn" onclick="deletePlant(\'' + plant.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
