<script>window.currentLang="ko";window.toolI18n={"meta":{"title":{"ko":"BMI 계산기","en":"BMI Calculator","ja":"BMI計算機"},"desc":{"ko":"체질량지수 계산","en":"Calculate BMI","ja":"BMI計算"}},"header":{"title":{"ko":"⚖️ BMI 계산기","en":"⚖️ BMI Calculator","ja":"⚖️ BMI計算機"},"subtitle":{"ko":"건강 상태 확인","en":"Check Health","ja":"健康状態確認"}},"input":{"height":{"ko":"키 (Height)","en":"Height","ja":"身長"},"weight":{"ko":"몸무게 (Weight)","en":"Weight","ja":"体重"},"btn":{"ko":"BMI 계산하기","en":"Calculate","ja":"計算"}},"result":{"val":{"ko":"BMI","en":"BMI","ja":"BMI"},"cat":{"ko":"판정","en":"Category","ja":"判定"},"ideal":{"ko":"표준 체중","en":"Ideal Weight","ja":"標準体重"},"range":{"ko":"정상 범위","en":"Normal Range","ja":"正常範囲"}},"cats":{"under":{"ko":"저체중","en":"Underweight","ja":"低体重"},"norm":{"ko":"정상","en":"Normal","ja":"正常"},"over":{"ko":"과체중","en":"Overweight","ja":"過体重"},"obese":{"ko":"비만","en":"Obese","ja":"肥満"},"severe":{"ko":"고도비만","en":"Severe","ja":"高度肥満"}},"share":{"ko":"결과 공유","en":"Share","ja":"共有"},"disclaimer":{"ko":"참고용입니다.","en":"Reference only.","ja":"参考用です。"}};</script></head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>

        <header>
            <h1 data-i18n="header.title">⚖️ BMI 계산기</h1>
            <p class="subtitle" data-i18n="header.subtitle">체질량지수로 건강 상태를 확인하세요</p>
        </header>

        <div class="input-section">
            <div class="input-group">
                <label data-i18n="input.height">키 (Height)</label>
                <div class="input-wrapper">
                    <input type="number" id="height" placeholder="170" min="100" max="250">
                    <span class="unit">cm</span>
                </div>
            </div>
            <div class="input-group">
                <label data-i18n="input.weight">몸무게 (Weight)</label>
                <div class="input-wrapper">
                    <input type="number" id="weight" placeholder="65" min="20" max="300">
                    <span class="unit">kg</span>
                </div>
            </div>
            <button class="calculate-btn" onclick="calculateBMI()" data-i18n="input.btn">BMI 계산하기</button>
        </div>

        <div class="result-section" id="result">
            <div class="bmi-card">
                <div class="bmi-value" id="bmiValue">0.0</div>
                <div class="bmi-category" id="bmiCategory">-</div>

                <div class="bmi-bar">
                    <div class="bmi-indicator" id="bmiIndicator"></div>
                </div>
                <div class="bmi-labels">
                    <span data-i18n="cats.under">저체중</span>
                    <span data-i18n="cats.norm">정상</span>
                    <span data-i18n="cats.over">과체중</span>
                    <span data-i18n="cats.obese">비만</span>
                    <span data-i18n="cats.severe">고도비만</span>
                </div>

                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label" data-i18n="result.ideal">표준 체중</div>
                        <div class="info-value" id="idealWeight">-</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label" data-i18n="result.range">정상 체중 범위</div>
                        <div class="info-value" id="normalRange">-</div>
                    </div>
                </div>
            </div>

            <div class="category-table">
                <h3>📊 BMI Classification</h3>
                <div class="category-row" data-category="underweight">
                    <span class="category-name" data-i18n="cats.under">저체중</span>
                    <span class="category-range">18.5 ↓</span>
                </div>
                <div class="category-row" data-category="normal">
                    <span class="category-name" data-i18n="cats.norm">정상</span>
                    <span class="category-range">18.5 - 22.9</span>
                </div>
                <div class="category-row" data-category="overweight">
                    <span class="category-name" data-i18n="cats.over">과체중</span>
                    <span class="category-range">23 - 24.9</span>
                </div>
                <div class="category-row" data-category="obese">
                    <span class="category-name" data-i18n="cats.obese">비만</span>
                    <span class="category-range">25 - 29.9</span>
                </div>
                <div class="category-row" data-category="severe-obese">
                    <span class="category-name" data-i18n="cats.severe">고도비만</span>
                    <span class="category-range">30 ↑</span>
                </div>
            </div>

            <button class="share-btn" onclick="shareResult()">
                <span>📤</span> <span data-i18n="share">결과 공유하기</span>
            </button>
        </div>

        <div class="disclaimer" data-i18n="disclaimer">
            BMI는 참고용 지표입니다.
        </div>

        <div class="ad-banner" style="margin-top: 20px;">Advertisement</div>

        <footer>
            <p>© 2024 BMI Calculator</p>
        </footer>
    </div>

    <script>
        function calculateBMI() {
            const height = parseFloat(document.getElementById('height').value);
            const weight = parseFloat(document.getElementById('weight').value);
            if (!height || !weight) { alert('Please enter height and weight.'); return; }
            if (height < 50 || height > 300) { alert('Invalid height.'); return; }
            if (weight < 10 || weight > 500) { alert('Invalid weight.'); return; }

            const heightM = height / 100;
            const bmi = weight / (heightM * heightM);
            let category, colorClass;
            
            // Dynamic text retrieval needed for category name if we want JS to be localized too
            // For now, using keys or fallback
            const lang = window.currentLang || 'en';
            const cats = window.toolI18n?.cats || {};

            if (bmi < 18.5) { category = cats.under?.[lang] || 'Underweight'; colorClass = 'underweight'; }
            else if (bmi < 23) { category = cats.norm?.[lang] || 'Normal'; colorClass = 'normal'; }
            else if (bmi < 25) { category = cats.over?.[lang] || 'Overweight'; colorClass = 'overweight'; }
            else if (bmi < 30) { category = cats.obese?.[lang] || 'Obese'; colorClass = 'obese'; }
            else { category = cats.severe?.[lang] || 'Severe'; colorClass = 'severe-obese'; }

            const idealWeight = 22 * heightM * heightM;
            const minNormal = 18.5 * heightM * heightM;
            const maxNormal = 22.9 * heightM * heightM;
            let indicatorPos = ((bmi - 15) / 20) * 100;
            indicatorPos = Math.max(0, Math.min(100, indicatorPos));

            document.getElementById('bmiValue').textContent = bmi.toFixed(1);
            document.getElementById('bmiValue').className = 'bmi-value ' + colorClass;
            document.getElementById('bmiCategory').textContent = category;
            document.getElementById('bmiCategory').className = 'bmi-category ' + colorClass;
            document.getElementById('bmiIndicator').style.left = indicatorPos + '%';
            document.getElementById('idealWeight').textContent = idealWeight.toFixed(1) + ' kg';
            document.getElementById('normalRange').textContent = minNormal.toFixed(1) + ' - ' + maxNormal.toFixed(1) + ' kg';

            document.querySelectorAll('.category-row').forEach(row => {
                row.classList.remove('active');
                if (row.dataset.category === colorClass) row.classList.add('active');
            });
            document.getElementById('result').classList.add('show');
        }

        function shareResult() {
            const bmi = document.getElementById('bmiValue').textContent;
            const status = document.getElementById('bmiCategory').textContent;
            const text = `⚖️ BMI 측정 결과

나의 BMI: ${bmi}
${status} 범위에 해당해요!

💪 당신의 BMI도 측정해보세요!`;
            window.shareWithModal('BMI 계산기', text);
        }

        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) { if (e.key === 'Enter') calculateBMI(); });
        });
    </script>
<script src="/common/share-modal.js"></script><script src="/common/tool-i18n-handler.js"></script></body>
</html>
