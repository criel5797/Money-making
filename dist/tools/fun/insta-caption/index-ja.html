        function selectCategory(el) {
            document.querySelectorAll('.category-chip').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedCategory = el.dataset.cat;
        }

        function selectMood(el) {
            document.querySelectorAll('.mood-btn').forEach(m => m.classList.remove('selected'));
            el.classList.add('selected');
            selectedMood = el.dataset.mood;
        }

        function generate() {
            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="loading"></span> 生成中...';

            setTimeout(() => {
                const captions = generateCaptions();
                displayResults(captions);
                btn.disabled = false;
                btn.innerHTML = '✨ キャプション生成';
            }, 1200);
        }

        function generateCaptions() {
            const templates = captionTemplates[selectedCategory]?.[selectedMood] ||
                             captionTemplates[selectedCategory]?.emotional ||
                             captionTemplates.daily.emotional;

            const hashtags = hashtagSets[selectedCategory] || hashtagSets.daily;
            const additionalInfo = document.getElementById('additionalInfo').value;

            // Shuffle and pick 3
            const shuffled = [...templates].sort(() => Math.random() - 0.5);
            const selectedCaptions = shuffled.slice(0, 3);

            return selectedCaptions.map(caption => {
                // Add additional info if provided
                let finalCaption = caption;
                if (additionalInfo) {
                    finalCaption = caption + '\n\n📍 ' + additionalInfo;
                }

                // Generate hashtags
                const shuffledTags = [...hashtags].sort(() => Math.random() - 0.5);
                const selectedTags = shuffledTags.slice(0, 12);

                return {
                    caption: finalCaption,
                    hashtags: selectedTags.join(' ')
                };
            });
        }

        function displayResults(captions) {
            const container = document.getElementById('resultsContainer');
            container.innerHTML = captions.map((item, i) => `
                <div class="result-card">
                    <div class="result-caption">${item.caption}</div>
                    <div class="result-hashtags">${item.hashtags}</div>
                    <div class="result-actions">
                        <button class="action-btn" onclick="copyCaption(${i})">📋 キャプションのみコピー</button>
                        <button class="action-btn" onclick="copyAll(${i})">📎 全体コピー</button>
                    </div>
                </div>
            `).join('');

            window.generatedCaptions = captions;
            document.getElementById('resultsSection').classList.add('show');
            showToast('キャプションが生成されました! ✨');
        }

        function copyCaption(index) {
            const caption = window.generatedCaptions[index].caption;
            navigator.clipboard.writeText(caption);
            showToast('キャプションをコピーしました!');
        }

        function copyAll(index) {
            const item = window.generatedCaptions[index];
            const text = item.caption + '\n\n' + item.hashtags;
            navigator.clipboard.writeText(text);
            showToast('キャプション+ハッシュタグをコピーしました!');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }
    </script>
