    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #56ab2f, #a8e063); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .grocery-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .add-form { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-form input { flex: 1; padding: 14px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { padding: 14px 20px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-weight: 600; cursor: pointer; }
        .category-tabs { display: flex; gap: 5px; margin-bottom: 15px; overflow-x: auto; }
        .cat-tab { padding: 8px 15px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; white-space: nowrap; font-size: .85rem; }
        .cat-tab.active { background: rgba(255,255,255,.4); }
        .grocery-list { max-height: 350px; overflow-y: auto; }
        .grocery-item { display: flex; align-items: center; gap: 12px; padding: 14px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; }
        .grocery-item.checked { opacity: .5; }
        .grocery-item.checked .item-name { text-decoration: line-through; }
        .item-check { width: 24px; height: 24px; border: 2px solid #fff; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .item-check.done { background: #38ef7d; border-color: #38ef7d; }
        .item-name { flex: 1; font-size: 1rem; }
        .item-qty { font-size: .85rem; opacity: .8; }
        .delete-btn { background: none; border: none; color: #ff6b6b; font-size: 1.2rem; cursor: pointer; }
        .summary { display: flex; justify-content: space-between; margin-top: 15px; padding: 15px; background: rgba(0,0,0,.2); border-radius: 10px; }
        .summary span { font-size: .9rem; }
        .clear-btn { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🛒 장보기 목록</h1>
        </header>
        <div class="grocery-section">
            <div class="add-form">
                <input type="text" id="itemInput" placeholder="품목 입력" onkeypress="if(event.key==='Enter')addItem()">
                <button class="add-btn" onclick="addItem()">추가</button>
            </div>
            <div class="category-tabs">
                <button class="cat-tab active" onclick="filterCategory('all')">전체</button>
                <button class="cat-tab" onclick="filterCategory('채소')">🥬 채소</button>
                <button class="cat-tab" onclick="filterCategory('과일')">🍎 과일</button>
                <button class="cat-tab" onclick="filterCategory('육류')">🥩 육류</button>
                <button class="cat-tab" onclick="filterCategory('유제품')">🥛 유제품</button>
                <button class="cat-tab" onclick="filterCategory('기타')">📦 기타</button>
            </div>
            <div class="grocery-list" id="groceryList"></div>
            <div class="summary">
                <span id="totalItems">총 0개</span>
                <span id="checkedItems">완료 0개</span>
            </div>
            <button class="clear-btn" onclick="clearChecked()">완료 항목 삭제</button>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var items = JSON.parse(localStorage.getItem('grocery_list') || '[]');
        var currentFilter = 'all';
        function save() { localStorage.setItem('grocery_list', JSON.stringify(items)); }
        function detectCategory(name) {
            var veggies = ['양파', '마늘', '감자', '당근', '배추', '시금치', '파', '고추', '양배추', '브로콜리'];
            var fruits = ['사과', '배', '바나나', '오렌지', '포도', '딸기', '수박', '참외', '귤', '키위'];
            var meats = ['소고기', '돼지고기', '닭고기', '삼겹살', '불고기', '갈비', '오리'];
            var dairy = ['우유', '치즈', '요거트', '버터', '크림', '달걀', '계란'];
            if (veggies.some(function(v) { return name.includes(v); })) return '채소';
            if (fruits.some(function(f) { return name.includes(f); })) return '과일';
            if (meats.some(function(m) { return name.includes(m); })) return '육류';
            if (dairy.some(function(d) { return name.includes(d); })) return '유제품';
            return '기타';
        }
        function addItem() {
            var name = document.getElementById('itemInput').value.trim();
            if (name) {
                items.push({ id: Date.now().toString(), name: name, category: detectCategory(name), checked: false });
                save();
                render();
                document.getElementById('itemInput').value = '';
            }
        }
        function toggleItem(id) {
            var item = items.find(function(i) { return i.id === id; });
            if (item) item.checked = !item.checked;
            save();
            render();
        }
        function deleteItem(id) {
            items = items.filter(function(i) { return i.id !== id; });
            save();
            render();
        }
        function filterCategory(cat) {
            currentFilter = cat;
            document.querySelectorAll('.cat-tab').forEach(function(t, i) {
                t.classList.toggle('active', (i === 0 && cat === 'all') || t.textContent.includes(cat));
            });
            render();
        }
        function clearChecked() {
            items = items.filter(function(i) { return !i.checked; });
            save();
            render();
        }
        function render() {
            var filtered = currentFilter === 'all' ? items : items.filter(function(i) { return i.category === currentFilter; });
            var list = document.getElementById('groceryList');
            list.innerHTML = '';
            filtered.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'grocery-item' + (item.checked ? ' checked' : '');
                div.innerHTML = '<div class="item-check' + (item.checked ? ' done' : '') + '" onclick="toggleItem(\'' + item.id + '\')">' + (item.checked ? '✓' : '') + '</div><span class="item-name">' + item.name + '</span><button class="delete-btn" onclick="deleteItem(\'' + item.id + '\')">×</button>';
                list.appendChild(div);
            });
            document.getElementById('totalItems').textContent = '총 ' + items.length + '개';
            document.getElementById('checkedItems').textContent = '완료 ' + items.filter(function(i) { return i.checked; }).length + '개';
        }
        render();
    </script>
</body>
</html>
