        .container { max-width: 400px; margin: 0 auto; }

        .test-area.waiting { background: #e74c3c; }
        .test-area.ready { background: #f39c12; }
        .test-area.go { background: #2ecc71; }
        .test-area.result { background: #3498db; }
        .test-area.early { background: #9b59b6; }
        .test-icon { font-size: 4rem; margin-bottom: 15px; }
        .test-message { font-size: 1.3rem; font-weight: 600; text-align: center; }
        .test-time { font-size: 3rem; font-weight: 700; margin-top: 10px; }

        .history-list { display: flex; flex-wrap: wrap; gap: 8px; }
        .history-item { background: rgba(255,255,255,.1); padding: 8px 12px; border-radius: 8px; font-size: .85rem; }
        .history-item.best { background: rgba(46,204,113,.3); color: #2ecc71; }
        .ranking { background: rgba(255,255,255,.1); border-radius: 12px; padding: 15px; }
        .ranking-title { font-size: .9rem; font-weight: 600; margin-bottom: 10px; }
        .ranking-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,.1); font-size: .85rem; }
        .ranking-item:last-child { border-bottom: none; }
        .tips { margin-top: 20px; background: rgba(255,255,255,.05); border-radius: 12px; padding: 15px; }
        .tips-title { font-size: .9rem; font-weight: 600; margin-bottom: 10px; }

<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>⚡ 反応速度テスト</h1>
        </header>
        <div class="game-section">
            <div class="test-area waiting" id="testArea" onclick="handleClick()">
                <div class="test-icon" id="testIcon">🎯</div>
                <div class="test-message" id="testMessage">クリックしてスタート</div>
                <div class="test-time" id="testTime"></div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="bestTime">-</div>
                    <div class="stat-label">ベスト記録</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgTime">-</div>
                    <div class="stat-label">平均</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="attempts">0</div>
                    <div class="stat-label">試行回数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="rank">-</div>
                    <div class="stat-label">ランク</div>
                </div>
            </div>
            <div class="history">
                <div class="history-title">
                    <span>最近の記録 (ms)</span>
                    <button class="clear-btn" onclick="clearHistory()">クリア</button>
                </div>
                <div class="history-list" id="historyList"></div>
            </div>
            <div class="ranking">
                <div class="ranking-title">🏆 ランキング基準</div>
                <div class="ranking-item"><span>⚡ 雷速</span><span>&lt; 150ms</span></div>
                <div class="ranking-item"><span>🚀 超高速</span><span>150-200ms</span></div>
                <div class="ranking-item"><span>✨ 高速</span><span>200-250ms</span></div>
                <div class="ranking-item"><span>👍 普通</span><span>250-350ms</span></div>
                <div class="ranking-item"><span>🐢 遅い</span><span>&gt; 350ms</span></div>
            </div>
            <div class="tips">
                <div class="tips-title">💡 ヒント</div>
                <div class="tips-text">画面が緑色に変わったら、できるだけ速くクリックしてください！早すぎるとやり直しになります。</div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var state = 'waiting';
        var startTime = 0;
        var timeoutId = null;
        var results = JSON.parse(localStorage.getItem('reaction_test_ja') || '[]');

        function handleClick() {
            var area = document.getElementById('testArea');
            var icon = document.getElementById('testIcon');
            var message = document.getElementById('testMessage');
            var time = document.getElementById('testTime');

            if (state === 'waiting' || state === 'result' || state === 'early') {
                state = 'ready';
                area.className = 'test-area ready';
                icon.textContent = '⏳';
                message.textContent = '緑色を待って...';
                time.textContent = '';

                var delay = Math.random() * 3000 + 2000;
                timeoutId = setTimeout(function() {
                    state = 'go';
                    area.className = 'test-area go';
                    icon.textContent = '🟢';
                    message.textContent = '今すぐクリック！';
                    startTime = Date.now();
                }, delay);
            } else if (state === 'ready') {
                clearTimeout(timeoutId);
                state = 'early';
                area.className = 'test-area early';
                icon.textContent = '❌';
                message.textContent = '早すぎ！';
                time.textContent = '';
                setTimeout(function() {
                    message.textContent = 'もう一度クリック';
                }, 1000);
            } else if (state === 'go') {
                var reactionTime = Date.now() - startTime;
                state = 'result';
                area.className = 'test-area result';
                icon.textContent = '⚡';
                message.textContent = getRank(reactionTime);
                time.textContent = reactionTime + 'ms';

                results.unshift(reactionTime);
                if (results.length > 20) results.pop();
                localStorage.setItem('reaction_test_ja', JSON.stringify(results));
                updateStats();
            }
        }

        function getRank(time) {
            if (time < 150) return '雷のように速い！';
            if (time < 200) return '超高速！';
            if (time < 250) return '速い！';
            if (time < 350) return 'いいね！';
            return 'ちょっと遅いかも';
        }

        function getRankEmoji(time) {
            if (time < 150) return '⚡';
            if (time < 200) return '🚀';
            if (time < 250) return '✨';
            if (time < 350) return '👍';
            return '🐢';
        }

        function updateStats() {
            var best = results.length > 0 ? Math.min.apply(null, results) : null;
            var avg = results.length > 0 ? Math.round(results.reduce(function(a, b) { return a + b; }, 0) / results.length) : null;

            document.getElementById('bestTime').textContent = best ? best + 'ms' : '-';
            document.getElementById('avgTime').textContent = avg ? avg + 'ms' : '-';
            document.getElementById('attempts').textContent = results.length;
            document.getElementById('rank').textContent = best ? getRankEmoji(best) : '-';

            var historyList = document.getElementById('historyList');
            historyList.innerHTML = '';
            results.slice(0, 10).forEach(function(r, i) {
                var div = document.createElement('div');
                div.className = 'history-item' + (r === best ? ' best' : '');
                div.textContent = r + 'ms';
                historyList.appendChild(div);
            });
        }

        function clearHistory() {
            results = [];
            localStorage.removeItem('reaction_test_ja');
            updateStats();
        }

        updateStats();
    </script>
</body>
</html>
