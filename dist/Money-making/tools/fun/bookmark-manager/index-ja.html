    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .bookmark-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .search-box { width: 100%; padding: 12px 15px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; margin-bottom: 15px; font-size: 1rem; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .folder-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .folder-tab { padding: 8px 15px; border: 1px solid rgba(255,255,255,.3); border-radius: 20px; background: transparent; color: #fff; cursor: pointer; font-size: .85rem; white-space: nowrap; }
        .folder-tab.active { background: rgba(255,255,255,.2); border-color: #fff; }
        .bookmarks { max-height: 300px; overflow-y: auto; }
        .bookmark-item { display: flex; align-items: center; padding: 12px 15px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; text-decoration: none; color: #fff; }
        .bookmark-icon { width: 32px; height: 32px; background: rgba(255,255,255,.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-right: 12px; font-size: 1.2rem; }
        .bookmark-info { flex: 1; min-width: 0; }
        .bookmark-title { font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .bookmark-url { font-size: .75rem; opacity: .7; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1rem; margin-left: 10px; }
        .stats { display: flex; justify-content: center; gap: 20px; margin-bottom: 15px; font-size: .85rem; opacity: .8; }
    </style>

<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🔖 ブックマーク管理</h1>
        </header>
        <div class="bookmark-section">
            <input type="text" class="search-box" id="searchBox" placeholder="ブックマーク検索..." oninput="render()">
            <div class="stats">
                <span id="totalCount">全体: 0</span>
            </div>
            <div class="folder-tabs" id="folderTabs"></div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="bookmarkTitle" placeholder="タイトル">
                </div>
                <div class="form-row">
                    <input type="url" id="bookmarkUrl" placeholder="URL (https://...)">
                </div>
                <div class="form-row">
                    <select id="bookmarkFolder">
                        <option value="general">一般</option>
                        <option value="work">仕事</option>
                        <option value="study">学習</option>
                        <option value="shopping">ショッピング</option>
                        <option value="entertainment">エンタメ</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addBookmark()">ブックマーク追加</button>
            </div>
            <div class="bookmarks" id="bookmarks"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var bookmarks = JSON.parse(localStorage.getItem('bookmarks') || '[]');
        var currentFolder = 'all';
        var folderNames = { all: '全体', general: '一般', work: '仕事', study: '学習', shopping: 'ショッピング', entertainment: 'エンタメ' };
        var folderIcons = { general: '📁', work: '💼', study: '📚', shopping: '🛒', entertainment: '🎬' };
        function save() { localStorage.setItem('bookmarks', JSON.stringify(bookmarks)); }
        function addBookmark() {
            var title = document.getElementById('bookmarkTitle').value.trim();
            var url = document.getElementById('bookmarkUrl').value.trim();
            var folder = document.getElementById('bookmarkFolder').value;
            if (!title || !url) return;
            if (!url.startsWith('http')) url = 'https://' + url;
            bookmarks.push({ id: Date.now().toString(), title: title, url: url, folder: folder, createdAt: new Date().toISOString() });
            save();
            document.getElementById('bookmarkTitle').value = '';
            document.getElementById('bookmarkUrl').value = '';
            render();
        }
        function deleteBookmark(id) {
            bookmarks = bookmarks.filter(function(b) { return b.id !== id; });
            save();
            render();
        }
        function setFolder(folder) {
            currentFolder = folder;
            render();
        }
        function render() {
            var search = document.getElementById('searchBox').value.toLowerCase();
            var filtered = bookmarks.filter(function(b) {
                var matchFolder = currentFolder === 'all' || b.folder === currentFolder;
                var matchSearch = !search || b.title.toLowerCase().includes(search) || b.url.toLowerCase().includes(search);
                return matchFolder && matchSearch;
            });
            document.getElementById('totalCount').textContent = '全体: ' + bookmarks.length;
            var tabs = document.getElementById('folderTabs');
            tabs.innerHTML = '';
            ['all', 'general', 'work', 'study', 'shopping', 'entertainment'].forEach(function(f) {
                var btn = document.createElement('button');
                btn.className = 'folder-tab' + (currentFolder === f ? ' active' : '');
                btn.textContent = folderNames[f];
                btn.onclick = function() { setFolder(f); };
                tabs.appendChild(btn);
            });
            var list = document.getElementById('bookmarks');
            list.innerHTML = '';
            filtered.forEach(function(b) {
                var div = document.createElement('div');
                div.className = 'bookmark-item';
                div.innerHTML = '<div class="bookmark-icon">' + (folderIcons[b.folder] || '🔗') + '</div><div class="bookmark-info"><div class="bookmark-title">' + b.title + '</div><div class="bookmark-url">' + b.url + '</div></div><button class="del-btn" onclick="event.stopPropagation();deleteBookmark(\'' + b.id + '\')">×</button>';
                div.onclick = function() { window.open(b.url, '_blank'); };
                div.style.cursor = 'pointer';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
