    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;

        header { text-align: center; margin-bottom: 30px; }

        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .input-section {
            background: rgba(255,255,255,0.1);

        .example-item:last-child { border: none; }

            position: fixed;

            left: 50%;
            transform: translate(-50%, -50%);

        }

<body>
    <div class="container">
        <div class="ad-banner">Ad Area</div>
        <header>
            <h1>🔢 Number to Korean</h1>
            <p class="subtitle">Convert numbers to Korean text</p>
        </header>
        <div class="input-section">
            <div class="options">
                <button class="option-btn active" data-type="money">Money (Won)</button>
                <button class="option-btn" data-type="number">Number</button>
            </div>
            <div class="input-group">
                <label>Enter a number</label>
                <input type="text" id="numberInput" placeholder="e.g., 1234567890" inputmode="numeric">
            </div>
            <div class="result-box">
                <div class="result-label">Korean Text</div>
                <div class="result-text" id="koreanResult">-</div>
            </div>
            <div class="result-box">
                <div class="result-label">Reading</div>
                <div class="result-text" id="readingResult">-</div>
            </div>
            <div class="btn-group">
                <button class="btn-copy" onclick="copyResult()">Copy</button>
                <button class="btn-clear" onclick="clearInput()">Clear</button>
            </div>
        </div>
        <div class="examples">
            <h3>📝 Examples</h3>
            <div class="example-item"><span>1,234</span><span>일천이백삼십사</span></div>
            <div class="example-item"><span>10,000</span><span>일만</span></div>
            <div class="example-item"><span>1,000,000</span><span>일백만</span></div>
            <div class="example-item"><span>100,000,000</span><span>일억</span></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Ad Area</div>
    </div>
    <script>
        var type = 'money';
        var digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
        var units = ['', '십', '백', '천'];
        var bigUnits = ['', '만', '억', '조', '경'];

        document.querySelectorAll('.option-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.option-btn').forEach(function(b) { b.classList.remove('active'); });
                this.classList.add('active');
                type = this.dataset.type;
                convert();
            });
        });

        document.getElementById('numberInput').addEventListener('input', function(e) {
            var value = e.target.value.replace(/[^0-9]/g, '');
            if (value.length > 16) value = value.slice(0, 16);
            e.target.value = formatNumber(value);
            convert();
        });

        function formatNumber(num) {
            return num.replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        }

        function convert() {
            var input = document.getElementById('numberInput').value.replace(/,/g, '');
            if (!input || input === '0') {
                document.getElementById('koreanResult').textContent = input === '0' ? '영' : '-';
                document.getElementById('readingResult').textContent = input === '0' ? '영' : '-';
                return;
            }
            var korean = numberToKorean(input);
            var suffix = type === 'money' ? '원' : '';
            document.getElementById('koreanResult').textContent = korean + suffix;
            document.getElementById('readingResult').textContent = korean.replace(/일([천백십만억조경])/g, '$1') + suffix;
        }

        function numberToKorean(num) {
            if (num === '0') return '영';
            var result = '';
            var groups = [];
            while (num.length > 0) {
                groups.push(num.slice(-4));
                num = num.slice(0, -4);
            }
            for (var i = groups.length - 1; i >= 0; i--) {
                var group = groups[i];
                var groupKorean = '';
                for (var j = 0; j < group.length; j++) {
                    var digit = parseInt(group[group.length - 1 - j]);
                    if (digit !== 0) {
                        groupKorean = digits[digit] + units[j] + groupKorean;
                    }
                }
                if (groupKorean) {
                    result += groupKorean + bigUnits[i];
                }
            }
            return result || '영';
        }

        function copyResult() {
            var text = document.getElementById('koreanResult').textContent;
            if (text && text !== '-') {
                navigator.clipboard.writeText(text).then(function() {
                    showCopied();
                });
            }
        }

        function clearInput() {
            document.getElementById('numberInput').value = '';
            document.getElementById('koreanResult').textContent = '-';
            document.getElementById('readingResult').textContent = '-';
        }

        function showCopied() {
            var div = document.createElement('div');
            div.className = 'copied';
            div.textContent = 'Copied!';
            document.body.appendChild(div);
            setTimeout(function() { div.remove(); }, 1500);
        }
    </script>
</body>
