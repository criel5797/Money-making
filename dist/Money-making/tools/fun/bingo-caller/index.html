    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>빙고 번호 추첨기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .current-call { text-align: center; margin-bottom: 20px; }
        .call-display { font-size: 5rem; font-weight: 700; color: #fbbf24; text-shadow: 0 0 20px rgba(251,191,36,.5); margin-bottom: 10px; }
        .call-display.new { animation: pop 0.5s ease; }
        @keyframes pop { 0% { transform: scale(0.5); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .call-letter { font-size: 2rem; opacity: .8; }
        .call-btn { width: 100%; padding: 18px; border: none; border-radius: 12px; background: linear-gradient(135deg, #10b981, #059669); color: #fff; font-size: 1.3rem; font-weight: 700; cursor: pointer; transition: transform .2s; margin-bottom: 10px; }
        .call-btn:hover { transform: scale(1.02); }
        .call-btn:active { transform: scale(0.98); }
        .call-btn:disabled { background: #6b7280; cursor: not-allowed; transform: none; }
        .reset-btn { width: 100%; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,.1); color: #fff; font-size: 1rem; cursor: pointer; }
        .board { margin-top: 20px; }
        .board-header { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; margin-bottom: 8px; }
        .board-letter { text-align: center; font-size: 1.2rem; font-weight: 700; padding: 8px; }
        .board-letter.b { color: #ef4444; }
        .board-letter.i { color: #f59e0b; }
        .board-letter.n { color: #10b981; }
        .board-letter.g { color: #3b82f6; }
        .board-letter.o { color: #8b5cf6; }
        .board-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
        .board-cell { aspect-ratio: 1; background: rgba(255,255,255,.1); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: .85rem; font-weight: 600; transition: all .3s; }
        .board-cell.called { background: #10b981; color: #fff; }
        .board-cell.latest { background: #fbbf24; color: #1a1a2e; animation: pulse 1s ease infinite; }
        @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 15px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
        .history { margin-top: 15px; }
        .history-label { font-size: .8rem; opacity: .7; margin-bottom: 10px; }
        .history-items { display: flex; gap: 8px; flex-wrap: wrap; max-height: 80px; overflow-y: auto; }
        .history-item { padding: 6px 10px; background: rgba(255,255,255,.1); border-radius: 6px; font-size: .8rem; font-weight: 600; }
        .history-item.b { border-left: 3px solid #ef4444; }
        .history-item.i { border-left: 3px solid #f59e0b; }
        .history-item.n { border-left: 3px solid #10b981; }
        .history-item.g { border-left: 3px solid #3b82f6; }
        .history-item.o { border-left: 3px solid #8b5cf6; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>빙고 번호 추첨기</h1>
        </header>
        <div class="game-section">
            <div class="current-call">
                <div class="call-letter" id="callLetter">-</div>
                <div class="call-display" id="callNumber">?</div>
            </div>
            <button class="call-btn" id="callBtn" onclick="callNumber()">번호 뽑기</button>
            <button class="reset-btn" onclick="resetGame()">새 게임</button>
            <div class="board">
                <div class="board-header">
                    <div class="board-letter b">B</div>
                    <div class="board-letter i">I</div>
                    <div class="board-letter n">N</div>
                    <div class="board-letter g">G</div>
                    <div class="board-letter o">O</div>
                </div>
                <div class="board-grid" id="boardGrid"></div>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="called">0</div>
                    <div class="stat-label">뽑은 수</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="remaining">75</div>
                    <div class="stat-label">남은 수</div>
                </div>
            </div>
            <div class="history">
                <div class="history-label">기록</div>
                <div class="history-items" id="history"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var calledNumbers = [];
        var latestNumber = null;

        function getLetter(num) {
            if (num <= 15) return 'B';
            if (num <= 30) return 'I';
            if (num <= 45) return 'N';
            if (num <= 60) return 'G';
            return 'O';
        }

        function init() {
            var grid = document.getElementById('boardGrid');
            grid.innerHTML = '';
            for (var row = 0; row < 15; row++) {
                for (var col = 0; col < 5; col++) {
                    var num = col * 15 + row + 1;
                    var cell = document.createElement('div');
                    cell.className = 'board-cell';
                    cell.id = 'cell-' + num;
                    cell.textContent = num;
                    grid.appendChild(cell);
                }
            }
        }

        function callNumber() {
            if (calledNumbers.length >= 75) {
                alert('모든 번호를 이미 뽑았습니다!');
                return;
            }

            var available = [];
            for (var i = 1; i <= 75; i++) {
                if (calledNumbers.indexOf(i) === -1) {
                    available.push(i);
                }
            }

            var num = available[Math.floor(Math.random() * available.length)];
            calledNumbers.push(num);

            if (latestNumber !== null) {
                var prevCell = document.getElementById('cell-' + latestNumber);
                if (prevCell) {
                    prevCell.classList.remove('latest');
                }
            }

            latestNumber = num;
            var letter = getLetter(num);

            var displayEl = document.getElementById('callNumber');
            var letterEl = document.getElementById('callLetter');
            displayEl.textContent = num;
            displayEl.classList.remove('new');
            void displayEl.offsetWidth;
            displayEl.classList.add('new');
            letterEl.textContent = letter;

            var cell = document.getElementById('cell-' + num);
            if (cell) {
                cell.classList.add('called', 'latest');
            }

            updateDisplay();

            if (calledNumbers.length >= 75) {
                document.getElementById('callBtn').disabled = true;
            }
        }

        function resetGame() {
            calledNumbers = [];
            latestNumber = null;
            document.getElementById('callNumber').textContent = '?';
            document.getElementById('callLetter').textContent = '-';
            document.getElementById('callBtn').disabled = false;
            document.querySelectorAll('.board-cell').forEach(function(cell) {
                cell.classList.remove('called', 'latest');
            });
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('called').textContent = calledNumbers.length;
            document.getElementById('remaining').textContent = 75 - calledNumbers.length;

            var historyEl = document.getElementById('history');
            historyEl.innerHTML = '';
            var recent = calledNumbers.slice().reverse().slice(0, 15);
            recent.forEach(function(num) {
                var div = document.createElement('div');
                var letter = getLetter(num).toLowerCase();
                div.className = 'history-item ' + letter;
                div.textContent = getLetter(num) + '-' + num;
                historyEl.appendChild(div);
            });
        }

        init();
    </script>
</body>
</html>
