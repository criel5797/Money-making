    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감사 일기</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f8b500, #fceabb); min-height: 100vh; color: #333; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.3); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; color: #7a5100; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .date-display { font-size: 1rem; opacity: .8; }
        .journal-section { background: rgba(255,255,255,.8); border-radius: 16px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,.1); }
        .prompt { font-size: 1rem; color: #7a5100; margin-bottom: 15px; }
        .entry-list { margin-bottom: 20px; }
        .entry-input { display: flex; gap: 10px; margin-bottom: 15px; }
        .entry-input input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 10px; font-size: 1rem; }
        .entry-input button { padding: 12px 20px; border: none; border-radius: 10px; background: linear-gradient(135deg, #f8b500, #f39c12); color: #fff; cursor: pointer; }
        .entry-item { display: flex; align-items: center; gap: 10px; padding: 12px; background: rgba(248,181,0,.1); border-radius: 10px; margin-bottom: 10px; }
        .entry-item span { flex: 1; }
        .del-btn { background: none; border: none; color: #999; cursor: pointer; font-size: 1.2rem; }
        .past-entries { margin-top: 20px; padding-top: 20px; border-top: 1px solid #eee; }
        .past-title { font-size: .9rem; color: #7a5100; margin-bottom: 15px; }
        .past-day { background: rgba(248,181,0,.05); padding: 15px; border-radius: 10px; margin-bottom: 10px; }
        .past-date { font-size: .85rem; color: #7a5100; margin-bottom: 8px; }
        .past-item { font-size: .9rem; color: #555; padding: 5px 0; }
        .stats { text-align: center; margin-top: 20px; padding: 15px; background: rgba(248,181,0,.1); border-radius: 10px; }
        .stats-value { font-size: 1.5rem; font-weight: 700; color: #f8b500; }
        .stats-label { font-size: .85rem; color: #7a5100; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🙏 감사 일기</h1>
            <div class="date-display" id="dateDisplay"></div>
        </header>
        <div class="journal-section">
            <div class="prompt">오늘 감사한 것 3가지를 적어보세요</div>
            <div class="entry-input">
                <input type="text" id="entryInput" placeholder="감사한 일을 적어주세요" onkeypress="if(event.key==='Enter')addEntry()">
                <button onclick="addEntry()">추가</button>
            </div>
            <div class="entry-list" id="entryList"></div>
            <div class="stats">
                <div class="stats-value" id="totalDays">0</div>
                <div class="stats-label">일 연속 기록</div>
            </div>
            <div class="past-entries" id="pastEntries"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var today = new Date().toDateString();
        var key = 'gratitude';
        var data = JSON.parse(localStorage.getItem(key) || '{}');
        if (!data[today]) data[today] = [];
        document.getElementById('dateDisplay').textContent = new Date().toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        function save() { localStorage.setItem(key, JSON.stringify(data)); }
        function addEntry() {
            var text = document.getElementById('entryInput').value.trim();
            if (!text) return;
            data[today].push(text);
            save();
            render();
            document.getElementById('entryInput').value = '';
        }
        function delEntry(idx) {
            data[today].splice(idx, 1);
            save();
            render();
        }
        function render() {
            var list = document.getElementById('entryList');
            list.innerHTML = '';
            data[today].forEach(function(e, i) {
                var div = document.createElement('div');
                div.className = 'entry-item';
                div.innerHTML = '<span>✨ ' + e + '</span><button class="del-btn" onclick="delEntry(' + i + ')">×</button>';
                list.appendChild(div);
            });
            var dates = Object.keys(data).sort().reverse();
            var streak = 0;
            var checkDate = new Date();
            for (var i = 0; i < dates.length; i++) {
                if (dates[i] === checkDate.toDateString() && data[dates[i]].length > 0) {
                    streak++;
                    checkDate.setDate(checkDate.getDate() - 1);
                } else break;
            }
            document.getElementById('totalDays').textContent = streak;
            var past = document.getElementById('pastEntries');
            past.innerHTML = '<div class="past-title">지난 기록</div>';
            dates.slice(1, 4).forEach(function(d) {
                if (data[d].length === 0) return;
                var div = document.createElement('div');
                div.className = 'past-day';
                div.innerHTML = '<div class="past-date">' + d + '</div>' + data[d].map(function(e) { return '<div class="past-item">✨ ' + e + '</div>'; }).join('');
                past.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
