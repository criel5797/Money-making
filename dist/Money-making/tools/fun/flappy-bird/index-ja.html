    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #87ceeb, #98d8c8); min-height: 100vh; color: #333; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(0,0,0,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; color: #666; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.9); border-radius: 16px; padding: 20px; }
        .score-bar { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .score-item { text-align: center; }
        .score-label { font-size: .8rem; color: #666; }
        .score-value { font-size: 1.5rem; font-weight: 700; color: #333; }
        .game-canvas { display: flex; justify-content: center; margin-bottom: 15px; }
        #gameCanvas { border-radius: 12px; cursor: pointer; }
        .action-btn { width: 100%; padding: 16px; border: none; border-radius: 14px; background: linear-gradient(135deg, #f6d365, #fda085); color: #fff; font-size: 1.1rem; cursor: pointer; font-weight: 700; margin-bottom: 15px; }
        .game-over { text-align: center; padding: 20px; background: rgba(239,68,68,.1); border-radius: 12px; margin-bottom: 15px; display: none; }
        .game-over h2 { font-size: 1.5rem; margin-bottom: 10px; color: #ef4444; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stat-card { background: rgba(0,0,0,.05); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; color: #333; }
        .stat-label { font-size: .7rem; color: #666; }
        .tip { text-align: center; font-size: .85rem; color: #666; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🐦 フラッピーバード</h1>
        </header>
        <div class="game-section">
            <div class="score-bar">
                <div class="score-item">
                    <div class="score-label">スコア</div>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="score-item">
                    <div class="score-label">ハイスコア</div>
                    <div class="score-value" id="highScore">0</div>
                </div>
            </div>
            <div class="game-canvas">
                <canvas id="gameCanvas" width="320" height="480"></canvas>
            </div>
            <div id="gameOver" class="game-over">
                <h2>ゲームオーバー！</h2>
                <p>スコア: <span id="finalScore">0</span></p>
            </div>
            <button class="action-btn" id="startBtn" onclick="startGame()">🎮 タップしてスタート！</button>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="totalGames">0</div>
                    <div class="stat-label">ゲーム数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="avgScore">0</div>
                    <div class="stat-label">平均スコア</div>
                </div>
            </div>
            <div class="tip">画面をタップまたはスペースキーでジャンプ！</div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var canvas = document.getElementById('gameCanvas');
        var ctx = canvas.getContext('2d');
        var bird = { x: 60, y: 200, width: 34, height: 24, velocity: 0 };
        var pipes = [];
        var gravity = 0.5;
        var jump = -8;
        var pipeWidth = 52;
        var pipeGap = 130;
        var pipeSpeed = 2.5;
        var score = 0;
        var gameLoop = null;
        var isGameOver = true;
        var isStarted = false;
        var stats = JSON.parse(localStorage.getItem('flappy_ja') || '{"games":0,"total":0,"high":0}');
        var frameCount = 0;

        function drawBird() {
            ctx.fillStyle = '#f6d365';
            ctx.beginPath();
            ctx.ellipse(bird.x, bird.y, bird.width/2, bird.height/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(bird.x + 8, bird.y - 3, 6, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#333';
            ctx.beginPath();
            ctx.arc(bird.x + 10, bird.y - 3, 3, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = '#ff6b6b';
            ctx.beginPath();
            ctx.moveTo(bird.x + 17, bird.y);
            ctx.lineTo(bird.x + 27, bird.y + 3);
            ctx.lineTo(bird.x + 17, bird.y + 6);
            ctx.closePath();
            ctx.fill();
            ctx.fillStyle = '#fda085';
            ctx.beginPath();
            ctx.ellipse(bird.x - 8, bird.y, 10, 6, bird.velocity * 0.05, 0, Math.PI * 2);
            ctx.fill();
        }

        function drawPipes() {
            ctx.fillStyle = '#4ade80';
            pipes.forEach(function(pipe) {
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
                ctx.fillRect(pipe.x - 3, pipe.top - 20, pipeWidth + 6, 20);
                ctx.fillRect(pipe.x, pipe.top + pipeGap, pipeWidth, canvas.height - pipe.top - pipeGap);
                ctx.fillRect(pipe.x - 3, pipe.top + pipeGap, pipeWidth + 6, 20);
            });
        }

        function drawBackground() {
            var gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, '#87ceeb');
            gradient.addColorStop(1, '#e0f7fa');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#8bc34a';
            ctx.fillRect(0, canvas.height - 50, canvas.width, 50);
            ctx.fillStyle = '#689f38';
            for (var i = 0; i < canvas.width; i += 30) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height - 50);
                ctx.lineTo(i + 15, canvas.height - 65);
                ctx.lineTo(i + 30, canvas.height - 50);
                ctx.fill();
            }
        }

        function drawScore() {
            ctx.fillStyle = '#fff';
            ctx.strokeStyle = '#333';
            ctx.lineWidth = 3;
            ctx.font = 'bold 40px sans-serif';
            ctx.textAlign = 'center';
            ctx.strokeText(score, canvas.width / 2, 60);
            ctx.fillText(score, canvas.width / 2, 60);
        }

        function update() {
            if (!isStarted || isGameOver) return;

            bird.velocity += gravity;
            bird.y += bird.velocity;

            if (frameCount % 90 === 0) {
                var top = 50 + Math.random() * (canvas.height - pipeGap - 150);
                pipes.push({ x: canvas.width, top: top, passed: false });
            }

            pipes.forEach(function(pipe) {
                pipe.x -= pipeSpeed;
                if (!pipe.passed && pipe.x + pipeWidth < bird.x) {
                    pipe.passed = true;
                    score++;
                    document.getElementById('score').textContent = score;
                }
            });

            pipes = pipes.filter(function(pipe) { return pipe.x > -pipeWidth; });

            if (bird.y + bird.height/2 > canvas.height - 50 || bird.y - bird.height/2 < 0) {
                endGame();
                return;
            }

            pipes.forEach(function(pipe) {
                if (bird.x + bird.width/2 > pipe.x && bird.x - bird.width/2 < pipe.x + pipeWidth) {
                    if (bird.y - bird.height/2 < pipe.top || bird.y + bird.height/2 > pipe.top + pipeGap) {
                        endGame();
                    }
                }
            });

            frameCount++;
        }

        function draw() {
            drawBackground();
            drawPipes();
            drawBird();
            drawScore();
        }

        function flap() {
            if (isGameOver) return;
            if (!isStarted) {
                isStarted = true;
            }
            bird.velocity = jump;
        }

        function startGame() {
            bird.y = 200;
            bird.velocity = 0;
            pipes = [];
            score = 0;
            frameCount = 0;
            isGameOver = false;
            isStarted = false;
            document.getElementById('score').textContent = '0';
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('startBtn').textContent = '🎮 タップしてジャンプ！';
            if (gameLoop) cancelAnimationFrame(gameLoop);
            function loop() {
                update();
                draw();
                if (!isGameOver) gameLoop = requestAnimationFrame(loop);
            }
            loop();
        }

        function endGame() {
            isGameOver = true;
            document.getElementById('gameOver').style.display = 'block';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('startBtn').textContent = '🎮 もう一度';
            stats.games++;
            stats.total += score;
            if (score > stats.high) stats.high = score;
            localStorage.setItem('flappy_ja', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('highScore').textContent = stats.high;
            document.getElementById('totalGames').textContent = stats.games;
            document.getElementById('avgScore').textContent = stats.games > 0 ? Math.round(stats.total / stats.games) : 0;
        }

        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', function(e) { e.preventDefault(); flap(); });
        document.addEventListener('keydown', function(e) {
            if (e.code === 'Space') { e.preventDefault(); flap(); }
        });

        updateStats();
        drawBackground();
        drawBird();
    </script>
</body>
</html>
