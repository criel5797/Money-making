    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #2c3e50, #4ca1af); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .quote-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .quote-card { background: rgba(255,255,255,.1); border-radius: 16px; padding: 30px; margin-bottom: 20px; text-align: center; position: relative; }
        .quote-icon { font-size: 3rem; margin-bottom: 15px; }
        .quote-text { font-size: 1.3rem; line-height: 1.6; margin-bottom: 20px; font-style: italic; }
        .quote-author { font-size: 1rem; opacity: .8; }
        .category-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .cat-tab { padding: 8px 16px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-tab.active { background: rgba(255,255,255,.4); }
        .action-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .action-btn.secondary { background: rgba(255,255,255,.2); }
        .favorites { margin-top: 20px; }
        .fav-title { font-size: .9rem; opacity: .8; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .fav-count { background: rgba(255,255,255,.2); padding: 2px 10px; border-radius: 10px; font-size: .8rem; }
        .fav-list { max-height: 200px; overflow-y: auto; }
        .fav-item { padding: 12px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; font-size: .9rem; }
        .fav-item-text { margin-bottom: 5px; }
        .fav-item-author { font-size: .8rem; opacity: .7; }
        .fav-item-delete { float: right; background: none; border: none; color: #ff6b6b; cursor: pointer; }
        .share-btns { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,.15); color: #fff; cursor: pointer; font-size: .85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>💬 오늘의 명언</h1>
        </header>
        <div class="quote-section">
            <div class="quote-card" id="quoteCard">
                <div class="quote-icon">📜</div>
                <div class="quote-text" id="quoteText">"인생에서 가장 중요한 것은 꿈을 갖는 것이다."</div>
                <div class="quote-author" id="quoteAuthor">- 알베르트 아인슈타인</div>
            </div>
            <div class="category-tabs">
                <button class="cat-tab active" onclick="setCategory('all')">전체</button>
                <button class="cat-tab" onclick="setCategory('motivation')">동기부여</button>
                <button class="cat-tab" onclick="setCategory('love')">사랑</button>
                <button class="cat-tab" onclick="setCategory('success')">성공</button>
                <button class="cat-tab" onclick="setCategory('wisdom')">지혜</button>
                <button class="cat-tab" onclick="setCategory('happiness')">행복</button>
            </div>
            <div class="action-btns">
                <button class="action-btn" onclick="newQuote()">✨ 새 명언</button>
                <button class="action-btn secondary" onclick="saveFavorite()">❤️ 저장</button>
            </div>
            <div class="share-btns">
                <button class="share-btn" onclick="copyQuote()">📋 복사</button>
                <button class="share-btn" onclick="shareQuote()">📤 공유</button>
            </div>
            <div class="favorites">
                <div class="fav-title">
                    <span>저장된 명언</span>
                    <span class="fav-count" id="favCount">0</span>
                </div>
                <div class="fav-list" id="favList"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var favorites = JSON.parse(localStorage.getItem('daily_quote_ko') || '[]');
        var currentQuote = {};
        var currentCategory = 'all';
        var quotes = {
            motivation: [
                { text: '할 수 있다고 믿으면, 이미 반은 이룬 것이다.', author: '시어도어 루즈벨트' },
                { text: '성공은 최종적인 것이 아니며, 실패는 치명적인 것이 아니다. 중요한 것은 계속하는 용기다.', author: '윈스턴 처칠' },
                { text: '오늘 할 수 있는 일을 내일로 미루지 마라.', author: '벤자민 프랭클린' },
                { text: '천 리 길도 한 걸음부터.', author: '노자' },
                { text: '실패는 성공의 어머니다.', author: '토마스 에디슨' }
            ],
            love: [
                { text: '사랑받고 싶다면 사랑하고, 사랑스럽게 행동하라.', author: '벤자민 프랭클린' },
                { text: '사랑은 서로를 바라보는 것이 아니라 함께 같은 방향을 바라보는 것이다.', author: '생텍쥐페리' },
                { text: '진정한 사랑은 끝이 없다.', author: '레오나르도 다빈치' },
                { text: '사랑은 이해의 다른 이름이다.', author: '타고르' },
                { text: '가장 위대한 것은 사랑이다.', author: '성경' }
            ],
            success: [
                { text: '성공의 비결은 시작하는 것이다.', author: '마크 트웨인' },
                { text: '성공한 사람들은 실패를 두려워하지 않는다.', author: '빌 게이츠' },
                { text: '기회는 준비된 자에게 온다.', author: '파스퇴르' },
                { text: '멈추지 않는 한 얼마나 천천히 가는지는 중요하지 않다.', author: '공자' },
                { text: '승리는 가장 끈기 있는 자에게 돌아간다.', author: '나폴레옹' }
            ],
            wisdom: [
                { text: '아는 것이 힘이다.', author: '프랜시스 베이컨' },
                { text: '배움에는 끝이 없다.', author: '공자' },
                { text: '지혜는 경험에서 온다.', author: '아리스토텔레스' },
                { text: '너 자신을 알라.', author: '소크라테스' },
                { text: '진정한 지식은 자신의 무지를 아는 것이다.', author: '소크라테스' }
            ],
            happiness: [
                { text: '행복은 여행이지 목적지가 아니다.', author: '벤 스위트랜드' },
                { text: '행복은 마음의 습관이다.', author: '익명' },
                { text: '오늘 하루도 감사하며 살자.', author: '익명' },
                { text: '웃음은 최고의 약이다.', author: '속담' },
                { text: '작은 것에 감사하면 큰 기쁨이 온다.', author: '익명' }
            ]
        };
        function getAllQuotes() {
            var all = [];
            for (var cat in quotes) {
                all = all.concat(quotes[cat]);
            }
            return all;
        }
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(function(tab) {
                tab.classList.toggle('active', tab.textContent.includes(cat === 'all' ? '전체' :
                    cat === 'motivation' ? '동기' : cat === 'love' ? '사랑' :
                    cat === 'success' ? '성공' : cat === 'wisdom' ? '지혜' : '행복'));
            });
            newQuote();
        }
        function newQuote() {
            var pool = currentCategory === 'all' ? getAllQuotes() : quotes[currentCategory];
            var quote = pool[Math.floor(Math.random() * pool.length)];
            currentQuote = quote;
            document.getElementById('quoteText').textContent = '"' + quote.text + '"';
            document.getElementById('quoteAuthor').textContent = '- ' + quote.author;
        }
        function saveFavorite() {
            if (!currentQuote.text) return;
            var exists = favorites.some(function(f) { return f.text === currentQuote.text; });
            if (!exists) {
                favorites.unshift(currentQuote);
                localStorage.setItem('daily_quote_ko', JSON.stringify(favorites));
                renderFavorites();
                alert('저장되었습니다!');
            } else {
                alert('이미 저장된 명언입니다.');
            }
        }
        function deleteFavorite(index) {
            favorites.splice(index, 1);
            localStorage.setItem('daily_quote_ko', JSON.stringify(favorites));
            renderFavorites();
        }
        function renderFavorites() {
            var list = document.getElementById('favList');
            list.innerHTML = '';
            document.getElementById('favCount').textContent = favorites.length;
            favorites.forEach(function(fav, i) {
                var div = document.createElement('div');
                div.className = 'fav-item';
                div.innerHTML = '<button class="fav-item-delete" onclick="deleteFavorite(' + i + ')">×</button><div class="fav-item-text">"' + fav.text + '"</div><div class="fav-item-author">- ' + fav.author + '</div>';
                list.appendChild(div);
            });
        }
        function copyQuote() {
            var text = currentQuote.text + ' - ' + currentQuote.author;
            navigator.clipboard.writeText(text).then(function() {
                alert('복사되었습니다!');
            });
        }
        function shareQuote() {
            var text = currentQuote.text + ' - ' + currentQuote.author;
            if (navigator.share) {
                navigator.share({ title: '오늘의 명언', text: text });
            } else {
                copyQuote();
            }
        }
        newQuote();
        renderFavorites();
    </script>
</body>
</html>
