<!DOCTYPE html>
<html lang="ja">
<head><meta name="robots" content="index,follow,max-image-preview:large"><link rel="canonical" href="https://instaidea.org/tools/fun/daily-quote/index-ja.html"><meta property="og:url" content="https://instaidea.org/tools/fun/daily-quote/index-ja.html"><meta property="og:locale" content="ja_JP"><meta property="og:locale:alternate" content="ko_KR"><meta property="og:locale:alternate" content="en_US"><link rel="alternate" hreflang="ko" href="https://instaidea.org/tools/fun/daily-quote/"><link rel="alternate" hreflang="en" href="https://instaidea.org/tools/fun/daily-quote/index-en.html"><link rel="alternate" hreflang="ja" href="https://instaidea.org/tools/fun/daily-quote/index-ja.html"><link rel="alternate" hreflang="x-default" href="https://instaidea.org/tools/fun/daily-quote/"><script async src="https://www.googletagmanager.com/gtag/js?id=G-CGCL4G4YMY"></script><script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag("js", new Date());gtag("config", "G-CGCL4G4YMY");</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>今日の名言</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #2c3e50, #4ca1af); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .quote-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .quote-card { background: rgba(255,255,255,.1); border-radius: 16px; padding: 30px; margin-bottom: 20px; text-align: center; position: relative; }
        .quote-icon { font-size: 3rem; margin-bottom: 15px; }
        .quote-text { font-size: 1.3rem; line-height: 1.6; margin-bottom: 20px; font-style: italic; }
        .quote-author { font-size: 1rem; opacity: .8; }
        .category-tabs { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .cat-tab { padding: 8px 16px; border: none; border-radius: 20px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: .85rem; }
        .cat-tab.active { background: rgba(255,255,255,.4); }
        .action-btns { display: flex; gap: 10px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .action-btn.secondary { background: rgba(255,255,255,.2); }
        .favorites { margin-top: 20px; }
        .fav-title { font-size: .9rem; opacity: .8; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .fav-count { background: rgba(255,255,255,.2); padding: 2px 10px; border-radius: 10px; font-size: .8rem; }
        .fav-list { max-height: 200px; overflow-y: auto; }
        .fav-item { padding: 12px; background: rgba(255,255,255,.1); border-radius: 10px; margin-bottom: 8px; font-size: .9rem; }
        .fav-item-text { margin-bottom: 5px; }
        .fav-item-author { font-size: .8rem; opacity: .7; }
        .fav-item-delete { float: right; background: none; border: none; color: #ff6b6b; cursor: pointer; }
        .share-btns { display: flex; gap: 10px; margin-top: 15px; }
        .share-btn { flex: 1; padding: 10px; border: none; border-radius: 8px; background: rgba(255,255,255,.15); color: #fff; cursor: pointer; font-size: .85rem; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>💬 今日の名言</h1>
        </header>
        <div class="quote-section">
            <div class="quote-card" id="quoteCard">
                <div class="quote-icon">📜</div>
                <div class="quote-text" id="quoteText">「人生で最も大切なのは夢を持つことだ。」</div>
                <div class="quote-author" id="quoteAuthor">- アルベルト・アインシュタイン</div>
            </div>
            <div class="category-tabs">
                <button class="cat-tab active" onclick="setCategory('all')">すべて</button>
                <button class="cat-tab" onclick="setCategory('motivation')">やる気</button>
                <button class="cat-tab" onclick="setCategory('love')">愛</button>
                <button class="cat-tab" onclick="setCategory('success')">成功</button>
                <button class="cat-tab" onclick="setCategory('wisdom')">知恵</button>
                <button class="cat-tab" onclick="setCategory('happiness')">幸福</button>
            </div>
            <div class="action-btns">
                <button class="action-btn" onclick="newQuote()">✨ 新しい名言</button>
                <button class="action-btn secondary" onclick="saveFavorite()">❤️ 保存</button>
            </div>
            <div class="share-btns">
                <button class="share-btn" onclick="copyQuote()">📋 コピー</button>
                <button class="share-btn" onclick="shareQuote()">📤 共有</button>
            </div>
            <div class="favorites">
                <div class="fav-title">
                    <span>保存した名言</span>
                    <span class="fav-count" id="favCount">0</span>
                </div>
                <div class="fav-list" id="favList"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var favorites = JSON.parse(localStorage.getItem('daily_quote_ja') || '[]');
        var currentQuote = {};
        var currentCategory = 'all';
        var quotes = {
            motivation: [
                { text: '自分ができると信じれば、もう半分は達成したようなものだ。', author: 'セオドア・ルーズベルト' },
                { text: '成功は最終的なものではなく、失敗は致命的ではない。大切なのは続ける勇気だ。', author: 'ウィンストン・チャーチル' },
                { text: '今日できることを明日に延ばすな。', author: 'ベンジャミン・フランクリン' },
                { text: '千里の道も一歩から。', author: '老子' },
                { text: '私は失敗したのではない。うまくいかない方法を1万通り見つけただけだ。', author: 'トーマス・エジソン' }
            ],
            love: [
                { text: '愛されたいなら、愛せ。', author: 'ベンジャミン・フランクリン' },
                { text: '愛とは互いを見つめ合うことではなく、共に同じ方向を見つめることである。', author: 'サン＝テグジュペリ' },
                { text: '真の愛には終わりがない。', author: 'レオナルド・ダ・ヴィンチ' },
                { text: '愛のあるところに人生がある。', author: 'マハトマ・ガンジー' },
                { text: '人生で最も大切なものは愛だ。', author: '聖書' }
            ],
            success: [
                { text: '成功の秘訣は始めることだ。', author: 'マーク・トウェイン' },
                { text: '成功とは熱意を失わずに失敗から失敗へと歩むことだ。', author: 'ウィンストン・チャーチル' },
                { text: 'チャンスは準備された心に訪れる。', author: 'ルイ・パスツール' },
                { text: '止まらない限り、どんなにゆっくり進んでも問題ない。', author: '孔子' },
                { text: '勝利は最も粘り強い者のものだ。', author: 'ナポレオン' }
            ],
            wisdom: [
                { text: '知識は力なり。', author: 'フランシス・ベーコン' },
                { text: '唯一の真の知恵は、自分が何も知らないと知ることだ。', author: 'ソクラテス' },
                { text: '困難の中にこそ機会がある。', author: 'アルベルト・アインシュタイン' },
                { text: '汝自身を知れ。', author: 'ソクラテス' },
                { text: '吟味されない人生は生きる価値がない。', author: 'ソクラテス' }
            ],
            happiness: [
                { text: '幸福は目的地ではなく旅である。', author: 'ベン・スウィートランド' },
                { text: '私たちの人生の目的は幸せになることだ。', author: 'ダライ・ラマ' },
                { text: '幸福は自分自身次第である。', author: 'アリストテレス' },
                { text: '笑いのない日は無駄な日だ。', author: 'チャップリン' },
                { text: '幸福は既製品ではない。自分の行動から生まれる。', author: 'ダライ・ラマ' }
            ]
        };
        function getAllQuotes() {
            var all = [];
            for (var cat in quotes) {
                all = all.concat(quotes[cat]);
            }
            return all;
        }
        function setCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.cat-tab').forEach(function(tab) {
                tab.classList.toggle('active', tab.textContent.includes(cat === 'all' ? 'すべて' :
                    cat === 'motivation' ? 'やる気' : cat === 'love' ? '愛' :
                    cat === 'success' ? '成功' : cat === 'wisdom' ? '知恵' : '幸福'));
            });
            newQuote();
        }
        function newQuote() {
            var pool = currentCategory === 'all' ? getAllQuotes() : quotes[currentCategory];
            var quote = pool[Math.floor(Math.random() * pool.length)];
            currentQuote = quote;
            document.getElementById('quoteText').textContent = '「' + quote.text + '」';
            document.getElementById('quoteAuthor').textContent = '- ' + quote.author;
        }
        function saveFavorite() {
            if (!currentQuote.text) return;
            var exists = favorites.some(function(f) { return f.text === currentQuote.text; });
            if (!exists) {
                favorites.unshift(currentQuote);
                localStorage.setItem('daily_quote_ja', JSON.stringify(favorites));
                renderFavorites();
                alert('保存しました！');
            } else {
                alert('既に保存されています。');
            }
        }
        function deleteFavorite(index) {
            favorites.splice(index, 1);
            localStorage.setItem('daily_quote_ja', JSON.stringify(favorites));
            renderFavorites();
        }
        function renderFavorites() {
            var list = document.getElementById('favList');
            list.innerHTML = '';
            document.getElementById('favCount').textContent = favorites.length;
            favorites.forEach(function(fav, i) {
                var div = document.createElement('div');
                div.className = 'fav-item';
                div.innerHTML = '<button class="fav-item-delete" onclick="deleteFavorite(' + i + ')">×</button><div class="fav-item-text">「' + fav.text + '」</div><div class="fav-item-author">- ' + fav.author + '</div>';
                list.appendChild(div);
            });
        }
        function copyQuote() {
            var text = currentQuote.text + ' - ' + currentQuote.author;
            navigator.clipboard.writeText(text).then(function() {
                alert('コピーしました！');
            });
        }
        function shareQuote() {
            var text = currentQuote.text + ' - ' + currentQuote.author;
            if (navigator.share) {
                navigator.share({ title: '今日の名言', text: text });
            } else {
                copyQuote();
            }
        }
        newQuote();
        renderFavorites();
    </script>
</body>
</html>
