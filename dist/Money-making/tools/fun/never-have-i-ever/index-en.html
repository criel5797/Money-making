    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Never Have I Ever</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #ec4899, #8b5cf6); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .category-section { margin-bottom: 20px; }
        .category-title { font-size: .9rem; opacity: .7; margin-bottom: 12px; }
        .categories { display: flex; flex-wrap: wrap; gap: 8px; }
        .category-btn { padding: 10px 16px; border: 2px solid rgba(255,255,255,.3); border-radius: 20px; background: rgba(255,255,255,.1); color: #fff; font-size: .9rem; cursor: pointer; transition: all .3s; }
        .category-btn.active { background: #fff; color: #8b5cf6; border-color: #fff; }
        .card-area { min-height: 300px; display: flex; flex-direction: column; align-items: center; justify-content: center; margin-bottom: 20px; }
        .card { width: 100%; background: linear-gradient(135deg, rgba(255,255,255,.2), rgba(255,255,255,.1)); border-radius: 20px; padding: 40px 30px; text-align: center; transform-style: preserve-3d; transition: transform .6s; }
        .card.flip { animation: flipCard .6s ease; }
        @keyframes flipCard { 0% { transform: rotateY(0); } 50% { transform: rotateY(90deg); } 100% { transform: rotateY(0); } }
        .card-label { font-size: 1rem; opacity: .8; margin-bottom: 15px; }
        .card-text { font-size: 1.4rem; font-weight: 700; line-height: 1.6; }
        .actions { display: flex; gap: 12px; margin-bottom: 20px; }
        .action-btn { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: all .3s; }
        .next-btn { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
        .next-btn:hover { transform: scale(1.02); }
        .shuffle-btn { background: rgba(255,255,255,.2); color: #fff; }
        .stats { padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; }
        .stats-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .stats-row { display: flex; justify-content: space-between; font-size: .9rem; margin-bottom: 5px; }
        .intensity-section { margin-top: 15px; padding-top: 15px; border-top: 1px solid rgba(255,255,255,.2); }
        .intensity-title { font-size: .85rem; opacity: .7; margin-bottom: 10px; }
        .intensity-btns { display: flex; gap: 8px; }
        .intensity-btn { flex: 1; padding: 10px; border: 2px solid rgba(255,255,255,.3); border-radius: 10px; background: rgba(255,255,255,.1); color: #fff; font-size: .85rem; cursor: pointer; }
        .intensity-btn.active { background: #fff; color: #8b5cf6; border-color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🙈 Never Have I Ever</h1>
        </header>
        <div class="game-section">
            <div class="category-section">
                <div class="category-title">Category</div>
                <div class="categories" id="categories"></div>
            </div>
            <div class="intensity-section">
                <div class="intensity-title">Intensity</div>
                <div class="intensity-btns">
                    <button class="intensity-btn active" onclick="setIntensity('mild')">Mild</button>
                    <button class="intensity-btn" onclick="setIntensity('medium')">Medium</button>
                    <button class="intensity-btn" onclick="setIntensity('spicy')">Spicy</button>
                </div>
            </div>
            <div class="card-area">
                <div class="card" id="card">
                    <div class="card-label">Never have I ever...</div>
                    <div class="card-text" id="cardText">Press the button to start!</div>
                </div>
            </div>
            <div class="actions">
                <button class="action-btn shuffle-btn" onclick="shuffle()">🔀 Shuffle</button>
                <button class="action-btn next-btn" onclick="nextCard()">👉 Next</button>
            </div>
            <div class="stats">
                <div class="stats-title">📊 Stats</div>
                <div class="stats-row"><span>Cards Seen</span><span id="seenCount">0</span></div>
                <div class="stats-row"><span>Cards Left</span><span id="remainCount">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var prompts = {
            general: {
                mild: ["fallen asleep in class", "lied to cancel plans", "sung alone at karaoke", "walked in the rain without an umbrella", "tripped in front of my crush", "cried in secret", "slept all day", "taken over 100 selfies", "eaten all my favorite food alone", "forgotten to buy a friend's gift"],
                medium: ["talked behind a friend's back", "cheated on a test", "lied to my parents", "eaten late night snacks secretly", "skipped class to hang out", "told someone else a friend's secret", "refused to text first after a fight", "pretended to be crazy from jealousy", "acted interested when I wasn't", "secretly watched someone's story"],
                spicy: ["stalked my crush's entire social media", "secretly checked on an ex", "been so drunk I forgot everything", "been attracted to a friend's partner", "secretly looked through someone's phone", "received a fake confession", "dated someone while liking another", "drunk texted and regretted it", "done crazy things out of jealousy", "cried secretly over someone"]
            },
            travel: {
                mild: ["been on a plane", "traveled abroad", "traveled alone", "gone camping", "gotten lost", "got caught in the rain while traveling", "stayed up all night at a pension", "sung while driving", "went to see the sunrise", "made friends while traveling"],
                medium: ["spent all my money traveling", "traveled with no plans", "missed a flight", "gotten sick while traveling", "had problems at accommodation", "been scammed while traveling", "slept on the street", "had a fight while traveling", "starved because of no money", "lost my passport"],
                spicy: ["had a romance while traveling", "secretly traveled alone", "had something dangerous happen", "done something illegal", "gotten completely drunk traveling", "slept at a stranger's house", "spent 10x my travel budget", "traveled without telling parents", "been hospitalized while traveling", "encountered police abroad"]
            },
            food: {
                mild: ["eaten alone", "had ramen as a meal", "cried from spicy food", "spilled food while eating", "burned food", "ordered delivery and ate it all alone", "eaten ramen at dawn", "said bad food was good", "raided the fridge", "binged after starving"],
                medium: ["thrown up after eating", "binged while on a diet", "dined and dashed", "eaten expired food", "fought over food", "cried while eating", "starved from having no money", "secretly eaten someone's food", "gone to ER from overeating", "tried mukbang"],
                spicy: ["got drunk, ate, and threw up", "ruined a date because of food", "made a scene at a restaurant", "couldn't hold it after eating", "eaten weird things while drunk", "ran away without paying", "not used bathroom for 3+ days", "went to ER for food allergy", "surprised everyone by eating the most", "ate and immediately ate again"]
            }
        };

        var categories = ['general', 'travel', 'food'];
        var categoryNames = { general: 'General', travel: 'Travel', food: 'Food' };
        var currentCategory = 'general';
        var currentIntensity = 'mild';
        var deck = [];
        var usedCards = [];

        function initCategories() {
            var html = '';
            for (var i = 0; i < categories.length; i++) {
                var cat = categories[i];
                var active = cat === currentCategory ? 'active' : '';
                html += '<button class="category-btn ' + active + '" onclick="setCategory(\'' + cat + '\')">' + categoryNames[cat] + '</button>';
            }
            document.getElementById('categories').innerHTML = html;
        }

        function setCategory(cat) {
            currentCategory = cat;
            initCategories();
            resetDeck();
        }

        function setIntensity(level) {
            currentIntensity = level;
            document.querySelectorAll('.intensity-btn').forEach(function(btn, i) {
                var levels = ['mild', 'medium', 'spicy'];
                btn.classList.toggle('active', levels[i] === level);
            });
            resetDeck();
        }

        function resetDeck() {
            deck = prompts[currentCategory][currentIntensity].slice();
            shuffle();
            usedCards = [];
            updateStats();
        }

        function shuffle() {
            for (var i = deck.length - 1; i > 0; i--) {
                var j = Math.floor(Math.random() * (i + 1));
                var temp = deck[i];
                deck[i] = deck[j];
                deck[j] = temp;
            }
        }

        function nextCard() {
            if (deck.length === 0) {
                deck = usedCards.slice();
                usedCards = [];
                shuffle();
            }

            var card = deck.pop();
            usedCards.push(card);

            var cardEl = document.getElementById('card');
            cardEl.classList.add('flip');

            setTimeout(function() {
                document.getElementById('cardText').textContent = card;
                cardEl.classList.remove('flip');
            }, 300);

            updateStats();
            saveStats();
        }

        function updateStats() {
            document.getElementById('seenCount').textContent = usedCards.length;
            document.getElementById('remainCount').textContent = deck.length;
        }

        function saveStats() {
            var stats = JSON.parse(localStorage.getItem('nhie_en') || '{"played":0}');
            stats.played++;
            localStorage.setItem('nhie_en', JSON.stringify(stats));
        }

        initCategories();
        resetDeck();
    </script>
</body>
</html>
