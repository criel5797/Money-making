    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #f857a6, #ff5858); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .cart-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .cart-summary { background: rgba(0,0,0,.2); border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .summary-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
        .summary-row.total { font-size: 1.2rem; font-weight: 700; border-top: 1px solid rgba(255,255,255,.2); padding-top: 10px; margin-top: 10px; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #11998e, #38ef7d); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .cart-items { max-height: 280px; overflow-y: auto; }
        .cart-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; margin-bottom: 10px; }
        .item-info { flex: 1; }
        .item-name { font-weight: 600; }
        .item-price { font-size: .9rem; opacity: .8; margin-top: 3px; }
        .quantity-controls { display: flex; align-items: center; gap: 10px; margin-right: 15px; }
        .qty-btn { width: 28px; height: 28px; border: none; border-radius: 50%; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; font-size: 1rem; }
        .qty-value { font-weight: 600; min-width: 20px; text-align: center; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; }
        .clear-btn { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,.3); border-radius: 10px; background: transparent; color: #fff; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🛒 장바구니</h1>
        </header>
        <div class="cart-section">
            <div class="cart-summary">
                <div class="summary-row"><span>상품 수</span><span id="itemCount">0개</span></div>
                <div class="summary-row"><span>수량 합계</span><span id="qtyTotal">0개</span></div>
                <div class="summary-row total"><span>총 금액</span><span id="priceTotal">0원</span></div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="itemName" placeholder="상품명">
                    <input type="number" id="itemPrice" placeholder="가격" style="max-width:100px">
                </div>
                <button class="add-btn" onclick="addItem()">장바구니 추가</button>
            </div>
            <div class="cart-items" id="cartItems"></div>
            <button class="clear-btn" onclick="clearCart()">장바구니 비우기</button>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var cart = JSON.parse(localStorage.getItem('shopping_cart') || '[]');
        function save() { localStorage.setItem('shopping_cart', JSON.stringify(cart)); }
        function addItem() {
            var name = document.getElementById('itemName').value.trim();
            var price = parseInt(document.getElementById('itemPrice').value) || 0;
            if (!name) return;
            var existing = cart.find(function(c) { return c.name === name; });
            if (existing) {
                existing.quantity++;
            } else {
                cart.push({ id: Date.now().toString(), name: name, price: price, quantity: 1 });
            }
            save();
            document.getElementById('itemName').value = '';
            document.getElementById('itemPrice').value = '';
            render();
        }
        function updateQty(id, delta) {
            var item = cart.find(function(c) { return c.id === id; });
            if (item) {
                item.quantity += delta;
                if (item.quantity <= 0) {
                    cart = cart.filter(function(c) { return c.id !== id; });
                }
                save();
                render();
            }
        }
        function deleteItem(id) {
            cart = cart.filter(function(c) { return c.id !== id; });
            save();
            render();
        }
        function clearCart() {
            cart = [];
            save();
            render();
        }
        function render() {
            var itemCount = cart.length;
            var qtyTotal = cart.reduce(function(s, c) { return s + c.quantity; }, 0);
            var priceTotal = cart.reduce(function(s, c) { return s + c.price * c.quantity; }, 0);
            document.getElementById('itemCount').textContent = itemCount + '개';
            document.getElementById('qtyTotal').textContent = qtyTotal + '개';
            document.getElementById('priceTotal').textContent = priceTotal.toLocaleString() + '원';
            var list = document.getElementById('cartItems');
            list.innerHTML = '';
            cart.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'cart-item';
                div.innerHTML = '<div class="item-info"><div class="item-name">' + item.name + '</div><div class="item-price">' + item.price.toLocaleString() + '원</div></div><div class="quantity-controls"><button class="qty-btn" onclick="updateQty(\'' + item.id + '\',-1)">-</button><span class="qty-value">' + item.quantity + '</span><button class="qty-btn" onclick="updateQty(\'' + item.id + '\',1)">+</button></div><button class="del-btn" onclick="deleteItem(\'' + item.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
