    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #4a00e0); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .wish-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .counter-display { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 16px; padding: 40px; margin-bottom: 20px; text-align: center; }
        .counter-icon { font-size: 3rem; margin-bottom: 10px; }
        .counter-number { font-size: 4rem; font-weight: 700; }
        .counter-label { font-size: .9rem; opacity: .8; margin-top: 5px; }
        .count-btn { width: 100%; padding: 20px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; font-size: 1.2rem; cursor: pointer; font-weight: 600; margin-bottom: 15px; transition: transform .1s; }
        .count-btn:active { transform: scale(0.98); }
        .btn-row { display: flex; gap: 10px; margin-bottom: 20px; }
        .reset-btn { flex: 1; padding: 14px; border: none; border-radius: 10px; background: rgba(255,255,255,.2); color: #fff; cursor: pointer; }
        .history-title { font-size: .9rem; margin-bottom: 10px; opacity: .8; }
        .history-list { max-height: 150px; overflow-y: auto; }
        .history-item { display: flex; justify-content: space-between; padding: 10px 15px; background: rgba(255,255,255,.1); border-radius: 8px; margin-bottom: 5px; font-size: .85rem; }
        .add-wish { margin-top: 15px; }
        .add-input { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🌟 願いカウンター</h1>
        </header>
        <div class="wish-section">
            <div class="counter-display">
                <div class="counter-icon">✨</div>
                <div class="counter-number" id="counter">0</div>
                <div class="counter-label" id="wishLabel">願いを込めましょう</div>
            </div>
            <button class="count-btn" onclick="makeWish()">🙏 願いを込める</button>
            <div class="add-wish">
                <input type="text" class="add-input" id="wishInput" placeholder="今日の願い（任意）">
            </div>
            <div class="btn-row">
                <button class="reset-btn" onclick="resetCounter()">リセット</button>
            </div>
            <div class="history-title">願いの履歴</div>
            <div class="history-list" id="historyList"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var wishData = JSON.parse(localStorage.getItem('wish_counter_ja') || '{"count":0,"wishes":[]}');
        function save() { localStorage.setItem('wish_counter_ja', JSON.stringify(wishData)); }
        function makeWish() {
            wishData.count++;
            var wishText = document.getElementById('wishInput').value.trim();
            if (wishText) {
                wishData.wishes.unshift({ text: wishText, date: new Date().toISOString(), count: wishData.count });
                if (wishData.wishes.length > 20) wishData.wishes.pop();
                document.getElementById('wishInput').value = '';
            }
            save();
            render();
            animateCounter();
        }
        function animateCounter() {
            var counter = document.getElementById('counter');
            counter.style.transform = 'scale(1.2)';
            setTimeout(function() { counter.style.transform = 'scale(1)'; }, 150);
        }
        function resetCounter() {
            if (confirm('カウンターをリセットしますか？')) {
                wishData.count = 0;
                save();
                render();
            }
        }
        function formatDate(iso) {
            var d = new Date(iso);
            return (d.getMonth() + 1) + '/' + d.getDate();
        }
        function render() {
            document.getElementById('counter').textContent = wishData.count;
            var label = document.getElementById('wishLabel');
            if (wishData.count === 0) {
                label.textContent = '願いを込めましょう';
            } else if (wishData.count < 10) {
                label.textContent = '良いスタート！';
            } else if (wishData.count < 50) {
                label.textContent = '続けていますね！';
            } else if (wishData.count < 100) {
                label.textContent = 'すごい！続けて！';
            } else {
                label.textContent = '願いマスター！⭐';
            }
            var list = document.getElementById('historyList');
            list.innerHTML = '';
            wishData.wishes.slice(0, 10).forEach(function(w) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = '<span>' + w.text + '</span><span>' + formatDate(w.date) + '</span>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
