    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #2c3e50, #4ca1af); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .calc-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .input-group { margin-bottom: 18px; }
        .input-label { font-size: .9rem; margin-bottom: 8px; opacity: .8; }
        input[type=number] { width: 100%; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; font-size: 1rem; }
        .calc-btn { width: 100%; padding: 16px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1.1rem; cursor: pointer; margin: 20px 0; }
        .result-card { background: rgba(0,0,0,.3); border-radius: 12px; padding: 25px; }
        .result-main { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,.2); }
        .result-label { font-size: .9rem; opacity: .8; margin-bottom: 5px; }
        .result-value { font-size: 2.2rem; font-weight: 700; }
        .result-unit { font-size: .9rem; opacity: .8; }
        .detail-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,.1); }
        .detail-row:last-child { border: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header><h1>🏦 대출 계산기</h1></header>
        <div class="calc-section">
            <div class="input-group">
                <div class="input-label">대출 금액 (원)</div>
                <input type="number" id="loanAmount" placeholder="100000000" value="100000000">
            </div>
            <div class="input-group">
                <div class="input-label">연 이자율 (%)</div>
                <input type="number" id="interestRate" placeholder="4.5" value="4.5" step="0.1">
            </div>
            <div class="input-group">
                <div class="input-label">대출 기간 (년)</div>
                <input type="number" id="loanYears" placeholder="30" value="30">
            </div>
            <button class="calc-btn" onclick="calculate()">계산하기</button>
            <div class="result-card">
                <div class="result-main">
                    <div class="result-label">월 상환금</div>
                    <div class="result-value" id="monthlyPayment">0</div>
                    <div class="result-unit">원/월</div>
                </div>
                <div class="detail-row"><span>총 상환금</span><span id="totalPayment">0원</span></div>
                <div class="detail-row"><span>총 이자</span><span id="totalInterest">0원</span></div>
                <div class="detail-row"><span>이자 비율</span><span id="interestRatio">0%</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        function calculate() {
            var principal = parseFloat(document.getElementById('loanAmount').value) || 0;
            var rate = parseFloat(document.getElementById('interestRate').value) || 0;
            var years = parseInt(document.getElementById('loanYears').value) || 1;
            var monthlyRate = rate / 100 / 12;
            var months = years * 12;
            var monthly = 0;
            if (monthlyRate > 0) {
                var factor = Math.pow(1 + monthlyRate, months);
                monthly = principal * (monthlyRate * factor) / (factor - 1);
            } else {
                monthly = principal / months;
            }
            var totalPayment = monthly * months;
            var totalInterest = totalPayment - principal;
            var ratio = principal > 0 ? (totalInterest / principal) * 100 : 0;
            document.getElementById('monthlyPayment').textContent = Math.round(monthly).toLocaleString();
            document.getElementById('totalPayment').textContent = Math.round(totalPayment).toLocaleString() + '원';
            document.getElementById('totalInterest').textContent = Math.round(totalInterest).toLocaleString() + '원';
            document.getElementById('interestRatio').textContent = ratio.toFixed(1) + '%';
        }
        calculate();
    </script>
</body>
