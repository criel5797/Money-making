<body>
    <div class="container">
        <div class="ad-banner">広告エリア</div>
        <header>
            <h1>📝 Lorem Ipsumジェネレーター</h1>
            <p class="subtitle">デザインと開発用のダミーテキストを生成</p>
        </header>
        <div class="lorem-section">
            <div class="type-buttons">
                <button class="type-btn active" data-type="paragraphs">段落</button>
                <button class="type-btn" data-type="sentences">文</button>
                <button class="type-btn" data-type="words">単語</button>
            </div>

            <div class="options-grid">
                <div class="option-group">
                    <div class="option-label">生成数</div>
                    <input type="number" class="option-input" id="amount" value="3" min="1" max="100">
                </div>
                <div class="option-group">
                    <div class="option-label">テキストスタイル</div>
                    <select class="option-select" id="style">
                        <option value="classic">クラシック Lorem Ipsum</option>
                        <option value="japanese">日本語ダミー</option>
                        <option value="hipster">ヒップスター Ipsum</option>
                    </select>
                </div>
            </div>

            <div class="checkbox-group">
                <label class="checkbox-item">
                    <input type="checkbox" id="startLorem" checked>
                    <span>「Lorem ipsum」で開始</span>
                </label>
                <label class="checkbox-item">
                    <input type="checkbox" id="addTags">
                    <span>HTMLタグを含める</span>
                </label>
            </div>

            <button class="generate-btn" onclick="generate()">🎲 テキスト生成</button>

            <div class="output-area">
                <div class="output-text" id="outputText">生成ボタンをクリックしてテキストを作成してください。</div>
            </div>

            <div class="output-actions">
                <button class="action-btn" onclick="copyText()">📋 コピー</button>
                <button class="action-btn" onclick="downloadText()">💾 ダウンロード</button>
                <button class="action-btn" onclick="clearText()">🗑️ クリア</button>
            </div>

            <div class="stats">
                <div class="stat-item">単語: <span id="wordCount">0</span></div>
                <div class="stat-item">文字: <span id="charCount">0</span></div>
                <div class="stat-item">段落: <span id="paraCount">0</span></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告エリア</div>
    </div>
    <script>
        var loremWords = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum'];

        var japaneseWords = ['空', '海', '山', '川', '花', '月', '星', '風', '雲', '雪', '雨', '森', '湖', '道', '家', '窓', '光', '影', '朝', '夜', '春', '夏', '秋', '冬', '愛', '夢', '希望', '幸福', '平和', '自由', '真実', '勇気', '知恵', '忍耐', '努力', '成功', '未来', '現在', '過去', '時間', '世界', '人生', '心', '魂', '命', '力', '美', '善', '調和'];

        var hipsterWords = ['artisan', 'craft', 'sustainable', 'organic', 'vegan', 'vintage', 'retro', 'aesthetic', 'minimal', 'curated', 'ethical', 'handmade', 'authentic', 'bespoke', 'boutique', 'creative', 'design', 'eco', 'fair-trade', 'farm-to-table', 'gluten-free', 'indie', 'local', 'mindful', 'natural', 'premium', 'raw', 'slow', 'small-batch', 'urban', 'wellness', 'zen', 'avocado', 'kombucha', 'quinoa', 'kale', 'matcha', 'acai', 'cold-brew', 'sourdough'];

        var currentType = 'paragraphs';

        document.querySelectorAll('.type-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.type-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                currentType = btn.dataset.type;
            });
        });

        function getWordList() {
            var style = document.getElementById('style').value;
            if (style === 'japanese') return japaneseWords;
            if (style === 'hipster') return hipsterWords;
            return loremWords;
        }

        function generateWord() {
            var words = getWordList();
            return words[Math.floor(Math.random() * words.length)];
        }

        function generateSentence(wordCount) {
            var count = wordCount || Math.floor(Math.random() * 10) + 5;
            var words = [];
            for (var i = 0; i < count; i++) {
                words.push(generateWord());
            }
            words[0] = words[0].charAt(0).toUpperCase() + words[0].slice(1);
            return words.join(' ') + '.';
        }

        function generateParagraph(sentenceCount) {
            var count = sentenceCount || Math.floor(Math.random() * 4) + 3;
            var sentences = [];
            for (var i = 0; i < count; i++) {
                sentences.push(generateSentence());
            }
            return sentences.join(' ');
        }

        function generate() {
            var amount = parseInt(document.getElementById('amount').value) || 3;
            var startLorem = document.getElementById('startLorem').checked;
            var addTags = document.getElementById('addTags').checked;
            var style = document.getElementById('style').value;

            var output = [];

            if (currentType === 'paragraphs') {
                for (var i = 0; i < amount; i++) {
                    var para = generateParagraph();
                    if (i === 0 && startLorem && style === 'classic') {
                        para = 'Lorem ipsum dolor sit amet, consectetur adipiscing elit. ' + para;
                    }
                    if (addTags) {
                        output.push('<p>' + para + '</p>');
                    } else {
                        output.push(para);
                    }
                }
            } else if (currentType === 'sentences') {
                for (var j = 0; j < amount; j++) {
                    var sentence = generateSentence();
                    if (j === 0 && startLorem && style === 'classic') {
                        sentence = 'Lorem ipsum dolor sit amet. ' + sentence;
                    }
                    output.push(sentence);
                }
            } else {
                var words = [];
                if (startLorem && style === 'classic') {
                    words.push('Lorem', 'ipsum');
                    amount = Math.max(0, amount - 2);
                }
                for (var k = 0; k < amount; k++) {
                    words.push(generateWord());
                }
                output.push(words.join(' '));
            }

            var text = output.join(currentType === 'paragraphs' ? '\n\n' : ' ');
            document.getElementById('outputText').textContent = text;
            updateStats(text);
        }

        function updateStats(text) {
            var words = text.trim().split(/\s+/).filter(function(w) { return w.length > 0; });
            var chars = text.length;
            var paras = text.split(/\n\n+/).filter(function(p) { return p.trim().length > 0; });

            document.getElementById('wordCount').textContent = words.length;
            document.getElementById('charCount').textContent = chars;
            document.getElementById('paraCount').textContent = paras.length;
        }

        function copyText() {
            var text = document.getElementById('outputText').textContent;
            navigator.clipboard.writeText(text).then(function() {
                alert('コピーしました！');
            });
        }

        function downloadText() {
            var text = document.getElementById('outputText').textContent;
            var blob = new Blob([text], { type: 'text/plain' });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            a.href = url;
            a.download = 'lorem-ipsum.txt';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearText() {
            document.getElementById('outputText').textContent = '生成ボタンをクリックしてテキストを作成してください。';
            document.getElementById('wordCount').textContent = '0';
            document.getElementById('charCount').textContent = '0';
            document.getElementById('paraCount').textContent = '0';
        }

        generate();
    </script>
