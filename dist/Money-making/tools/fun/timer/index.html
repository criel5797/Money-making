    <meta charset="UTF-8">
    
    
    
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .timer-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            backdrop-filter: blur(10px);
        }
        .time-display {
            font-size: 4rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            margin: 30px 0;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }
        .time-display.warning { color: #f1c40f; }
        .time-display.danger { color: #e74c3c; animation: pulse 0.5s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }
        .time-inputs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .time-input-group {
            text-align: center;
        }
        .time-input-group label {
            display: block;
            font-size: 0.85rem;
            margin-bottom: 5px;
            color: rgba(255,255,255,0.7);
        }
        .time-input-group input {
            width: 70px;
            padding: 12px;
            font-size: 1.3rem;
            text-align: center;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-weight: bold;
        }
        .time-input-group input:focus {
            outline: none;
            border-color: rgba(255,255,255,0.6);
        }
        .preset-buttons {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }
        .preset-btn {
            padding: 10px 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .preset-btn:hover {
            background: rgba(255,255,255,0.2);
            border-color: rgba(255,255,255,0.5);
        }
        .control-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .control-btn {
            padding: 15px 35px;
            font-size: 1.1rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        .pause-btn {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            color: white;
        }
        .reset-btn {
            background: linear-gradient(135deg, #95a5a6, #7f8c8d);
            color: white;
        }
        .control-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            margin-top: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #27ae60, #2ecc71);
            border-radius: 4px;
            transition: width 0.3s;
        }
        .sound-toggle {
            margin-top: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .sound-toggle input {
            width: 20px;
            height: 20px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고 영역</div>
        <header>
            <h1>⏱️ 타이머</h1>
            <p class="subtitle">시간을 설정하고 카운트다운하세요</p>
        </header>
        <div class="timer-section">
            <div class="time-inputs" id="timeInputs">
                <div class="time-input-group">
                    <label>시간</label>
                    <input type="number" id="hoursInput" min="0" max="99" value="0">
                </div>
                <div class="time-input-group">
                    <label>분</label>
                    <input type="number" id="minutesInput" min="0" max="59" value="5">
                </div>
                <div class="time-input-group">
                    <label>초</label>
                    <input type="number" id="secondsInput" min="0" max="59" value="0">
                </div>
            </div>
            <div class="preset-buttons">
                <button class="preset-btn" onclick="setPreset(1)">1분</button>
                <button class="preset-btn" onclick="setPreset(3)">3분</button>
                <button class="preset-btn" onclick="setPreset(5)">5분</button>
                <button class="preset-btn" onclick="setPreset(10)">10분</button>
                <button class="preset-btn" onclick="setPreset(15)">15분</button>
                <button class="preset-btn" onclick="setPreset(30)">30분</button>
            </div>
            <div class="time-display" id="timeDisplay">05:00</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 100%"></div>
            </div>
            <div class="control-buttons">
                <button class="control-btn start-btn" id="startBtn" onclick="startTimer()">시작</button>
                <button class="control-btn pause-btn" id="pauseBtn" onclick="pauseTimer()" style="display:none">일시정지</button>
                <button class="control-btn reset-btn" id="resetBtn" onclick="resetTimer()">초기화</button>
            </div>
            <div class="sound-toggle">
                <input type="checkbox" id="soundToggle" checked>
                <label for="soundToggle">알람 소리</label>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고 영역</div>
    </div>
    <script>
        var timerInterval = null;
        var totalSeconds = 300;
        var remainingSeconds = 300;
        var isRunning = false;

        function updateDisplay() {
            var hours = Math.floor(remainingSeconds / 3600);
            var minutes = Math.floor((remainingSeconds % 3600) / 60);
            var seconds = remainingSeconds % 60;
            var display = document.getElementById('timeDisplay');

            if (hours > 0) {
                display.textContent = pad(hours) + ':' + pad(minutes) + ':' + pad(seconds);
            } else {
                display.textContent = pad(minutes) + ':' + pad(seconds);
            }

            display.className = 'time-display';
            if (remainingSeconds <= 10 && remainingSeconds > 0) {
                display.classList.add('danger');
            } else if (remainingSeconds <= 30) {
                display.classList.add('warning');
            }

            var progress = (remainingSeconds / totalSeconds) * 100;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function pad(num) {
            return num.toString().padStart(2, '0');
        }

        function getInputSeconds() {
            var hours = parseInt(document.getElementById('hoursInput').value) || 0;
            var minutes = parseInt(document.getElementById('minutesInput').value) || 0;
            var seconds = parseInt(document.getElementById('secondsInput').value) || 0;
            return hours * 3600 + minutes * 60 + seconds;
        }

        function setPreset(minutes) {
            document.getElementById('hoursInput').value = 0;
            document.getElementById('minutesInput').value = minutes;
            document.getElementById('secondsInput').value = 0;
            totalSeconds = minutes * 60;
            remainingSeconds = totalSeconds;
            updateDisplay();
        }

        function startTimer() {
            if (!isRunning) {
                if (remainingSeconds === 0 || remainingSeconds === totalSeconds) {
                    totalSeconds = getInputSeconds();
                    remainingSeconds = totalSeconds;
                }
                if (remainingSeconds <= 0) return;

                isRunning = true;
                document.getElementById('timeInputs').style.opacity = '0.5';
                document.getElementById('startBtn').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'inline-block';

                timerInterval = setInterval(function() {
                    remainingSeconds--;
                    updateDisplay();

                    if (remainingSeconds <= 0) {
                        clearInterval(timerInterval);
                        isRunning = false;
                        playAlarm();
                        document.getElementById('startBtn').style.display = 'inline-block';
                        document.getElementById('pauseBtn').style.display = 'none';
                        document.getElementById('timeInputs').style.opacity = '1';
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            if (isRunning) {
                clearInterval(timerInterval);
                isRunning = false;
                document.getElementById('startBtn').style.display = 'inline-block';
                document.getElementById('pauseBtn').style.display = 'none';
                document.getElementById('startBtn').textContent = '계속';
            }
        }

        function resetTimer() {
            clearInterval(timerInterval);
            isRunning = false;
            totalSeconds = getInputSeconds();
            remainingSeconds = totalSeconds;
            updateDisplay();
            document.getElementById('timeInputs').style.opacity = '1';
            document.getElementById('startBtn').style.display = 'inline-block';
            document.getElementById('pauseBtn').style.display = 'none';
            document.getElementById('startBtn').textContent = '시작';
        }

        function playAlarm() {
            if (!document.getElementById('soundToggle').checked) return;
            var audioContext = new (window.AudioContext || window.webkitAudioContext)();
            for (var i = 0; i < 3; i++) {
                setTimeout(function() {
                    var oscillator = audioContext.createOscillator();
                    var gainNode = audioContext.createGain();
                    oscillator.connect(gainNode);
                    gainNode.connect(audioContext.destination);
                    oscillator.frequency.value = 880;
                    oscillator.type = 'sine';
                    gainNode.gain.value = 0.3;
                    oscillator.start();
                    setTimeout(function() { oscillator.stop(); }, 200);
                }, i * 400);
            }
        }

        document.querySelectorAll('.time-input-group input').forEach(function(input) {
            input.addEventListener('change', function() {
                if (!isRunning) {
                    totalSeconds = getInputSeconds();
                    remainingSeconds = totalSeconds;
                    updateDisplay();
                }
            });
        });

        updateDisplay();
    </script>
</body>
</html>
