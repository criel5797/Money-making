            const combined = name1 + name2;
            let hash = 0;
            for (let i = 0; i < combined.length; i++) {
                hash = ((hash << 5) - hash) + combined.charCodeAt(i);
                hash = hash & hash;
            }

            // 50-100の範囲のスコア
            return 50 + (Math.abs(hash) % 51);
        }

        function calculateBirthScore(birth1, birth2) {
            const y1 = parseInt(birth1.year);
            const m1 = parseInt(birth1.month);
            const d1 = parseInt(birth1.day);
            const y2 = parseInt(birth2.year);
            const m2 = parseInt(birth2.month);
            const d2 = parseInt(birth2.day);

            // 年齢差スコア
            const ageDiff = Math.abs(y1 - y2);
            let ageScore = 100;
            if (ageDiff > 10) ageScore = 60;
            else if (ageDiff > 5) ageScore = 80;
            else if (ageDiff > 2) ageScore = 90;

            // 月日の組み合わせスコア
            const dateHash = (m1 * d1 + m2 * d2) % 100;
            const dateScore = 50 + (dateHash % 51);

            return Math.round((ageScore + dateScore) / 2);
        }

        function randomRange(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        function animateNumber(elementId, start, end, duration) {
            const element = document.getElementById(elementId);
            const range = end - start;
            const startTime = performance.now();

            function update(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const value = Math.round(start + range * progress);
                element.textContent = value + '%';

                if (progress < 1) {
                    requestAnimationFrame(update);
                }
            }
            requestAnimationFrame(update);
        }

            if (score >= 50) return "普通の相性！お互いの理解が必要です！ 🤔";
