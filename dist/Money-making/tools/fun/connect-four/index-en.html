    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #1a1a2e, #16213e); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 400px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .game-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 20px; }
        .status { text-align: center; font-size: 1.2rem; margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,.1); border-radius: 8px; }
        .board { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; background: #1a56db; padding: 10px; border-radius: 12px; margin-bottom: 15px; }
        .cell { aspect-ratio: 1; background: #1e40af; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all .2s; }
        .cell:hover { opacity: .8; }
        .cell.red { background: #ef4444; box-shadow: inset 0 -4px 8px rgba(0,0,0,.3); }
        .cell.yellow { background: #eab308; box-shadow: inset 0 -4px 8px rgba(0,0,0,.3); }
        .cell.winning { animation: pulse 0.5s infinite alternate; }
        @keyframes pulse { to { transform: scale(1.1); } }
        .action-btns { display: flex; gap: 10px; margin-bottom: 15px; }
        .action-btn { flex: 1; padding: 14px; border: none; border-radius: 12px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .new-btn { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
        .mode-btn { background: rgba(255,255,255,.2); color: #fff; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .stat-card { background: rgba(255,255,255,.1); border-radius: 10px; padding: 12px; text-align: center; }
        .stat-value { font-size: 1.2rem; font-weight: 700; }
        .stat-label { font-size: .7rem; opacity: .7; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">Advertisement</div>
        <header>
            <h1>🔴🟡 Connect Four</h1>
        </header>
        <div class="game-section">
            <div class="status" id="status">🔴 Red's Turn</div>
            <div class="board" id="board"></div>
            <div class="action-btns">
                <button class="action-btn new-btn" onclick="newGame()">🔄 New Game</button>
                <button class="action-btn mode-btn" onclick="toggleMode()">👤 1P Mode</button>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <div class="stat-value" id="redWins">0</div>
                    <div class="stat-label">🔴 Wins</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="draws">0</div>
                    <div class="stat-label">Draws</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="yellowWins">0</div>
                    <div class="stat-label">🟡 Wins</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">Advertisement</div>
    </div>
    <script>
        var ROWS = 6, COLS = 7;
        var board = [];
        var currentPlayer = 'red';
        var gameOver = false;
        var is1Player = true;
        var stats = JSON.parse(localStorage.getItem('connect4_en') || '{"red":0,"yellow":0,"draws":0}');

        function initBoard() {
            var boardEl = document.getElementById('board');
            boardEl.innerHTML = '';
            board = [];
            for (var r = 0; r < ROWS; r++) {
                var row = [];
                for (var c = 0; c < COLS; c++) {
                    var cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.col = c;
                    cell.onclick = function() { dropPiece(parseInt(this.dataset.col)); };
                    boardEl.appendChild(cell);
                    row.push('');
                }
                board.push(row);
            }
        }

        function dropPiece(col) {
            if (gameOver) return;
            if (is1Player && currentPlayer === 'yellow') return;

            var row = getAvailableRow(col);
            if (row === -1) return;

            board[row][col] = currentPlayer;
            updateCell(row, col);

            if (checkWin(row, col)) {
                gameOver = true;
                document.getElementById('status').textContent = (currentPlayer === 'red' ? '🔴 Red' : '🟡 Yellow') + ' Wins! 🎉';
                if (currentPlayer === 'red') stats.red++; else stats.yellow++;
                saveStats();
                return;
            }

            if (checkDraw()) {
                gameOver = true;
                document.getElementById('status').textContent = 'Draw! 🤝';
                stats.draws++;
                saveStats();
                return;
            }

            currentPlayer = currentPlayer === 'red' ? 'yellow' : 'red';
            document.getElementById('status').textContent = (currentPlayer === 'red' ? '🔴 Red' : '🟡 Yellow') + "'s Turn";

            if (is1Player && currentPlayer === 'yellow') {
                setTimeout(cpuMove, 500);
            }
        }

        function getAvailableRow(col) {
            for (var r = ROWS - 1; r >= 0; r--) {
                if (board[r][col] === '') return r;
            }
            return -1;
        }

        function updateCell(row, col) {
            var idx = row * COLS + col;
            var cells = document.querySelectorAll('.cell');
            cells[idx].classList.add(currentPlayer);
        }

        function checkWin(row, col) {
            var directions = [[0,1], [1,0], [1,1], [1,-1]];
            for (var d = 0; d < directions.length; d++) {
                var dr = directions[d][0], dc = directions[d][1];
                var count = 1;
                var cells = [[row, col]];

                for (var i = 1; i < 4; i++) {
                    var nr = row + dr * i, nc = col + dc * i;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === currentPlayer) {
                        count++;
                        cells.push([nr, nc]);
                    } else break;
                }
                for (var i = 1; i < 4; i++) {
                    var nr = row - dr * i, nc = col - dc * i;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === currentPlayer) {
                        count++;
                        cells.push([nr, nc]);
                    } else break;
                }

                if (count >= 4) {
                    highlightWin(cells);
                    return true;
                }
            }
            return false;
        }

        function highlightWin(cells) {
            var allCells = document.querySelectorAll('.cell');
            cells.forEach(function(pos) {
                var idx = pos[0] * COLS + pos[1];
                allCells[idx].classList.add('winning');
            });
        }

        function checkDraw() {
            for (var c = 0; c < COLS; c++) {
                if (board[0][c] === '') return false;
            }
            return true;
        }

        function cpuMove() {
            for (var c = 0; c < COLS; c++) {
                var r = getAvailableRow(c);
                if (r !== -1) {
                    board[r][c] = 'yellow';
                    if (checkWinSimple(r, c, 'yellow')) {
                        board[r][c] = '';
                        dropPiece(c);
                        return;
                    }
                    board[r][c] = '';
                }
            }

            for (var c = 0; c < COLS; c++) {
                var r = getAvailableRow(c);
                if (r !== -1) {
                    board[r][c] = 'red';
                    if (checkWinSimple(r, c, 'red')) {
                        board[r][c] = '';
                        dropPiece(c);
                        return;
                    }
                    board[r][c] = '';
                }
            }

            var centerCol = 3;
            if (getAvailableRow(centerCol) !== -1) {
                dropPiece(centerCol);
                return;
            }

            var validCols = [];
            for (var c = 0; c < COLS; c++) {
                if (getAvailableRow(c) !== -1) validCols.push(c);
            }
            if (validCols.length > 0) {
                dropPiece(validCols[Math.floor(Math.random() * validCols.length)]);
            }
        }

        function checkWinSimple(row, col, player) {
            var directions = [[0,1], [1,0], [1,1], [1,-1]];
            for (var d = 0; d < directions.length; d++) {
                var dr = directions[d][0], dc = directions[d][1];
                var count = 1;
                for (var i = 1; i < 4; i++) {
                    var nr = row + dr * i, nc = col + dc * i;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === player) count++;
                    else break;
                }
                for (var i = 1; i < 4; i++) {
                    var nr = row - dr * i, nc = col - dc * i;
                    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === player) count++;
                    else break;
                }
                if (count >= 4) return true;
            }
            return false;
        }

        function newGame() {
            currentPlayer = 'red';
            gameOver = false;
            document.getElementById('status').textContent = "🔴 Red's Turn";
            initBoard();
        }

        function toggleMode() {
            is1Player = !is1Player;
            document.querySelector('.mode-btn').textContent = is1Player ? '👤 1P Mode' : '👥 2P Mode';
            newGame();
        }

        function saveStats() {
            localStorage.setItem('connect4_en', JSON.stringify(stats));
            updateStats();
        }

        function updateStats() {
            document.getElementById('redWins').textContent = stats.red;
            document.getElementById('yellowWins').textContent = stats.yellow;
            document.getElementById('draws').textContent = stats.draws;
        }

        updateStats();
        initBoard();
    </script>
</body>
</html>
