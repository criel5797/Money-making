    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #434343, #000000); min-height: 100vh; color: #fff; padding: 20px; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 600px; width: 100%; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .quote-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 40px 30px; text-align: center; }
        .quote-icon { font-size: 3rem; margin-bottom: 20px; opacity: .5; }
        .quote-text { font-size: 1.4rem; line-height: 1.8; margin-bottom: 25px; font-style: italic; }
        .quote-author { font-size: 1rem; opacity: .7; margin-bottom: 30px; }
        .new-btn { padding: 18px 40px; border: none; border-radius: 12px; background: linear-gradient(135deg, #f093fb, #f5576c); color: #fff; font-size: 1.1rem; font-weight: 600; cursor: pointer; }
        .category-btns { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 25px; }
        .cat-btn { padding: 10px 16px; border: 1px solid rgba(255,255,255,.3); border-radius: 20px; background: transparent; color: #fff; cursor: pointer; font-size: .9rem; }
        .cat-btn.active { background: rgba(255,255,255,.2); border-color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header><h1>💬 랜덤 명언</h1></header>
        <div class="quote-section">
            <div class="category-btns">
                <button class="cat-btn active" onclick="setCat('all')">전체</button>
                <button class="cat-btn" onclick="setCat('motivation')">동기부여</button>
                <button class="cat-btn" onclick="setCat('love')">사랑</button>
                <button class="cat-btn" onclick="setCat('success')">성공</button>
                <button class="cat-btn" onclick="setCat('life')">인생</button>
            </div>
            <div class="quote-icon">❝</div>
            <div class="quote-text" id="quoteText">새로운 명언을 불러오세요</div>
            <div class="quote-author" id="quoteAuthor">- 클릭하세요 -</div>
            <button class="new-btn" onclick="newQuote()">새 명언</button>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var quotes = {
            motivation: [
                { text: "성공은 우연이 아니다. 노력, 인내, 학습, 연구, 희생 그리고 가장 중요한 것은 당신이 하는 일을 사랑하는 것이다.", author: "펠레" },
                { text: "실패는 성공의 어머니다.", author: "토마스 에디슨" },
                { text: "오늘 할 수 있는 일을 내일로 미루지 마라.", author: "벤자민 프랭클린" },
                { text: "꿈을 크게 가져라. 그것이 당신을 움직이게 한다.", author: "작자 미상" }
            ],
            love: [
                { text: "사랑은 보이는 것이 아니라 느끼는 것이다.", author: "헬렌 켈러" },
                { text: "사랑에 빠지는 것은 자연스러운 일이다. 사랑을 지키는 것은 선택이다.", author: "작자 미상" },
                { text: "진정한 사랑은 영원히 끝나지 않는다.", author: "셰익스피어" }
            ],
            success: [
                { text: "성공의 비결은 시작하는 것이다.", author: "마크 트웨인" },
                { text: "위대한 일은 작은 일들로 이루어진다.", author: "빈센트 반 고흐" },
                { text: "기회는 준비된 자에게 온다.", author: "루이 파스퇴르" }
            ],
            life: [
                { text: "인생은 짧다. 그래서 아름답다.", author: "작자 미상" },
                { text: "오늘이 당신 남은 인생의 첫 날이다.", author: "찰스 디더리히" },
                { text: "삶이 당신에게 레몬을 주면 레모네이드를 만들어라.", author: "데일 카네기" }
            ]
        };
        var category = 'all';
        function setCat(c) {
            category = c;
            document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
            event.target.classList.add('active');
            newQuote();
        }
        function newQuote() {
            var pool = [];
            if (category === 'all') {
                Object.keys(quotes).forEach(function(k) { pool = pool.concat(quotes[k]); });
            } else {
                pool = quotes[category] || [];
            }
            var q = pool[Math.floor(Math.random() * pool.length)];
            document.getElementById('quoteText').textContent = q.text;
            document.getElementById('quoteAuthor').textContent = '- ' + q.author + ' -';
        }
        newQuote();
    </script>
</body>
</html>
