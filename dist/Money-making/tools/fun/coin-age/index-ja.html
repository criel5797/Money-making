<body>
    <div class="container">
        <div class="ad-banner">広告</div>
        <header>
            <h1>🪙 コイン年齢計算機</h1>
        </header>
        <div class="coin-section">
            <div class="coin-visual" id="coinVisual">🪙</div>
            <div class="input-group">
                <div class="input-label">コイン発行年</div>
                <input type="number" class="year-input" id="yearInput" min="1900" placeholder="例: 1995">
            </div>
            <button class="calc-btn" onclick="calculate()">🔍 年齢を計算</button>
            <div class="result-box">
                <div class="result-age" id="resultAge">-</div>
                <div class="result-label" id="resultLabel">年を入力してください</div>
                <div class="result-detail" id="resultDetail"></div>
            </div>
            <div class="fun-facts">
                <h3>💡 ご存知ですか?</h3>
                <ul>
                    <li>希少なコインは額面以上の価値があります</li>
                    <li>古いコインほど収集価値が高い場合があります</li>
                    <li>発行年によって希少性が異なります</li>
                </ul>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告</div>
    </div>
    <script>
        var yearInput = document.getElementById('yearInput');
        yearInput.max = String(new Date().getFullYear());

        function calculate() {
            var y = parseInt(yearInput.value, 10);
            var now = new Date().getFullYear();
            if (isNaN(y) || y < 1900 || y > now) {
                document.getElementById('resultAge').textContent = '?';
                document.getElementById('resultLabel').textContent = '有効な年を入力してください';
                document.getElementById('resultDetail').textContent = '';
                return;
            }

            var age = now - y;
            document.getElementById('resultAge').textContent = age + '年';
            document.getElementById('resultLabel').textContent = 'このコインの年齢';

            var detail = '発行年: ' + y + '年\n';
            if (age >= 50) detail += '50年以上! 希少なコインかもしれません\n';
            else if (age >= 30) detail += '30年以上! ヴィンテージコインです\n';
            else if (age >= 20) detail += '20年以上! かなり古いです\n';
            else detail += '比較的新しいコインです\n';
            detail += '\n経過時間: ' + (age * 365) + '日, ' + (age * 12) + 'か月';
            document.getElementById('resultDetail').textContent = detail;
        }
    </script>
</body>
