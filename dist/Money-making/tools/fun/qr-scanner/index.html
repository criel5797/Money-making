    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 500px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .scanner-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .tab:hover {
            background: rgba(255,255,255,0.2);
        }
        .tab.active {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }
        #reader {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
        }
        #reader video {
            border-radius: 12px;
        }
        .upload-area {
            display: none;
            border: 3px dashed rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            border-color: white;
            background: rgba(255,255,255,0.1);
        }
        .upload-area.active {
            display: block;
        }
        .upload-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }
        .upload-text {
            font-size: 1rem;
            opacity: 0.8;
        }
        #fileInput {
            display: none;
        }
        .result-section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
            display: none;
        }
        .result-section.active {
            display: block;
        }
        .result-section h3 {
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .result-box {
            background: rgba(255,255,255,0.95);
            color: #333;
            padding: 20px;
            border-radius: 12px;
            word-break: break-all;
            font-family: monospace;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .result-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .action-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .copy-btn {
            background: linear-gradient(135deg, #3498db, #2980b9);
            color: white;
        }
        .open-btn {
            background: linear-gradient(135deg, #27ae60, #2ecc71);
            color: white;
        }
        .action-btn:hover {
            transform: scale(1.02);
        }
        .history {
            margin-top: 25px;
        }
        .history h3 {
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 200px;
            overflow-y: auto;
        }
        .history-item {
            background: rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .history-item:hover {
            background: rgba(255,255,255,0.2);
        }
        .history-text {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 10px;
        }
        .history-time {
            font-size: 0.8rem;
            opacity: 0.7;
        }
        .camera-controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }
        .camera-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .camera-btn:hover {
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고 영역</div>
        <header>
            <h1>📷 QR 코드 스캐너</h1>
            <p class="subtitle">카메라로 스캔하거나 이미지를 업로드하세요</p>
        </header>
        <div class="scanner-section">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('camera')">📹 카메라</button>
                <button class="tab" onclick="switchTab('upload')">📁 이미지 업로드</button>
            </div>

            <div id="reader"></div>

            <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
                <div class="upload-icon">📤</div>
                <div class="upload-text">클릭하여 QR 코드 이미지 업로드</div>
                <input type="file" id="fileInput" accept="image/*" onchange="handleFileUpload(event)">
            </div>

            <div class="camera-controls" id="cameraControls">
                <button class="camera-btn" onclick="toggleFlash()">💡 플래시</button>
                <button class="camera-btn" onclick="switchCamera()">🔄 카메라 전환</button>
            </div>

            <div class="result-section" id="resultSection">
                <h3>✅ 스캔 결과</h3>
                <div class="result-box" id="resultBox"></div>
                <div class="result-actions">
                    <button class="action-btn copy-btn" onclick="copyResult()">📋 복사</button>
                    <button class="action-btn open-btn" id="openBtn" onclick="openResult()" style="display:none">🔗 열기</button>
                </div>
            </div>

            <div class="history">
                <h3>📜 스캔 기록</h3>
                <div class="history-list" id="historyList">
                    <div style="text-align:center;opacity:0.5;padding:20px">기록이 없습니다</div>
                </div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고 영역</div>
    </div>
    <script>
        var html5QrCode = null;
        var currentResult = '';
        var history = JSON.parse(localStorage.getItem('qrHistory') || '[]');
        var currentTab = 'camera';
        var currentCamera = 'environment';

        function initScanner() {
            html5QrCode = new Html5Qrcode("reader");
            startCamera();
        }

        function startCamera() {
            var config = {
                fps: 10,
                qrbox: { width: 250, height: 250 }
            };

            html5QrCode.start(
                { facingMode: currentCamera },
                config,
                onScanSuccess,
                onScanFailure
            ).catch(function(err) {
                console.log('Camera error:', err);
            });
        }

        function onScanSuccess(decodedText, decodedResult) {
            showResult(decodedText);
            addToHistory(decodedText);
            playBeep();
        }

        function onScanFailure(error) {
            // Ignore scan failures
        }

        function showResult(text) {
            currentResult = text;
            document.getElementById('resultBox').textContent = text;
            document.getElementById('resultSection').classList.add('active');

            var openBtn = document.getElementById('openBtn');
            if (isValidUrl(text)) {
                openBtn.style.display = 'block';
            } else {
                openBtn.style.display = 'none';
            }
        }

        function isValidUrl(string) {
            try {
                new URL(string);
                return true;
            } catch (_) {
                return string.startsWith('http://') || string.startsWith('https://');
            }
        }

        function copyResult() {
            navigator.clipboard.writeText(currentResult).then(function() {
                alert('복사되었습니다!');
            });
        }

        function openResult() {
            if (isValidUrl(currentResult)) {
                window.open(currentResult, '_blank');
            }
        }

        function addToHistory(text) {
            var item = {
                text: text,
                time: new Date().toISOString()
            };
            history.unshift(item);
            if (history.length > 20) history.pop();
            localStorage.setItem('qrHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            var list = document.getElementById('historyList');
            if (history.length === 0) {
                list.innerHTML = '<div style="text-align:center;opacity:0.5;padding:20px">기록이 없습니다</div>';
                return;
            }

            list.innerHTML = '';
            history.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = '<span class="history-text">' + item.text + '</span>' +
                    '<span class="history-time">' + new Date(item.time).toLocaleTimeString() + '</span>';
                div.onclick = function() { showResult(item.text); };
                list.appendChild(div);
            });
        }

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(function(t) {
                t.classList.remove('active');
            });
            event.target.classList.add('active');

            if (tab === 'camera') {
                document.getElementById('reader').style.display = 'block';
                document.getElementById('uploadArea').classList.remove('active');
                document.getElementById('cameraControls').style.display = 'flex';
                if (html5QrCode) {
                    html5QrCode.resume();
                }
            } else {
                document.getElementById('reader').style.display = 'none';
                document.getElementById('uploadArea').classList.add('active');
                document.getElementById('cameraControls').style.display = 'none';
                if (html5QrCode) {
                    html5QrCode.pause();
                }
            }
        }

        function handleFileUpload(event) {
            var file = event.target.files[0];
            if (!file) return;

            Html5Qrcode.scanFile(file, true)
                .then(function(decodedText) {
                    showResult(decodedText);
                    addToHistory(decodedText);
                    playBeep();
                })
                .catch(function(err) {
                    alert('QR 코드를 찾을 수 없습니다');
                });
        }

        function switchCamera() {
            currentCamera = currentCamera === 'environment' ? 'user' : 'environment';
            if (html5QrCode) {
                html5QrCode.stop().then(function() {
                    startCamera();
                });
            }
        }

        function toggleFlash() {
            alert('플래시 기능은 일부 기기에서만 지원됩니다');
        }

        function playBeep() {
            var ctx = new (window.AudioContext || window.webkitAudioContext)();
            var o = ctx.createOscillator();
            var g = ctx.createGain();
            o.connect(g);
            g.connect(ctx.destination);
            o.frequency.value = 1000;
            g.gain.value = 0.2;
            o.start();
            setTimeout(function() { o.stop(); }, 100);
        }

        renderHistory();
        initScanner();
    </script>
</body>
</html>
