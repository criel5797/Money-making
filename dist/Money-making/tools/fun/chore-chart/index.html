    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; background: linear-gradient(135deg, #4facfe, #00f2fe); min-height: 100vh; color: #fff; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; }
        .ad-banner { background: rgba(255,255,255,.1); padding: 20px; text-align: center; border-radius: 12px; margin-bottom: 20px; }
        header { text-align: center; margin-bottom: 20px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .chore-section { background: rgba(255,255,255,.1); border-radius: 16px; padding: 25px; }
        .stats { display: flex; justify-content: space-around; margin-bottom: 20px; padding: 15px; background: rgba(0,0,0,.2); border-radius: 12px; }
        .stat { text-align: center; }
        .stat-value { font-size: 1.5rem; font-weight: 700; }
        .stat-label { font-size: .75rem; opacity: .7; }
        .add-form { margin-bottom: 20px; }
        .form-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .form-row input, .form-row select { flex: 1; padding: 12px; border: none; border-radius: 10px; background: rgba(255,255,255,.9); color: #333; }
        .add-btn { width: 100%; padding: 14px; border: none; border-radius: 10px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .chores { max-height: 300px; overflow-y: auto; }
        .chore-item { display: flex; align-items: center; padding: 15px; background: rgba(255,255,255,.1); border-radius: 12px; margin-bottom: 10px; }
        .chore-item.done { opacity: .6; }
        .chore-check { width: 24px; height: 24px; border: 2px solid #fff; border-radius: 50%; margin-right: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .chore-item.done .chore-check { background: #38ef7d; border-color: #38ef7d; }
        .chore-info { flex: 1; }
        .chore-name { font-weight: 600; }
        .chore-item.done .chore-name { text-decoration: line-through; }
        .chore-assignee { font-size: .8rem; opacity: .7; margin-top: 3px; }
        .chore-freq { font-size: .7rem; padding: 2px 8px; border-radius: 10px; background: rgba(255,255,255,.2); margin-left: 10px; }
        .del-btn { background: none; border: none; color: rgba(255,255,255,.5); cursor: pointer; font-size: 1.2rem; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고</div>
        <header>
            <h1>🧹 집안일 차트</h1>
        </header>
        <div class="chore-section">
            <div class="stats">
                <div class="stat"><div class="stat-value" id="totalChores">0</div><div class="stat-label">전체</div></div>
                <div class="stat"><div class="stat-value" id="doneChores">0</div><div class="stat-label">완료</div></div>
                <div class="stat"><div class="stat-value" id="pendingChores">0</div><div class="stat-label">대기</div></div>
            </div>
            <div class="add-form">
                <div class="form-row">
                    <input type="text" id="choreName" placeholder="집안일">
                    <input type="text" id="choreAssignee" placeholder="담당자">
                </div>
                <div class="form-row">
                    <select id="choreFreq">
                        <option value="daily">매일</option>
                        <option value="weekly">매주</option>
                        <option value="monthly">매월</option>
                    </select>
                </div>
                <button class="add-btn" onclick="addChore()">집안일 추가</button>
            </div>
            <div class="chores" id="chores"></div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고</div>
    </div>
    <script>
        var chores = JSON.parse(localStorage.getItem('chores') || '[]');
        var todayKey = 'chores_done_' + new Date().toDateString();
        var doneToday = JSON.parse(localStorage.getItem(todayKey) || '[]');
        var freqNames = { daily: '매일', weekly: '매주', monthly: '매월' };
        function save() {
            localStorage.setItem('chores', JSON.stringify(chores));
            localStorage.setItem(todayKey, JSON.stringify(doneToday));
        }
        function addChore() {
            var name = document.getElementById('choreName').value.trim();
            var assignee = document.getElementById('choreAssignee').value.trim();
            var freq = document.getElementById('choreFreq').value;
            if (!name) return;
            chores.push({ id: Date.now().toString(), name: name, assignee: assignee || '미지정', freq: freq });
            save();
            document.getElementById('choreName').value = '';
            document.getElementById('choreAssignee').value = '';
            render();
        }
        function toggleChore(id) {
            if (doneToday.includes(id)) {
                doneToday = doneToday.filter(function(d) { return d !== id; });
            } else {
                doneToday.push(id);
            }
            save();
            render();
        }
        function deleteChore(id) {
            chores = chores.filter(function(c) { return c.id !== id; });
            save();
            render();
        }
        function render() {
            var done = doneToday.length;
            document.getElementById('totalChores').textContent = chores.length;
            document.getElementById('doneChores').textContent = done;
            document.getElementById('pendingChores').textContent = chores.length - done;
            var list = document.getElementById('chores');
            list.innerHTML = '';
            chores.forEach(function(chore) {
                var isDone = doneToday.includes(chore.id);
                var div = document.createElement('div');
                div.className = 'chore-item' + (isDone ? ' done' : '');
                div.innerHTML = '<div class="chore-check" onclick="toggleChore(\'' + chore.id + '\')">' + (isDone ? '✓' : '') + '</div><div class="chore-info"><div class="chore-name">' + chore.name + '</div><div class="chore-assignee">담당: ' + chore.assignee + '</div></div><span class="chore-freq">' + freqNames[chore.freq] + '</span><button class="del-btn" onclick="deleteChore(\'' + chore.id + '\')">×</button>';
                list.appendChild(div);
            });
        }
        render();
    </script>
</body>
</html>
