    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: sans-serif; min-height: 100vh; transition: background .3s; }
        h1 { text-align: center; padding: 20px; font-size: 1.5rem; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,.5); }

        input[type=text] { flex: 1; padding: 12px; border: none; border-radius: 8px; }
        .apply-btn { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; font-size: 1rem; cursor: pointer; }

<body>
    <h1>🖥️ 画面カラーテスト</h1>
    <div class="controls">
        <div class="color-grid">
            <button class="color-btn" style="background:#ff0000;color:#fff" onclick="setC('#ff0000')">赤</button>
            <button class="color-btn" style="background:#00ff00;color:#000" onclick="setC('#00ff00')">緑</button>
            <button class="color-btn" style="background:#0000ff;color:#fff" onclick="setC('#0000ff')">青</button>
            <button class="color-btn" style="background:#ffffff;color:#000" onclick="setC('#ffffff')">白</button>
            <button class="color-btn" style="background:#000000;color:#fff" onclick="setC('#000000')">黒</button>
            <button class="color-btn" style="background:#ffff00;color:#000" onclick="setC('#ffff00')">黄</button>
            <button class="color-btn" style="background:#ff00ff;color:#fff" onclick="setC('#ff00ff')">マゼンタ</button>
            <button class="color-btn" style="background:#00ffff;color:#000" onclick="setC('#00ffff')">シアン</button>
        </div>
        <div class="custom-color">
            <input type="color" id="cp" value="#667eea">
            <input type="text" id="ci" placeholder="#667eea">
        </div>
        <button class="apply-btn" onclick="applyC()">色を適用</button>
        <div class="info">モニタードット抜けテスト</div>
    </div>
    <script>
        function setC(c){document.body.style.background=c;document.getElementById('cp').value=c;document.getElementById('ci').value=c}
        function applyC(){var c=document.getElementById('ci').value||document.getElementById('cp').value;setC(c)}
        document.getElementById('cp').oninput=function(){document.getElementById('ci').value=this.value};
        setC('#667eea');
    </script>
</body>
