    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .typing-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .text-display {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 12px;
            color: #333;
            font-size: 1.2rem;
            line-height: 2;
            margin-bottom: 20px;
            min-height: 120px;
        }
        .char { transition: all 0.1s; }
        .char.correct { color: #27ae60; }
        .char.incorrect { color: #e74c3c; background: rgba(231,76,60,0.2); }
        .char.current { background: #667eea; color: white; border-radius: 2px; }
        .input-area {
            margin-bottom: 20px;
        }
        #typingInput {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.95);
            color: #333;
        }
        #typingInput:focus {
            outline: 3px solid rgba(255,255,255,0.5);
        }
        #typingInput:disabled {
            background: rgba(255,255,255,0.5);
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }
        .reset-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .control-btn:hover {
            transform: scale(1.02);
        }
        .difficulty {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .diff-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .diff-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .result-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        .result-title {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .result-stat {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 12px;
        }
        .result-value {
            font-size: 2rem;
            font-weight: 700;
        }
        .result-label {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .close-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #667eea;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .history {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .history h3 {
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ad-banner">광고 영역</div>
        <header>
            <h1>⌨️ 타이핑 속도 테스트</h1>
            <p class="subtitle">당신의 타자 실력을 측정해보세요</p>
        </header>
        <div class="typing-section">
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-value" id="wpm">0</div>
                    <div class="stat-label">WPM (분당 단어)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="accuracy">100%</div>
                    <div class="stat-label">정확도</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="timer">60</div>
                    <div class="stat-label">남은 시간 (초)</div>
                </div>
            </div>

            <div class="difficulty">
                <button class="diff-btn active" data-time="30">30초</button>
                <button class="diff-btn" data-time="60">60초</button>
                <button class="diff-btn" data-time="120">2분</button>
            </div>

            <div class="text-display" id="textDisplay">시작 버튼을 눌러 테스트를 시작하세요</div>

            <div class="input-area">
                <input type="text" id="typingInput" placeholder="여기에 타이핑하세요..." disabled autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            </div>

            <div class="controls">
                <button class="control-btn start-btn" id="startBtn" onclick="startTest()">▶ 시작</button>
                <button class="control-btn reset-btn" onclick="resetTest()">🔄 초기화</button>
            </div>

            <div class="history">
                <h3>📊 최근 기록</h3>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">광고 영역</div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <h2 class="result-title">🎉 테스트 완료!</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-value" id="resultWpm">0</div>
                    <div class="result-label">WPM</div>
                </div>
                <div class="result-stat">
                    <div class="result-value" id="resultAccuracy">0%</div>
                    <div class="result-label">정확도</div>
                </div>
                <div class="result-stat">
                    <div class="result-value" id="resultChars">0</div>
                    <div class="result-label">입력 문자</div>
                </div>
                <div class="result-stat">
                    <div class="result-value" id="resultErrors">0</div>
                    <div class="result-label">오타</div>
                </div>
            </div>
            <button class="close-btn" onclick="closeResult()">확인</button>
        </div>
    </div>

    <script>
        var texts = [
            "빠른 갈색 여우가 게으른 개를 뛰어넘습니다. 이것은 모든 알파벳을 포함하는 문장입니다.",
            "인생은 속도가 아니라 방향이 중요합니다. 천천히 가더라도 올바른 길로 가면 됩니다.",
            "성공은 최종 목적지가 아니라 여행 그 자체입니다. 매일 조금씩 성장하세요.",
            "코딩은 문제 해결의 예술입니다. 복잡한 문제를 작은 단위로 나누어 해결하세요.",
            "지식은 나눌수록 커집니다. 배운 것을 다른 사람과 공유하면 더 깊이 이해할 수 있습니다.",
            "오늘 할 수 있는 일을 내일로 미루지 마세요. 작은 시작이 큰 변화를 만듭니다.",
            "실패는 성공의 어머니입니다. 실패를 두려워하지 말고 도전하세요.",
            "꿈을 이루는 가장 좋은 방법은 깨어나서 행동하는 것입니다.",
            "좋은 습관은 좋은 인생을 만듭니다. 매일 작은 습관을 실천하세요.",
            "시간은 금입니다. 오늘 하루를 소중히 여기고 최선을 다하세요."
        ];

        var currentText = '';
        var currentIndex = 0;
        var startTime = null;
        var timerInterval = null;
        var testDuration = 30;
        var timeLeft = 30;
        var totalChars = 0;
        var correctChars = 0;
        var errorCount = 0;
        var isRunning = false;

        document.querySelectorAll('.diff-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (isRunning) return;
                document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                testDuration = parseInt(btn.dataset.time);
                timeLeft = testDuration;
                document.getElementById('timer').textContent = timeLeft;
            });
        });

        document.getElementById('typingInput').addEventListener('input', function(e) {
            if (!isRunning) return;

            var input = e.target.value;
            var displayHTML = '';

            for (var i = 0; i < currentText.length; i++) {
                if (i < input.length) {
                    if (input[i] === currentText[i]) {
                        displayHTML += '<span class="char correct">' + currentText[i] + '</span>';
                    } else {
                        displayHTML += '<span class="char incorrect">' + currentText[i] + '</span>';
                    }
                } else if (i === input.length) {
                    displayHTML += '<span class="char current">' + currentText[i] + '</span>';
                } else {
                    displayHTML += '<span class="char">' + currentText[i] + '</span>';
                }
            }

            document.getElementById('textDisplay').innerHTML = displayHTML;

            totalChars = input.length;
            correctChars = 0;
            errorCount = 0;
            for (var j = 0; j < input.length; j++) {
                if (input[j] === currentText[j]) {
                    correctChars++;
                } else {
                    errorCount++;
                }
            }

            var elapsed = (Date.now() - startTime) / 1000 / 60;
            var wpm = Math.round((correctChars / 5) / elapsed) || 0;
            var accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

            document.getElementById('wpm').textContent = wpm;
            document.getElementById('accuracy').textContent = accuracy + '%';

            if (input.length >= currentText.length) {
                currentText = texts[Math.floor(Math.random() * texts.length)];
                e.target.value = '';
                renderText();
            }
        });

        function startTest() {
            if (isRunning) return;

            isRunning = true;
            currentText = texts[Math.floor(Math.random() * texts.length)];
            currentIndex = 0;
            totalChars = 0;
            correctChars = 0;
            errorCount = 0;
            timeLeft = testDuration;

            renderText();
            document.getElementById('typingInput').disabled = false;
            document.getElementById('typingInput').value = '';
            document.getElementById('typingInput').focus();
            document.getElementById('startBtn').textContent = '진행 중...';
            document.getElementById('startBtn').disabled = true;

            startTime = Date.now();
            timerInterval = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                var elapsed = (Date.now() - startTime) / 1000 / 60;
                var wpm = Math.round((correctChars / 5) / elapsed) || 0;
                document.getElementById('wpm').textContent = wpm;

                if (timeLeft <= 0) {
                    endTest();
                }
            }, 1000);
        }

        function endTest() {
            isRunning = false;
            clearInterval(timerInterval);

            document.getElementById('typingInput').disabled = true;
            document.getElementById('startBtn').textContent = '▶ 시작';
            document.getElementById('startBtn').disabled = false;

            var elapsed = (Date.now() - startTime) / 1000 / 60;
            var finalWpm = Math.round((correctChars / 5) / elapsed) || 0;
            var finalAccuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

            document.getElementById('resultWpm').textContent = finalWpm;
            document.getElementById('resultAccuracy').textContent = finalAccuracy + '%';
            document.getElementById('resultChars').textContent = totalChars;
            document.getElementById('resultErrors').textContent = errorCount;
            document.getElementById('resultModal').style.display = 'flex';

            saveHistory(finalWpm, finalAccuracy);
        }

        function resetTest() {
            isRunning = false;
            clearInterval(timerInterval);

            currentIndex = 0;
            totalChars = 0;
            correctChars = 0;
            errorCount = 0;
            timeLeft = testDuration;

            document.getElementById('wpm').textContent = '0';
            document.getElementById('accuracy').textContent = '100%';
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('textDisplay').textContent = '시작 버튼을 눌러 테스트를 시작하세요';
            document.getElementById('typingInput').disabled = true;
            document.getElementById('typingInput').value = '';
            document.getElementById('startBtn').textContent = '▶ 시작';
            document.getElementById('startBtn').disabled = false;
        }

        function closeResult() {
            document.getElementById('resultModal').style.display = 'none';
            resetTest();
        }

        function renderText() {
            var html = '';
            for (var i = 0; i < currentText.length; i++) {
                if (i === 0) {
                    html += '<span class="char current">' + currentText[i] + '</span>';
                } else {
                    html += '<span class="char">' + currentText[i] + '</span>';
                }
            }
            document.getElementById('textDisplay').innerHTML = html;
        }

        function saveHistory(wpm, accuracy) {
            var history = JSON.parse(localStorage.getItem('typingHistory') || '[]');
            history.unshift({
                wpm: wpm,
                accuracy: accuracy,
                duration: testDuration,
                date: new Date().toLocaleDateString('ko-KR')
            });
            history = history.slice(0, 5);
            localStorage.setItem('typingHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            var history = JSON.parse(localStorage.getItem('typingHistory') || '[]');
            var list = document.getElementById('historyList');
            list.innerHTML = '';

            if (history.length === 0) {
                list.innerHTML = '<div style="opacity:0.5;text-align:center;padding:10px;">기록이 없습니다</div>';
                return;
            }

            history.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = '<span>' + item.date + ' (' + item.duration + '초)</span><span>' + item.wpm + ' WPM / ' + item.accuracy + '%</span>';
                list.appendChild(div);
            });
        }

        renderHistory();
    </script>
</body>
</html>
