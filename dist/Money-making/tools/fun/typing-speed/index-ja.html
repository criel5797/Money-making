    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }
        .container { max-width: 700px; margin: 0 auto; }
        .ad-banner {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            text-align: center;
            border-radius: 12px;
            margin-bottom: 20px;
            color: rgba(255,255,255,0.5);
        }
        header { text-align: center; margin-bottom: 30px; }
        h1 { font-size: 1.8rem; margin-bottom: 10px; }
        .subtitle { color: rgba(255,255,255,0.7); font-size: 0.95rem; }
        .typing-section {
            background: rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 25px;
            backdrop-filter: blur(10px);
        }
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }
        .stat-box {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            color: #fff;
        }
        .stat-label {
            font-size: 0.85rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .text-display {
            background: rgba(255,255,255,0.95);
            padding: 25px;
            border-radius: 12px;
            color: #333;
            font-size: 1.2rem;
            line-height: 2;
            margin-bottom: 20px;
            min-height: 120px;
        }
        .char { transition: all 0.1s; }
        .char.correct { color: #27ae60; }
        .char.incorrect { color: #e74c3c; background: rgba(231,76,60,0.2); }
        .char.current { background: #667eea; color: white; border-radius: 2px; }
        .input-area {
            margin-bottom: 20px;
        }
        #typingInput {
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            background: rgba(255,255,255,0.95);
            color: #333;
        }
        #typingInput:focus {
            outline: 3px solid rgba(255,255,255,0.5);
        }
        #typingInput:disabled {
            background: rgba(255,255,255,0.5);
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .control-btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        .start-btn {
            background: linear-gradient(135deg, #00b894, #00cec9);
            color: white;
        }
        .reset-btn {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .control-btn:hover {
            transform: scale(1.02);
        }
        .difficulty {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .diff-btn {
            flex: 1;
            padding: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            background: rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
        }
        .diff-btn.active {
            background: rgba(255,255,255,0.3);
            border-color: white;
        }
        .result-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .result-content {
            background: linear-gradient(135deg, #667eea, #764ba2);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
        }
        .result-title {
            font-size: 1.5rem;
            margin-bottom: 30px;
        }
        .result-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .result-stat {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 12px;
        }
        .result-value {
            font-size: 2rem;
            font-weight: 700;
        }
        .result-label {
            font-size: 0.85rem;
            opacity: 0.8;
        }
        .close-btn {
            padding: 15px 40px;
            border: none;
            border-radius: 12px;
            background: white;
            color: #667eea;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        .history {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid rgba(255,255,255,0.2);
        }
        .history h3 {
            font-size: 1rem;
            margin-bottom: 15px;
        }
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .history-item {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.1);
            padding: 12px 15px;
            border-radius: 8px;
            font-size: 0.9rem;
        }
    </style>

<body>
    <div class="container">
        <div class="ad-banner">広告エリア</div>
        <header>
            <h1>⌨️ タイピング速度テスト</h1>
            <p class="subtitle">あなたのタイピングスキルを測定しましょう</p>
        </header>
        <div class="typing-section">
            <div class="stats-row">
                <div class="stat-box">
                    <div class="stat-value" id="wpm">0</div>
                    <div class="stat-label">WPM (分間単語数)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="accuracy">100%</div>
                    <div class="stat-label">精度</div>
                </div>
                <div class="stat-box">
                    <div class="stat-value" id="timer">60</div>
                    <div class="stat-label">残り時間 (秒)</div>
                </div>
            </div>

            <div class="difficulty">
                <button class="diff-btn active" data-time="30">30秒</button>
                <button class="diff-btn" data-time="60">60秒</button>
                <button class="diff-btn" data-time="120">2分</button>
            </div>

            <div class="text-display" id="textDisplay">スタートボタンを押してテストを開始してください</div>

            <div class="input-area">
                <input type="text" id="typingInput" placeholder="ここに入力してください..." disabled autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
            </div>

            <div class="controls">
                <button class="control-btn start-btn" id="startBtn" onclick="startTest()">▶ スタート</button>
                <button class="control-btn reset-btn" onclick="resetTest()">🔄 リセット</button>
            </div>

            <div class="history">
                <h3>📊 最近の記録</h3>
                <div class="history-list" id="historyList"></div>
            </div>
        </div>
        <div class="ad-banner" style="margin-top:20px">広告エリア</div>
    </div>

    <div class="result-modal" id="resultModal">
        <div class="result-content">
            <h2 class="result-title">🎉 テスト完了！</h2>
            <div class="result-stats">
                <div class="result-stat">
                    <div class="result-value" id="resultWpm">0</div>
                    <div class="result-label">WPM</div>
                </div>
                <div class="result-stat">
                    <div class="result-value" id="resultAccuracy">0%</div>
                    <div class="result-label">精度</div>
                </div>
                <div class="result-stat">
                    <div class="result-value" id="resultChars">0</div>
                    <div class="result-label">入力文字数</div>
                </div>
                <div class="result-stat">
                    <div class="result-value" id="resultErrors">0</div>
                    <div class="result-label">ミス</div>
                </div>
            </div>
            <button class="close-btn" onclick="closeResult()">OK</button>
        </div>
    </div>

    <script>
        var texts = [
            "素早い茶色の狐が怠惰な犬を飛び越えます。これはすべてのアルファベットを含む文章です。",
            "人生は速さではなく方向が大切です。ゆっくりでも正しい道を歩めば目的地に着きます。",
            "成功は目的地ではなく旅そのものです。毎日少しずつ成長することを楽しみましょう。",
            "コーディングは問題解決の芸術です。複雑な問題を小さな部分に分けて解決しましょう。",
            "知識は共有すると増えます。学んだことを他の人に教えると理解が深まります。",
            "今日できることを明日に延ばさないでください。小さな始まりが大きな変化を生みます。",
            "失敗は成功の母です。失敗を恐れず挑戦しましょう。",
            "夢を実現する最良の方法は目覚めて行動することです。",
            "良い習慣は良い人生を作ります。毎日小さな習慣を実践しましょう。",
            "時間は大切です。今日という日を大切にし、常にベストを尽くしましょう。"
        ];

        var currentText = '';
        var currentIndex = 0;
        var startTime = null;
        var timerInterval = null;
        var testDuration = 30;
        var timeLeft = 30;
        var totalChars = 0;
        var correctChars = 0;
        var errorCount = 0;
        var isRunning = false;

        document.querySelectorAll('.diff-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                if (isRunning) return;
                document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                testDuration = parseInt(btn.dataset.time);
                timeLeft = testDuration;
                document.getElementById('timer').textContent = timeLeft;
            });
        });

        document.getElementById('typingInput').addEventListener('input', function(e) {
            if (!isRunning) return;

            var input = e.target.value;
            var displayHTML = '';

            for (var i = 0; i < currentText.length; i++) {
                if (i < input.length) {
                    if (input[i] === currentText[i]) {
                        displayHTML += '<span class="char correct">' + currentText[i] + '</span>';
                    } else {
                        displayHTML += '<span class="char incorrect">' + currentText[i] + '</span>';
                    }
                } else if (i === input.length) {
                    displayHTML += '<span class="char current">' + currentText[i] + '</span>';
                } else {
                    displayHTML += '<span class="char">' + currentText[i] + '</span>';
                }
            }

            document.getElementById('textDisplay').innerHTML = displayHTML;

            totalChars = input.length;
            correctChars = 0;
            errorCount = 0;
            for (var j = 0; j < input.length; j++) {
                if (input[j] === currentText[j]) {
                    correctChars++;
                } else {
                    errorCount++;
                }
            }

            var elapsed = (Date.now() - startTime) / 1000 / 60;
            var wpm = Math.round((correctChars / 5) / elapsed) || 0;
            var accuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

            document.getElementById('wpm').textContent = wpm;
            document.getElementById('accuracy').textContent = accuracy + '%';

            if (input.length >= currentText.length) {
                currentText = texts[Math.floor(Math.random() * texts.length)];
                e.target.value = '';
                renderText();
            }
        });

        function startTest() {
            if (isRunning) return;

            isRunning = true;
            currentText = texts[Math.floor(Math.random() * texts.length)];
            currentIndex = 0;
            totalChars = 0;
            correctChars = 0;
            errorCount = 0;
            timeLeft = testDuration;

            renderText();
            document.getElementById('typingInput').disabled = false;
            document.getElementById('typingInput').value = '';
            document.getElementById('typingInput').focus();
            document.getElementById('startBtn').textContent = '実行中...';
            document.getElementById('startBtn').disabled = true;

            startTime = Date.now();
            timerInterval = setInterval(function() {
                timeLeft--;
                document.getElementById('timer').textContent = timeLeft;

                var elapsed = (Date.now() - startTime) / 1000 / 60;
                var wpm = Math.round((correctChars / 5) / elapsed) || 0;
                document.getElementById('wpm').textContent = wpm;

                if (timeLeft <= 0) {
                    endTest();
                }
            }, 1000);
        }

        function endTest() {
            isRunning = false;
            clearInterval(timerInterval);

            document.getElementById('typingInput').disabled = true;
            document.getElementById('startBtn').textContent = '▶ スタート';
            document.getElementById('startBtn').disabled = false;

            var elapsed = (Date.now() - startTime) / 1000 / 60;
            var finalWpm = Math.round((correctChars / 5) / elapsed) || 0;
            var finalAccuracy = totalChars > 0 ? Math.round((correctChars / totalChars) * 100) : 100;

            document.getElementById('resultWpm').textContent = finalWpm;
            document.getElementById('resultAccuracy').textContent = finalAccuracy + '%';
            document.getElementById('resultChars').textContent = totalChars;
            document.getElementById('resultErrors').textContent = errorCount;
            document.getElementById('resultModal').style.display = 'flex';

            saveHistory(finalWpm, finalAccuracy);
        }

        function resetTest() {
            isRunning = false;
            clearInterval(timerInterval);

            currentIndex = 0;
            totalChars = 0;
            correctChars = 0;
            errorCount = 0;
            timeLeft = testDuration;

            document.getElementById('wpm').textContent = '0';
            document.getElementById('accuracy').textContent = '100%';
            document.getElementById('timer').textContent = timeLeft;
            document.getElementById('textDisplay').textContent = 'スタートボタンを押してテストを開始してください';
            document.getElementById('typingInput').disabled = true;
            document.getElementById('typingInput').value = '';
            document.getElementById('startBtn').textContent = '▶ スタート';
            document.getElementById('startBtn').disabled = false;
        }

        function closeResult() {
            document.getElementById('resultModal').style.display = 'none';
            resetTest();
        }

        function renderText() {
            var html = '';
            for (var i = 0; i < currentText.length; i++) {
                if (i === 0) {
                    html += '<span class="char current">' + currentText[i] + '</span>';
                } else {
                    html += '<span class="char">' + currentText[i] + '</span>';
                }
            }
            document.getElementById('textDisplay').innerHTML = html;
        }

        function saveHistory(wpm, accuracy) {
            var history = JSON.parse(localStorage.getItem('typingHistory') || '[]');
            history.unshift({
                wpm: wpm,
                accuracy: accuracy,
                duration: testDuration,
                date: new Date().toLocaleDateString('ja-JP')
            });
            history = history.slice(0, 5);
            localStorage.setItem('typingHistory', JSON.stringify(history));
            renderHistory();
        }

        function renderHistory() {
            var history = JSON.parse(localStorage.getItem('typingHistory') || '[]');
            var list = document.getElementById('historyList');
            list.innerHTML = '';

            if (history.length === 0) {
                list.innerHTML = '<div style="opacity:0.5;text-align:center;padding:10px;">記録がありません</div>';
                return;
            }

            history.forEach(function(item) {
                var div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = '<span>' + item.date + ' (' + item.duration + '秒)</span><span>' + item.wpm + ' WPM / ' + item.accuracy + '%</span>';
                list.appendChild(div);
            });
        }

        renderHistory();
    </script>
</body>
</html>
