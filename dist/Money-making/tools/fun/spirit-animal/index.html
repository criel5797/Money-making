        let currentQuestion = 0;
        let answers = [];
        let resultData = {};

        function startTest() {
            document.getElementById('introSection').style.display = 'none';
            document.getElementById('questionSection').classList.add('active');
            showQuestion(0);
        }

        function showQuestion(index) {
            const q = questions[index];
            const container = document.getElementById('questionCard');

            let optionsHtml = q.options.map((opt, i) =>
                `<div class="option" onclick="selectOption(${i}, '${opt.type}')">${opt.text}</div>`
            ).join('');

            container.innerHTML = `
                <div class="question-text">${q.text}</div>
                <div class="options">${optionsHtml}</div>
            `;

            document.getElementById('progressFill').style.width = ((index + 1) / questions.length * 100) + '%';
            document.getElementById('progressText').textContent = `${index + 1} / ${questions.length}`;
        }

        function selectOption(optionIndex, type) {
            answers.push(type);
            document.querySelectorAll('.option')[optionIndex].classList.add('selected');

            setTimeout(() => {
                if (currentQuestion < questions.length - 1) {
                    currentQuestion++;
                    showQuestion(currentQuestion);
                } else {
                    calculateResult();
                }
            }, 400);
        }

        function calculateResult() {
            // 유형 카운트
            const counts = {};
            answers.forEach(type => {
                counts[type] = (counts[type] || 0) + 1;
            });

            // 동물 매칭
            let animal = 'fox'; // 기본값

            if (counts.leader >= 2 && counts.active >= 1) animal = 'lion';
            else if (counts.calm >= 3 || (counts.lone >= 2 && counts.calm >= 1)) animal = 'cat';
            else if (counts.social >= 3 || (counts.active >= 2 && counts.social >= 1)) animal = 'dog';
            else if (counts.smart >= 3) animal = 'owl';
            else if (counts.lone >= 3 || (counts.smart >= 2 && counts.calm >= 1)) animal = 'wolf';
            else if (counts.free >= 3) animal = 'butterfly';
            else if (counts.social >= 2 && counts.calm >= 1) animal = 'rabbit';
            else if (counts.smart >= 2 || counts.calm >= 2) animal = 'fox';

            resultData = animals[animal];
            displayResult();
        }

        function displayResult() {
            document.getElementById('questionSection').classList.remove('active');
            document.getElementById('resultSection').classList.add('show');

            document.getElementById('animalEmoji').textContent = resultData.emoji;
            document.getElementById('animalName').textContent = resultData.name;
            document.getElementById('animalTitle').textContent = resultData.title;
            document.getElementById('animalDescription').textContent = resultData.description;
            document.getElementById('animalStrength').textContent = resultData.strength;
            document.getElementById('animalWeakness').textContent = resultData.weakness;

            document.getElementById('traitsContainer').innerHTML = resultData.traits.map(t =>
                `<span class="trait-tag">${t}</span>`
            ).join('');

            document.getElementById('matchSection').innerHTML = `
                <div class="match-item good">
                    <div class="label">잘 맞는 동물</div>
                    <div class="emoji">${resultData.goodMatch.emoji}</div>
                    <div class="name">${resultData.goodMatch.name}</div>
                </div>
                <div class="match-item bad">
                    <div class="label">주의할 동물</div>
                    <div class="emoji">${resultData.badMatch.emoji}</div>
                    <div class="name">${resultData.badMatch.name}</div>
                </div>
            `;
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function shareResult() {
            const text = `🦊 동물 성격 테스트 결과

나의 동물 유형: ${resultData.emoji} ${resultData.name}
${resultData.title}

${resultData.description}

✨ 나의 특징: ${resultData.traits.slice(0, 3).join(' · ')}

🐾 너는 어떤 동물일까?`;

            window.shareWithModal('동물 성격 테스트', text);
        }

        function resetTest() {
            currentQuestion = 0;
            answers = [];
            document.getElementById('resultSection').classList.remove('show');
            document.getElementById('questionSection').classList.remove('active');
            document.getElementById('introSection').style.display = 'block';
        }
    </script>
